// ── PWA Install Banner ──────────────────────────────────────────────
const InstallBanner = () => {
  const [show, setShow] = React.useState(false);
  const [installed, setInstalled] = React.useState(false);
  const promptRef = React.useRef(null);

  React.useEffect(() => {
    // Already standalone (installed)?
    if (window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true) {
      setInstalled(true);
      return;
    }
    const onReady = () => {
      promptRef.current = window._pwaInstallPrompt;
      setShow(true);
    };
    const onInstalled = () => { setShow(false); setInstalled(true); };
    window.addEventListener('pwaInstallReady', onReady);
    window.addEventListener('pwaInstalled', onInstalled);
    // In case event already fired before component mounted
    if (window._pwaInstallPrompt) onReady();
    return () => {
      window.removeEventListener('pwaInstallReady', onReady);
      window.removeEventListener('pwaInstalled', onInstalled);
    };
  }, []);

  if (!show || installed) return null;

  const handleInstall = () => {
    if (!promptRef.current) return;
    promptRef.current.prompt();
    promptRef.current.userChoice.then(choice => {
      if (choice.outcome === 'accepted') setShow(false);
      promptRef.current = null;
      window._pwaInstallPrompt = null;
    });
  };

  return (
    <div style={{
      position:'fixed', bottom:72, left:'50%', transform:'translateX(-50%)',
      zIndex:9999, background:'#1a1d2e', border:'1.5px solid #00d4b8',
      borderRadius:14, padding:'10px 14px', display:'flex', alignItems:'center',
      gap:10, boxShadow:'0 8px 32px rgba(0,0,0,.6)', maxWidth:320, width:'calc(100% - 32px)'}}>
      <span style={{fontSize:26, flexShrink:0}}>📲</span>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:12, fontWeight:800, color:'#e8eaf8'}}>Install Hemi Bros</div>
        <div style={{fontSize:10, color:'#8890b8', marginTop:1}}>Add to your home screen for quick access</div>
      </div>
      <button onClick={handleInstall} style={{
        background:'#00d4b8', border:'none', borderRadius:8, padding:'6px 12px',
        fontSize:11, fontWeight:800, color:'#0b0c14', cursor:'pointer', flexShrink:0}}>
        Install
      </button>
      <button onClick={() => setShow(false)} style={{
        background:'none', border:'none', color:'#4d5580', fontSize:16,
        cursor:'pointer', padding:0, flexShrink:0, lineHeight:1}}>✕</button>
    </div>
  );
};

const GrandExchange = ({nfts, traitMap, onSelectNft}) => {
  const [tab,       setTab]      = useState('table');
  const [catFilter, setCatFilter]= useState('All');
  const [search,    setSearch]   = useState('');
  const [sortKey,   setSortKey]  = useState('price');
  const [sortDir,   setSortDir]  = useState('desc');
  const [hoverDot,  setHoverDot] = useState(null);
  const [salesPage, setSalesPage]= useState(0);
  const [rangeFilter,  setRangeFilter] = useState(null); // null | 'above' | 'on' | 'below'
  const [traitFilter,  setTraitFilter] = useState(null); // null | {name, cat, color}
  const [saleModal,    setSaleModal]   = useState(null); // null | sale object
  const [histSortKey,  setHistSortKey] = useState('date');
  const [histSortDir,  setHistSortDir] = useState('desc');

  const histCols = [
    ['id',    'ID',    'center'],
    ['date',  'Date',  'left'  ],
    ['price', 'Price', 'right' ],
    ['di',    'DI',    'center'],
    ['model', 'Mdl',   'center'],
    ['pct',   'vs Mid','right' ],
    ['see',   '🔍',    'center'],
  ];

  const toggleHistSort = key => {
    if(key === 'see') return; // not sortable
    setHistSortKey(k => {
      if(k === key) { setHistSortDir(d => d==='asc'?'desc':'asc'); return k; }
      setHistSortDir('desc');
      return key;
    });
  };
  const [showHelp,     setShowHelp]    = useState(false);
  const [showFloorEdit,setShowFloorEdit]= useState(false);
  const [floorLo,      setFloorLo]     = useState(FLOOR_LO);
  const [floorHi,      setFloorHi]     = useState(FLOOR_HI);
  const [floorLoInput, setFloorLoInput]= useState(String(FLOOR_LO));
  const [floorHiInput, setFloorHiInput]= useState(String(FLOOR_HI));
  const SALES_PER_PAGE = 50;

  const CAT_COLORS = {
    'Bro Type':   'var(--r-grail)',
    'Headwear':   'var(--r-legendary)',
    'Clothes':    'var(--r-epic)',
    'Eyes':       'var(--r-rare)',
    'Eyewear':    'var(--r-uncommon)',
    'Mouth Items':'var(--gold)',
  };

  // ── Per-trait analytics ──────────────────────────────────────────
  const allSales = useMemo(() => {
    // 1. Collect all valid sales with timestamps
    const raw = [];
    nfts.forEach(n => {
      (n.sales||[]).forEach(s => {
        if(s.price > 0) raw.push({...s, nft:n, ts: new Date(s.date||0).getTime()});
      });
    });
    raw.sort((a,b) => a.ts - b.ts);

    // Uses floorLo/floorHi state (user-adjustable) instead of global constants
    // Attach expected range and onTarget to each sale.
    return raw.map(s => {
      const r          = getMultipleRange(s.nft) || diScoreToRange(s.nft.diScore);
      const expectedLo = floorLo * r.lo;
      const expectedHi = floorHi * r.hi;
      const expectedMid= (floorLo * r.lo + floorHi * r.hi) / 2;
      const onTarget   = s.price >= expectedLo && s.price <= expectedHi;
      return {
        ...s,
        expectedLo, expectedHi, expectedMid,
        miss:    expectedMid != null ? s.price - expectedMid : null,
        onTarget: expectedLo != null ? onTarget : null,
      };
    }).sort((a,b) => b.ts - a.ts); // keep newest-first for display
  }, [nfts, floorLo, floorHi]);

  // ── All individual sale events ───────────────────────────────────
  // ── Build sorted-by-date sales list first, then compute time-local floors ──
  const traitRows = useMemo(() => {
    const rows = [];
    Object.values(traitMap).forEach(detail => {
      const name = detail['Unique Item List'];
      const cat  = detail.Category;
      if(!name || !cat || !CATS.includes(cat)) return;
      if(name.toLowerCase() === 'none') return;
      const supply = parseInt(detail.Supply) || 0;
      const score  = detail.adjustedScore || 0;
      const rarity = getRarityTier(score);

      const hasTraitNfts = nfts.filter(n => {
        const v = n[cat]; if(!v) return false;
        return String(v).split('(')[0].trim().toLowerCase() === name.toLowerCase();
      });
      const sales      = hasTraitNfts.flatMap(n => (n.sales||[]).map(s => ({...s, nft:n})));
      const validSales = sales.filter(s => s.price > 0);
      const prices     = validSales.map(s => s.price);
      const avgPrice   = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : null;
      const minPrice   = prices.length ? Math.min(...prices) : null;
      const maxPrice   = prices.length ? Math.max(...prices) : null;

      // Premium: avg sale price above the minimum of this trait's expected range.
      // tExpLo = FLOOR_LO × multiple.lo = the lowest "fair value" for this tier.
      // Tells you: how much above rock-bottom expectations did it actually sell?
      const traitRange = diScoreToRange(score);
      const tExpLo  = floorLo * traitRange.lo;
      const tExpHi  = floorHi * traitRange.hi;
      const tExpMid = (tExpLo + tExpHi) / 2;
      const premiums = validSales.map(s => s.price - tExpLo);
      const premium  = premiums.length ? premiums.reduce((a,b)=>a+b,0)/premiums.length : null;

      // Efficiency: DI pts per 0.01 ETH of premium above tier floor.
      const rawEff = premium && premium > 0.001 && score > 0 ? score / (premium * 100) : null;
      const efficiency = rawEff != null ? Math.min(rawEff, 9999) : null;

      // Miss: avg distance from the midpoint of expected range.
      // Positive = sold above midpoint (outperformed), negative = sold below (underperformed).
      // Unlike the binary ↑/✓/↓, this is a continuous signal — a trait at 0.001 miss
      // sat right at the center of its range; +0.01 means consistently beating the midpoint.
      const avgMiss = validSales.length
        ? validSales.reduce((acc, s) => acc + (s.price - tExpMid), 0) / validSales.length
        : null;

      rows.push({
        name, cat, supply, score, rarity,
        thumbnailUrl: detail.thumbnailUrl || null,
        saleCount: validSales.length,
        avgPrice, minPrice, maxPrice, premium, efficiency,
        avgMiss,
        sales: validSales,
        exampleNft: hasTraitNfts[0] || null,
        nftCount: hasTraitNfts.length,
      });
    });
    return rows;
  }, [nfts, traitMap, allSales, floorLo, floorHi]);

  const allSalesByScore = useMemo(() =>
    [...allSales].sort((a,b) => a.nft.diScore - b.nft.diScore)
  , [allSales]);

  // ── Filtered + sorted trait table ───────────────────────────────
  const filteredRows = useMemo(() => {
    let rows = [...traitRows];
    if(catFilter !== 'All') rows = rows.filter(r => r.cat === catFilter);
    if(search.trim()) {
      const q = search.trim().toLowerCase();
      rows = rows.filter(r => r.name.toLowerCase().includes(q));
    }
    const getVal = (r,k) => ({
      name:r.name, cat:r.cat, supply:r.supply||0, score:r.score||0,
      sales:r.saleCount||0, price:r.avgPrice||0, prem:r.premium||0, miss:r.avgMiss||0,
    }[k]??0);
    rows.sort((a,b) => {
      const av=getVal(a,sortKey), bv=getVal(b,sortKey);
      if(typeof av==='string') return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
      return sortDir==='asc'?av-bv:bv-av;
    });
    return rows;
  }, [traitRows, catFilter, search, sortKey, sortDir]);

  // ── Summary insights ─────────────────────────────────────────────
  const summary = useMemo(() => {
    const withSales = traitRows.filter(r => r.saleCount > 0);
    if(!allSales.length) return null;
    const prices = allSales.map(s=>s.price);
    const avg    = prices.reduce((a,b)=>a+b,0)/prices.length;
    const topPremium = [...withSales].filter(r=>r.premium!=null).sort((a,b)=>(b.premium||0)-(a.premium||0))[0]||null;
    const topEff     = [...withSales].filter(r=>(r.efficiency||0)>0).sort((a,b)=>(b.efficiency||0)-(a.efficiency||0))[0]||null;
    const mostSold   = [...withSales].sort((a,b)=>b.saleCount-a.saleCount)[0]||null;
    const highSale   = [...allSales].sort((a,b)=>b.price-a.price)[0]||null;
    // Pearson r: DI score vs price
    const xs=allSalesByScore.map(s=>s.nft.diScore), ys=allSalesByScore.map(s=>s.price);
    const n=xs.length, mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
    const r = xs.reduce((a,v,i)=>a+(v-mx)*(ys[i]-my),0) /
      (Math.sqrt(xs.reduce((a,v)=>a+(v-mx)**2,0)*ys.reduce((a,v)=>a+(v-my)**2,0))||1);
    // Avg DI score of sold NFTs vs collection avg
    const soldDI    = allSales.map(s=>s.nft.diScore);
    const avgSoldDI = soldDI.reduce((a,b)=>a+b,0)/soldDI.length;
    const collDI    = nfts.length ? nfts.reduce((a,n)=>a+n.diScore,0)/nfts.length : 0;
    // Miss analysis — model validation
    // ── Spearman rank correlation: DI score rank vs sale price rank ──
    // Tests whether higher-DI Bros sold for more — independent of absolute floor level.
    // Each NFT with multiple sales: use avg sale price to avoid over-representing it.
    const soldNftMap = {};
    allSales.forEach(s => {
      const id = s.nft.ID;
      if(!soldNftMap[id]) soldNftMap[id] = { diScore: s.nft.diScore, prices: [] };
      soldNftMap[id].prices.push(s.price);
    });
    const soldNfts = Object.values(soldNftMap).map(v => ({
      diScore: v.diScore,
      avgPrice: v.prices.reduce((a,b)=>a+b,0)/v.prices.length,
    }));
    console.log('[GX] soldNfts:', soldNfts.length, '| allSales:', allSales.length,
      '| onTarget:', allSales.filter(s=>s.onTarget).length,
      '| above:', allSales.filter(s=>s.onTarget===false && s.price>(s.expectedHi||0)).length,
      '| below:', allSales.filter(s=>s.onTarget===false && s.price<(s.expectedLo||Infinity)).length,
      '| sampleSales:', allSales.slice(0,5).map(s=>`#${s.nft.ID} DI${s.nft.diScore.toFixed(0)} exp[${s.expectedLo?.toFixed(4)}-${s.expectedHi?.toFixed(4)}] sold${s.price.toFixed(4)} ${s.onTarget?'✓':'✗'}`),
    );

    // Weighted Kendall's tau: compare every pair of sold Bros.
    // Each pair is weighted by their DI score gap — a pair with DI 411 vs DI 20
    // counts far more than DI 30 vs DI 29. This makes the metric robust to noise
    // in close-scoring comparisons where price differences are barely meaningful.
    const weightedTau = arr => {
      const n = arr.length;
      if(n < 2) return null;
      let wConcordant = 0, wDiscordant = 0, totalWeight = 0;
      let nConcordant = 0, nDiscordant = 0;
      for(let i = 0; i < n; i++){
        for(let j = i+1; j < n; j++){
          const diGap      = Math.abs(arr[i].diScore - arr[j].diScore);
          const diAgree    = Math.sign(arr[i].diScore  - arr[j].diScore);
          const priceAgree = Math.sign(arr[i].avgPrice - arr[j].avgPrice);
          if(diAgree === 0 || priceAgree === 0) continue;
          if(diAgree === priceAgree){ wConcordant += diGap; nConcordant++; }
          else                      { wDiscordant += diGap; nDiscordant++; }
          totalWeight += diGap;
        }
      }
      if(totalWeight === 0) return null;
      return {
        tau: (wConcordant - wDiscordant) / totalWeight,
        nConcordant, nDiscordant,
        totalPairs: nConcordant + nDiscordant,
      };
    };
    const tauResult     = soldNfts.length >= 2 ? weightedTau(soldNfts) : null;
    const spearmanR     = tauResult?.tau ?? null;
    const spearmanN     = soldNfts.length;
    const tauConcordant = tauResult?.nConcordant ?? 0;
    const tauDiscordant = tauResult?.nDiscordant ?? 0;
    const tauPairs      = tauResult?.totalPairs  ?? 0;

    // Keep on-target count for secondary display
    const withMiss   = allSales.filter(s => s.onTarget != null);
    const exact      = withMiss.filter(s => s.onTarget).length;
    const overshoot  = withMiss.filter(s => !s.onTarget && s.price > (s.expectedHi||0)).length;
    const undershoot = withMiss.filter(s => !s.onTarget && s.price < (s.expectedLo||Infinity)).length;

    return { total:allSales.length, avg, min:Math.min(...prices), max:Math.max(...prices),
      topPremium, topEff, mostSold, highSale, r, avgSoldDI, collDI,
      traitsWithSales: withSales.length,
      spearmanR, spearmanN, tauConcordant, tauDiscordant, tauPairs,
      exact, overshoot, undershoot, withMissCount: withMiss.length };
  }, [traitRows, allSales, allSalesByScore, nfts]);

  const toggleSort = key => {
    if(sortKey===key) setSortDir(d=>d==='desc'?'asc':'desc');
    else { setSortKey(key); setSortDir('desc'); }
  };
  const SH = key => sortKey===key?(sortDir==='desc'?'↓':'↑'):'⇅';
  const fE = v => v==null?'—':v.toFixed(3)+' Ξ';
  const fP = v => v==null?'—':`${v>=0?'+':''}${v.toFixed(3)} Ξ`;

  // ── Scatter Plot ─────────────────────────────────────────────────
  const ScatterPlot = () => {
    if(!allSalesByScore.length) return (
      <div style={{color:'var(--txt3)',padding:'40px 0',textAlign:'center'}}>No sales data to plot.</div>
    );
    const W=340,H=220,PL=50,PR=14,PT=14,PB=38;
    const IW=W-PL-PR, IH=H-PT-PB;
    const xs=allSalesByScore.map(s=>s.nft.diScore), ys=allSalesByScore.map(s=>s.price);
    const xMn=Math.min(...xs),xMx=Math.max(...xs)||1;
    const yMn=0, yMx=Math.max(...ys)*1.2||1;
    const px=v=>PL+(v-xMn)/(xMx-xMn)*IW;
    const py=v=>H-PB-(v-yMn)/(yMx-yMn)*IH;
    const n=xs.length,mx2=xs.reduce((a,b)=>a+b,0)/n,my2=ys.reduce((a,b)=>a+b,0)/n;
    const sl=xs.reduce((a,v,i)=>a+(v-mx2)*(ys[i]-my2),0)/(xs.reduce((a,v)=>a+(v-mx2)**2,0)||1);
    const ic=my2-sl*mx2;
    const xTicks=[xMn, Math.round((xMn+xMx)/2), xMx];
    const yTicks=[0, parseFloat((yMx/2).toFixed(4)), parseFloat(yMx.toFixed(4))];
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{maxWidth:520,display:'block',margin:'0 auto',overflow:'visible'}}>
        {yTicks.map((v,i)=>(
          <line key={i} x1={PL} x2={W-PR} y1={py(v)} y2={py(v)} stroke="var(--line)" strokeWidth={.5} strokeDasharray="3,3"/>
        ))}
        <line x1={px(xMn)} y1={py(sl*xMn+ic)} x2={px(xMx)} y2={py(sl*xMx+ic)}
          stroke="var(--pop)" strokeWidth={1.5} strokeDasharray="5,3" opacity={.75}/>
        {allSalesByScore.map((s,i)=>{
          const isH=hoverDot===i;
          const col = CAT_COLORS[Object.keys(CAT_COLORS)[i % 6]] || 'var(--teal)';
          return(
            <circle key={i} cx={px(s.nft.diScore)} cy={py(s.price)} r={isH?6:3.5}
              fill="var(--teal)" stroke="var(--ink2)" strokeWidth={.8}
              opacity={isH?1:.6} style={{cursor:'pointer',transition:'r .1s'}}
              onMouseEnter={()=>setHoverDot(i)} onMouseLeave={()=>setHoverDot(null)}
              onClick={()=>onSelectNft&&onSelectNft(s.nft)}/>
          );
        })}
        <line x1={PL} y1={H-PB} x2={W-PR} y2={H-PB} stroke="var(--line2)" strokeWidth={1}/>
        <line x1={PL} y1={PT}   x2={PL}   y2={H-PB} stroke="var(--line2)" strokeWidth={1}/>
        {xTicks.map((v,i)=>(
          <g key={i}>
            <line x1={px(v)} y1={H-PB} x2={px(v)} y2={H-PB+4} stroke="var(--line2)"/>
            <text x={px(v)} y={H-PB+13} textAnchor="middle" fill="var(--txt3)" fontSize={8}>{Math.round(v)}</text>
          </g>
        ))}
        {yTicks.map((v,i)=>(
          <g key={i}>
            <line x1={PL-4} y1={py(v)} x2={PL} y2={py(v)} stroke="var(--line2)"/>
            <text x={PL-6} y={py(v)+3} textAnchor="end" fill="var(--txt3)" fontSize={8}>{v}</text>
          </g>
        ))}
        <text x={PL+IW/2} y={H-2} textAnchor="middle" fill="var(--txt3)" fontSize={9}>NFT DI Score →</text>
        <text x={10} y={PT+IH/2} textAnchor="middle" fill="var(--txt3)" fontSize={9}
          transform={`rotate(-90,10,${PT+IH/2})`}>Sale Price (Ξ)</text>
        {hoverDot!=null&&allSalesByScore[hoverDot]&&(()=>{
          const s=allSalesByScore[hoverDot];
          const cx=px(s.nft.diScore),cy=py(s.price);
          const tx=cx>W*.65?cx-100:cx+8, ty=cy<36?cy+10:cy-34;
          return(
            <g>
              <rect x={tx-4} y={ty-14} width={104} height={34} rx={5}
                fill="var(--ink3)" stroke="var(--teal)" strokeWidth={.8}/>
              <text x={tx+1} y={ty} fill="var(--teal)" fontSize={9} fontWeight="bold">
                {`#${s.nft.ID} · ${s.price} Ξ`}
              </text>
              <text x={tx+1} y={ty+12} fill="var(--txt3)" fontSize={8}>
                {`DI ${s.nft.diScore.toFixed(1)}`}
              </text>
              <text x={tx+1} y={ty+22} fill="var(--txt3)" fontSize={8}>
                {s.date||''}
              </text>
            </g>
          );
        })()}
      </svg>
    );
  };

  const toggleHistSort = key => {
    if(histSortKey===key) setHistSortDir(d=>d==='desc'?'asc':'desc');
    else { setHistSortKey(key); setHistSortDir('desc'); }
  };
  const HSH = key => histSortKey===key?(histSortDir==='desc'?'↓':'↑'):'⇅';

  const filteredSales = useMemo(()=>{
    const base = allSales.filter(s => {
      if(traitFilter) {
        const v = s.nft[traitFilter.cat];
        if(!v) return false;
        if(String(v).split('(')[0].trim().toLowerCase() !== traitFilter.name.toLowerCase()) return false;
      }
      if(rangeFilter) {
        if(s.onTarget == null) return false;
        if(rangeFilter==='on')    return s.onTarget;
        if(rangeFilter==='above') return !s.onTarget && s.price > (s.expectedHi||0);
        if(rangeFilter==='below') return !s.onTarget && s.price < (s.expectedLo||Infinity);
      }
      return true;
    });
    return [...base].sort((a,b)=>{
      let av,bv;
      if(histSortKey==='id')    { av=a.nft.ID;       bv=b.nft.ID; }
      else if(histSortKey==='date')  { av=new Date(a.date||0); bv=new Date(b.date||0); }
      else if(histSortKey==='price') { av=a.price;     bv=b.price; }
      else if(histSortKey==='di')    { av=a.nft.diScore; bv=b.nft.diScore; }
      else if(histSortKey==='model') { av=a.onTarget?1:a.price>(a.expectedHi||0)?2:0; bv=b.onTarget?1:b.price>(b.expectedHi||0)?2:0; }
      else if(histSortKey==='pct')   { av=a.expectedMid>0?(a.price-a.expectedMid)/a.expectedMid:0; bv=b.expectedMid>0?(b.price-b.expectedMid)/b.expectedMid:0; }
      else { av=0; bv=0; }
      return histSortDir==='desc' ? (av>bv?-1:av<bv?1:0) : (av>bv?1:av<bv?-1:0);
    });
  },[allSales,traitFilter,rangeFilter,histSortKey,histSortDir]);
  // pagedSales removed — full list rendered
  const totalPages = Math.ceil(filteredSales.length / SALES_PER_PAGE);

  return (
    <div className="gx-wrap">
      {/* ── SALE BAND MODAL ── */}
      {saleModal&&<SaleBandModal sale={saleModal} onClose={()=>setSaleModal(null)}/>}

      {/* ── HELP MODAL ── */}
      {showHelp&&(
        <div onClick={()=>setShowHelp(false)} style={{
          position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,.75)',
          display:'flex',alignItems:'flex-start',justifyContent:'center',
          padding:'20px 16px',overflowY:'auto'}}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:'var(--ink2)',border:'1px solid var(--line)',borderRadius:14,
            width:'100%',maxWidth:540,padding:'20px 22px',position:'relative'}}>

            {/* Close */}
            <button onClick={()=>setShowHelp(false)} style={{
              position:'absolute',top:12,right:14,background:'none',border:'none',
              color:'var(--txt3)',fontSize:18,cursor:'pointer',lineHeight:1}}>✕</button>

            <div style={{fontSize:16,fontWeight:800,color:'var(--txt)',marginBottom:4}}>
              📊 How to Read the Grand Exchange
            </div>
            <div style={{fontSize:11,color:'var(--txt3)',marginBottom:18}}>
              A guide to the Traits table, column definitions, and sales history symbols.
            </div>

            {/* ── SECTION: Floor Range ── */}
            <Section title="The Floor Range">
              <p>Every calculation here uses a <b>historical floor range of 0.004–0.013 ETH</b> — the band the collection floor operated in over its sale history. No single fixed floor is used because the floor moved during that period.</p>
              <p style={{marginTop:8}}>Combined with a trait's <b>DI floor multiple</b>, this defines the full expected price band for any NFT.</p>
            </Section>

            {/* ── SECTION: DI Floor Multiple ── */}
            <Section title="DI Score & Floor Multiple">
              <p>Each NFT has a cumulative <b>DI (Desirability Index) score</b> — the sum of all its trait scores. That total maps to a <b>floor multiple tier</b>:</p>
              <div style={{margin:'10px 0',border:'1px solid var(--line)',borderRadius:8,overflow:'hidden'}}>
                {[
                  {range:'DI ≥ 375',   mult:'30x – 50x',  ex:'0.12–0.75 ETH'},
                  {range:'DI 148–375', mult:'10x – 30x',  ex:'0.04–0.45 ETH'},
                  {range:'DI 65–148',  mult:'5x – 10x',   ex:'0.02–0.15 ETH'},
                  {range:'DI 45–65',   mult:'2x – 5x',    ex:'0.008–0.075 ETH'},
                  {range:'DI 35–45',   mult:'1.5x – 2x',  ex:'0.006–0.03 ETH'},
                  {range:'DI 23.5–35', mult:'1x – 1.5x',  ex:'0.004–0.0225 ETH'},
                  {range:'DI 15–23.5', mult:'1x (floor)', ex:'0.004–0.013 ETH'},
                  {range:'DI < 15',    mult:'0.8x – 1x',  ex:'0.0032–0.013 ETH'},
                ].map((row,i)=>(
                  <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',
                    padding:'5px 10px',fontSize:10,fontFamily:'Space Mono,monospace',
                    background:i%2===0?'var(--ink2)':'var(--ink3)',
                    borderBottom:'1px solid var(--line)'}}>
                    <span style={{color:'var(--txt3)'}}>{row.range}</span>
                    <span style={{color:'var(--teal)',fontWeight:700}}>{row.mult}</span>
                    <span style={{color:'var(--txt2)'}}>{row.ex}</span>
                  </div>
                ))}
              </div>
              <p style={{fontSize:10,color:'var(--txt3)'}}>The expected price band = <b>floor low × multiple low</b> to <b>floor high × multiple high</b>. A 2x–5x NFT is on-model anywhere from 0.008 to 0.075 ETH.</p>
            </Section>

            {/* ── SECTION: Traits Table Columns ── */}
            <Section title="Traits Table Columns">
              {[
                {col:"DI", desc:"The trait's individual Adjusted Score from the DI model. Higher = rarer and more desirable. This is one component of an NFT's total DI score."},
                {col:"QTY", desc:"How many NFTs in the collection have this trait."},
                {col:"# Sales", desc:"Number of recorded sales of NFTs that have this trait."},
                {col:"Avg Ξ", desc:"Average sale price in ETH across all sales of NFTs with this trait."},
                {col:"+Flr", desc:"Average premium above the tier floor minimum. Calculated as: avg sale price − (FLOOR_LO × multiple.lo). Example: a 30x–50x trait (floor min = 0.12 ETH) selling at 0.30 ETH has +Flr of 0.18 ETH. Tells you how far above rock-bottom expectations it traded."},
                {col:"vs Mid", desc:"Average distance from the midpoint of the expected range. Positive = consistently selling in the upper half of its range (outperforming). Negative = selling in the lower half. Near zero = right at the model's center prediction. Example: Darth Vader at 0.30 ETH in a 0.12–0.75 range has a midpoint of 0.435, so vs Mid = −0.135 (sold, but in the cheap end of a wide tier)."},
              ].map(({col,desc})=>(
                <div key={col} style={{marginBottom:10}}>
                  <span style={{fontFamily:'Space Mono,monospace',fontSize:11,fontWeight:700,
                    color:'var(--teal)',background:'var(--ink3)',padding:'2px 6px',borderRadius:4}}>{col}</span>
                  <span style={{fontSize:11,color:'var(--txt2)',marginLeft:8,lineHeight:1.5}}>{desc}</span>
                </div>
              ))}
            </Section>

            {/* ── SECTION: Sales History Symbols ── */}
            <Section title="Sales History: ↑ ✓ ↓ Symbols">
              <p>Each sale is marked based on whether the price fell within the NFT’s expected range:</p>
              <div style={{margin:'10px 0 6px'}}>
                {[
                  {icon:'↑', col:'var(--green)', label:'Above range', desc:'Sold higher than FLOOR_HI × multiple.hi. Either a great sale, or the floor was higher than the model assumed during that period.'},
                  {icon:'✓', col:'var(--teal)',  label:'On target',   desc:'Sold within the expected band. The model predicted this price range correctly.'},
                  {icon:'↓', col:'var(--red)',   label:'Below range', desc:'Sold lower than FLOOR_LO × multiple.lo. Could indicate a distressed sale, thin liquidity, or a very low floor period.'},
                ].map(({icon,col,label,desc})=>(
                  <div key={icon} style={{display:'flex',gap:10,marginBottom:10,alignItems:'flex-start'}}>
                    <span style={{fontSize:20,fontWeight:900,color:col,lineHeight:1,flexShrink:0,width:20,textAlign:'center'}}>{icon}</span>
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:col}}>{label}</div>
                      <div style={{fontSize:11,color:'var(--txt3)',lineHeight:1.5}}>{desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <p style={{fontSize:10,color:'var(--txt3)'}}>Note: the debut period (floor ~0.03 ETH) will show many ↑ — those sales happened before the floor settled into the 0.004–0.013 range the model is calibrated to.</p>
            </Section>

            {/* ── SECTION: Model Validation ── */}
            <Section title="Model Validation (Insights Tab)">
              <p><b>Weighted τ (tau)</b> measures whether higher-DI Bros consistently sell for more. Pairs are weighted by their DI gap — a DI 411 vs DI 20 comparison counts far more than DI 30 vs DI 29. Ranges from −1 (inverse) to +1 (perfect). Above 0.5 is a strong signal.</p>
              <p style={{marginTop:8}}><b>Range accuracy</b> counts what % of sales landed within the expected floor × multiple band. 88%+ is considered well-calibrated for a collection at this price level.</p>
            </Section>

          </div>
        </div>
      )}

      {/* ── Header ── */}
      <div className="gx-header">
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <div className="gx-title">💹 Grand Exchange</div>
          <div style={{fontSize:10,color:'var(--txt3)'}}>
            {allSales.length} sale{allSales.length!==1?'s':''} · {traitRows.filter(r=>r.saleCount>0).length} traits with data
          </div>
          {/* Floor range editor */}
          {showFloorEdit ? (
            <div style={{display:'flex',alignItems:'center',gap:4,background:'var(--ink3)',
              border:'1px solid var(--teal)',borderRadius:8,padding:'3px 7px'}}>
              <span style={{fontSize:9,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.05em'}}>Floor</span>
              <input value={floorLoInput} onChange={e=>setFloorLoInput(e.target.value)}
                style={{width:44,fontSize:10,fontFamily:'Space Mono,monospace',background:'transparent',
                  border:'none',color:'var(--teal)',outline:'none',textAlign:'right'}}
                placeholder="0.004"/>
              <span style={{fontSize:9,color:'var(--txt3)'}}>–</span>
              <input value={floorHiInput} onChange={e=>setFloorHiInput(e.target.value)}
                style={{width:44,fontSize:10,fontFamily:'Space Mono,monospace',background:'transparent',
                  border:'none',color:'var(--teal)',outline:'none'}}
                placeholder="0.013"/>
              <EthIcon size={9}/>
              <button onClick={()=>{
                const lo=parseFloat(floorLoInput), hi=parseFloat(floorHiInput);
                if(!isNaN(lo)&&!isNaN(hi)&&lo>0&&hi>lo){setFloorLo(lo);setFloorHi(hi);}
                else if(!isNaN(lo)&&lo>0&&isNaN(hi)){setFloorLo(lo);setFloorHi(lo);}
                setShowFloorEdit(false);
              }} style={{background:'var(--teal)',border:'none',borderRadius:5,padding:'2px 6px',
                fontSize:9,fontWeight:800,color:'#0b0c14',cursor:'pointer'}}>✓</button>
              <button onClick={()=>{
                setFloorLoInput(String(floorLo));setFloorHiInput(String(floorHi));setShowFloorEdit(false);
              }} style={{background:'none',border:'none',color:'var(--txt3)',fontSize:13,cursor:'pointer',lineHeight:1,padding:0}}>✕</button>
            </div>
          ) : (
            <button onClick={()=>setShowFloorEdit(true)} style={{
              fontSize:10,color:'var(--txt2)',fontFamily:'Space Mono,monospace',whiteSpace:'nowrap',
              display:'flex',alignItems:'center',gap:3,background:'none',border:'1px solid var(--line)',
              borderRadius:6,padding:'2px 6px',cursor:'pointer'}}
              title="Click to adjust floor range">
              {floorLo===floorHi
                ? <>{floorLo.toFixed(3)}<EthIcon size={10}/></>
                : <>{floorLo.toFixed(3)}–{floorHi.toFixed(3)}<EthIcon size={10}/></>
              }
              <span style={{fontSize:8,color:'var(--txt3)'}}>✎</span>
            </button>
          )}
          <button onClick={()=>setShowHelp(true)} style={{
            background:'none',border:'1.5px solid var(--txt3)',borderRadius:'50%',
            width:18,height:18,fontSize:10,fontWeight:800,color:'var(--txt3)',
            cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
            lineHeight:1,padding:0,flexShrink:0}} title="How to read this table">?</button>
        </div>
        <div className="gx-tabs">
console.log("parsed ok");
</script></body></html>
