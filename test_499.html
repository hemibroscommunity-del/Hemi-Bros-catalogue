/* ════════════════════════════════════
   WALLET FETCH — auto-paginate all pages
════════════════════════════════════ */
const CONTRACT = '0xEAB71F90235E6b885C05aFFF3BAF0E41244cf874';
const EXPLORER = 'https://explorer.hemi.xyz';

async function fetchWalletNFTs(walletAddress, onProgress) {
  const ids = new Set();
  let pageParams = null;
  let pageNum = 0;

  while (true) {
    pageNum++;
    let url = `${EXPLORER}/api/v2/tokens/${CONTRACT}/instances?holder_address_hash=${walletAddress}&page_size=50`;
    if (pageParams) url += `&${new URLSearchParams(pageParams).toString()}`;

    onProgress(`Fetching page ${pageNum}…`);
    const res = await fetch(url);
    if (!res.ok) {
      // Try alternate Blockscout API path
      const alt = `${EXPLORER}/api/v2/tokens/${CONTRACT}/token-holders?page_size=50`;
      throw new Error(`Explorer API returned ${res.status}. Check wallet address.`);
    }
    const json = await res.json();

    // Extract token IDs from items array
    const items = json.items || json.data || [];
    items.forEach(item => {
      const id = item.id ?? item.token_id ?? item.metadata?.id;
      if (id != null) ids.add(String(id));
    });

    // Blockscout pagination: next_page_params object
    const next = json.next_page_params;
    if (!next || Object.keys(next).length === 0 || items.length === 0) break;
    pageParams = next;

    // Safety cap — shouldn't need >200 pages for a collection this size
    if (pageNum >= 200) break;
  }

  return [...ids];
}

/* ════════════════════════════════════
   GRID WITH INFINITE SCROLL
════════════════════════════════════ */
const PAGE = 60;
const FlatGrid = ({items, onCardClick, isWatchedFn, onToggleWatch}) => {
  const [limit, setLimit] = useState(PAGE);
  const scrollerRef = useRef(null);

  // Reset when items change (filter/sort)
  useEffect(()=>{
    setLimit(PAGE);
    if(scrollerRef.current) scrollerRef.current.scrollTop = 0;
  }, [items]);

  const onScroll = useCallback(e=>{
    const el = e.currentTarget;
    if(el.scrollHeight - el.scrollTop - el.clientHeight < 300){
      setLimit(l => l < items.length ? Math.min(l + 40, items.length) : l);
    }
  }, [items.length]);

  const visible = items.slice(0, limit);

  return (
    <div className="grid-scroll" ref={scrollerRef} onScroll={onScroll}>
      <div className="nft-grid">
        {visible.map(item=>(
          <Card key={item.ID} nft={item} onClick={onCardClick}
            isWatched={isWatchedFn&&isWatchedFn(item.ID)}
            onToggleWatch={onToggleWatch}/>
        ))}
      </div>
      {limit < items.length && (
        <div style={{padding:'16px',textAlign:'center',color:'var(--txt3)',fontSize:12}}>
          Showing {limit} of {items.length} — scroll for more
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   NFT CARD
════════════════════════════════════ */
const CardImg = React.memo(({src, id}) => {
  const [imgSrc, setImgSrc] = React.useState(src);
  const [failed, setFailed] = React.useState(false);
  const onErr = React.useCallback(() => {
    if(!failed && imgSrc.includes('cdn.jsdelivr.net')){
      // fallback to raw GitHub if CDN fails
      setImgSrc(imgSrc.replace('https://cdn.jsdelivr.net/gh/','https://raw.githubusercontent.com/'));
      setFailed(true);
    }
  },[imgSrc, failed]);
  if(failed && !imgSrc.includes('raw.githubusercontent.com'))
    return <div className="card-img-fallback">#{id}</div>;
  return <img src={imgSrc} alt={`#${id}`} loading="lazy" decoding="async" onError={onErr}/>;
});

const Card = React.memo(({nft,onClick,isWatched,onToggleWatch})=>{
  const sc=nft.diScore;
  const glow = sc>=175?'tier-s':sc>=110?'tier-a':'';
  const handleClick = useCallback(()=>onClick(nft),[nft,onClick]);
  const handleWatch = useCallback(e=>{ e.stopPropagation(); onToggleWatch&&onToggleWatch(nft.ID); },[nft.ID,onToggleWatch]);
  // Rough price estimate: use diScore as floor multiple proxy
  const multiple = getMultiple(nft);
  const estEth = (FLOOR_ETH * multiple).toFixed(3);
  return(
    <div className={`card ${glow}`} onClick={handleClick}>
      <div className="card-img">
        {nft.rank<=100 && <div className="card-rank">#{nft.rank}</div>}
        {nft.hasIpRisk && <div className="card-ip">{I.warn}</div>}

        {nft.Image
          ? <CardImg src={nft.Image} id={nft.ID}/>
          : <div className="card-img-fallback">#{nft.ID}</div>}
      </div>
      <div className="card-info">
        <div className="card-id">#{nft.ID}</div>
        <div className="card-score">{fmtScore(nft)}</div>
        <div className="card-eth">~{estEth} ETH</div>
      </div>
    </div>
  );
});
