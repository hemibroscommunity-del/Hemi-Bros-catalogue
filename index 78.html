      <div className="sb-scroll">

        {/* ── Wallet ── */}
        {FEATURES.walletConnect&&<WalletSection ownedIds={ownedIds} setOwnedIds={setOwnedIds} walletFilter={walletFilter} setWalletFilter={setWalletFilter} nfts={nfts}/>}
        {FEATURES.portfolio&&<PortfolioCalc ownedNfts={ownedNfts}/>}

        {/* ── Quick Filters ── */}
        <SidebarSection title="Quick Filters">
          <div style={{padding:'0 10px 10px',display:'flex',flexDirection:'column',gap:4}}>
            {[
              {label:'🔴 Has Grail Trait',     tiers:['Grail']},
              {label:'🟠 Has Legendary+ Trait', tiers:['Grail','Legendary']},
              {label:'🟣 Has Epic+ Trait',      tiers:['Grail','Legendary','Epic']},
              {label:'🟢 Has Rare+ Trait',      tiers:['Grail','Legendary','Epic','Rare']},
            ].map(({label,tiers})=>{
              const active=tiers.every(t=>rarityFilter.includes(t))&&rarityFilter.length===tiers.length;
              return(
                <button key={label} onClick={()=>setRarityFilter(active?[]:tiers)}
                  style={{textAlign:'left',padding:'5px 9px',borderRadius:7,fontSize:11.5,fontWeight:600,
                    background:active?'var(--pop-soft)':'var(--ink3)',
                    border:`1.5px solid ${active?'var(--pop)':'var(--line)'}`,
                    color:active?'var(--txt)':'var(--txt2)',cursor:'pointer',transition:'all .12s'
                  }}>{label}</button>
              );
            })}
          </div>
        </SidebarSection>

        {/* ── Score Range ── */}
        <SidebarSection title="Score Range" badge={(scoreMin||scoreMax)?1:0}>
          <div className="score-range-body">
            <div className="score-range-row">
              <input className="score-range-inp" placeholder="Min" value={scoreMin} onChange={e=>setScoreMin(e.target.value)} type="number"/>
              <span className="score-range-sep">—</span>
              <input className="score-range-inp" placeholder="Max" value={scoreMax} onChange={e=>setScoreMax(e.target.value)} type="number"/>
            </div>
            <div className="score-range-tiers">
              {[{l:'Uncommon',min:10,max:24},{l:'Rare',min:25,max:44},{l:'Epic',min:45,max:149},{l:'Legendary',min:150,max:299},{l:'Grail',min:300,max:''}].map(({l,min,max})=>{
                const RARITY_COLORS={Grail:'var(--r-grail)',Legendary:'var(--r-legendary)',Epic:'var(--r-epic)',Rare:'var(--r-rare)',Uncommon:'var(--r-uncommon)'};
                return <button key={l} className="score-tier-btn" style={{color:RARITY_COLORS[l]||'var(--txt2)'}} onClick={()=>{setScoreMin(String(min));setScoreMax(max?String(max):'');}}>{l}</button>;
              })}
            </div>
          </div>
        </SidebarSection>

        {/* ── IP Risk ── */}
        {FEATURES.ipFilter&&(
          <div className="acc-sec">
            <div className="ip-toggle-row">
              <span className="ip-toggle-label"><span className="ip-warn-icon">{I.warn}</span> Hide IP Risk Items</span>
              <label className="toggle-switch">
                <input type="checkbox" checked={hideIp} onChange={e=>setHideIp(e.target.checked)}/>
                <div className="toggle-track"/><div className="toggle-knob"/>
              </label>
            </div>
          </div>
        )}

        {/* ── Trait Filters ── */}
        <FilterContent filters={filters} setFilters={setFilters} traitOpts={traitOpts} traitMap={traitMap} facetedCounts={facetedCounts} famCounts={famCounts} openCat={openCat} setOpenCat={setOpenCat}/>

      </div>
      <div style={{padding:'10px 14px',borderTop:'1px solid var(--line)',flexShrink:0,textAlign:'center'}}>
        <span style={{fontFamily:'Space Mono,monospace',fontSize:'1rem',color:'var(--teal)'}}>{filtered.length}</span>
        <span style={{fontSize:11,color:'var(--txt3)',marginLeft:5}}>result{filtered.length!==1?'s':''}</span>
      </div>
    </aside>
  );
};

/* ════════════════════════════════════
   GRAND EXCHANGE
   Trait-level market analytics
════════════════════════════════════ */
// ── Sale Price Band Modal ──────────────────────────────────────────
const SaleBandModal = ({sale, onClose}) => {
  if(!sale) return null;
  const {price, expectedLo, expectedHi, expectedMid, onTarget, nft, date,
         synthetic=false, floorLo: sFL=FLOOR_LO, floorHi: sFH=FLOOR_HI} = sale;
  const [pane, setPane] = React.useState('model');
  const icon    = synthetic ? '📊' : onTarget?'✓':price>(expectedHi||0)?'↑':'↓';
  const icol    = synthetic ? 'var(--teal)' : onTarget?'var(--teal)':price>(expectedHi||0)?'var(--green)':'var(--red)';
  const icolHex = synthetic ? '#2dd4bf'    : onTarget?'#2dd4bf':price>(expectedHi||0)?'#4ade80':'#f87171';
  const miss = (!synthetic && expectedMid!=null) ? price - expectedMid : null;
  const pct  = (!synthetic && expectedMid>0)    ? (price - expectedMid)/expectedMid*100 : null;

  // ── MODEL SVG Layout ────────────────────────────────────────────────
  const W = 460, H = 270, PAD = 48;
  const BAND_TOP = 120, BAND_H = 32, BAND_BOT = BAND_TOP + BAND_H;
  const AXIS_Y   = BAND_BOT + 8;
  const BRK_ZONE = BAND_TOP - 10;

  const ceiling = synthetic
    ? expectedHi * 1.5
    : Math.max(expectedHi * 1.3, price * 1.25, expectedHi + 0.005);
  const trackW  = W - PAD * 2;
  const toX     = v => PAD + (v / ceiling) * trackW;

  const loX  = toX(expectedLo);
  const hiX  = toX(expectedHi);
  const midX = toX(expectedMid);
  const prX  = toX(price);
  const bandW = hiX - loX;

  const brkY   = BRK_ZONE - 30;
  const tickH  = 10;
  const lblY   = brkY - 6;
  const tooClose = Math.abs(prX - midX) < 50;

  // ── SALES HISTORY SVG ───────────────────────────────────────────────
  const allSales = React.useMemo(()=>{
    if(!nft.sales) return [];
    return [...nft.sales]
      .map(s=>({...s, p:parseFloat(s.price)||0}))
      .filter(s=>s.p>0)
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
  },[nft.sales]);

  const curIdx = allSales.findIndex(s=>Math.abs(s.p-price)<0.000001 && s.date===date);

  const salesSvg = React.useMemo(()=>{
    if(allSales.length < 1) return null;
    const PW=460, PH=200, PPAD=52;
    const prices = allSales.map(s=>s.p);
    const sMin=Math.min(...prices), sMax=Math.max(...prices);
    const sMid=(sMin+sMax)/2;
    const pad = (sMax-sMin)*0.2 || 0.001;
    const yLo=sMin-pad, yHi=sMax+pad, ySpan=yHi-yLo;
    const xStep = allSales.length>1 ? (PW-PPAD*2)/(allSales.length-1) : 0;
    const toY2 = v => PH-30 - ((v-yLo)/ySpan)*(PH-60);
    const pts = allSales.map((s,i)=>({x:PPAD+(allSales.length>1?i*xStep:PW/2), y:toY2(s.p), s}));
    const polyline = pts.map(p=>`${p.x},${p.y}`).join(' ');
    const AXIS2 = PH-30;
    return {PW,PH,PPAD,pts,polyline,AXIS2,toY2,sMin,sMax,sMid,yLo,yHi};
  },[allSales]);

  return (
    <div onClick={onClose} style={{
      position:'fixed',inset:0,zIndex:2000,background:'rgba(0,0,0,.88)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:12}}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'#161825',border:'2px solid #2d2f48',borderRadius:16,
        width:'100%',maxWidth:520,padding:'20px 22px 18px',position:'relative',
        boxShadow:'0 24px 64px rgba(0,0,0,.75)',maxHeight:'90vh',overflowY:'auto'}}>

        {/* ── Header row: NFT image + info + pane toggle + close ── */}
        <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:14}}>
          {/* NFT thumbnail + floor multiple */}
          {nft.Image && (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flexShrink:0}}>
              <img src={nft.Image} alt={`#${nft.ID}`}
                style={{width:52,height:52,borderRadius:8,objectFit:'cover',
                  border:'1.5px solid #2d2f48'}}
                onError={e=>{e.target.style.display='none';}}/>
              {(()=>{
                const mr = getMultipleRange(nft) || diScoreToRange(nft.diScore);
                const lbl = mr.lo===mr.hi ? `${mr.lo}x` : `${mr.lo}x–${mr.hi}x`;
                const lo2 = mr.lo;
                const color = lo2>=30?'#f87171':lo2>=10?'#c084fc':lo2>=5?'#fb923c':lo2>=3?'#60a5fa':lo2>=2?'#34d399':'#9ca3af';
                return <div style={{fontSize:9,fontWeight:800,color,letterSpacing:'.04em',whiteSpace:'nowrap',
                  background:'rgba(0,0,0,.4)',borderRadius:4,padding:'1px 5px',border:`1px solid ${color}50`}}>
                  {lbl}
                </div>;
              })()}
            </div>
          )}
          {/* Title */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:800,color:'#f0f0f0',display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:26,fontWeight:900,color:icolHex,lineHeight:1}}>{icon}</span>
              Bro #{nft.ID}
            </div>
            {synthetic ? (
              <div style={{fontSize:12,color:'var(--teal)',fontWeight:700,marginTop:2}}>
                DI Model Projection
                <span style={{fontSize:10,fontWeight:400,color:'#888',marginLeft:6}}>estimated range · no sale price</span>
              </div>
            ) : (
              <div style={{fontSize:12,fontWeight:700,color:'#ddd',marginTop:2,display:'flex',alignItems:'center',gap:4}}>
                <span style={{fontWeight:400,color:'#888'}}>Sold for</span>&nbsp;{price.toFixed(4)}<EthIcon size={12}/>
              </div>
            )}
            {!synthetic&&<div style={{fontSize:10,color:'#777',marginTop:2}}>
              {date||'—'}&nbsp;·&nbsp;DI {nft.diScore.toFixed(1)}
              {pct!=null&&(
                <span style={{marginLeft:8,fontWeight:800,color:icolHex}}>
                  {pct>0?'+':''}{pct.toFixed(1)}% vs mid
                </span>
              )}
            </div>}
          </div>
          {/* Pane toggle + close */}
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6,flexShrink:0}}>
            <button onClick={onClose} style={{background:'none',border:'none',color:'#666',
              fontSize:20,cursor:'pointer',lineHeight:1,padding:0}}>✕</button>
            {allSales.length>=1&&(
              <div style={{display:'flex',border:'1px solid #2d2f48',borderRadius:8,overflow:'hidden',marginTop:4}}>
                {[['model','DI Model'],['sales','Sales Only']].map(([k,lbl])=>(
                  <button key={k} onClick={()=>setPane(k)}
                    style={{padding:'5px 10px',fontSize:9,fontWeight:800,letterSpacing:'.06em',
                      textTransform:'uppercase',border:'none',cursor:'pointer',
                      background:pane===k?icolHex:'#0f1120',
                      color:pane===k?'#000':'#888',transition:'all .15s'}}>
                    {lbl}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* ── DI MODEL PANE ── */}
        {pane==='model'&&<>
          {/* SVG band */}
          <div style={{background:'#0f1120',borderRadius:12,padding:'6px 0 4px',marginBottom:14}}>
            <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
              <defs>
                <marker id="arR" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                  <path d="M0,1 L7,4 L0,7 Z" fill={icolHex}/>
                </marker>
                <marker id="arL" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
                  <path d="M8,1 L1,4 L8,7 Z" fill={icolHex}/>
                </marker>
              </defs>

              <line x1={PAD} y1={AXIS_Y} x2={W-PAD} y2={AXIS_Y} stroke="#2a2d42" strokeWidth={2}/>
              <text x={PAD} y={AXIS_Y+14} textAnchor="middle" fontSize={8} fill="#444" fontFamily="Space Mono,monospace">0</text>

              {/* Floor range label — upper left of SVG background */}
              {(()=>{
                const r=getMultipleRange(nft)||diScoreToRange(nft.diScore);
                const lbl=r.lo===r.hi?`${r.lo}x floor multiple`:`${r.lo}x – ${r.hi}x floor multiple`;
                const floorRangeLbl = `Floor: ${sFL.toFixed(3)}–${sFH.toFixed(3)} Ξ`;
                return <>
                  <text x={PAD+4} y={18} textAnchor="start" fontSize={13} fontWeight="900"
                    fill="#c0c0e0" fontFamily="Space Mono,monospace">{lbl}</text>
                  <text x={PAD+4} y={33} textAnchor="start" fontSize={9}
                    fill="#666" fontFamily="Space Mono,monospace">{floorRangeLbl}</text>
                </>;
              })()}

              <rect x={loX} y={BAND_TOP} width={bandW} height={BAND_H}
                fill={onTarget?'rgba(45,212,191,.18)':price>expectedHi?'rgba(74,222,128,.14)':'rgba(248,113,113,.14)'} rx={5}/>
              <rect x={loX} y={BAND_TOP} width={bandW} height={BAND_H}
                fill="none" stroke={icolHex} strokeWidth={1.5} rx={5} opacity={0.6}/>
              <text x={(loX+hiX)/2} y={BAND_TOP+BAND_H/2+4} textAnchor="middle"
                fontSize={9} fill={icolHex} opacity={0.7} fontFamily="Space Mono,monospace" fontWeight="700">
                TARGET RANGE
              </text>

              <line x1={loX} y1={AXIS_Y} x2={loX} y2={AXIS_Y+5} stroke="#444" strokeWidth={1}/>
              <text x={loX} y={AXIS_Y+16} textAnchor="middle" fontSize={9} fill="#888" fontFamily="Space Mono,monospace">{expectedLo.toFixed(3)}</text>
              {(()=>{const r=getMultipleRange(nft)||diScoreToRange(nft.diScore);return(<>
                <text x={loX} y={AXIS_Y+29} textAnchor="middle" fontSize={11} fontWeight="700" fill="#8888bb" fontFamily="Space Mono,monospace">{r.lo}x</text>
                <text x={loX} y={AXIS_Y+43} textAnchor="middle" fontSize={8} fill="#555" fontFamily="Space Mono,monospace">{`(${sFL.toFixed(3)}×${r.lo})`}</text>
              </>);})()}
              <line x1={hiX} y1={AXIS_Y} x2={hiX} y2={AXIS_Y+5} stroke="#444" strokeWidth={1}/>
              <text x={hiX} y={AXIS_Y+16} textAnchor="middle" fontSize={9} fill="#888" fontFamily="Space Mono,monospace">{expectedHi.toFixed(3)}</text>
              {(()=>{const r=getMultipleRange(nft)||diScoreToRange(nft.diScore);return(<>
                <text x={hiX} y={AXIS_Y+29} textAnchor="middle" fontSize={11} fontWeight="700" fill="#8888bb" fontFamily="Space Mono,monospace">{r.hi}x</text>
                <text x={hiX} y={AXIS_Y+43} textAnchor="middle" fontSize={8} fill="#555" fontFamily="Space Mono,monospace">{`(${sFH.toFixed(3)}×${r.hi})`}</text>
              </>);})()}
              <line x1={midX} y1={AXIS_Y} x2={midX} y2={AXIS_Y+5} stroke="#a0a0c0" strokeWidth={1}/>
              <text x={midX} y={AXIS_Y+16} textAnchor="middle" fontSize={9} fill="#a0a0c0" fontWeight="700" fontFamily="Space Mono,monospace">{expectedMid.toFixed(3)}</text>
              <text x={midX} y={AXIS_Y+26} textAnchor="middle" fontSize={7} fill="#777" fontFamily="Space Mono,monospace">MID</text>

              <line x1={midX} y1={BAND_TOP-2} x2={midX} y2={AXIS_Y} stroke="#a0a0c0" strokeWidth={1.5} strokeDasharray="4,3"/>
              <text x={midX} y={BAND_TOP-6} textAnchor="middle" fontSize={8} fill="#a0a0c0" fontFamily="Space Mono,monospace" fontWeight="700">MID</text>

              {!synthetic&&<>
              <line x1={prX} y1={brkY+tickH} x2={prX} y2={AXIS_Y+5} stroke={icolHex} strokeWidth={2.5}/>
              <polygon points={`${prX},${AXIS_Y+6} ${prX-6},${AXIS_Y+16} ${prX+6},${AXIS_Y+16}`} fill={icolHex}/>
              <text x={prX} y={AXIS_Y+57} textAnchor="middle" fontSize={11} fontWeight="bold"
                fill={icolHex} fontFamily="Space Mono,monospace">{price.toFixed(4)}</text>
              {miss!=null && Math.abs(miss) > 0.00005 && (()=>{
                const left  = Math.min(midX, prX);
                const right = Math.max(midX, prX);
                const cx    = (midX + prX) / 2;
                return <>
                  <line x1={left} y1={brkY} x2={right} y2={brkY} stroke={icolHex} strokeWidth={2}/>
                  <line x1={left}  y1={brkY} x2={left}  y2={brkY+tickH} stroke={icolHex} strokeWidth={2}/>
                  <line x1={right} y1={brkY} x2={right} y2={brkY+tickH} stroke={icolHex} strokeWidth={2}/>
                  <circle cx={cx} cy={brkY} r={3} fill={icolHex}/>
                  <text x={cx} y={lblY-2} textAnchor="middle" fontSize={13} fontWeight="900"
                    fill={icolHex} fontFamily="Space Mono,monospace">
                    {miss>0?'+':''}{miss.toFixed(4)} Ξ
                  </text>
                  <text x={cx} y={lblY+28} textAnchor="middle" fontSize={11} fontWeight="700"
                    fill={icolHex} fontFamily="Space Mono,monospace" opacity={0.85}>
                    ({pct>0?'+':''}{pct.toFixed(1)}%)
                  </text>
                </>;
              })()}
              {miss!=null && Math.abs(miss) <= 0.00005 && (
                <text x={midX} y={brkY} textAnchor="middle" fontSize={11} fontWeight="800"
                  fill={icolHex} fontFamily="Space Mono,monospace">AT MIDPOINT</text>
              )}
              </>}
            </svg>
          </div>

          {/* Stats row */}
          <div style={{display:'grid',gridTemplateColumns:synthetic?'repeat(3,1fr)':'repeat(4,1fr)',gap:5,marginBottom:12}}>
            {[
              {label:'Range Low',   val:expectedLo.toFixed(4),  col:'#aaa',    eth:true},
              {label:'Midpoint',    val:expectedMid.toFixed(4), col:'#d0d0d0', eth:true},
              {label:'Range High',  val:expectedHi.toFixed(4),  col:'#aaa',    eth:true},
              {label:'vs Midpoint', val:pct!=null?(pct>0?'+':'')+pct.toFixed(1)+'%':'—', col:icolHex, eth:false, hide:synthetic},
            ].filter(s=>!s.hide).map(({label,val,col,eth})=>(
              <div key={label} style={{background:'#0f1120',borderRadius:8,padding:'8px 6px',
                textAlign:'center',border:'1px solid #2a2d42'}}>
                <div style={{fontSize:11,fontFamily:'Space Mono,monospace',fontWeight:700,color:col,lineHeight:1.2,
                  display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>
                  {val}{eth&&<>&nbsp;<EthIcon size={9}/></>}
                </div>
                <div style={{fontSize:7,color:'#555',marginTop:4,textTransform:'uppercase',letterSpacing:'.08em'}}>{label}</div>
              </div>
            ))}
          </div>

          {/* Outcome sentence — only for real sales */}
          {!synthetic&&miss!=null&&(
            <div style={{background:'#0f1120',border:`1.5px solid ${icolHex}50`,borderRadius:8,
              padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:24,fontWeight:900,color:icolHex,flexShrink:0}}>{icon}</span>
              <span style={{fontSize:12,color:'#ccc',lineHeight:1.5}}>
                Sold <b style={{color:icolHex,display:'inline-flex',alignItems:'center',gap:3}}>
                  {Math.abs(miss).toFixed(4)}<EthIcon size={11}/> ({Math.abs(pct||0).toFixed(1)}%) {miss>0?'above':'below'}
                </b> the range midpoint
                {onTarget?' — within target band':miss>0?' — above expected range':' — below expected range'}.
              </span>
            </div>
          )}
        </>}

        {/* ── SALES ONLY PANE ── */}
        {pane==='sales'&&(()=>{
          if(!salesSvg) return <div style={{color:'#666',fontSize:12,textAlign:'center',padding:20}}>Only one sale recorded for this NFT.</div>;
          const {PW,PH,PPAD,pts,polyline,AXIS2,toY2,sMin,sMax,sMid} = salesSvg;
          return (
            <div style={{display:'block'}}>
              <div style={{background:'#0f1120',borderRadius:12,padding:'10px 0 6px',marginBottom:14}}>
                <div style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',
                  color:'#666',paddingLeft:PPAD,marginBottom:6}}>
                  All Sales · Bro #{nft.ID} ({allSales.length} total)
                </div>
                <svg width="100%" viewBox={`0 0 ${PW} ${PH}`} style={{display:'block',overflow:'visible'}}>
                  {/* Axis */}
                  <line x1={PPAD} y1={AXIS2} x2={PW-PPAD} y2={AXIS2} stroke="#2a2d42" strokeWidth={1.5}/>

                  {/* Midpoint band reference line */}
                  <line x1={PPAD} y1={toY2(sMid)} x2={PW-PPAD} y2={toY2(sMid)}
                    stroke="#a0a0c0" strokeWidth={1} strokeDasharray="4,3" opacity={0.5}/>
                  <text x={PPAD-4} y={toY2(sMid)+4} textAnchor="end" fontSize={8} fill="#a0a0c0" fontFamily="Space Mono,monospace">mid</text>

                  {/* Hi band line */}
                  <line x1={PPAD} y1={toY2(sMax)} x2={PW-PPAD} y2={toY2(sMax)}
                    stroke="#555" strokeWidth={1} strokeDasharray="2,3" opacity={0.4}/>
                  <text x={PPAD-4} y={toY2(sMax)+4} textAnchor="end" fontSize={8} fill="#555" fontFamily="Space Mono,monospace">hi</text>

                  {/* Lo band line */}
                  <line x1={PPAD} y1={toY2(sMin)} x2={PW-PPAD} y2={toY2(sMin)}
                    stroke="#555" strokeWidth={1} strokeDasharray="2,3" opacity={0.4}/>
                  <text x={PPAD-4} y={toY2(sMin)+4} textAnchor="end" fontSize={8} fill="#555" fontFamily="Space Mono,monospace">lo</text>

                  {/* Polyline */}
                  {allSales.length>1&&<polyline points={polyline} fill="none" stroke="#3a3f60" strokeWidth={1.5}/>}

                  {/* Dots */}
                  {pts.map((p,i)=>{
                    const isCur = i===curIdx;
                    const sp = p.s.p;
                    const r2 = diScoreToRange(nft.diScore);
                    const eLo2=FLOOR_LO*r2.lo, eHi2=FLOOR_HI*r2.hi;
                    const onT2 = sp>=eLo2&&sp<=eHi2;
                    const dotCol = isCur ? icolHex : onT2?'#2dd4bf':sp>eHi2?'#4ade80':'#f87171';
                    return (
                      <g key={i}>
                        <circle cx={p.x} cy={p.y} r={isCur?7:4}
                          fill={dotCol} opacity={isCur?1:0.8}
                          stroke={isCur?'#fff':'none'} strokeWidth={isCur?2:0}/>
                        {isCur&&(
                          <text x={p.x} y={p.y-12} textAnchor="middle" fontSize={9} fontWeight="800"
                            fill={icolHex} fontFamily="Space Mono,monospace">THIS</text>
                        )}
                        {/* Price label on hover - show for cur and last */}
                        {(isCur||i===0||i===allSales.length-1)&&(
                          <text x={p.x} y={isCur?p.y+18:AXIS2+14} textAnchor="middle" fontSize={8}
                            fill={isCur?icolHex:'#666'} fontFamily="Space Mono,monospace">
                            {p.s.p.toFixed(4)}
                          </text>
                        )}
                      </g>
                    );
                  })}

                  {/* Date labels */}
                  <text x={PPAD} y={AXIS2+26} textAnchor="middle" fontSize={7} fill="#555" fontFamily="Space Mono,monospace">{allSales[0]?.date||''}</text>
                  {allSales.length>1&&<text x={PW-PPAD} y={AXIS2+26} textAnchor="middle" fontSize={7} fill="#555" fontFamily="Space Mono,monospace">{allSales[allSales.length-1]?.date||''}</text>}
                </svg>
              </div>

              {/* Sales stats: low / mid / high */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5}}>
                {[
                  {label:'Lowest Sale',  val:sMin, col:'#f87171'},
                  {label:'Midpoint',     val:sMid, col:'#a0a0c0'},
                  {label:'Highest Sale', val:sMax, col:'#4ade80'},
                ].map(({label,val,col})=>(
                  <div key={label} style={{background:'#0f1120',borderRadius:8,padding:'8px 6px',
                    textAlign:'center',border:'1px solid #2a2d42'}}>
                    <div style={{fontSize:11,fontFamily:'Space Mono,monospace',fontWeight:700,color:col,
                      display:'flex',alignItems:'center',justifyContent:'center',gap:2,lineHeight:1.2}}>
                      {val.toFixed(4)}<EthIcon size={9}/>
                    </div>
                    <div style={{fontSize:7,color:'#555',marginTop:4,textTransform:'uppercase',letterSpacing:'.08em'}}>{label}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
};

const InstallBanner = () => {
  const [show, setShow] = React.useState(false);
  const [installed, setInstalled] = React.useState(false);
  const promptRef = React.useRef(null);

  React.useEffect(() => {
    // Already standalone (installed)?
    if (window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true) {
      setInstalled(true);
      return;
    }
    const onReady = () => {
      promptRef.current = window._pwaInstallPrompt;
      setShow(true);
    };
    const onInstalled = () => { setShow(false); setInstalled(true); };
    window.addEventListener('pwaInstallReady', onReady);
    window.addEventListener('pwaInstalled', onInstalled);
    // In case event already fired before component mounted
    if (window._pwaInstallPrompt) onReady();
    return () => {
      window.removeEventListener('pwaInstallReady', onReady);
      window.removeEventListener('pwaInstalled', onInstalled);
    };
  }, []);

  if (!show || installed) return null;

  const handleInstall = () => {
    if (!promptRef.current) return;
    promptRef.current.prompt();
    promptRef.current.userChoice.then(choice => {
      if (choice.outcome === 'accepted') setShow(false);
      promptRef.current = null;
      window._pwaInstallPrompt = null;
    });
  };

  return (
    <div style={{
      position:'fixed', bottom:72, left:'50%', transform:'translateX(-50%)',
      zIndex:9999, background:'#1a1d2e', border:'1.5px solid #00d4b8',
      borderRadius:14, padding:'10px 14px', display:'flex', alignItems:'center',
      gap:10, boxShadow:'0 8px 32px rgba(0,0,0,.6)', maxWidth:320, width:'calc(100% - 32px)'}}>
      <span style={{fontSize:26, flexShrink:0}}>📲</span>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:12, fontWeight:800, color:'#e8eaf8'}}>Install Hemi Bros</div>
        <div style={{fontSize:10, color:'#8890b8', marginTop:1}}>Add to your home screen for quick access</div>
      </div>
      <button onClick={handleInstall} style={{
        background:'#00d4b8', border:'none', borderRadius:8, padding:'6px 12px',
        fontSize:11, fontWeight:800, color:'#0b0c14', cursor:'pointer', flexShrink:0}}>
        Install
      </button>
      <button onClick={() => setShow(false)} style={{
        background:'none', border:'none', color:'#4d5580', fontSize:16,
        cursor:'pointer', padding:0, flexShrink:0, lineHeight:1}}>✕</button>
    </div>
  );
};

const GrandExchange = ({nfts, traitMap, onSelectNft}) => {
  const [tab,       setTab]      = useState('table');
  const [catFilter, setCatFilter]= useState('All');
  const [search,    setSearch]   = useState('');
  const [sortKey,   setSortKey]  = useState('price');
  const [sortDir,   setSortDir]  = useState('desc');
  const [hoverDot,  setHoverDot] = useState(null);
  const [salesPage, setSalesPage]= useState(0);
  const [rangeFilter,  setRangeFilter] = useState(null); // null | 'above' | 'on' | 'below'
  const [traitFilter,  setTraitFilter] = useState(null); // null | {name, cat, color}
  const [saleModal,    setSaleModal]   = useState(null); // null | sale object
  const [showHelp,     setShowHelp]    = useState(false);
  const [histSort,     setHistSort]    = useState({key:'date', dir:'desc'});
  const [floorLoInput, setFloorLoInput]= useState('');
  const [floorHiInput, setFloorHiInput]= useState('');
  const [showFloorEdit,setShowFloorEdit]=useState(false);
  const SALES_PER_PAGE = 50;

  // Custom floor values (user can override global constants)
  const effFloorLo = useMemo(()=>{
    const v = parseFloat(floorLoInput);
    return (!isNaN(v)&&v>0) ? v : FLOOR_LO;
  },[floorLoInput]);
  const effFloorHi = useMemo(()=>{
    const v = parseFloat(floorHiInput);
    return (!isNaN(v)&&v>0) ? v : (floorLoInput&&parseFloat(floorLoInput)>0 ? parseFloat(floorLoInput) : FLOOR_HI);
  },[floorHiInput, floorLoInput]);

  const CAT_COLORS = {
    'Bro Type':   'var(--r-grail)',
    'Headwear':   'var(--r-legendary)',
    'Clothes':    'var(--r-epic)',
    'Eyes':       'var(--r-rare)',
    'Eyewear':    'var(--r-uncommon)',
    'Mouth Items':'var(--gold)',
  };

  // ── Per-trait analytics ──────────────────────────────────────────
  const allSales = useMemo(() => {
    // 1. Collect all valid sales with timestamps
    const raw = [];
    nfts.forEach(n => {
      (n.sales||[]).forEach(s => {
        if(s.price > 0) raw.push({...s, nft:n, ts: new Date(s.date||0).getTime()});
      });
    });
    raw.sort((a,b) => a.ts - b.ts);

   // Floor operated in a known range over the collection's history.
    // Rather than trying to estimate a moving floor from sales (circular),
    // we define the full expected price band as:
    //   low  = effFloorLo × multiple.lo  (cheapest plausible sale)
    //   high = effFloorHi × multiple.hi  (most expensive plausible sale)
    // A sale is on-target if its price falls anywhere within that band.

    // Attach expected range and onTarget to each sale.
    // Use displayMultiple if available, fall back to diScoreToRange for any NFT missing it.
    return raw.map(s => {
      const r          = getMultipleRange(s.nft) || diScoreToRange(s.nft.diScore);
      const expectedLo = effFloorLo * r.lo;
      const expectedHi = effFloorHi * r.hi;
      const expectedMid= (effFloorLo * r.lo + effFloorHi * r.hi) / 2;
      const onTarget   = s.price >= expectedLo && s.price <= expectedHi;
      return {
        ...s,
        expectedLo, expectedHi, expectedMid,
        miss:    expectedMid != null ? s.price - expectedMid : null,
        onTarget: expectedLo != null ? onTarget : null,
      };
    }).sort((a,b) => b.ts - a.ts); // keep newest-first for display
  }, [nfts, effFloorLo, effFloorHi]);

  // ── All individual sale events ───────────────────────────────────
  // ── Build sorted-by-date sales list first, then compute time-local floors ──
  const traitRows = useMemo(() => {
    const rows = [];
    Object.values(traitMap).forEach(detail => {
      const name = detail['Unique Item List'];
      const cat  = detail.Category;
      if(!name || !cat || !CATS.includes(cat)) return;
      if(name.toLowerCase() === 'none') return;
      const supply = parseInt(detail.Supply) || 0;
      const score  = detail.adjustedScore || 0;
      const rarity = getRarityTier(score);

      const hasTraitNfts = nfts.filter(n => {
        const v = n[cat]; if(!v) return false;
        return String(v).split('(')[0].trim().toLowerCase() === name.toLowerCase();
      });
      const sales      = hasTraitNfts.flatMap(n => (n.sales||[]).map(s => ({...s, nft:n})));
      const validSales = sales.filter(s => s.price > 0);
      const prices     = validSales.map(s => s.price);
      const avgPrice   = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : null;
      const minPrice   = prices.length ? Math.min(...prices) : null;
      const maxPrice   = prices.length ? Math.max(...prices) : null;

      // Premium: avg sale price above the minimum of this trait's expected range.
      // tExpLo = effFloorLo × multiple.lo = the lowest "fair value" for this tier.
      // Tells you: how much above rock-bottom expectations did it actually sell?
      const traitRange = diScoreToRange(score);
      const tExpLo  = effFloorLo * traitRange.lo;
      const tExpHi  = effFloorHi * traitRange.hi;
      const tExpMid = (tExpLo + tExpHi) / 2;
      const premiums = validSales.map(s => s.price - tExpLo);
      const premium  = premiums.length ? premiums.reduce((a,b)=>a+b,0)/premiums.length : null;

      // Efficiency: DI pts per 0.01 ETH of premium above tier floor.
      const rawEff = premium && premium > 0.001 && score > 0 ? score / (premium * 100) : null;
      const efficiency = rawEff != null ? Math.min(rawEff, 9999) : null;

      // Miss: avg distance from the midpoint of expected range.
      // Positive = sold above midpoint (outperformed), negative = sold below (underperformed).
      // Unlike the binary ↑/✓/↓, this is a continuous signal — a trait at 0.001 miss
      // sat right at the center of its range; +0.01 means consistently beating the midpoint.
      const avgMiss = validSales.length
        ? validSales.reduce((acc, s) => acc + (s.price - tExpMid), 0) / validSales.length
        : null;

      rows.push({
        name, cat, supply, score, rarity,
        thumbnailUrl: detail.thumbnailUrl || null,
        saleCount: validSales.length,
        avgPrice, minPrice, maxPrice, premium, efficiency,
        avgMiss,
        sales: validSales,
        exampleNft: hasTraitNfts[0] || null,
        nftCount: hasTraitNfts.length,
      });
    });
    return rows;
  }, [nfts, traitMap, allSales, effFloorLo, effFloorHi]);

  const allSalesByScore = useMemo(() =>
    [...allSales].sort((a,b) => a.nft.diScore - b.nft.diScore)
  , [allSales]);

  // ── Filtered + sorted trait table ───────────────────────────────
  const filteredRows = useMemo(() => {
    let rows = [...traitRows];
    if(catFilter !== 'All') rows = rows.filter(r => r.cat === catFilter);
    if(search.trim()) {
      const q = search.trim().toLowerCase();
      rows = rows.filter(r => r.name.toLowerCase().includes(q));
    }
    const getVal = (r,k) => ({
      name:r.name, cat:r.cat, supply:r.supply||0, score:r.score||0,
      sales:r.saleCount||0, price:r.avgPrice||0, prem:r.premium||0, miss:r.avgMiss||0,
    }[k]??0);
    rows.sort((a,b) => {
      const av=getVal(a,sortKey), bv=getVal(b,sortKey);
      if(typeof av==='string') return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
      return sortDir==='asc'?av-bv:bv-av;
    });
    return rows;
  }, [traitRows, catFilter, search, sortKey, sortDir]);

  // ── Summary insights ─────────────────────────────────────────────
  const summary = useMemo(() => {
    const withSales = traitRows.filter(r => r.saleCount > 0);
    if(!allSales.length) return null;
    const prices = allSales.map(s=>s.price);
    const avg    = prices.reduce((a,b)=>a+b,0)/prices.length;
    const topPremium = [...withSales].filter(r=>r.premium!=null).sort((a,b)=>(b.premium||0)-(a.premium||0))[0]||null;
    const topEff     = [...withSales].filter(r=>(r.efficiency||0)>0).sort((a,b)=>(b.efficiency||0)-(a.efficiency||0))[0]||null;
    const mostSold   = [...withSales].sort((a,b)=>b.saleCount-a.saleCount)[0]||null;
    const highSale   = [...allSales].sort((a,b)=>b.price-a.price)[0]||null;
    // Pearson r: DI score vs price
    const xs=allSalesByScore.map(s=>s.nft.diScore), ys=allSalesByScore.map(s=>s.price);
    const n=xs.length, mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
    const r = xs.reduce((a,v,i)=>a+(v-mx)*(ys[i]-my),0) /
      (Math.sqrt(xs.reduce((a,v)=>a+(v-mx)**2,0)*ys.reduce((a,v)=>a+(v-my)**2,0))||1);
    // Avg DI score of sold NFTs vs collection avg
    const soldDI    = allSales.map(s=>s.nft.diScore);
    const avgSoldDI = soldDI.reduce((a,b)=>a+b,0)/soldDI.length;
    const collDI    = nfts.length ? nfts.reduce((a,n)=>a+n.diScore,0)/nfts.length : 0;
    // Miss analysis — model validation
    // ── Spearman rank correlation: DI score rank vs sale price rank ──
    // Tests whether higher-DI Bros sold for more — independent of absolute floor level.
    // Each NFT with multiple sales: use avg sale price to avoid over-representing it.
    const soldNftMap = {};
    allSales.forEach(s => {
      const id = s.nft.ID;
      if(!soldNftMap[id]) soldNftMap[id] = { diScore: s.nft.diScore, prices: [] };
      soldNftMap[id].prices.push(s.price);
    });
    const soldNfts = Object.values(soldNftMap).map(v => ({
      diScore: v.diScore,
      avgPrice: v.prices.reduce((a,b)=>a+b,0)/v.prices.length,
    }));
    console.log('[GX] soldNfts:', soldNfts.length, '| allSales:', allSales.length,
      '| onTarget:', allSales.filter(s=>s.onTarget).length,
      '| above:', allSales.filter(s=>s.onTarget===false && s.price>(s.expectedHi||0)).length,
      '| below:', allSales.filter(s=>s.onTarget===false && s.price<(s.expectedLo||Infinity)).length,
      '| sampleSales:', allSales.slice(0,5).map(s=>`#${s.nft.ID} DI${s.nft.diScore.toFixed(0)} exp[${s.expectedLo?.toFixed(4)}-${s.expectedHi?.toFixed(4)}] sold${s.price.toFixed(4)} ${s.onTarget?'✓':'✗'}`),
    );

    // Weighted Kendall's tau: compare every pair of sold Bros.
    // Each pair is weighted by their DI score gap — a pair with DI 411 vs DI 20
    // counts far more than DI 30 vs DI 29. This makes the metric robust to noise
    // in close-scoring comparisons where price differences are barely meaningful.
    const weightedTau = arr => {
      const n = arr.length;
      if(n < 2) return null;
      let wConcordant = 0, wDiscordant = 0, totalWeight = 0;
      let nConcordant = 0, nDiscordant = 0;
      for(let i = 0; i < n; i++){
        for(let j = i+1; j < n; j++){
          const diGap      = Math.abs(arr[i].diScore - arr[j].diScore);
          const diAgree    = Math.sign(arr[i].diScore  - arr[j].diScore);
          const priceAgree = Math.sign(arr[i].avgPrice - arr[j].avgPrice);
          if(diAgree === 0 || priceAgree === 0) continue;
          if(diAgree === priceAgree){ wConcordant += diGap; nConcordant++; }
          else                      { wDiscordant += diGap; nDiscordant++; }
          totalWeight += diGap;
        }
      }
      if(totalWeight === 0) return null;
      return {
        tau: (wConcordant - wDiscordant) / totalWeight,
        nConcordant, nDiscordant,
        totalPairs: nConcordant + nDiscordant,
      };
    };
    const tauResult     = soldNfts.length >= 2 ? weightedTau(soldNfts) : null;
    const spearmanR     = tauResult?.tau ?? null;
    const spearmanN     = soldNfts.length;
    const tauConcordant = tauResult?.nConcordant ?? 0;
    const tauDiscordant = tauResult?.nDiscordant ?? 0;
    const tauPairs      = tauResult?.totalPairs  ?? 0;

    // Keep on-target count for secondary display
    const withMiss   = allSales.filter(s => s.onTarget != null);
    const exact      = withMiss.filter(s => s.onTarget).length;
    const overshoot  = withMiss.filter(s => !s.onTarget && s.price > (s.expectedHi||0)).length;
    const undershoot = withMiss.filter(s => !s.onTarget && s.price < (s.expectedLo||Infinity)).length;

    return { total:allSales.length, avg, min:Math.min(...prices), max:Math.max(...prices),
      topPremium, topEff, mostSold, highSale, r, avgSoldDI, collDI,
      traitsWithSales: withSales.length,
      spearmanR, spearmanN, tauConcordant, tauDiscordant, tauPairs,
      exact, overshoot, undershoot, withMissCount: withMiss.length };
  }, [traitRows, allSales, allSalesByScore, nfts]);

  const toggleSort = key => {
    if(sortKey===key) setSortDir(d=>d==='desc'?'asc':'desc');
    else { setSortKey(key); setSortDir('desc'); }
  };
  const SH = key => sortKey===key?(sortDir==='desc'?'↓':'↑'):'⇅';
  const fE = v => v==null?'—':v.toFixed(3)+' Ξ';
  const fP = v => v==null?'—':`${v>=0?'+':''}${v.toFixed(3)} Ξ`;

  // ── Scatter Plot ─────────────────────────────────────────────────
  const ScatterPlot = () => {
    if(!allSalesByScore.length) return (
      <div style={{color:'var(--txt3)',padding:'40px 0',textAlign:'center'}}>No sales data to plot.</div>
    );
    const W=340,H=220,PL=50,PR=14,PT=14,PB=38;
    const IW=W-PL-PR, IH=H-PT-PB;
    const xs=allSalesByScore.map(s=>s.nft.diScore), ys=allSalesByScore.map(s=>s.price);
    const xMn=Math.min(...xs),xMx=Math.max(...xs)||1;
    const yMn=0, yMx=Math.max(...ys)*1.2||1;
    const px=v=>PL+(v-xMn)/(xMx-xMn)*IW;
    const py=v=>H-PB-(v-yMn)/(yMx-yMn)*IH;
    const n=xs.length,mx2=xs.reduce((a,b)=>a+b,0)/n,my2=ys.reduce((a,b)=>a+b,0)/n;
    const sl=xs.reduce((a,v,i)=>a+(v-mx2)*(ys[i]-my2),0)/(xs.reduce((a,v)=>a+(v-mx2)**2,0)||1);
    const ic=my2-sl*mx2;
    const xTicks=[xMn, Math.round((xMn+xMx)/2), xMx];
    const yTicks=[0, parseFloat((yMx/2).toFixed(4)), parseFloat(yMx.toFixed(4))];
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{maxWidth:520,display:'block',margin:'0 auto',overflow:'visible'}}>
        {yTicks.map((v,i)=>(
          <line key={i} x1={PL} x2={W-PR} y1={py(v)} y2={py(v)} stroke="var(--line)" strokeWidth={.5} strokeDasharray="3,3"/>
        ))}
        <line x1={px(xMn)} y1={py(sl*xMn+ic)} x2={px(xMx)} y2={py(sl*xMx+ic)}
          stroke="var(--pop)" strokeWidth={1.5} strokeDasharray="5,3" opacity={.75}/>
        {allSalesByScore.map((s,i)=>{
          const isH=hoverDot===i;
          const col = CAT_COLORS[Object.keys(CAT_COLORS)[i % 6]] || 'var(--teal)';
          return(
            <circle key={i} cx={px(s.nft.diScore)} cy={py(s.price)} r={isH?6:3.5}
              fill="var(--teal)" stroke="var(--ink2)" strokeWidth={.8}
              opacity={isH?1:.6} style={{cursor:'pointer',transition:'r .1s'}}
              onMouseEnter={()=>setHoverDot(i)} onMouseLeave={()=>setHoverDot(null)}
              onClick={()=>onSelectNft&&onSelectNft(s.nft)}/>
          );
        })}
        <line x1={PL} y1={H-PB} x2={W-PR} y2={H-PB} stroke="var(--line2)" strokeWidth={1}/>
        <line x1={PL} y1={PT}   x2={PL}   y2={H-PB} stroke="var(--line2)" strokeWidth={1}/>
        {xTicks.map((v,i)=>(
          <g key={i}>
            <line x1={px(v)} y1={H-PB} x2={px(v)} y2={H-PB+4} stroke="var(--line2)"/>
            <text x={px(v)} y={H-PB+13} textAnchor="middle" fill="var(--txt3)" fontSize={8}>{Math.round(v)}</text>
          </g>
        ))}
        {yTicks.map((v,i)=>(
          <g key={i}>
            <line x1={PL-4} y1={py(v)} x2={PL} y2={py(v)} stroke="var(--line2)"/>
            <text x={PL-6} y={py(v)+3} textAnchor="end" fill="var(--txt3)" fontSize={8}>{v}</text>
          </g>
        ))}
        <text x={PL+IW/2} y={H-2} textAnchor="middle" fill="var(--txt3)" fontSize={9}>NFT DI Score →</text>
        <text x={10} y={PT+IH/2} textAnchor="middle" fill="var(--txt3)" fontSize={9}
          transform={`rotate(-90,10,${PT+IH/2})`}>Sale Price (Ξ)</text>
        {hoverDot!=null&&allSalesByScore[hoverDot]&&(()=>{
          const s=allSalesByScore[hoverDot];
          const cx=px(s.nft.diScore),cy=py(s.price);
          const tx=cx>W*.65?cx-100:cx+8, ty=cy<36?cy+10:cy-34;
          return(
            <g>
              <rect x={tx-4} y={ty-14} width={104} height={34} rx={5}
                fill="var(--ink3)" stroke="var(--teal)" strokeWidth={.8}/>
              <text x={tx+1} y={ty} fill="var(--teal)" fontSize={9} fontWeight="bold">
                {`#${s.nft.ID} · ${s.price} Ξ`}
              </text>
              <text x={tx+1} y={ty+12} fill="var(--txt3)" fontSize={8}>
                {`DI ${s.nft.diScore.toFixed(1)}`}
              </text>
              <text x={tx+1} y={ty+22} fill="var(--txt3)" fontSize={8}>
                {s.date||''}
              </text>
            </g>
          );
        })()}
      </svg>
    );
  };

  const filteredSales = useMemo(() => {
    const base = allSales.filter(s => {
      if(traitFilter) {
        const v = s.nft[traitFilter.cat];
        if(!v) return false;
        if(String(v).split('(')[0].trim().toLowerCase() !== traitFilter.name.toLowerCase()) return false;
      }
      if(rangeFilter) {
        if(s.onTarget == null) return false;
        if(rangeFilter==='on')    return s.onTarget;
        if(rangeFilter==='above') return !s.onTarget && s.price > (s.expectedHi||0);
        if(rangeFilter==='below') return !s.onTarget && s.price < (s.expectedLo||Infinity);
      }
      return true;
    });
    const {key, dir} = histSort;
    const mul = dir==='desc' ? -1 : 1;
    return [...base].sort((a,b) => {
      if(key==='id')    return mul*(a.nft.ID - b.nft.ID);
      if(key==='date')  return mul*(a.ts - b.ts);
      if(key==='price') return mul*(a.price - b.price);
      if(key==='di')    return mul*(a.nft.diScore - b.nft.diScore);
      if(key==='model') { const av=a.onTarget?0:a.price>(a.expectedHi||0)?-1:1; const bv=b.onTarget?0:b.price>(b.expectedHi||0)?-1:1; return mul*(av-bv); }
      if(key==='dist')  { const ap=a.expectedMid>0?(a.price-a.expectedMid)/a.expectedMid:0; const bp=b.expectedMid>0?(b.price-b.expectedMid)/b.expectedMid:0; return mul*(ap-bp); }
      return 0;
    });
  }, [allSales, traitFilter, rangeFilter, histSort]);
  const pagedSales = filteredSales.slice(salesPage*SALES_PER_PAGE, (salesPage+1)*SALES_PER_PAGE);
  const totalPages = Math.ceil(filteredSales.length / SALES_PER_PAGE);

  return (

            {/* ── SECTION: Floor Range ── */}
            <Section title="The Floor Range">
              <p>Every calculation here uses a <b>historical floor range of 0.004–0.013 ETH</b> — the band the collection floor operated in over its sale history. No single fixed floor is used because the floor moved during that period.</p>
              <p style={{marginTop:8}}>Combined with a trait's <b>DI floor multiple</b>, this defines the full expected price band for any NFT.</p>
            </Section>

            {/* ── SECTION: DI Floor Multiple ── */}
            <Section title="DI Score & Floor Multiple">
              <p>Each NFT has a cumulative <b>DI (Desirability Index) score</b> — the sum of all its trait scores. That total maps to a <b>floor multiple tier</b>:</p>
              <div style={{margin:'10px 0',border:'1px solid var(--line)',borderRadius:8,overflow:'hidden'}}>
                {[
                  {range:'DI ≥ 375',   mult:'30x – 50x',  ex:'0.12–0.75 ETH'},
                  {range:'DI 148–375', mult:'10x – 30x',  ex:'0.04–0.45 ETH'},
                  {range:'DI 65–148',  mult:'5x – 10x',   ex:'0.02–0.15 ETH'},
                  {range:'DI 45–65',   mult:'2x – 5x',    ex:'0.008–0.075 ETH'},
                  {range:'DI 35–45',   mult:'1.5x – 2x',  ex:'0.006–0.03 ETH'},
                  {range:'DI 23.5–35', mult:'1x – 1.5x',  ex:'0.004–0.0225 ETH'},
                  {range:'DI 15–23.5', mult:'1x (floor)', ex:'0.004–0.013 ETH'},
                  {range:'DI < 15',    mult:'0.8x – 1x',  ex:'0.0032–0.013 ETH'},
                ].map((row,i)=>(
                  <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',
                    padding:'5px 10px',fontSize:10,fontFamily:'Space Mono,monospace',
                    background:i%2===0?'var(--ink2)':'var(--ink3)',
                    borderBottom:'1px solid var(--line)'}}>
                    <span style={{color:'var(--txt3)'}}>{row.range}</span>
                    <span style={{color:'var(--teal)',fontWeight:700}}>{row.mult}</span>
                    <span style={{color:'var(--txt2)'}}>{row.ex}</span>
                  </div>

              </div>
              <p style={{fontSize:10,color:'var(--txt3)'}}>The expected price band = <b>floor low × multiple low</b> to <b>floor high × multiple high</b>. A 2x–5x NFT is on-model anywhere from 0.008 to 0.075 ETH.</p>
            </Section>

            {/* ── SECTION: Traits Table Columns ── */}
            <Section title="Traits Table Columns">

                {col:"DI", desc:"The trait's individual Adjusted Score from the DI model. Higher = rarer and more desirable. This is one component of an NFT's total DI score."},

                {col:"# Sales", desc:"Number of recorded sales of NFTs that have this trait."},
                {col:"Avg Ξ", desc:"Average sale price in ETH across all sales of NFTs with this trait."},
                {col:"+Flr", desc:"Average premium above the tier floor minimum. Calculated as: avg sale price − (FLOOR_LO × multiple.lo). Example: a 30x–50x trait (floor min = 0.12 ETH) selling at 0.30 ETH has +Flr of 0.18 ETH. Tells you how far above rock-bottom expectations it traded."},
                {col:"vs Mid", desc:"Average distance from the midpoint of the expected range. Positive = consistently selling in the upper half of its range (outperforming). Negative = selling in the lower half. Near zero = right at the model's center prediction. Example: Darth Vader at 0.30 ETH in a 0.12–0.75 range has a midpoint of 0.435, so vs Mid = −0.135 (sold, but in the cheap end of a wide tier)."},

                {label:'Grail 300+',    col:'var(--r-grail)',     lo:300, hi:Infinity},

                const ps=bs.map(s=>s.price);

                            style={{background:'var(--ink4)',borderRadius:8,padding:'8px',textAlign:'center',
                              border:`1px solid ${rangeFilter===key?col:col+'44'}`,cursor:'pointer',
                              transform:rangeFilter===key?'scale(1.02)':'scale(1)',transition:'all .15s'}}>
                            <div style={{fontSize:18,color:col,fontWeight:900,lineHeight:1}}>{icon} {val}</div>
                            <div style={{fontSize:8,color:'var(--txt3)',marginTop:3,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em'}}>{label}</div>
                            <div style={{fontSize:7,color:col,marginTop:2,opacity:.8}}>tap to filter</div>
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:9,color:'var(--txt3)',marginTop:8,fontStyle:'italic'}}>
                        {summary.spearmanN<10
                          ? `Only ${summary.spearmanN} data points — correlation will stabilise with more sales.`
                          : summary.spearmanR>=0.5
                            ? 'DI scoring is meaningfully predicting relative sale prices.'
                            : 'More sales needed across DI tiers to draw firm conclusions.'}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </>
          }
        </div>
      )}

      {/* ── HISTORY ── */}
      {tab==='history'&&(
        <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
          <div style={{padding:'8px 14px 6px',borderBottom:'1px solid var(--line)',flexShrink:0,
            display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
            <span style={{fontSize:10,color:'var(--txt3)',display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
              {traitFilter&&(
                <span style={{display:'inline-flex',alignItems:'center',gap:4,
                  background:'var(--ink3)',border:`1px solid ${traitFilter.color}`,
                  borderRadius:10,padding:'2px 8px',fontSize:9,fontWeight:700,color:traitFilter.color}}>
                  {traitFilter.name}
                  <button onClick={()=>setTraitFilter(null)}
                    style={{background:'none',border:'none',color:'inherit',cursor:'pointer',padding:'0 0 0 2px',fontSize:10,lineHeight:1}}>×</button>
                </span>
              )}
              {rangeFilter&&(
                <span style={{display:'inline-flex',alignItems:'center',gap:4,
                  background:'var(--ink3)',border:`1px solid ${rangeFilter==='above'?'var(--green)':rangeFilter==='on'?'var(--teal)':'var(--red)'}`,
                  borderRadius:10,padding:'2px 8px',fontSize:9,fontWeight:700,
                  color:rangeFilter==='above'?'var(--green)':rangeFilter==='on'?'var(--teal)':'var(--red)'}}>
                  {rangeFilter==='above'?'↑ above range':rangeFilter==='on'?'✓ in range':'↓ below range'}
                  <button onClick={()=>setRangeFilter(null)}
                    style={{background:'none',border:'none',color:'inherit',cursor:'pointer',padding:'0 0 0 2px',fontSize:10,lineHeight:1}}>×</button>
                </span>
              )}
              {!traitFilter&&!rangeFilter&&<>{allSales.length} total sales · newest first</>}
              {(traitFilter||rangeFilter)&&<span>{filteredSales.length} sale{filteredSales.length!==1?'s':''}</span>}
            </span>
            {(traitFilter||rangeFilter)&&(
              <button onClick={()=>{setTraitFilter(null);setRangeFilter(null);}}
                style={{background:'none',border:'1px solid var(--line)',borderRadius:4,padding:'2px 8px',
                  fontSize:9,color:'var(--txt3)',cursor:'pointer',flexShrink:0}}>
                clear all ×
              </button>
            )}
          </div>
          <div style={{flex:1,overflowY:'auto',overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',tableLayout:'fixed'}}>
            <colgroup>
              <col style={{width:'11%'}}/>{/* ID */}
              <col style={{width:'20%'}}/>{/* Date */}
              <col style={{width:'18%'}}/>{/* Price */}
              <col style={{width:'13%'}}/>{/* DI */}
              <col style={{width:'9%'}}/>{/* ✓ */}
              <col style={{width:'16%'}}/>{/* Δ Mid */}
              <col style={{width:'13%'}}/>{/* Report */}
            </colgroup>
            <thead>
              <tr style={{background:'var(--ink3)',borderBottom:'1px solid var(--line)'}}>
                {[['id','ID','center'],['date','Date','left'],['price','Price','right'],['di','DI','center'],['model','✓','center'],['dist','Δ Mid','right'],['','Report','center']].map(([k,h,align])=>{
                  const sortable = k!=='';
                  const active = histSort.key===k;
                  const arrow = active?(histSort.dir==='desc'?'↓':'↑'):'⇅';
                  return(
                    <th key={h} onClick={sortable?()=>{
                      setHistSort(p=>p.key===k?{key:k,dir:p.dir==='desc'?'asc':'desc'}:{key:k,dir:'desc'});

            </thead>
            <tbody>
            {filteredSales.map((s,i)=>{
              const icol = s.onTarget==null?'var(--txt3)':s.onTarget?'var(--teal)':s.price>(s.expectedHi||0)?'var(--green)':'var(--red)';
              const icn  = s.onTarget==null?'—':s.onTarget?'✓':s.price>(s.expectedHi||0)?'↑':'↓';
              const pct  = s.expectedMid>0 ? ((s.price - s.expectedMid)/s.expectedMid*100) : null;
              return(
                <tr key={i} style={{borderBottom:'1px solid var(--ink4)',cursor:'pointer'}}
                  onClick={()=>onSelectNft&&onSelectNft(s.nft)}>
                  <td style={{padding:'7px 4px',fontFamily:'Space Mono,monospace',fontSize:10,fontWeight:700,color:'var(--teal)',textAlign:'center'}}>#{s.nft.ID}</td>

                  <td style={{padding:'7px 4px',fontFamily:'Space Mono,monospace',fontSize:10,textAlign:'center',color:getRarityTier(s.nft.diScore)?.color||'var(--txt3)'}}>{s.nft.diScore.toFixed(1)}</td>
                  <td style={{padding:'7px 4px',textAlign:'center',fontWeight:900,fontSize:12,color:icol}}>{icn}</td>
                  <td style={{padding:'7px 4px',textAlign:'right',fontFamily:'Space Mono,monospace',fontSize:9,fontWeight:700,color:pct==null?'var(--txt3)':pct>0?'var(--green)':'var(--red)'}}>
