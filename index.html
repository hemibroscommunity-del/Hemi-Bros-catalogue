                                                                <div className="flex flex-wrap gap-1 content-start">{data.tagsList.map((tag) => (<div key={tag.name} className="flex items-center gap-1 border border-black/10 rounded px-1.5 py-0.5" style={{backgroundColor: SYNERGY_COLORS[tag.name] || '#eee'}} title={`${tag.name}: +${tag.score}`}><IdentityIcon name={tag.name} className="w-2.5 h-2.5 text-gray-800" /><span className="text-[9px] font-bold text-gray-800">{tag.name}</span><span className="text-[9px] font-mono text-gray-700">+{tag.score}</span></div>))}</div>
                                                            ) : <span className="text-[10px] text-gray-400 italic">No traits</span>}
                                                        </div>
                                                    </div>
                                                ) : <span className="text-xs text-gray-300 italic mt-1">Empty</span>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    {activeSlot && <ItemDetailModal data={activeSlot} onClose={() => setActiveSlot(null)} />}
                </div>
            );
        };

        const App = () => {
            const [currentView, setCurrentView] = React.useState('gallery');
            const [nfts, setNfts] = React.useState([]);
            const [traitDetails, setTraitDetails] = React.useState({});
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [selectedNft, setSelectedNft] = React.useState(null);
            const [filters, setFilters] = React.useState({ id: '', rarity: '', traits: {}, showIpRisk: true });
            const [idInput, setIdInput] = React.useState('');
            const [sortBy, setSortBy] = React.useState('rank-asc');

            React.useEffect(() => {
                const load = async () => {
                    try {
                        setLoading(true);
                        const { nfts: loadedNfts, traitMap } = await fetchData();
                        setNfts(loadedNfts);
                        setTraitDetails(traitMap);
                    } catch (err) {
                        console.error(err);
                        setError(err instanceof Error ? err.message : 'An unknown error occurred');
                    } finally {
                        setLoading(false);
                    }
                };
                load();
            }, []);

            React.useEffect(() => {
                const timer = setTimeout(() => setFilters(prev => ({ ...prev, id: idInput })), 300);
                return () => clearTimeout(timer);
            }, [idInput]);

            const filteredNfts = React.useMemo(() => {
                let result = nfts.filter(nft => {
                    if (!filters.showIpRisk && nft.hasIpRisk) return false;
                    if (filters.id && nft.ID.toString() !== filters.id && filters.id !== '') return false;
                    if (filters.rarity) { if (nft.rarity.tier !== filters.rarity) return false; }
                    for (const [cat, val] of Object.entries(filters.traits)) { if (nft[cat] !== val) return false; }
                    return true;
                });
                result.sort((a, b) => {
                    if (sortBy === 'rank-asc') return a.rank - b.rank;
                    if (sortBy === 'rank-desc') return b.rank - a.rank;
                    if (sortBy === 'surprisal-desc') return b.surprisalScore - a.surprisalScore;
                    if (sortBy === 'additive-asc') return a.additiveScore - b.additiveScore; // LOW to HIGH
                    return 0;
                });
                return result;
            }, [nfts, filters, sortBy]);

            const facetedCounts = React.useMemo(() => {
                const counts = { rarity: {}, traits: {} };
                TRAIT_CATEGORIES.forEach(cat => counts.traits[cat] = {});
                const matchesFilters = (nft, excludeCategory) => {
                    if (!filters.showIpRisk && nft.hasIpRisk) return false;
                    if (filters.id && nft.ID.toString() !== filters.id && filters.id !== '') return false;
                    if (excludeCategory !== 'rarity' && filters.rarity) { if (nft.rarity.tier !== filters.rarity) return false; }
                    for (const [cat, val] of Object.entries(filters.traits)) { if (excludeCategory !== cat && val && nft[cat] !== val) return false; }
                    return true;
                };
                nfts.forEach(nft => {
                    if (matchesFilters(nft, 'rarity')) counts.rarity[nft.rarity.tier] = (counts.rarity[nft.rarity.tier] || 0) + 1;
                });
                TRAIT_CATEGORIES.forEach(cat => {
                    nfts.forEach(nft => {
                        if (matchesFilters(nft, cat)) {
                            const val = nft[cat];
                            if (typeof val === 'string' && val && val !== 'None') counts.traits[cat][val] = (counts.traits[cat][val] || 0) + 1;
                        }
                    });
                });
                return counts;
            }, [nfts, filters]);

            const traitOptions = React.useMemo(() => {
                const options = {};
                TRAIT_CATEGORIES.forEach(cat => {
                    const values = new Set();
                    nfts.forEach(nft => {
                        const val = nft[cat];
                        if (typeof val === 'string' && val && val !== 'None') values.add(val);
                    });
                    options[cat] = Array.from(values).sort((a, b) => a.localeCompare(b));
                });
                return options;
            }, [nfts]);

            const handleEncyclopediaClick = (category, traitName) => {
                const key = getTraitKey(category, traitName);
                if (key && traitDetails[key]) {
                    const fullValue = `${traitName} (${traitDetails[key].Supply})`;
                    const isRisky = checkIpRisk(traitDetails[key]['IP Risk']);
                    setFilters({ id: '', rarity: '', traits: { [category]: fullValue }, showIpRisk: isRisky ? true : filters.showIpRisk });
                    setCurrentView('gallery');
                }
            };

            const hiddenByIpRisk = React.useMemo(() => {
                if (idInput && filteredNfts.length === 0) {
                    const nft = nfts.find(n => n.ID.toString() === idInput);
                    if (nft && nft.hasIpRisk && !filters.showIpRisk) return true;
                }
                return false;
            }, [idInput, filteredNfts.length, nfts, filters.showIpRisk]);

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#d1d1d1]"><div className="text-2xl font-bold text-purple-700 animate-pulse font-serif">Loading Hemi Bros...</div></div>;
            if (error) return <div className="min-h-screen flex items-center justify-center p-4 bg-[#d1d1d1]"><div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-center"><strong className="font-bold">Error!</strong><span className="block sm:inline ml-2">{error}</span></div></div>;

            return (
                <div className="min-h-screen flex flex-col">
                    <div className="sticky top-0 z-40 bg-white shadow-lg">
                        <header className="bg-gradient-to-r from-purple-800 to-gray-700">
                            <div className="container mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
                                <h1 className="text-3xl md:text-4xl font-bold text-white tracking-wider cursor-pointer drop-shadow-md" style={{ fontFamily: 'VT323, monospace' }} onClick={() => setCurrentView('gallery')}>HEMI BROS NFT GALLERY</h1>
                                <div className="flex bg-gray-900/30 rounded-lg p-1">
                                    <button onClick={() => setCurrentView('gallery')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all flex items-center ${currentView === 'gallery' ? 'bg-white text-purple-900 shadow' : 'text-gray-200 hover:text-white hover:bg-white/10'}`}><GridIcon /> Gallery</button>
                                    <button onClick={() => setCurrentView('encyclopedia')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all flex items-center ${currentView === 'encyclopedia' ? 'bg-white text-purple-900 shadow' : 'text-gray-200 hover:text-white hover:bg-white/10'}`}><BookIcon /> Encyclopedia</button>
                                </div>
                            </div>
                        </header>
                        {currentView === 'gallery' && <FilterBar filters={filters} setFilters={setFilters} traitOptions={traitOptions} traitDetails={traitDetails} facetedCounts={facetedCounts} resetFilters={() => setFilters({ id: '', rarity: '', traits: {}, showIpRisk: true })} idInput={idInput} setIdInput={setIdInput} sortBy={sortBy} setSortBy={setSortBy} />}
                    </div>
                    <main className="container mx-auto p-4 flex-grow">
                        {currentView === 'gallery' ? (
                            <>
                                <div className="mb-4">
                                    <div className="text-center text-sm text-gray-600 bg-white/50 inline-block px-4 py-1 rounded-full mx-auto shadow-sm border border-gray-200 backdrop-blur-sm">Showing <span className="font-bold">{filteredNfts.length}</span> of <span className="font-bold">{nfts.length}</span> Bros</div>
                                    {hiddenByIpRisk && <div className="max-w-md mx-auto mt-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded shadow-md"><div className="flex"><div className="flex-shrink-0"><CautionIcon className="h-5 w-5 text-yellow-400" /></div><div className="ml-3"><p className="text-sm text-yellow-700">Item <span className="font-bold">#{idInput}</span> has been community flagged with one or more items that have IP risk.</p><div className="mt-2"><button onClick={() => setFilters(prev => ({ ...prev, showIpRisk: true }))} className="text-sm font-medium text-yellow-800 hover:text-yellow-900 underline">Show IP Risk Content</button></div></div></div></div>}
                                </div>
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                                    {filteredNfts.map(nft => <NFTCard key={nft.ID} nft={nft} onClick={setSelectedNft} />)}
                                </div>
                                {filteredNfts.length === 0 && !hiddenByIpRisk && <div className="col-span-full text-center py-12 text-gray-500"><h3 className="text-xl font-semibold">No NFTs Found</h3><p>Try adjusting your filters.</p></div>}
                            </>
                        ) : <Encyclopedia traitDetails={traitDetails} onTraitClick={handleEncyclopediaClick} />}
                    </main>
                    <NFTModal nft={selectedNft} traitDetails={traitDetails} onClose={() => setSelectedNft(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
