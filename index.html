<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback,useDeferredValue,useTransition,startTransition} = React;
const BASE    = 'https://raw.githubusercontent.com/hemibroscommunity-del/Hemi-Bros-catalogue/main';
const CDN     = 'https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main';
const NFT_U   = `${BASE}/Hemi%20Bro%20spreadsheet-CleanDataWithImages.csv`;
const SUP_U   = `${BASE}/Hemi%20Bro%20spreadsheet-SupplyCount.csv`;
const TAGS_U  = `${BASE}/Hemi_Bros_V14_Worksheet%20-%20Trait%20Scoring.csv`;
const SCR_U   = `${BASE}/Hemi_Bros_V14_Worksheet%20-%20All%20NFT%20scores.csv`;
const SALES_U = `${BASE}/hemibrossales%20-%20Sold.csv`;

const CATS = ['Bro Type','Headwear','Clothes','Eyes','Eyewear','Mouth Items'];
const FLOOR_ETH = 0.005; // used for display estimates (current floor)
const FLOOR_LO  = 0.004; // historical floor low  (for range accuracy / premium baseline)
const FLOOR_HI  = 0.013; // historical floor high (for range accuracy upper bound)
const FLOOR_MID = (FLOOR_LO + FLOOR_HI) / 2; // midpoint ~0.0095

/* ════════════════════════════════════
   FEATURE FLAGS
   Toggle features without touching
   component code.
════════════════════════════════════ */
const FEATURES = {
  watchlist:     true,
  priceEstimate: true,
  ipFilter:      true,
  compareMode:   true,
  walletConnect: true,
  portfolio:     true,
  offerFeed:     true,
  deepLinks:     true,
  ethPrice:      true,
};

/* ════════════════════════════════════
   APP CONTEXT
   Collection data available to any
   component without prop drilling.
════════════════════════════════════ */
const AppCtx = React.createContext(null);
const useApp = () => React.useContext(AppCtx);

// Error boundary: catches rendering crashes with a friendly recovery UI
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('[ErrorBoundary]', error, info.componentStack); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: {padding:40,textAlign:'center',color:'#e8eaf8',fontFamily:'DM Sans,system-ui,sans-serif'}
      },
        React.createElement('div', {style:{fontSize:'2rem',marginBottom:12}}, '⚠️'),
        React.createElement('h2', {style:{fontSize:18,marginBottom:8}}, 'Something went wrong'),
        React.createElement('p', {style:{fontSize:13,color:'#8890b8',marginBottom:16,maxWidth:400,margin:'0 auto 16px'}},
          this.state.error?.message || 'An unexpected error occurred.'),
        React.createElement('button', {
          onClick: () => { this.setState({ hasError: false, error: null }); },
          style: {padding:'8px 20px',borderRadius:8,border:'1.5px solid #5b52ff',background:'rgba(91,82,255,.14)',color:'#e8eaf8',fontSize:13,fontWeight:600,cursor:'pointer'}
        }, 'Try Again'),
        React.createElement('button', {
          onClick: () => { window.location.reload(); },
          style: {marginLeft:8,padding:'8px 20px',borderRadius:8,border:'1.5px solid #2d3251',background:'#1a1d2e',color:'#8890b8',fontSize:13,fontWeight:600,cursor:'pointer'}
        }, 'Reload Page')
      );
    }
    return this.props.children;
  }
}

const FAM_COLORS = {
  Brand:'#fca5a5',Prestige:'#fde047',Villainous:'#86efac',Enforcer:'#93c5fd',
  Fantasy:'#6ee7b7','Sci-fi':'#67e8f9',Whimsical:'#fbcfe8',Heritage:'#fdba74',
  Drip:'#f472b6',Urban:'#9ca3af',Meme:'#bef264',Minimalist:'#e2e8f0',
  Scene:'#d8b4fe',Hemi:'#fdba74',Zombie:'#bef264',Alien:'#c4b5fd',
  Robot:'#67e8f9',Gold:'#fde047',Demon:'#fca5a5',Angel:'#93c5fd',
  Cyborg:'#a5b4fc',Ape:'#d7ccc8',Human:'#f9a8d4',Skeleton:'#d1d5db',
  default:'#cbd5e1'
};

/* ════════════════════════════════════
   UTILS
════════════════════════════════════ */
const tk  = (cat,name) => !name?null:`${cat.trim().toLowerCase()}:${name.trim().toLowerCase()}`;
const isIp= v => !!v && ['yes','y','true','1'].includes(String(v).trim().toLowerCase());

// Simple debounce hook
const useDebounce = (value, ms) => {
  const [debounced, setDebounced] = useState(value);
  useEffect(() => {
    const t = setTimeout(() => setDebounced(value), ms);
    return () => clearTimeout(t);
  }, [value, ms]);
  return debounced;
};

const normCat = c => {
  const l = c.trim().toLowerCase();
  if(l==='head'||l==='hats') return 'Headwear';
  if(l==='face'||l==='glasses') return 'Eyewear';
  if(l==='mouth') return 'Mouth Items';
  if(l==='torso'||l==='clothing'||l==='shirt') return 'Clothes';
  if(l==='base'||l==='body') return 'Bro Type';
  return c.trim();
};

const thumbUrl = (cat,file,name) => {
  const f = file ? (file.trim().match(/\.[a-z]+$/i)?file.trim():file.trim()+'.png') : null;
  if(f) return `${CDN}/${encodeURIComponent(cat)}/${encodeURIComponent(f)}`;
  if(name) return `${CDN}/${encodeURIComponent(cat)}/${encodeURIComponent(name)}.png`;
  return null;
};

// Extract the numeric floor multiple from an NFT's displayMultiple field.
// "10x - 30x" → midpoint 20. "15x" → 15. null/missing → fall back to diScore.
// Returns {lo, hi, mid} — lo/hi are the range endpoints (lo===hi for single values)
const getMultipleRange = nft => {
  const dm = nft.displayMultiple;
  if(dm != null){
    const s = String(dm).trim();
    if(s && s !== 'null'){
      const range = s.match(/^([\d.]+)x?\s*[-–]\s*([\d.]+)x?$/i);
      if(range){
        const lo = parseFloat(range[1]), hi = parseFloat(range[2]);
        return {lo, hi, mid:(lo+hi)/2};
      }
      const n = parseFloat(s.replace(/x/gi,'').replace(/,/g,''));
      if(!isNaN(n) && n > 0) return {lo:n, hi:n, mid:n};
    }
  }
  return null;
};
// Backwards-compat single value (midpoint) for places that just need a number
const getMultiple = nft => { const r = getMultipleRange(nft); return r ? r.mid : null; };

// Derive floor multiple range directly from a DI score.
// Thresholds extracted from All NFT scores CSV — definitive mapping.
const DI_TIERS = [
  { minDI: 375.0, lo: 30, hi: 50 }, // 30x - 50x
  { minDI: 148.0, lo: 10, hi: 30 }, // 10x - 30x
  { minDI:  65.2, lo:  5, hi: 10 }, // 5x  - 10x
  { minDI:  45.0, lo:  2, hi:  5 }, // 2x  - 5x
  { minDI:  35.0, lo:1.5, hi:  2 }, // 1.5x - 2x
  { minDI:  23.5, lo:  1, hi:1.5 }, // 1x  - 1.5x
  { minDI:  15.0, lo:  1, hi:  1 }, // 1x  - 1x
  { minDI:   0,   lo:0.8, hi:  1 }, // 0.8x - 1x (floor/below-floor)
];
const diScoreToRange = score => {
  for(const t of DI_TIERS) if(score >= t.minDI) return { lo: t.lo, hi: t.hi, mid: (t.lo + t.hi) / 2 };
  return { lo: 0.8, hi: 1, mid: 0.9 }; // fallback
};

// Implied multiple: linear interpolation within the DI tier band.
// e.g. DI=262 in the 148-375 band (10x-30x) → lerp(10,30, (262-148)/(375-148)) ≈ 20x
const getImpliedMultiple = score => {
  for(let i=0;i<DI_TIERS.length;i++){
    const t = DI_TIERS[i];
    if(score >= t.minDI){
      const bandTop = i===0 ? t.minDI + (t.hi - t.lo) * 10 : DI_TIERS[i-1].minDI;
      const bandBot = t.minDI;
      const frac = bandTop > bandBot ? Math.min(1, Math.max(0, (score - bandBot) / (bandTop - bandBot))) : 0;
      return t.lo + frac * (t.hi - t.lo);
    }
  }
  return 0.9;
};

const fmtEth = (multiple, ethPrice=null) => {
  const est = FLOOR_ETH * multiple;
  const ethStr = est < 0.01 ? est.toFixed(4) : est.toFixed(3);
  const usdStr = ethPrice ? ` (~$${Math.round(est * ethPrice).toLocaleString()})` : '';
  return `${ethStr} ETH${usdStr}`;
};

const fmtScore = nft => {
  const dm = nft.displayMultiple;
  if(dm!=null){
    const s = String(dm).trim();
    if(!s||s==='null') return nft.diScore.toFixed(1);
    if(isNaN(Number(s.replace(/,/g,'')))) return s; // "10x - 30x" range
    const n = parseFloat(s.replace(/,/g,''));
    if(!isNaN(n)) return Number.isInteger(n)?`${n}x`:`${n.toFixed(2)}x`;
  }
  return nft.diScore.toFixed(1);
};

/* ════════════════════════════════════
   DATA LOAD
════════════════════════════════════ */
async function loadData(){
  const txt = url => fetch(url,{cache:'default'}).then(r=>{if(!r.ok)throw new Error(url);return r.text();});
  const [nftTxt,supTxt,tagsTxt,scrTxt,salesTxt] = await Promise.all([txt(NFT_U),txt(SUP_U),txt(TAGS_U),txt(SCR_U),txt(SALES_U).catch(()=>'')]);
  const traitMap={}, scoresMap={};

  // --- sales ---
  const salesMap = {};
  if(salesTxt && salesTxt.trim()){
    await new Promise(res=>Papa.parse(salesTxt,{header:true,dynamicTyping:false,skipEmptyLines:true,complete:r=>{
      // Normalize all column keys to lowercase-no-spaces for flexible matching
      const norm = s => String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      const get = (row, ...keys) => {
        const rn = Object.fromEntries(Object.entries(row).map(([k,v])=>[norm(k),v]));
        for(const k of keys){ const v=rn[norm(k)]; if(v!==undefined&&v!==null&&v!=='') return v; }
        return '';
      };
      if(r.data.length>0) console.log('[Sales CSV] columns:', Object.keys(r.data[0]), 'first row:', r.data[0]);
      r.data.forEach(row=>{
        const rawId = get(row,'NFT ID','NFTID','Token ID','TokenID','ID','id','token id','#','Bro','Bro ID','NFT','NFT ID','Number');
        if(!rawId) return;
        const sid = String(rawId).trim();
        if(!salesMap[sid]) salesMap[sid]=[];
        const rawPrice = get(row,'Price (ETH)','PriceETH','Price','price','ETH','eth','Amount','amount','Sale Price','saleprice','Value','value','Cost','cost');
        const rawDate  = get(row,'Date','date','Sale Date','saledate','Sold Date','solddate','Transaction Date');
        const rawBuyer = get(row,'Buyer','buyer','To','to');
        const rawSeller= get(row,'Seller','seller','From','from');
        salesMap[sid].push({
          price:  parseFloat(String(rawPrice).replace(/[^0-9.]/g,''))||0,
          date:   String(rawDate).trim(),
          buyer:  String(rawBuyer).trim(),
          seller: String(rawSeller).trim(),
        });
      });
      res();
    }}));

    // ── Compute historical floor (trailing 60-day 10th-percentile) for every sale ──
    // Known data corrections:
    //   NFT #5503 sold 8/3/2025 at 0.0012 ETH — seller error, actual total was 0.007 ETH
    // Known outlier exclusions from floor calc (rare 1-of-1 OTC buys, not market floor):
    //   NFT #4104 sold 5/29/2025 at 0.1585 ETH
    //   NFT #5110 sold 7/16/2025 at 0.3 ETH
    const FLOOR_OUTLIER_IDS = new Set(['4104','5110']); // excluded from floor window
    const FLOOR_PRICE_CORRECTIONS = {'5503': 0.007};    // display price unchanged; floor calc uses corrected price

    // Flatten all sales into a time-sorted array for window lookups
    // Each entry: { sid, price (corrected), date (Date obj), isOutlier }
    const allSalesFlat = [];
    Object.entries(salesMap).forEach(([sid, arr]) => {
      arr.forEach(s => {
        if(!s.price || !s.date) return;
        const d = new Date(s.date);
        if(isNaN(d.getTime())) return;
        const correctedPrice = FLOOR_PRICE_CORRECTIONS[sid] != null ? FLOOR_PRICE_CORRECTIONS[sid] : s.price;
        allSalesFlat.push({ sid, price: correctedPrice, date: d, isOutlier: FLOOR_OUTLIER_IDS.has(sid) });
      });
    });
    allSalesFlat.sort((a,b) => a.date - b.date);

    const percentileN = (arr, p) => {
      if(!arr.length) return null;
      const sorted = [...arr].sort((a,b)=>a-b);
      const idx = Math.max(0, Math.ceil(sorted.length * p) - 1);
      return sorted[idx];
    };

    // For each sale, compute trailing 60-day p10 (floor lo) and p90 (floor hi)
    // and attach to the salesMap entry as histFloorLo / histFloorHi
    Object.entries(salesMap).forEach(([sid, arr]) => {
      arr.forEach(s => {
        if(!s.price || !s.date) return;
        const saleDate = new Date(s.date);
        if(isNaN(saleDate.getTime())) return;
        const windowStart = new Date(saleDate.getTime() - 60 * 24 * 60 * 60 * 1000);
        // Prices in trailing 60-day window (excluding outliers, including this sale)
        const windowPrices = allSalesFlat
          .filter(x => !x.isOutlier && x.date >= windowStart && x.date <= saleDate)
          .map(x => x.price);
        let floorLo = percentileN(windowPrices, 0.10);
        let floorHi = percentileN(windowPrices, 0.90);
        if(floorLo == null) {
          // Fallback: global min/max up to this date (excluding outliers)
          const prior = allSalesFlat.filter(x => !x.isOutlier && x.date <= saleDate).map(x=>x.price);
          floorLo = prior.length ? Math.min(...prior) : null;
          floorHi = prior.length ? Math.max(...prior) : null;
        }
        s.histFloorLo = floorLo; // trailing p10 — floor lower bound
        s.histFloorHi = floorHi; // trailing p90 — floor upper bound
      });
    });
  }

  // --- scores ---
  Papa.parse(scrTxt,{header:true,dynamicTyping:true,skipEmptyLines:true,complete:r=>{
    r.data.forEach(row=>{
      if(!row.ID) return;
      let dm = row['Display Multiple']??row['Display_Multiple']??null;
      if(typeof dm==='string'){
        const s=dm.trim(), n=parseFloat(s.replace(/,/g,''));
        dm = (!isNaN(n)&&String(n)===s.replace(/,/g,'')) ? n : s;
      }
      scoresMap[row.ID]={diScore:row['DI Score']||row['DI_Score']||0, displayMultiple:dm};
    });
  }});

  // --- supply / trait master ---
  await new Promise(res=>Papa.parse(supTxt,{header:true,skipEmptyLines:true,complete:r=>{
    r.data.forEach(d=>{
      const keys=Object.keys(d);
      const catRaw = d.Category||d[keys.find(k=>k.trim().toLowerCase()==='category')];
      const item   = d['Unique Item List']||d[keys.find(k=>['unique item list','item name','trait','item'].includes(k.trim().toLowerCase()))];
      if(!catRaw||!item) return;
      const cat  = normCat(catRaw);
      const name = item.split('(')[0].trim();
      const key  = tk(cat,name);
      if(!key) return;
      const supply   = d.Count||d.Supply||d.Quantity||d.Qty||d[keys.find(k=>['count','supply','quantity','qty'].includes(k.trim().toLowerCase()))];
      const thumbFile= d.IconName||d.ThumbFilename||d.Image||d.Filename;
      const ipRisk   = d['IP Concern']||d['IP Risk']||d[keys.find(k=>k.toLowerCase().includes('ip risk')||k.toLowerCase().includes('ip concern'))];
      traitMap[key]  = {...d,Category:cat,'Unique Item List':name,
        Supply:supply!=null?String(supply):'',
        'IP Risk':ipRisk,
        thumbnailUrl:thumbUrl(cat,thumbFile,name),
        tags:{},adjustedScore:0};
    });
    res();
  }}));

  // --- tags + adj scores ---
  await new Promise(res=>Papa.parse(tagsTxt,{header:true,dynamicTyping:true,skipEmptyLines:true,complete:r=>{
    r.data.forEach(d=>{
      const keys=Object.keys(d);
      const catRaw=d.Category||d[keys.find(k=>k.trim().toLowerCase()==='category')];
      const item=d['Unique Item List']||d[keys.find(k=>['unique item list','item name','trait','item'].includes(k.trim().toLowerCase()))];
      if(!catRaw||!item) return;
      const cat=normCat(catRaw), name=item.split('(')[0].trim(), key=tk(cat,name);
      if(!key) return;
      if(!traitMap[key]) traitMap[key]={Category:cat,'Unique Item List':name,Supply:'',tags:{},adjustedScore:0};
      const tags={};
      for(let i=1;i<=10;i++){
        const th=keys.find(k=>k.trim().toLowerCase().replace(/[^a-z0-9]/g,'')=== `tag${i}`);
        const sh=keys.find(k=>{const n=k.trim().toLowerCase().replace(/[^a-z0-9]/g,'');return n===`is${i}`||n===`score${i}`;});
        if(!th) continue;
        const tn=d[th]; if(!tn||typeof tn!=='string'||!tn.trim()||tn.toLowerCase()==='none') continue;
        if(tn.trim().toLowerCase()==='minimalist') continue;
        let sc=sh?(typeof d[sh]==='number'?d[sh]:parseFloat(d[sh])||0):0;
        if(isNaN(sc)) sc=0;
        tags[tn.trim()]=sc;
      }
      traitMap[key].tags=tags;
      const ak=keys.find(k=>['adjusted score','adjustedscore','calculated is','item score'].includes(k.trim().toLowerCase()));
      if(ak){const v=d[ak],sc=typeof v==='number'?v:parseFloat(String(v).replace(/,/g,''));if(!isNaN(sc))traitMap[key].adjustedScore=sc;}
    });
    res();
  }}));

  // --- NFTs ---
  const nfts = await new Promise((res,rej)=>Papa.parse(nftTxt,{
    header:true,dynamicTyping:true,skipEmptyLines:true,
    complete:r=>{
      const tmp=r.data.filter(n=>n.ID).map(n=>{
        const e={...n,hasIpRisk:false};
        const nk=Object.keys(n);
        const famSc={};
        let headwearTags = null; // capture Headwear-specific tags for heritage override
        CATS.forEach(cat=>{
          let key=cat;
          if(n[key]===undefined) key=nk.find(x=>x.trim().toLowerCase()===cat.toLowerCase())||key;
          if(n[key]===undefined){
            if(cat==='Headwear') key=nk.find(x=>x.trim().toLowerCase()==='head')||key;
            if(cat==='Bro Type') key=nk.find(x=>['body','base'].includes(x.trim().toLowerCase()))||key;
            if(cat==='Clothes') key=nk.find(x=>['torso','clothing'].includes(x.trim().toLowerCase()))||key;
            if(cat==='Eyewear') key=nk.find(x=>['face','glasses'].includes(x.trim().toLowerCase()))||key;
            if(cat==='Mouth Items') key=nk.find(x=>x.trim().toLowerCase()==='mouth')||key;
          }
          const val=n[key]; if(!val) return;
          const name=String(val).split('(')[0].trim();
          const tkey=tk(cat,name);
          const detail=tkey?traitMap[tkey]:null;
          if(detail){
            e[cat]=`${name} (${detail.Supply||'?'})`;
            if(isIp(detail['IP Risk'])) e.hasIpRisk=true;
            if(detail.tags) Object.entries(detail.tags).forEach(([t,s])=>{
              famSc[t]=(famSc[t]||0)+(typeof s==='number'?s:parseFloat(s)||0);
            });
            if(cat==='Headwear' && detail.tags) headwearTags=detail.tags;
          } else { e[cat]=name; }
        });
        const maxS=Math.max(0,...Object.values(famSc));
        e.dominantFamilies=maxS>0?Object.entries(famSc).filter(([,s])=>s===maxS).map(([f])=>f):['None'];
        // ── Urban demotion ─────────────────────────────────────────────────────
        // Never use Urban if any other family is available (sole winner or tied).
        // Only keep Urban when it's genuinely the only family with any score.
        const hasUrban = e.dominantFamilies.some(f=>f.toLowerCase()==='urban');
        if(hasUrban){
          const withoutUrban = e.dominantFamilies.filter(f=>f.toLowerCase()!=='urban');
          if(withoutUrban.length>0){
            // Other families tied at the top — just drop Urban from the tie
            e.dominantFamilies = withoutUrban;
          } else {
            // Urban is sole top family — check for next-highest scoring family
            const others = Object.entries(famSc)
              .filter(([f])=>f.toLowerCase()!=='urban')
              .sort(([,a],[,b])=>b-a);
            if(others.length>0 && others[0][1]>0){
              const nextMax = others[0][1];
              e.dominantFamilies = others.filter(([,s])=>s===nextMax).map(([f])=>f);
            }
            // else: truly only Urban — keep it
          }
        }
        // ── Heritage headwear override ─────────────────────────────────────────
        // If the Headwear has a 'heritage' tag, assign Heritage as dominant family
        // UNLESS the headwear's 'enforcer' tag score is strictly higher (use Enforcer instead)
        if(headwearTags){
          // Case-insensitive tag lookup — CSV may store as 'Heritage', 'heritage', etc.
          const hwTagEntries = Object.entries(headwearTags);
          const findTag = name => {
            const e = hwTagEntries.find(([k])=>k.trim().toLowerCase()===name.toLowerCase());
            return e ? (typeof e[1]==='number'?e[1]:parseFloat(e[1])||0) : 0;
          };
          const hwHeritage = findTag('heritage');
          const hwEnforcer = findTag('enforcer');
          if(hwHeritage>0){
            const overrideCap = hwEnforcer>hwHeritage ? 'Enforcer' : 'Heritage';
            if(!e.dominantFamilies.includes(overrideCap)){
              e.dominantFamilies=[overrideCap];
            }
          }
        }
        const sd=scoresMap[n.ID];
        e.diScore=sd?.diScore||0;
        e.displayMultiple=sd?.displayMultiple??null;
        // Diagnostic: warn if any NFT is missing a floor multiple
        if(!sd || sd.displayMultiple==null || sd.displayMultiple==='null' || sd.displayMultiple==='') {
          console.warn(`[Missing multiple] Bro #${n.ID} — scoresMap entry:`, sd);
        }
        return e;
      });
      tmp.sort((a,b)=>b.diScore-a.diScore);
      tmp.forEach((nft,i)=>{
        nft.rank=i+1;
        nft.idStr=String(nft.ID);             // pre-stringify for fast search
        nft.famSet=new Set(nft.dominantFamilies); // pre-build Set for fast family lookup
        nft.sales=salesMap[nft.idStr]||[];    // attach sales history
        // Keep raw GitHub URL — buildImgSources tries raw first, CDN as fallback
        // (no rewrite needed; CDN @main was unreliable)
      });
      res(tmp);
    },
    error:err=>rej(new Error(err.message))
  }));
  // ── Global latest floor: p10/p90 from the most recent sale with hist data ──
  // This represents "most current floor" — the market as of last recorded sale
  let globalLatestFloor = null;
  {
    let latestDate = null, latestLo = null, latestHi = null;
    Object.values(salesMap).forEach(arr => {
      arr.forEach(s => {
        if(s.histFloorLo == null || s.histFloorHi == null) return;
        const d = new Date(s.date);
        if(isNaN(d.getTime())) return;
        if(latestDate == null || d > latestDate) {
          latestDate = d; latestLo = s.histFloorLo; latestHi = s.histFloorHi;
        }
      });
    });
    if(latestDate) globalLatestFloor = { lo: latestLo, hi: latestHi, date: latestDate };
  }

  // ── Floor history time series: every sale with its trailing p10/p90 floor ──
  const _floorOutliers = new Set(['4104','5110']);
  const floorHistory = [];
  Object.entries(salesMap).forEach(([sid, arr]) => {
    arr.forEach(s => {
      if(!s.price || !s.date) return;
      const d = new Date(s.date);
      if(isNaN(d.getTime())) return;
      floorHistory.push({
        date: d, price: s.price, sid,
        floorLo: s.histFloorLo ?? null,
        floorHi: s.histFloorHi ?? null,
        isOutlier: _floorOutliers.has(sid),
      });
    });
  });
  floorHistory.sort((a,b) => a.date - b.date);

  return {nfts, traitMap, salesMap, globalLatestFloor, floorHistory};
}

/* ════════════════════════════════════
   WALLET FETCH — auto-paginate all pages
════════════════════════════════════ */
const CONTRACT = '0xEAB71F90235E6b885C05aFFF3BAF0E41244cf874';
const EXPLORER = 'https://explorer.hemi.xyz';

async function fetchWalletNFTs(walletAddress, onProgress) {
  const ids = new Set();
  let pageParams = null;
  let pageNum = 0;

  while (true) {
    pageNum++;
    let url = `${EXPLORER}/api/v2/tokens/${CONTRACT}/instances?holder_address_hash=${walletAddress}&page_size=50`;
    if (pageParams) url += `&${new URLSearchParams(pageParams).toString()}`;

    onProgress(`Fetching page ${pageNum}…`);
    const res = await fetch(url);
    if (!res.ok) {
      // Try alternate Blockscout API path
      const alt = `${EXPLORER}/api/v2/tokens/${CONTRACT}/token-holders?page_size=50`;
      throw new Error(`Explorer API returned ${res.status}. Check wallet address.`);
    }
    const json = await res.json();

    // Extract token IDs from items array
    const items = json.items || json.data || [];
    items.forEach(item => {
      const id = item.id ?? item.token_id ?? item.metadata?.id;
      if (id != null) ids.add(String(id));
    });

    // Blockscout pagination: next_page_params object
    const next = json.next_page_params;
    if (!next || Object.keys(next).length === 0 || items.length === 0) break;
    pageParams = next;

    // Safety cap — shouldn't need >200 pages for a collection this size
    if (pageNum >= 200) break;
  }

  return [...ids];
}

   GRID WITH INFINITE SCROLL
════════════════════════════════════ */
const PAGE = 60;
/* ════════════════════════════════════
   VIRTUAL WINDOWED GRID
   Only renders rows visible in the viewport + overscan buffer.
   Measures container width via ResizeObserver to match CSS
   grid-template-columns: repeat(auto-fill, minmax(MIN_COL,1fr)).
   Card height is derived: colWidth (1:1 image) + INFO_H (text area) + gap.
════════════════════════════════════ */
const GRID_GAP      = 9;   // matches .nft-grid gap
const GRID_PAD      = 12;  // matches .grid-scroll padding
const INFO_H        = 46;  // card-info height (id + score + eth lines + padding)
const BORDER_H      = 3;   // 1.5px border × 2
const OVERSCAN_ROWS = 4;   // extra rows rendered above/below viewport

const FlatGrid = ({items, onCardClick, isWatchedFn, onToggleWatch}) => {
  const scrollerRef = useRef(null);
  const [scrollTop, setScrollTop]   = useState(0);
  const [viewH,     setViewH]       = useState(800);
  const [containerW, setContainerW] = useState(600);

  // Track container size via ResizeObserver
  useEffect(()=>{
    const el = scrollerRef.current;
    if(!el) return;
    const measure = () => {
      setViewH(el.clientHeight);
      setContainerW(el.clientWidth - GRID_PAD * 2); // subtract padding
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    return ()=>ro.disconnect();
  },[]);

  // Scroll handler (passive + rAF-throttled for perf)
  useEffect(()=>{
    const el = scrollerRef.current;
    if(!el) return;
    let raf = 0;
    const onScroll = () => {
      if(raf) return;
      raf = requestAnimationFrame(()=>{ setScrollTop(el.scrollTop); raf = 0; });
    };
    el.addEventListener('scroll', onScroll, {passive:true});
    return ()=>{ el.removeEventListener('scroll', onScroll); cancelAnimationFrame(raf); };
  },[]);

  // Reset scroll when items change (filter/sort)
  useEffect(()=>{
    if(scrollerRef.current) scrollerRef.current.scrollTop = 0;
    setScrollTop(0);
  }, [items]);

  // Compute grid geometry
  const isMobile = containerW < 480;
  const minCol   = isMobile ? 110 : 130;
  const cols     = Math.max(1, Math.floor((containerW + GRID_GAP) / (minCol + GRID_GAP)));
  const colW     = (containerW - GRID_GAP * (cols - 1)) / cols;
  const rowH     = colW + INFO_H + BORDER_H + GRID_GAP; // card height + gap

  const totalRows  = Math.ceil(items.length / cols);
  const totalH     = totalRows * rowH - GRID_GAP + GRID_PAD * 2; // total scrollable height

  // Which rows are visible
  const firstVisRow = Math.max(0, Math.floor((scrollTop - GRID_PAD) / rowH) - OVERSCAN_ROWS);
  const lastVisRow  = Math.min(totalRows - 1, Math.ceil((scrollTop + viewH - GRID_PAD) / rowH) + OVERSCAN_ROWS);

  const startIdx = firstVisRow * cols;
  const endIdx   = Math.min(items.length, (lastVisRow + 1) * cols);
  const visible  = items.slice(startIdx, endIdx);

  const topPad    = GRID_PAD + firstVisRow * rowH;
  const bottomPad = Math.max(0, GRID_PAD + (totalRows - lastVisRow - 1) * rowH);

  return (
    <div className="grid-scroll virtual" ref={scrollerRef}>
      <div style={{height:topPad,flexShrink:0}} aria-hidden="true"/>
      <div className="nft-grid">
        {visible.map(item=>(
          <Card key={item.ID} nft={item} onClick={onCardClick}
            isWatched={isWatchedFn&&isWatchedFn(item.ID)}
            onToggleWatch={onToggleWatch}/>
        ))}
      </div>
      <div style={{height:bottomPad,flexShrink:0}} aria-hidden="true"/>
      {items.length > 0 && (
        <div style={{position:'sticky',bottom:0,padding:'6px 0',textAlign:'center',
          color:'var(--txt3)',fontSize:11,pointerEvents:'none',
          background:'linear-gradient(transparent, var(--ink) 60%)'}}>
          {items.length.toLocaleString()} Bro{items.length!==1?'s':''}
        </div>
      )}
    </div>
  );
};

// ── Image loading helpers ──────────────────────────────────────────────
// jsDelivr CDN needs @branch not /branch: cdn.jsdelivr.net/gh/USER/REPO@main/path
const RAW_PREFIX = 'https://raw.githubusercontent.com/hemibroscommunity-del/Hemi-Bros-catalogue/main';
const CDN_PREFIX = 'https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main';
const STATICALLY_PREFIX = 'https://cdn.statically.io/gh/hemibroscommunity-del/Hemi-Bros-catalogue/main';
// wsrv.nl proxy: serves WebP-converted, CDN-cached version of any image URL
const wsrvUrl = (rawUrl, w=400) =>
  `https://wsrv.nl/?url=${encodeURIComponent(rawUrl)}&w=${w}&output=webp&q=80&we`;

// Build 4-source waterfall for any NFT image URL:
// 1. wsrv.nl proxy (WebP, globally CDN-cached, resized) — fastest when warm
// 2. Raw GitHub                                          — most authoritative
// 3. jsDelivr CDN (@main)                               — CDN but rate-limited
// 4. Statically CDN                                     — third CDN fallback
const buildImgSources = (src, proxyW=400) => {
  if(!src || typeof src !== 'string') return [];
  // Normalise to raw URL
  let raw = src;
  if(src.includes('cdn.jsdelivr.net'))
    raw = src.replace('https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main', RAW_PREFIX)
             .replace('https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue/main', RAW_PREFIX);
  if(src.includes('cdn.statically.io'))
    raw = src.replace(STATICALLY_PREFIX, RAW_PREFIX);
  const cdn       = raw.replace(RAW_PREFIX, CDN_PREFIX);
  const statically = raw.replace(RAW_PREFIX, STATICALLY_PREFIX);
  const proxy     = wsrvUrl(raw, proxyW);
  // Deduplicate (in case any substitution was a no-op)
  const seen = new Set();
  return [proxy, raw, cdn, statically].filter(u => { if(seen.has(u)) return false; seen.add(u); return true; });
};

// Preload a single image with a hard timeout (ms). Resolves with the URL that loaded, or null.
const preloadImg = (src, timeoutMs=2500, proxyW=400) => {
  const sources = buildImgSources(src, proxyW);
  if(!sources.length) return Promise.resolve(null);
  return new Promise(resolve => {
    let i = 0;
    let timer = null;
    const tryNext = () => {
      if(i >= sources.length) { clearTimeout(timer); resolve(null); return; }
      const url = sources[i++];
      const img = new window.Image();
      clearTimeout(timer);
      timer = setTimeout(() => { img.onload = img.onerror = null; tryNext(); }, timeoutMs);
      img.onload  = () => { clearTimeout(timer); resolve(url); };
      img.onerror = () => { clearTimeout(timer); setTimeout(tryNext, 150); };
      img.src = url;
    };
    tryNext();
  });
};

// Global resolved-URL cache: once an image source resolves successfully,
// skip the waterfall on subsequent renders (e.g. scrolling back into view).
const _imgResolveCache = new Map();

// Shared hook: waterfall through sources on error, with backoff delay
const useImgSrc = (src, proxyW=400) => {
  const sources = React.useMemo(() => buildImgSources(src, proxyW), [src, proxyW]);
  const cachedIdx = React.useMemo(() => {
    const key = `${src}|${proxyW}`;
    const cached = _imgResolveCache.get(key);
    if(cached != null) { const ci = sources.indexOf(cached); if(ci >= 0) return ci; }
    return 0;
  }, [src, proxyW, sources]);
  const [idx, setIdx] = React.useState(cachedIdx);
  const [loaded, setLoaded] = React.useState(false);
  const retryRef = React.useRef(null);
  React.useEffect(() => { setIdx(cachedIdx); setLoaded(false); return () => clearTimeout(retryRef.current); }, [src, cachedIdx]);
  const onErr  = React.useCallback(() => { retryRef.current = setTimeout(() => setIdx(i => i+1), 300); }, []);
  const onLoad = React.useCallback(() => {
    setLoaded(true);
    // Cache the working URL for this source
    const key = `${src}|${proxyW}`;
    if(sources[idx]) _imgResolveCache.set(key, sources[idx]);
  }, [src, proxyW, sources, idx]);
  return { url: idx < sources.length ? sources[idx] : null, onErr, onLoad, loaded, failed: idx >= sources.length };
};

const shortAddr = a => a ? `${a.slice(0,6)}…${a.slice(-4)}` : '';
const fmtRelTime = ts => {
  try {
    const diff = Date.now() - new Date(ts).getTime();
    if(diff < 60000)    return 'just now';
    if(diff < 3600000)  return `${Math.floor(diff/60000)}m ago`;
    if(diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
    if(diff < 604800000)return `${Math.floor(diff/86400000)}d ago`;
    return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  } catch{ return ''; }
};
const fmtExpiry = expiresAt => {
  if(!expiresAt) return null;
  const diff = new Date(expiresAt).getTime() - Date.now();
  if(diff <= 0) return {label:'Expired', cls:'expired'};
  const days = Math.floor(diff/86400000);
  const hrs  = Math.floor((diff%86400000)/3600000);
  if(days === 0) return {label:`Expires in ${hrs}h`, cls:'soon'};
  if(days <= 2)  return {label:`Expires in ${days}d`, cls:'soon'};
  return {label:`Expires in ${days}d`, cls:''};
};
const isOfferActive = o => !o.withdrawn && (!o.expires_at || new Date(o.expires_at) > new Date());

// shared wallet connector — returns {wallet, status, connectWallet, disconnectWallet}
const useWallet = () => {
  const [wallet, setWallet] = useState(null);
  const [status, setStatus] = useState(null);
  const connectWallet = async () => {
    setStatus({type:'loading', msg:'Connecting…'});
    await new Promise(r => setTimeout(r, 0));
    try {
      const provider = window.ethereum;
      if(!provider){ setStatus({type:'err', msg:'No wallet detected. Install MetaMask or similar.'}); return; }
      const accounts = await provider.request({method:'eth_requestAccounts'});
      if(!accounts||accounts.length===0){ setStatus({type:'err', msg:'No accounts returned.'}); return; }
      setWallet(accounts[0].toLowerCase());
      setStatus(null);
    } catch(e) {
      if(e.code===4001)    setStatus({type:'err', msg:'Rejected — approve in your wallet.'});
      else if(e.code===-32002) setStatus({type:'err', msg:'Already pending — check wallet popup.'});
      else                 setStatus({type:'err', msg:`Error ${e.code||''}: ${e.message}`});
    }
  };
  const disconnectWallet = () => { setWallet(null); setStatus(null); };
  return {wallet, status, setStatus, connectWallet, disconnectWallet};
};

const OffersPanel = ({nftId}) => {
  const {useState, useEffect, useCallback} = React;
  const {wallet, status, setStatus, connectWallet, disconnectWallet} = useWallet();
  const [offers,     setOffers]     = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [amount,     setAmount]     = useState('');
  const [message,    setMessage]    = useState('');
  const [expDays,    setExpDays]    = useState('7');
  const [submitting, setSubmitting] = useState(false);

  const loadOffers = useCallback(()=>{
    setLoading(true);
    supa.select('offers', `nft_id=eq.${nftId}&withdrawn=is.false`)
      .then(d=>{ setOffers(d||[]); setLoading(false); })
      .catch(()=>{ setOffers([]); setLoading(false); });
  },[nftId]);

  useEffect(()=>{ loadOffers(); },[loadOffers]);

  const submitOffer = async () => {
    if(!wallet){ setStatus({type:'err', msg:'Connect wallet first'}); return; }
    const amt = parseFloat(amount);
    if(isNaN(amt)||amt<=0){ setStatus({type:'err', msg:'Enter a valid ETH amount'}); return; }
    setSubmitting(true); setStatus(null);
    try {
      const days = parseInt(expDays)||7;
      const expiresAt = new Date(Date.now() + days*86400000).toISOString();
      await supa.insert('offers', {
        nft_id: String(nftId),
        wallet_address: wallet,
        offer_amount: String(amt),
        message: message.trim()||null,
        expires_at: expiresAt,
        withdrawn: false,
      });
      loadOffers();
      setAmount(''); setMessage(''); setExpDays('7');
      setStatus({type:'ok', msg:'Offer submitted!'});
    } catch(e){ setStatus({type:'err', msg:`Failed: ${e.message}`}); }
    setSubmitting(false);
  };

  const withdrawOffer = async (offerId) => {
    try {
      await supa.patch('offers', `id=eq.${offerId}&wallet_address=eq.${wallet}`, {withdrawn: true});
      loadOffers();
    } catch(e){ setStatus({type:'err', msg:'Could not withdraw offer.'}); }
  };

  // Sort active first, then by amount desc
  const sorted = [...offers].filter(isOfferActive).sort((a,b)=>parseFloat(b.offer_amount)-parseFloat(a.offer_amount));
  const bestAmt = sorted[0] ? parseFloat(sorted[0].offer_amount) : null;

  return (
    <div className="offer-section">
      {/* Wallet banner */}
      <div className="offer-wallet-banner">
        {wallet
          ? <><span style={{fontSize:11,color:'var(--txt3)'}}>Connected:</span><span className="offer-wallet-addr">{wallet}</span></>
          : <span style={{fontSize:12,color:'var(--txt2)'}}>Connect wallet to make or withdraw offers</span>}
        {!wallet
          ? <button className="offer-connect-btn" onClick={connectWallet}>Connect Wallet</button>
          : <button className="offer-connect-btn" style={{background:'none',border:'1px solid var(--line)',color:'var(--txt2)',fontSize:11}} onClick={disconnectWallet}>Disconnect</button>}
      </div>
      {status && status.type!=='ok' && <div className={`offer-status ${status.type}`}>{status.msg}</div>}

      {/* Make offer form */}
      {wallet && (
        <div className="offer-form">
          <div className="offer-form-title">Make an Offer</div>
          <div className="offer-inp-row">
            <span className="offer-prefix">Ξ</span>
            <input className="offer-inp" placeholder="Amount in ETH" value={amount}
              onChange={e=>setAmount(e.target.value)} type="number" min="0" step="0.001"/>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:11,color:'var(--txt3)',whiteSpace:'nowrap'}}>Expires in</span>
            <select value={expDays} onChange={e=>setExpDays(e.target.value)}
              style={{flex:1,height:32,background:'var(--ink)',border:'1.5px solid var(--line)',borderRadius:7,color:'var(--txt)',fontSize:12,padding:'0 8px',outline:'none'}}>
              <option value="1">1 day</option>
              <option value="3">3 days</option>
              <option value="7">7 days</option>
              <option value="14">2 weeks</option>
              <option value="30">30 days</option>
            </select>
          </div>
          <textarea className="offer-msg-inp" placeholder="Optional message…" value={message}
            onChange={e=>setMessage(e.target.value)} rows={2}/>
          <button className="offer-submit-btn" onClick={submitOffer} disabled={submitting}>
            {submitting ? 'Submitting…' : 'Submit Offer'}
          </button>
          {status?.type==='ok' && <div className="offer-status ok">{status.msg}</div>}
        </div>
      )}

      {/* Offers list */}
      <div className="offer-list">
        <div className="offer-list-title" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>Active Offers {sorted.length > 0 && `(${sorted.length})`}</span>
          <button style={{fontSize:10,background:'none',border:'none',color:'var(--txt3)',cursor:'pointer'}} onClick={loadOffers}>↻ Refresh</button>
        </div>
        {loading
          ? <div className="offer-empty">Loading offers…</div>
          : sorted.length === 0
            ? <div className="offer-empty">No active offers yet. Be the first!</div>
            : sorted.map((o,i) => {
                const isYours = wallet && o.wallet_address?.toLowerCase() === wallet.toLowerCase();
                const isBest  = parseFloat(o.offer_amount) === bestAmt && i === 0;
                const expInfo = fmtExpiry(o.expires_at);
                return (
                  <div className="offer-card" key={o.id}>
                    <div className="offer-card-top">
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span className="offer-amount">Ξ {parseFloat(o.offer_amount).toFixed(3)}</span>
                        {isBest && <span className="offer-badge-top best">Best</span>}
                        {isYours && <span className="offer-badge-top yours">Yours</span>}
                      </div>
                      <span className="offer-time">{fmtRelTime(o.created_at)}</span>
                    </div>
                    <div className="offer-addr">{shortAddr(o.wallet_address)}</div>
                    {o.message && <div className="offer-msg-text">"{o.message}"</div>}
                    <div className="offer-card-actions">
                      {expInfo && <span className={`offer-expiry ${expInfo.cls}`}>{expInfo.label}</span>}
                      {isYours && (
                        <button className="offer-withdraw-btn" onClick={()=>withdrawOffer(o.id)}>
                          Withdraw
                        </button>
                      )}
                    </div>
                  </div>
                );
              })
        }
      </div>
    </div>
  );
};

const BreakdownScoreCell = ({traitKey, bonus, origBonus, color, scoreOverrides, setScoreOverride}) => {
  const [editing, setEditing] = React.useState(false);
  const isModified = scoreOverrides && traitKey && scoreOverrides[traitKey] != null;

  const commit = v => {

    setEditing(false);

        style={{width:60,background:'var(--ink3)',border:'1px solid var(--teal)',

        onKeyDown={e=>{if(e.key==='Enter')e.target.blur();if(e.key==='Escape')setEditing(false);}}
      />
    );
  }
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:4}}>
      <span style={{color,cursor:'pointer',textDecoration:'underline dotted',
        textUnderlineOffset:3,fontFamily:'Space Mono,monospace',fontSize:12}}

        <span style={{fontSize:9,fontWeight:800,
          color:delta>0?'var(--green)':'var(--red)',fontFamily:'Space Mono,monospace'}}>
          {delta>0?`▲+${delta.toFixed(1)}`:`▼${delta.toFixed(1)}`}

      )}
      {isModified && (
        <span style={{fontSize:9,color:'var(--txt3)',cursor:'pointer',marginLeft:2}}
          title="Reset to original" onClick={()=>setScoreOverride(traitKey,null)}>↩</span>

};

const SalesPriceChart = React.memo(({sales=[], width=460, height=200, highlightSid=null, title=null, showFloorBand=true}) => {
  const [hover, setHover] = React.useState(null);

  const data = React.useMemo(()=>{
    if(!sales.length) return null;
    const pts = sales
      .map(s => {
        const d = s.date instanceof Date ? s.date : new Date(s.date);
        if(isNaN(d.getTime())) return null;
        const p = parseFloat(s.price)||0;
        if(p <= 0) return null;
        return {date:d, price:p, floorLo:s.histFloorLo??s.floorLo??null, floorHi:s.histFloorHi??s.floorHi??null, sid:s.sid||null, isOutlier:!!s.isOutlier};
      })
      .filter(Boolean)
      .sort((a,b) => a.date - b.date);
    if(!pts.length) return null;

    const PAD_L=44, PAD_R=12, PAD_T=title?28:12, PAD_B=28;
    const plotW = width - PAD_L - PAD_R;
    const plotH = height - PAD_T - PAD_B;

    const minDate = pts[0].date.getTime();
    const maxDate = pts[pts.length-1].date.getTime();
    const dateRange = maxDate - minDate || 1;

    const allPrices = pts.filter(p=>!p.isOutlier).map(p=>p.price);
    const floorLos = pts.map(p=>p.floorLo).filter(Boolean);
    const floorHis = pts.map(p=>p.floorHi).filter(Boolean);
    const minP = Math.min(...allPrices, ...(showFloorBand?floorLos:[])) * 0.85;
    const maxP = Math.max(...allPrices, ...(showFloorBand?floorHis:[])) * 1.15;
    const priceRange = maxP - minP || 0.001;

    const toX = d => PAD_L + ((d.getTime() - minDate) / dateRange) * plotW;
    const toY = p => PAD_T + (1 - (p - minP) / priceRange) * plotH;

    let bandPath = '';
    if(showFloorBand) {
      const floorPts = pts.filter(p => p.floorLo != null && p.floorHi != null);
      if(floorPts.length >= 2) {
        const top = floorPts.map(p => `${toX(p.date).toFixed(1)},${toY(p.floorHi).toFixed(1)}`).join(' ');
        const bot = [...floorPts].reverse().map(p => `${toX(p.date).toFixed(1)},${toY(p.floorLo).toFixed(1)}`).join(' ');
        bandPath = top + ' ' + bot;
      }
    }

    const floorLine = showFloorBand ? pts
      .filter(p => p.floorLo != null)
      .map(p => `${toX(p.date).toFixed(1)},${toY(p.floorLo).toFixed(1)}`)
      .join(' ') : '';

    const nTicks = 4;
    const ticks = Array.from({length:nTicks+1}, (_,i) => {
      const p = minP + (priceRange * i / nTicks);
      return {y: toY(p), label: p < 0.01 ? p.toFixed(4) : p.toFixed(3)};
    });

    const months = [];
    const seen = new Set();
    pts.forEach(p => {
      const key = p.date.getFullYear()+'-'+p.date.getMonth();
      if(!seen.has(key)) { seen.add(key); months.push({x:toX(p.date), label:p.date.toLocaleDateString('en-US',{month:'short'})}); }
    });

    return {pts, bandPath, floorLine, ticks, months, toX, toY, PAD_L, PAD_T, plotW, plotH};
  }, [sales, width, height, highlightSid, title, showFloorBand]);

  if(!data) return null;
  const {pts, bandPath, floorLine, ticks, months, toX, toY, PAD_L, PAD_T, plotW, plotH} = data;

  return (
    <div style={{position:'relative'}}>
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{display:'block',overflow:'visible'}}>
        {title && <text x={PAD_L} y={14} fontSize={10} fontWeight={800} fill="var(--txt2)"
          letterSpacing=".06em" style={{textTransform:'uppercase'}}>{title}</text>}

        {ticks.map(({y,label},i) => (
          <React.Fragment key={i}>
            <line x1={PAD_L} y1={y} x2={PAD_L+plotW} y2={y} stroke="var(--line)" strokeWidth={0.5} strokeDasharray="3,3"/>
            <text x={PAD_L-4} y={y+3} textAnchor="end" fontSize={7} fill="var(--txt3)"
              fontFamily="Space Mono,monospace">{label}</text>
          </React.Fragment>
        ))}

        {months.map(({x,label},i) => (
          <text key={i} x={x} y={height-4} textAnchor="start" fontSize={7} fill="var(--txt3)"
            fontFamily="Space Mono,monospace">{label}</text>
        ))}

        {bandPath && <polygon points={bandPath} fill="rgba(91,82,255,.1)" stroke="none"/>}
        {floorLine && <polyline points={floorLine} fill="none" stroke="var(--pop)" strokeWidth={1} strokeDasharray="4,3" opacity={0.5}/>}

        {pts.map((p,i) => {
          const x = toX(p.date);
          const y = toY(p.price);
          const isHL = highlightSid && String(p.sid) === String(highlightSid);
          const isHover = hover === i;
          const r = isHL ? 5 : p.isOutlier ? 2.5 : 3.5;
          const col = isHL ? 'var(--teal)' : p.isOutlier ? 'var(--txt3)' : 'var(--pop)';
          return (
            <circle key={i} cx={x} cy={y} r={isHover?r+1.5:r}
              fill={col} opacity={p.isOutlier?0.4:0.85} stroke={isHover?'#fff':'none'} strokeWidth={1.5}
              style={{cursor:'pointer',transition:'r .1s'}}
              onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}/>
          );
        })}

        {hover !== null && pts[hover] && (()=>{
          const p = pts[hover];
          const x = toX(p.date);
          const y = toY(p.price);
          const tx = Math.min(Math.max(x, 60), width-60);
          const lbl = `#${p.sid||'?'}  ${p.price.toFixed(4)} ETH`;
          const flrLbl = p.floorLo ? `flr ${p.floorLo.toFixed(3)}\u2013${(p.floorHi||p.floorLo).toFixed(3)}` : '';
          const dateLbl = p.date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
          return (
            <g>
              <line x1={x} y1={y-8} x2={x} y2={y+8} stroke="#fff" strokeWidth={0.5} opacity={0.3}/>
              <rect x={tx-56} y={y-40} width={112} height={32} rx={5} fill="var(--ink2)" stroke="var(--line)" strokeWidth={1}/>
              <text x={tx} y={y-26} textAnchor="middle" fontSize={8} fontWeight={700} fill="var(--txt)"
                fontFamily="Space Mono,monospace">{lbl}</text>
              <text x={tx} y={y-15} textAnchor="middle" fontSize={7} fill="var(--txt3)"
                fontFamily="Space Mono,monospace">{dateLbl}{flrLbl?' \u00b7 '+flrLbl:''}</text>
            </g>
          );
        })()}
      </svg>
    </div>
  );
});

const Modal = ({nft, traitMap, originalTraitMap, nfts, onClose, onAddCompare, onSelect, ethPriceVal, isWatched, onToggleWatch, scoreOverrides, setScoreOverride, floorLo: floorLoProp, floorHi: floorHiProp, setFloorLo: setFloorLoProp, setFloorHi: setFloorHiProp, resetFloor: resetFloorProp, floorMethod: floorMethodProp='current', setFloorMethod: setFloorMethodProp=null, globalLatestFloor: globalLatestFloorProp=null})=>{
  // ── Floor method: 'current' | 'sale' | 'custom' ──
  // 'current' = globalLatestFloor (most recent sale's trailing p10–p90)
  // 'sale'    = this NFT's most recent sale's hist floor
  // 'custom'  = user-adjusted slider (floorLoProp/floorHiProp)
  const floorMethod = floorMethodProp || 'current';
  const setFloorMethod = setFloorMethodProp || (()=>{});

  // NFT's most recent sale hist floor
  const nftHistDefault = React.useMemo(()=>{
    if(!nft?.sales?.length) return null;
    const sorted = [...nft.sales]
      .filter(s => s.histFloorLo != null && s.histFloorHi != null)
      .sort((a,b) => new Date(b.date) - new Date(a.date));
    if(!sorted.length) return null;
    return { lo: sorted[0].histFloorLo, hi: sorted[0].histFloorHi, date: sorted[0].date };
  }, [nft?.ID]);

  // Global latest floor (most recent sale across entire collection)
  const globalLatestFloor = globalLatestFloorProp;

  // Resolve active floor lo/hi based on selected method
  const customFloorLo = floorLoProp != null ? floorLoProp : FLOOR_LO;
  const customFloorHi = floorHiProp != null ? floorHiProp : FLOOR_HI;
  const floorLo = floorMethod === 'custom'
    ? customFloorLo
    : floorMethod === 'sale' && nftHistDefault
      ? nftHistDefault.lo
      : globalLatestFloor
        ? globalLatestFloor.lo
        : (nftHistDefault ? nftHistDefault.lo : FLOOR_LO);
  const floorHi = floorMethod === 'custom'
    ? customFloorHi
    : floorMethod === 'sale' && nftHistDefault
      ? nftHistDefault.hi
      : globalLatestFloor
        ? globalLatestFloor.hi
        : (nftHistDefault ? nftHistDefault.hi : FLOOR_HI);
  const setFloorLo = setFloorLoProp || (()=>{});
  const setFloorHi = setFloorHiProp || (()=>{});
  // Label for active floor source shown in hero
  const floorSourceLabel = floorMethod === 'custom'
    ? 'Custom'
    : floorMethod === 'sale' && nftHistDefault
      ? `Last sale · ${nftHistDefault.date ? new Date(nftHistDefault.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : ''}`
      : globalLatestFloor
        ? `Most current · ${new Date(globalLatestFloor.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`
        : 'Default';
  const [tab,       setTab]        = useState('traits');
  const [itemDetail,setItemDetail] = useState(null);
  const [showTierLegend, setShowTierLegend] = useState(false);
  const [showShare, setShowShare]  = useState(false);
  const [saleBandSale, setSaleBandSale] = useState(null);
  const [editFloor, setEditFloor] = useState(false);
  const [fLoStr, setFLoStr] = useState(floorLo.toFixed(3));
  const [fHiStr, setFHiStr] = useState(floorHi.toFixed(3));
  useEffect(()=>{ setFLoStr(floorLo.toFixed(3)); },[floorLo]);
  useEffect(()=>{ setFHiStr(floorHi.toFixed(3)); },[floorHi]);
  useEffect(()=>{
    setTab('traits'); setItemDetail(null); setShowShare(false); setSaleBandSale(null);
    setEditFloor(false);
  },[nft?.ID]);
  if(!nft) return null;

  const slots=[
    {cat:'Bro Type',   label:'Bro Type'},
    {cat:'Headwear',   label:'Head'},
    {cat:'Eyes',       label:'Eyes'},
    {cat:'Eyewear',    label:'Eyewear'},
    {cat:'Clothes',    label:'Clothes'},
    {cat:'Mouth Items',label:'Mouth'},
  ];

  const slotData=[]; const famTot={}; const scoreItems=[]; let famSum=0;
  slots.forEach(({cat,label})=>{
    const val=nft[cat];
    if(!val||typeof val!=='string'){slotData.push({label,d:null});return;}
    const name   = val.split(' (')[0].trim();
    const key    = tk(cat,name);
    const detail = key?traitMap[key]:null;
    const match  = val.match(/\((\d+)\)/);
    const supply = match?parseInt(match[1]):(parseInt(detail?.Supply)||0);
    const bonus  = detail?.adjustedScore||0;
    if(detail?.tags) Object.entries(detail.tags).forEach(([t,s])=>{
      const sc=typeof s==='number'?s:parseFloat(s)||0;
      famTot[t]=(famTot[t]||0)+sc; famSum+=sc;
    });
    if(bonus>0) scoreItems.push({name,cat,bonus});
    slotData.push({label, d:{name,detail,supply,bonus,label}});
  });
  scoreItems.sort((a,b)=>b.bonus-a.bonus);
  const famSorted=Object.entries(famTot)
    .map(([n,s])=>({name:n,score:s,pct:famSum>0?s/famSum*100:0}))
    .sort((a,b)=>b.score-a.score);


  // Use the live nft values — effectiveNftsArray already has recalculated diScore + rank
  const dispDiScore = nft.diScore;
  const dispRank    = nft.rank;
  // If DI model overrides are active for this NFT, use score-derived range (not stale CSV displayMultiple)
  const hasModelOverride = !!(nft.originalDiScore && Math.abs(nft.diScore - nft.originalDiScore) > 0.05);
  const nftRange    = hasModelOverride ? diScoreToRange(dispDiScore) : (getMultipleRange(nft) || diScoreToRange(dispDiScore));
  const impliedMult = getImpliedMultiple(dispDiScore);
  const impliedEth  = ((floorLo + floorHi) / 2) * impliedMult;
  const floorMid    = (floorLo + floorHi) / 2;
  const eLo = floorLo * nftRange.lo;

      setSaleBandSale({...s, nft, price:p, expectedLo:eLo, expectedHi:eHi, expectedMid:eMid,
        onTarget:on, floorLo, floorHi, nftRange, hasModelOverride, globalLatestFloor});
      return;
    }
    // No sales — synthetic DI projection
    setSaleBandSale({
      price: eMid, expectedLo: eLo, expectedHi: eHi, expectedMid: eMid,
      onTarget: true, nft, date: null, synthetic: true, floorLo, floorHi, nftRange, hasModelOverride, globalLatestFloor,

  };

  return(
    <>
      <div className="mbd" onClick={onClose}>
        <div className="mbox" onClick={e=>e.stopPropagation()}>
          <div className="mmodal-topbar mobile-only">
            <div className="mmodal-draghandle"/>
            <button className="mclose" onClick={onClose}>{I.x} Close</button>
          </div>
          <button className="mclose desktop-only" onClick={onClose}>{I.x}</button>

          {/* ── Hero ── */}
          <div className="mhero">
            <div style={{position:'relative'}}>
                    <ModalImg src={nft.Image} id={nft.ID}/>
                    {(()=>{
                      const topScore = Math.max(0,...scoreItems.map(s=>s.bonus));
                      const r = getRarityTier(topScore);
                      if(!r) return null;
                      return <div style={{position:'absolute',inset:-2,borderRadius:14,
                        boxShadow:'0 0 '+(topScore>100?'20px':'12px')+' '+r.color+'44',
                        border:'2px solid '+r.color+'66',pointerEvents:'none'}}/>;
                    })()}
                  </div>
            <div className="mmeta">
              <div className="mid">#{nft.ID}</div>
              <div className={`mscore ${dispDiScore>=150?'mscore-shimmer':''}`} style={{cursor:'pointer',position:'relative'}}
                onClick={()=>setShowTierLegend(v=>!v)}>
                <span style={{
                  display:'inline-flex',alignItems:'center',gap:4,
                  border:'1.5px solid var(--teal)',borderRadius:8,
                  padding:'2px 8px',background:'rgba(45,212,191,.08)'}}>
                  {(()=>{
                    if(nft.originalDiScore && Math.abs(nft.diScore - nft.originalDiScore) > 0.05) {
                      const r = diScoreToRange(nft.diScore);
                      return r.lo===r.hi ? `${r.lo}x` : `${r.lo}x \u2013 ${r.hi}x`;
                    }
                    return fmtScore(nft);
                  })()}
                  <span style={{fontSize:11,color:'var(--teal)',opacity:.7}}>▾</span>
                </span>
              </div>
              <div className="mslabel" style={{color:'var(--teal)',fontSize:9,letterSpacing:'.06em'}}>
                FLOOR MULTIPLE · tap to explore<InfoTip text="Floor Multiple shows how many times above the collection floor price this Bro is valued at. A 2x Bro is estimated at twice the floor price. Based on the DI rarity score." size={12}/>
              </div>
              {showTierLegend&&(()=>{
                return(
                  <div onClick={e=>e.stopPropagation()} style={{
                    position:'absolute',zIndex:200,left:0,
                    background:'var(--ink2)',border:'1px solid var(--line)',borderRadius:10,
                    padding:'10px 12px',minWidth:210,boxShadow:'0 8px 24px rgba(0,0,0,.6)'}}>
                    <div style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',
                      color:'var(--txt3)',marginBottom:8}}>DI Score → Floor Multiple</div>
                    {[
                      {minDI:375, maxDI:null, lo:30,  hi:50,  label:'30x – 50x'},
                      {minDI:148, maxDI:375,  lo:10,  hi:30,  label:'10x – 30x'},
                      {minDI:65,  maxDI:148,  lo:5,   hi:10,  label:'5x – 10x'},
                      {minDI:45,  maxDI:65,   lo:2,   hi:5,   label:'2x – 5x'},
                      {minDI:35,  maxDI:45,   lo:1.5, hi:2,   label:'1.5x – 2x'},
                      {minDI:23.5,maxDI:35,   lo:1,   hi:1.5, label:'1x – 1.5x'},
                      {minDI:15,  maxDI:23.5, lo:1,   hi:1,   label:'1x (floor)'},
                      {minDI:0,   maxDI:15,   lo:0.8, hi:1,   label:'0.8x – 1x'},
                    ].map((tier,i)=>{
                      const active = nftRange.lo===tier.lo && nftRange.hi===tier.hi;
                      const rangeLabel = tier.maxDI==null
                        ? `DI ≥ ${tier.minDI}`
                        : tier.minDI===0
                          ? `DI < ${tier.maxDI}`
                          : `DI ${tier.minDI}–${tier.maxDI}`;
                      return(
                        <div key={i} style={{
                          display:'flex',justifyContent:'space-between',alignItems:'center',
                          padding:'4px 6px',borderRadius:6,marginBottom:2,
                          background:active?'rgba(45,212,191,.1)':'transparent',
                          border:active?'1px solid var(--teal)':'1px solid transparent'}}>
                          <span style={{fontSize:9,color:active?'var(--teal)':'var(--txt3)',fontFamily:'Space Mono,monospace'}}>
                            {rangeLabel}
                          </span>
                          <span style={{fontSize:11,fontWeight:800,color:active?'var(--teal)':'var(--txt2)',fontFamily:'Space Mono,monospace',marginLeft:8}}>
                            {tier.label}
                          </span>
                        </div>
                      );
                    })}
                    <div style={{fontSize:8,color:'var(--txt3)',marginTop:8,borderTop:'1px solid var(--line)',paddingTop:6,fontFamily:'Space Mono,monospace'}}>
                      Expected: {(floorLo*nftRange.lo).toFixed(3)}–{(floorHi*nftRange.hi).toFixed(3)} ETH
                    </div>
                  </div>
                );
              })()}
              <div className="mrank">

                {nft.originalRank && nft.originalRank !== dispRank && (

                {nft.originalDiScore && Math.abs(nft.diScore - nft.originalDiScore) > 0.05 && (

                    {nft.diScore > nft.originalDiScore

              </div>
              {/* ── Floor valuation method selector ── */}
              <div style={{marginTop:6,marginBottom:0}}>

                  {[
                    {k:'current', lbl:'Current Floor'},

                      style={{

                        color:disabled?'var(--txt3)':floorMethod===k?'var(--teal)':'var(--txt3)',
                        opacity:disabled?0.4:1,transition:'all .12s'
                      }}>
                      {lbl}
                    </button>
                  ))}
                </div>
                {/* Active floor source label + value */}
                <div style={{fontSize:10,color:'#5a7070',fontFamily:'Space Mono,monospace',marginBottom:2}}>
                  {floorSourceLabel}
                </div>
                {/* Custom floor editor — only shown when method=custom */}
                {floorMethod==='custom' && (editFloor ? (
                  <div style={{display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>
                    <input type="number" step="0.001" min="0" value={fLoStr}
                      onChange={e=>{setFLoStr(e.target.value);const n=parseFloat(e.target.value);if(!isNaN(n)&&n>0)setFloorLo(n);}}
                      style={{width:58,background:'var(--ink3)',border:'1px solid var(--teal)',borderRadius:5,
                        padding:'2px 4px',color:'var(--txt)',fontSize:11,fontFamily:'Space Mono,monospace',outline:'none'}}/>
                    <EthIcon size={10} style={{opacity:.7}}/>
                    <span style={{fontSize:10,color:'var(--txt3)'}}>–</span>
                    <input type="number" step="0.001" min="0" value={fHiStr}
                      onChange={e=>{setFHiStr(e.target.value);const n=parseFloat(e.target.value);if(!isNaN(n)&&n>0)setFloorHi(n);}}
                      style={{width:58,background:'var(--ink3)',border:'1px solid var(--teal)',borderRadius:5,
                        padding:'2px 4px',color:'var(--txt)',fontSize:11,fontFamily:'Space Mono,monospace',outline:'none'}}/>
                    <EthIcon size={10} style={{opacity:.7}}/>
                    <button onClick={()=>setEditFloor(false)} style={{fontSize:10,padding:'2px 6px',borderRadius:5,
                      border:'1px solid var(--teal)',background:'rgba(45,212,191,.1)',color:'var(--teal)',cursor:'pointer'}}>✓</button>
                    <button onClick={()=>{if(resetFloorProp)resetFloorProp();else{setFloorLo(FLOOR_LO);setFloorHi(FLOOR_HI);}setFLoStr(FLOOR_LO.toFixed(3));setFHiStr(FLOOR_HI.toFixed(3));}}
                      style={{fontSize:10,padding:'2px 6px',borderRadius:5,border:'1px solid var(--line)',background:'none',color:'var(--txt3)',cursor:'pointer'}}
                      title="Reset to defaults">↺</button>
                  </div>
                ) : (
                  <button onClick={()=>setEditFloor(true)} style={{background:'none',border:'none',padding:0,cursor:'pointer',display:'block'}}>
                    <span style={{fontSize:11,color:'var(--teal)'}}>
                      {customFloorLo.toFixed(3)}–{customFloorHi.toFixed(3)} Ξ ✎
                    </span>
                  </button>
                ))}
              </div>
              <div className="mprice">
                ~{eLo.toFixed(4)}–{eHi.toFixed(4)} ETH
                {ethPriceVal&&<span className="mprice-usd"> · ${Math.round(eMid * ethPriceVal).toLocaleString()}</span>}
              </div>
              {nftRange.lo !== nftRange.hi && (
                <div style={{display:'flex',alignItems:'center',gap:5,marginTop:3,flexWrap:'wrap'}}>
                  <span style={{fontSize:10,color:'var(--txt3)'}}>Implied:</span>
                  <span style={{fontSize:11,fontWeight:800,color:'var(--pop)',fontFamily:'Space Mono,monospace'}}>
                    {impliedMult < 2 ? impliedMult.toFixed(2) : impliedMult.toFixed(1)}x
                  </span>
                  <span style={{fontSize:10,color:'var(--txt3)'}}>·</span>
                  <span style={{fontSize:10,color:'var(--txt2)',fontFamily:'Space Mono,monospace'}}>
                    ~{impliedEth.toFixed(4)}
                  </span>
                  <EthIcon size={10}/>
                  {ethPriceVal&&<span style={{fontSize:10,color:'var(--txt3)'}}>· ${Math.round(impliedEth*ethPriceVal).toLocaleString()}</span>}
                  <InfoTip text="Implied multiple: a linear interpolation of this Bro's DI score within its tier band. Higher DI = higher implied multiple within the range." size={12}/>
                </div>
              )}
              <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                {onToggleWatch&&(
                  <button
                    onClick={()=>onToggleWatch(nft.ID)}
                    style={{display:'flex',alignItems:'center',gap:4,height:26,padding:'0 10px',background:isWatched?'rgba(245,197,66,.15)':'var(--ink4)',border:`1.5px solid ${isWatched?'var(--gold)':'var(--line)'}`,borderRadius:7,fontSize:13,fontWeight:600,color:isWatched?'var(--gold)':'var(--txt2)',cursor:'pointer',transition:'all .1s'}}
                  >{isWatched?'★':'☆'} {isWatched?'Watching':'Watch'}</button>
                )}
                <button
                  onClick={()=>setShowShare(true)}
                  style={{display:'flex',alignItems:'center',gap:4,height:26,padding:'0 10px',background:'var(--ink4)',border:'1.5px solid var(--line)',borderRadius:7,fontSize:11,fontWeight:600,color:'var(--txt2)',cursor:'pointer',transition:'all .1s'}}
                  onMouseOver={e=>{e.currentTarget.style.color='var(--txt)';e.currentTarget.style.borderColor='var(--line2)'}}
                  onMouseOut={e=>{e.currentTarget.style.color='var(--txt2)';e.currentTarget.style.borderColor='var(--line)'}}
                >{I.share} Share</button>

/* ════════════════════════════════════
   FILTER PANEL CONTENT (shared desktop/mobile)
════════════════════════════════════ */
const FilterContent=({filters,setFilters,traitOpts,traitMap,facetedCounts,famCounts,openCat,setOpenCat})=>{
  const [open,setOpen]=useState(()=>openCat?{[openCat]:true}:{});
  const [catSearch,setCatSearch]=useState({}); // search string per category
  const toggleOpen=cat=>setOpen(p=>({...p,[cat]:!p[cat]}));

  // When openCat changes (e.g. from home screen chip), scroll-open that category
  useEffect(()=>{
    if(openCat){ setOpen(p=>({...p,[openCat]:true})); if(setOpenCat) setOpenCat(null); }
  },[openCat]);

  // Multi-select: filters.traits[cat] is now an array of selected values
  const toggleTrait=(cat,val)=>setFilters(f=>{
    const prev=f.traits[cat]||[];
    const next=prev.includes(val)?prev.filter(x=>x!==val):[...prev,val];
    const t={...f.traits};
    if(next.length===0) delete t[cat]; else t[cat]=next;
    return {...f,traits:t};
  });
  const setFam=fam=>setFilters(f=>{
    const fs=f.families.includes(fam)?f.families.filter(x=>x!==fam):[...f.families,fam];
    return {...f,families:fs};
  });

  const families=Object.keys(FAM_COLORS).filter(f=>f!=='default').sort().filter(f=>(famCounts[f]||0)>0);

  return(
    <>
      {/* Family */}
      <div className="acc-sec">
        <button className="acc-hd" onClick={()=>toggleOpen('_fam')}>
          Family
          {filters.families.length>0&&<span className="sel-badge">{filters.families.length}</span>}
          <span className={`chev ${open['_fam']?'open':''}`}>{I.chev}</span>
        </button>
        {open['_fam']&&(
          <div className="fam-grid">
            {families.map(f=>(
              <button key={f} className={`fam-c ${filters.families.includes(f)?'sel':''}`} onClick={()=>setFam(f)}>
                <span className="fam-dot" style={{background:FAM_COLORS[f]}}></span>
                {f}
                <span style={{fontSize:10,color:'var(--txt3)',marginLeft:2}}>{famCounts[f]||0}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Trait cats */}
      {CATS.map(cat=>{
        const opts=traitOpts[cat]||[];
        const selArr=filters.traits[cat]||[];
        const selSet=new Set(selArr);
        const counts=facetedCounts[cat]||{};
        const catQ=(catSearch[cat]||'').toLowerCase().trim();
        // Sort: selected first, then by count desc, then alpha
        const sorted=[...opts].sort((a,b)=>{
          const aSel=selSet.has(a),bSel=selSet.has(b);
          if(aSel!==bSel) return aSel?-1:1;
          return (counts[b]||0)-(counts[a]||0)||a.localeCompare(b);
        });
        const visible=catQ?sorted.filter(o=>o.split(' (')[0].toLowerCase().includes(catQ)):sorted;
        return(
          <div className="acc-sec" key={cat}>
            <button className="acc-hd" onClick={()=>toggleOpen(cat)}>
              {cat}
              {selArr.length>0&&<span className="sel-badge">{selArr.length}</span>}
              <span className={`chev ${open[cat]?'open':''}`}>{I.chev}</span>
            </button>
            {open[cat]&&(
              <div className="acc-body">
                {opts.length>8&&(
                  <input
                    className="trait-search-inp"
                    placeholder={`Search ${cat.toLowerCase()}…`}
                    value={catSearch[cat]||''}
                    onChange={e=>setCatSearch(p=>({...p,[cat]:e.target.value}))}
                    onClick={e=>e.stopPropagation()}
                  />
                )}
                {visible.map(opt=>{
                  const name=opt.split(' (')[0];
                  const key=tk(cat,name);
                  const detail=key?traitMap[key]:null;
                  const cnt=counts[opt]||0;
                  const isSel=selSet.has(opt);
                  const rarity=detail?getRarityTier(detail.adjustedScore||0):null;
                  // Zero-result: show greyed out if other filters make this impossible
                  // but only hide if there are no active filters at all (unfiltered zero = truly no NFTs)
                  const hasActiveFilters = selArr.length > 0 || Object.keys(filters.traits).some(c=>c!==cat&&(filters.traits[c]||[]).length>0) || filters.families.length>0;
                  if(cnt===0 && !isSel && !hasActiveFilters) return null; // truly no NFTs with this trait
                  return(
                    <button
                      key={opt}
                      className={`topt ${isSel?'sel':''} ${cnt===0&&!isSel?'zero':''}` }
                      onClick={()=>cnt>0||isSel?toggleTrait(cat,opt):null}
                      disabled={cnt===0&&!isSel}
                      title={cnt===0&&!isSel?'No results with current filters':undefined}
                    >
                      <div className={`chkbox ${isSel?'on':''}`}>{isSel&&I.check}</div>
                      {name.toLowerCase()!=='none'
                        ?<TraitImg className="tthumb" src={detail?.thumbnailUrl} alt={name}/>
                        :<div className="tthumb" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--txt3)'}}>{I.none}</div>}
                      <span className="tname" style={{color:cnt===0&&!isSel?'var(--txt3)':rarity?rarity.color:'var(--txt2)'}}>{name}</span>
                      <span className="tcnt" style={{color:cnt===0?'var(--txt3)':undefined}}>{cnt>0?cnt:isSel?'0':'—'}</span>
                    </button>
                  );
                })}
                {catQ&&visible.length===0&&(
                  <div style={{padding:'6px 4px',fontSize:11,color:'var(--txt3)'}}>No matches</div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
};

/* ════════════════════════════════════
   WALLET SECTION
════════════════════════════════════ */
const WalletSection = ({ownedIds, setOwnedIds, walletFilter, setWalletFilter, nfts}) => {
  const [open, setOpen]       = useState(false);
  const [addr, setAddr]       = useState('');
  const [status, setStatus]   = useState(null); // null | {type:'loading'|'ok'|'err', msg}
  const inputRef              = useRef(null);

  // Compute rank badge when wallet is loaded
  const holderRank = useMemo(()=>{
    if(!ownedIds.length||!nfts.length) return null;
    const ownedSet = new Set(ownedIds);
    const ownedNfts = nfts.filter(n=>ownedSet.has(n.idStr));
    if(!ownedNfts.length) return null;
    const bestRank = Math.min(...ownedNfts.map(n=>n.rank));
    const pct = Math.round(bestRank/nfts.length*100);
    return {bestRank, count:ownedNfts.length, pct: Math.max(1,pct)};
  },[ownedIds, nfts]);

  const fetch_ = async () => {
    const a = addr.trim();
    if (!a) return;
    if (!/^0x[0-9a-fA-F]{40}$/.test(a)) {
      setStatus({type:'err', msg:'Invalid address format'});
      return;
    }
    setStatus({type:'loading', msg:'Connecting…'});
    try {
      const ids = await fetchWalletNFTs(a, msg => setStatus({type:'loading', msg}));
      if (ids.length === 0) {
        setStatus({type:'err', msg:'No Hemi Bros found for this address'});
        setOwnedIds([]);
      } else {
        setStatus({type:'ok', msg:`Found ${ids.length} Bro${ids.length!==1?'s':''}`});
        setOwnedIds(ids);
      }
    } catch(e) {
      setStatus({type:'err', msg: e.message});
      setOwnedIds([]);
    }
  };

  const clear = () => {
    setOwnedIds([]);
    setWalletFilter(false);
    setStatus(null);
    setAddr('');
  };

  const isLoading = status?.type === 'loading';

  return (
    <div className="wallet-sec">
      <button className="acc-hd" onClick={() => setOpen(p=>!p)}>
        {I.wallet} My Wallet
        {ownedIds.length > 0 && <span className="sel-badge">{ownedIds.length}</span>}
        <span className={`chev ${open?'open':''}`}>{I.chev}</span>
      </button>
      {open && (
        <div className="wallet-body">
          <div className="wallet-input-row">
            <input
              ref={inputRef}
              className="wallet-inp"
              placeholder="Paste wallet address (0x…)"
              value={addr}
              onChange={e => setAddr(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && fetch_()}
              spellCheck={false}
            />
            <button className="wallet-fetch-btn" onClick={fetch_} disabled={isLoading || !addr.trim()}>
              {isLoading ? '…' : 'Load'}
            </button>
          </div>

          {status && (
            <div className={`wallet-status ${status.type === 'ok' ? 'ok' : status.type === 'err' ? 'err' : ''}`}>
              {status.type === 'loading' && <span className="mini-spin"/>}
              {status.msg}
            </div>
          )}

          {ownedIds.length > 0 && (
            <div className="wallet-toggle-row">
              <span className="wallet-toggle-label">Show only my Bros</span>
              <label className="toggle-switch">
                <input type="checkbox" checked={walletFilter} onChange={e => setWalletFilter(e.target.checked)}/>
                <span className="toggle-track"/>
                <span className="toggle-knob"/>
              </label>
            </div>
          )}
          {ownedIds.length > 0 && holderRank && (
            <div className="wallet-rank-badge">
              🏆 <span>Rank <b>#{holderRank.bestRank}</b> · <b>{holderRank.count}</b> Bro{holderRank.count!==1?'s':''} · top <b>{holderRank.pct}%</b></span>
            </div>
          )}

          {ownedIds.length > 0 && (
            <button
              onClick={clear}
              style={{marginTop:8,background:'none',border:'none',color:'var(--red)',fontSize:11,fontWeight:700,cursor:'pointer',padding:0,display:'block'}}
            >
              × Clear wallet
            </button>
          )}
        </div>
      )}
    </div>
  );
};
