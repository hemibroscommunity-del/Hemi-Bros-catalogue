<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hemi Bros NFT Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse -->
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
      body {
        font-family: 'ui-sans-serif', 'system-ui', sans-serif;
        background-color: #d1d1d1;
        background-image: linear-gradient(45deg, #c6c6c6 25%, transparent 25%), 
                          linear-gradient(-45deg, #c6c6c6 25%, transparent 25%), 
                          linear-gradient(45deg, transparent 75%, #c6c6c6 75%), 
                          linear-gradient(-45deg, transparent 75%, #c6c6c6 75%);
        background-size: 8px 8px;
      }
      
      /* RPG / Diablo Style Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #c1c1c1; 
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8; 
      }

      /* Glow Animations */
      @keyframes grail-glow {
        0%, 100% { box-shadow: 0 0 15px #e60012, 0 0 25px #ff1a2d; }
        50% { box-shadow: 0 0 30px #ff3344, 0 0 50px #ff4d5d; }
      }
      @keyframes legendary-glow {
        0%, 100% { box-shadow: 0 0 10px #ff9900, 0 0 15px #ff9900; }
        50% { box-shadow: 0 0 20px #ffc966, 0 0 30px #ffc966; }
      }
      @keyframes epic-glow {
        0%, 100% { box-shadow: 0 0 8px #b344f3, 0 0 12px #b344f3; }
        50% { box-shadow: 0 0 16px #c364ff, 0 0 24px #c364ff; }
      }
      @keyframes rare-glow {
        0%, 100% { box-shadow: 0 0 5px #00a800, 0 0 10px #00a800; }
        50% { box-shadow: 0 0 15px #33c333, 0 0 20px #33c333; }
      }
      
      .animate-grail-glow { animation: grail-glow 1s linear infinite; }
      .animate-legendary-glow { animation: legendary-glow 1.8s ease-in-out infinite; }
      .animate-epic-glow { animation: epic-glow 1.5s ease-in-out infinite; }
      .animate-rare-glow { animation: rare-glow 2s ease-in-out infinite; }
      
      /* Animation Utilities */
      .animate-in { animation-fill-mode: forwards; }
      .fade-in { animation-name: fadeIn; }
      .zoom-in { animation-name: zoomIn; }
      .slide-in-from-right-10 { --tw-enter-translate-x: 2.5rem; animation-name: enter; }
      .slide-in-from-top-2 { --tw-enter-translate-y: 0.5rem; animation-name: enterY; }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes zoomIn { from { transform: scale(0.95); } to { transform: scale(1); } }
      @keyframes enter { from { opacity: 0; transform: translateX(var(--tw-enter-translate-x)); } to { opacity: 1; transform: translateX(0); } }
      @keyframes enterY { from { opacity: 0; transform: translateY(var(--tw-enter-translate-y)); } to { opacity: 1; transform: translateY(0); } }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "papaparse": "https://esm.sh/papaparse@^5.5.3",
    "react-dom": "https://esm.sh/react-dom@^19.2.4"
  }
}
</script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONSTANTS
        // ==========================================
        const GITHUB_BASE = 'https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main';
        const DATA_BASE = 'https://raw.githubusercontent.com/hemibroscommunity-del/Hemi-Bros-catalogue/main';
        const TRAIT_GRAPHICS_BASE = GITHUB_BASE;
        const NEW_NFT_DATA_URL = `${DATA_BASE}/Hemi%20Bro%20spreadsheet-CleanDataWithImages.csv`;
        const NEW_SUPPLY_COUNT_URL = `${DATA_BASE}/Hemi%20Bro%20spreadsheet-SupplyCount.csv`; 
        const TRAIT_TAGS_URL = `${DATA_BASE}/Hemi_Bros_V13_Worksheet%20-%20Trait%20Scoring%20(1).csv`;
        const SCORE_DATA_URL = `${DATA_BASE}/Hemi_Bros_V13_Worksheet%20-%20All%20NFT%20scores%20(2).csv`;

        const RARITY_LEVELS = ['Grail', 'Legendary', 'Epic', 'Rare', 'Uncommon', 'Common'];
        const TRAIT_CATEGORIES = ['Bro Type', 'Headwear', 'Clothes', 'Eyes', 'Eyewear', 'Mouth Items'];

        const RARITY_TEXT_COLORS = {
            'Grail': 'text-red-600',
            'Legendary': 'text-orange-500',
            'Epic': 'text-purple-600',
            'Rare': 'text-green-600',
            'Uncommon': 'text-amber-700',
            'Common': 'text-gray-500'
        };

        const RARITY_BG_COLORS = {
            'Grail': 'bg-red-200',
            'Legendary': 'bg-orange-200',
            'Epic': 'bg-purple-200',
            'Rare': 'bg-green-200',
            'Uncommon': 'bg-amber-200',
            'Common': 'bg-gray-200'
        };

        const SYNERGY_COLORS = {
            'Brand': '#fca5a5',
            'Prestige': '#fde047',
            'Villainous': '#86efac',
            'Enforcer': '#93c5fd',
            'Fantasy': '#6ee7b7',
            'Sci-fi': '#67e8f9',
            'Whimsical': '#fbcfe8',
            'Heritage': '#fdba74',
            'Drip': '#f472b6',
            'Urban': '#9ca3af',
            'Meme': '#bef264',
            'Minimalist': '#e2e8f0',
            'Scene': '#d8b4fe',
            'Hemi': '#fdba74',
            'Zombie': '#bef264',
            'Alien': '#c4b5fd',
            'Robot': '#67e8f9',
            'Gold': '#fde047',
            'Demon': '#fca5a5',
            'Angel': '#93c5fd',
            'Cyborg': '#a5b4fc',
            'Ape': '#d7ccc8',
            'Human': '#f9a8d4',
            'Skeleton': '#d1d5db',
            'default': '#cbd5e1'
        };

        const FILENAME_OVERRIDES = {};

        // ==========================================
        // UTILS
        // ==========================================
        const checkIpRisk = (val) => {
            if (!val) return false;
            const s = String(val).trim().toLowerCase();
            return ['yes', 'y', 'true', '1'].includes(s);
        };

        const getTraitKey = (category, name) => {
            if (!name) return null;
            return `${category.trim().toLowerCase()}:${name.trim().toLowerCase()}`;
        };

        const getTraitThumbnailUrl = (category, filename, traitName) => {
            const overrideKey = `${category.toLowerCase()}:${traitName.toLowerCase()}`;
            if (FILENAME_OVERRIDES[overrideKey]) {
                return `${TRAIT_GRAPHICS_BASE}/${encodeURIComponent(category)}/${encodeURIComponent(FILENAME_OVERRIDES[overrideKey])}`;
            }
            if (filename) {
                let cleanFilename = filename.trim();
                if (!cleanFilename.match(/\.[0-9a-z]+$/i)) {
                    cleanFilename += '.png';
                }
                return `${TRAIT_GRAPHICS_BASE}/${encodeURIComponent(category)}/${encodeURIComponent(cleanFilename)}`;
            }
            if (traitName) {
                return `${TRAIT_GRAPHICS_BASE}/${encodeURIComponent(category)}/${encodeURIComponent(traitName)}.png`;
            }
            return undefined;
        };

        const getRarityFromScore = (score) => {
            if (score >= 210) return { tier: 'Grail', color: 'red' };
            if (score >= 175) return { tier: 'Legendary', color: 'orange' };
            if (score >= 110) return { tier: 'Epic', color: 'purple' };
            if (score >= 60) return { tier: 'Rare', color: 'green' };
            if (score >= 48) return { tier: 'Uncommon', color: 'amber' };
            return { tier: 'Common', color: 'gray' };
        };

        // ==========================================
        // SERVICES
        // ==========================================
        const fetchWithFallbacks = async (name, primaryUrl, fallbacks = []) => {
            try {
                let res = await fetch(primaryUrl);
                if (res.ok) return res;
            } catch (e) {}

            for (const url of fallbacks) {
                try {
                    const res = await fetch(url);
                    if (res.ok) return res;
                } catch (e) {}
            }
            throw new Error(`Could not fetch ${name} from any available URL source.`);
        };

        const fetchData = async () => {
            try {
                const resources = [
                    { name: 'NFT Data', url: NEW_NFT_DATA_URL, fallbacks: [`${DATA_BASE}/Hemi%20Bro%20spreadsheet-CleanDataWithImages.csv`] },
                    { name: 'Trait Supply Data', url: NEW_SUPPLY_COUNT_URL, fallbacks: [`${DATA_BASE}/Hemi%20Bro%20spreadsheet-SupplyCount.csv`] },
                    { name: 'Score Data', url: SCORE_DATA_URL, fallbacks: [`${DATA_BASE}/Hemi_Bros_V13_Worksheet%20-%20All%20NFT%20scores%20%282%29.csv`] },
                    { name: 'Trait Tags Data', url: TRAIT_TAGS_URL, fallbacks: [`${DATA_BASE}/Hemi_Bros_V13_Worksheet%20-%20Trait%20Scoring%20(1).csv`] }
                ];

                const responses = await Promise.all(
                    resources.map(r => fetchWithFallbacks(r.name, r.url, r.fallbacks).then(res => ({ name: r.name, res })))
                );

                const [nftRes, traitRes, scoreRes, tagsRes] = responses.map(r => r.res);
                const [nftText, traitText, scoreText, tagsText] = await Promise.all([
                    nftRes.text(), traitRes.text(), scoreRes.text(), tagsRes.text()
                ]);

                const traitMap = {};
                const scoresMap = {};

                // Parse Scores
                Papa.parse(scoreText, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        results.data.forEach((score) => {
                            if (score.ID) {
                                let additive = score['Additive Ratity'] || score['Additive Rarity'] || score['Additive Score'] || 0;
                                if (typeof additive === 'string') additive = parseFloat(additive.replace(/,/g, ''));

                                let surprisal = score['Surprisal Score'] || 0;
                                if (typeof surprisal === 'string') surprisal = parseFloat(surprisal.replace(/,/g, ''));

                                scoresMap[score.ID] = {
                                    ID: score.ID,
                                    'DI Score': score['DI Score'] || score.DI_Score || 0,
                                    'Surprisal Score': surprisal,
                                    'Additive Ratity': additive,
                                    Tier: score.Tier
                                };
                            }
                        });
                    }
                });

                // Parse Traits (Supply)
                await new Promise((resolve, reject) => {
                    Papa.parse(traitText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            results.data.forEach((d) => {
                                const keys = Object.keys(d);
                                let categoryVal = d.Category;
                                let itemListVal = d['Unique Item List'];

                                if (!categoryVal || !itemListVal) {
                                    const catKey = keys.find(k => k.trim().toLowerCase() === 'category');
                                    const itemKey = keys.find(k => ['unique item list', 'item name', 'trait name', 'trait', 'item'].includes(k.trim().toLowerCase()));
                                    if (catKey) categoryVal = d[catKey];
                                    if (itemKey) itemListVal = d[itemKey];
                                }

                                if (categoryVal && itemListVal) {
                                    let category = categoryVal.trim();
                                    const lowerCat = category.toLowerCase();
                                    if (lowerCat === 'head' || lowerCat === 'hats') category = 'Headwear';
                                    else if (lowerCat === 'face' || lowerCat === 'glasses') category = 'Eyewear';
                                    else if (lowerCat === 'mouth') category = 'Mouth Items';
                                    else if (lowerCat === 'torso' || lowerCat === 'clothing' || lowerCat === 'shirt') category = 'Clothes';
                                    else if (lowerCat === 'base' || lowerCat === 'body') category = 'Bro Type';

                                    const cleanItemName = itemListVal.split('(')[0].trim();
                                    const key = getTraitKey(category, cleanItemName);

                                    if (key) {
                                        let supplyVal = d.Count || d.Supply || d.Quantity || d.Qty;
                                        if (supplyVal === undefined) {
                                            const supplyKey = keys.find(k => ['count', 'supply', 'quantity', 'qty'].includes(k.trim().toLowerCase()));
                                            if (supplyKey) supplyVal = d[supplyKey];
                                        }
                                        let tierVal = d.Tier || d.Rarity || d['Rarity Tier'];
                                        const thumbFile = d.IconName || d.ThumbFilename || d.Image || d.Filename;
                                        
                                        let ipRiskVal = d['IP Concern'] || d['IP Risk'];
                                        if (ipRiskVal === undefined) {
                                            const riskKey = keys.find(k => k.trim().toLowerCase().includes('ip risk') || k.trim().toLowerCase().includes('ip concern'));
                                            if (riskKey) ipRiskVal = d[riskKey];
                                        }

                                        traitMap[key] = {
                                            ...d,
                                            Category: category,
                                            'IP Risk': ipRiskVal,
                                            'Unique Item List': cleanItemName, 
                                            Supply: supplyVal !== undefined ? String(supplyVal) : '',
                                            Tier: tierVal,
                                            thumbnailUrl: getTraitThumbnailUrl(category, thumbFile, cleanItemName),
                                            tags: {},
                                            adjustedScore: 0
                                        };
                                    }
                                }
                            });
                            resolve();
                        },
                        error: (err) => reject(new Error(`Failed to parse trait data: ${err.message}`))
                    });
                });

                // Parse Tags & Scores
                await new Promise((resolve) => {
                    Papa.parse(tagsText, {
                        header: true,
                        dynamicTyping: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            results.data.forEach((d) => {
                                const keys = Object.keys(d);
                                let categoryVal = d.Category;
                                let itemListVal = d['Unique Item List'];
                                if (!categoryVal) {
                                    const k = keys.find(k => k.trim().toLowerCase() === 'category');
                                    if(k) categoryVal = d[k];
                                }
                                if (!itemListVal) {
                                    const k = keys.find(k => ['unique item list', 'item', 'trait', 'item name'].includes(k.trim().toLowerCase()));
                                    if(k) itemListVal = d[k];
                                }

                                if (categoryVal && itemListVal) {
                                    let category = categoryVal.trim();
                                    const lowerCat = category.toLowerCase();
                                    if (lowerCat === 'head' || lowerCat === 'hats') category = 'Headwear';
                                    else if (lowerCat === 'face' || lowerCat === 'glasses') category = 'Eyewear';
                                    else if (lowerCat === 'mouth') category = 'Mouth Items';
                                    else if (lowerCat === 'torso' || lowerCat === 'clothing' || lowerCat === 'shirt') category = 'Clothes';
                                    else if (lowerCat === 'base' || lowerCat === 'body') category = 'Bro Type';
                                    
                                    const cleanItemName = itemListVal.split('(')[0].trim();
                                    const key = getTraitKey(category, cleanItemName);
                                    
                                    if (key) {
                                        if (!traitMap[key]) {
                                            traitMap[key] = { Category: category, 'Unique Item List': cleanItemName, Supply: '?', tags: {}, adjustedScore: 0 };
                                        }
                                        const tags = traitMap[key].tags || {};
                                        for (let i = 1; i <= 10; i++) {
                                            const tagHeader = keys.find(k => k.trim().toLowerCase().replace(/[^a-z0-9]/g, '') === `tag${i}`);
                                            const isHeader = keys.find(k => k.trim().toLowerCase().replace(/[^a-z0-9]/g, '') === (`is${i}`) || k.trim().toLowerCase().replace(/[^a-z0-9]/g, '') === (`score${i}`));
                                            if (tagHeader) {
                                                const tagName = d[tagHeader];
                                                let score = 0;
                                                if (isHeader) {
                                                    const rawScore = d[isHeader];
                                                    if (typeof rawScore === 'number') score = rawScore;
                                                    else if (typeof rawScore === 'string') score = parseFloat(rawScore);
                                                }
                                                if (tagName && typeof tagName === 'string' && tagName.trim() !== '' && tagName.toLowerCase() !== 'none') {
                                                    if (tagName.trim().toLowerCase() !== 'minimalist') {
                                                        if (isNaN(score)) score = 0;
                                                        tags[tagName.trim()] = score;
                                                    }
                                                }
                                            }
                                        }
                                        traitMap[key].tags = tags;

                                        let adjScore = 0;
                                        const adjKey = keys.find(k => ['adjusted score', 'adjustedscore', 'calculated is', 'item score'].includes(k.trim().toLowerCase()));
                                        if (adjKey) {
                                            const val = d[adjKey];
                                            if (typeof val === 'number') adjScore = val;
                                            else if (typeof val === 'string') adjScore = parseFloat(val.replace(/,/g, ''));
                                        }
                                        if (!isNaN(adjScore)) {
                                            traitMap[key].adjustedScore = adjScore;
                                        }
                                    }
                                }
                            });
                            resolve();
                        }
                    });
                });

                // Parse NFTs
                const nfts = [];
                await new Promise((resolve, reject) => {
                    Papa.parse(nftText, {
                        header: true,
                        dynamicTyping: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            const tempNfts = results.data.filter(n => n.ID).map(n => {
                                const enrichedNft = { ...n, hasIpRisk: false };
                                let hasRisk = false;
                                const nftKeys = Object.keys(n);

                                TRAIT_CATEGORIES.forEach(cat => {
                                    let keyInNft = cat;
                                    if (n[cat] === undefined) keyInNft = nftKeys.find(k => k.trim().toLowerCase() === cat.toLowerCase()) || cat;
                                    if (n[keyInNft] === undefined) {
                                        if (cat === 'Headwear') keyInNft = nftKeys.find(k => k.trim().toLowerCase() === 'head') || keyInNft;
                                        if (cat === 'Bro Type') keyInNft = nftKeys.find(k => ['body','base'].includes(k.trim().toLowerCase())) || keyInNft;
                                        if (cat === 'Clothes') keyInNft = nftKeys.find(k => ['torso','clothing'].includes(k.trim().toLowerCase())) || keyInNft;
                                        if (cat === 'Eyewear') keyInNft = nftKeys.find(k => ['face','glasses'].includes(k.trim().toLowerCase())) || keyInNft;
                                        if (cat === 'Mouth Items') keyInNft = nftKeys.find(k => k.trim().toLowerCase() === 'mouth') || keyInNft;
                                    }

                                    const value = n[keyInNft];
                                    if (value) {
                                        const name = String(value).split('(')[0].trim();
                                        const key = getTraitKey(cat, name);
                                        const detail = key ? traitMap[key] : undefined;
                                        
                                        if (detail) {
                                            enrichedNft[cat] = `${name} (${detail.Supply || '?'})`;
                                            if (checkIpRisk(detail['IP Risk'])) hasRisk = true;
                                        } else {
                                            enrichedNft[cat] = name;
                                        }
                                    }
                                });
                                
                                enrichedNft.hasIpRisk = hasRisk;
                                const scoreData = scoresMap[n.ID];
                                if (scoreData) {
                                    enrichedNft.diScore = scoreData['DI Score'];
                                    enrichedNft.surprisalScore = scoreData['Surprisal Score'];
                                    enrichedNft.additiveScore = scoreData['Additive Ratity'] || 0;
                                    enrichedNft.rarity = getRarityFromScore(enrichedNft.diScore);
                                } else {
                                    enrichedNft.diScore = 0;
                                    enrichedNft.surprisalScore = 0;
                                    enrichedNft.additiveScore = 0;
                                    enrichedNft.rarity = { tier: 'Common', color: 'gray' };
                                }
                                return enrichedNft;
                            });

                            tempNfts.sort((a, b) => b.diScore - a.diScore);
                            tempNfts.forEach((nft, index) => nft.rank = index + 1);
                            nfts.push(...tempNfts);
                            resolve();
                        },
                        error: (err) => reject(new Error(`Failed to parse NFT data: ${err.message}`))
                    });
                });

                return { nfts, traitMap };
            } catch (err) {
                throw err;
            }
        };

        // ==========================================
        // ICONS
        // ==========================================
        const CloseIcon = ({ className = "h-6 w-6" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        const ArrowLeftIcon = ({ className = "h-6 w-6" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        );

        const ChevronDownIcon = ({ className = "h-5 w-5" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
            </svg>
        );

        const ChevronUpIcon = ({ className = "h-5 w-5" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7" />
            </svg>
        );

        const CautionIcon = ({ className = "h-5 w-5" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
        );

        const StarIcon = ({ className = "h-5 w-5" }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                <path d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.007z" />
            </svg>
        );

        const FilterIcon = () => (
            <svg className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
            </svg>
        );

        const BookIcon = ({ className = "h-5 w-5 mr-1" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
            </svg>
        );

        const GridIcon = ({ className = "h-5 w-5 mr-1" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25A2.25 2.25 0 0113.5 8.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
            </svg>
        );

        const NoneIcon = ({ className = "h-6 w-6" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
            </svg>
        );

        const IdentityIcon = ({ name, className = "w-4 h-4", color = "currentColor" }) => {
            const n = name.toLowerCase();
            let content = <circle cx="12" cy="12" r="6" />;

            if (n.includes('brand')) content = <path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2z" />;
            else if (n.includes('prestige')) content = <path d="M16 4h-8l-4 6 8 10 8-10-4-6zm-11.3 6l3.3-5h8l3.3 5h-14.6z M12 18.5L5.4 11h13.2L12 18.5z" />;
            else if (n.includes('villainous')) content = <path d="M12 2c-4.4 0-8 3.6-8 8 0 2.9 1.5 5.4 3.9 6.7.3.2.5.6.5 1l-.3 3.5c-.1.9.6 1.6 1.5 1.6h4.9c.9 0 1.5-.7 1.5-1.6l-.3-3.5c0-.4.2-.8.5-1 2.3-1.3 3.9-3.8 3.9-6.7 0-4.4-3.6-8-8-8zm-2.5 9.5c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5zm5 0c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5z" />;
            else if (n.includes('enforcer')) content = <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z" />;
            else if (n.includes('fantasy')) content = <path d="M10 2l2.5 5.5L18 10l-5.5 2.5L10 18l-2.5-5.5L2 10l5.5-2.5L10 2zm10 10l1.2 2.8L24 16l-2.8 1.2L20 20l-1.2-2.8L16 16l2.8-1.2L20 12zM4 18l1.2 2.8L8 22l-2.8 1.2L4 26l-1.2-2.8L0 22l2.8-1.2L4 18z" transform="translate(0, -2)" />;
            else if (n.includes('sci-fi') || n.includes('scifi')) content = <g><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" opacity="0.3"/><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93L17.66 6.34C18.5 7.18 19 8.28 19 9.5c0 2.48-2.02 4.5-4.5 4.5S10 11.98 10 9.5c0-1.22.5-2.32 1.34-3.16l-1.41-1.41C8.59 6.27 7 8.2 7 10.5 7 14.09 9.91 17 13.5 17c2.3 0 4.23-1.59 4.93-3.93l-1.41-1.41c-.24.79-.81 1.45-1.52 1.88V12h-2v1.5c-1.38 0-2.5-1.12-2.5-2.5 0-.69.28-1.31.73-1.77l1.41 1.41V9h2v1.5c1.38 0 2.5 1.12 2.5 2.5 0 .69-.28 1.31-.73 1.77l-1.41-1.41z" transform="rotate(45, 12, 12)"/></g>;
            else if (n.includes('whimsical')) content = <path d="M12 2C8.69 2 6 4.69 6 8c0 2.67 1.76 4.92 4.18 5.67L9.5 22h5l-.68-8.33C16.24 12.92 18 10.67 18 8c0-3.31-2.69-6-6-6zM9.5 18h5v2h-5v-2z" />;
            else if (n.includes('heritage')) content = <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 1-1z" />;
            else if (n.includes('drip')) content = <path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .55-.45 1-1 1H6c-.55 0-1-.45-1-1v-1h14v1z" />;
            else if (n.includes('urban')) content = <path d="M9 3h6v2H9V3zm0 3h6c.55 0 1 .45 1 1v12c0 1.1-.9 2-2 2h-4c-1.1 0-2-.9-2-2V7c0-.55.45-1 1-1z" />;
            else if (n.includes('meme')) content = <path d="M12 2.5s4 5 4 11c0 2.5-1.5 4.5-4 4.5S8 16 8 13.5c0-6 4-11 4-11z M12 22s-2-2-2-4h4c0 2-2 4-2 4z" />;
            else if (n.includes('minimalist')) content = <path d="M12 2L2 20h20L12 2zm0 3.8L18.5 18H5.5L12 5.8z" />;
            else if (n.includes('scene')) content = <path d="M12 4a8 8 0 018 8h-16a8 8 0 018-8z M2 14h20v2H2v-2z" />;
            else if (n.includes('hemi')) content = <path d="M12 2L15 8H9L12 2ZM6 8H18V16C18 19.3137 15.3137 22 12 22C8.68629 22 6 19.3137 6 16V8Z" />;
            else if (n.includes('zombie')) content = <path d="M12 2C7 2 4 5 4 9V12C4 14 5 15 5 15L7 20H17L19 15C19 15 20 14 20 12V9C20 5 17 2 12 2ZM8 10C7.44772 10 7 9.55228 7 9C7 8.44772 7.44772 8 8 8C8.55228 8 9 8.44772 9 9C9 9.55228 8.55228 10 8 10ZM16 10C15.4477 10 15 9.55228 15 9C15 8.44772 15.4477 8 16 8C16.5523 8 17 8.44772 17 9C17 9.55228 16.5523 10 16 10ZM12 18C10 18 9 17 9 17H15C15 17 14 18 12 18Z" />;
            else if (n.includes('alien')) content = <path d="M12 2C6 2 3 7 3 12C3 18 6 22 12 22C18 22 21 18 21 12C21 7 18 2 12 2ZM7.5 13C6.67157 13 6 11.6569 6 10C6 8.34315 6.67157 7 7.5 7C8.32843 7 9 8.34315 9 10C9 11.6569 8.32843 13 7.5 13ZM16.5 13C15.6716 13 15 11.6569 15 10C15 8.34315 15.6716 7 16.5 7C17.3284 7 18 8.34315 18 10C18 11.6569 17.3284 13 16.5 13Z" />;
            else if (n.includes('robot') || n.includes('cyborg')) content = <path d="M4 8H20V20H4V8ZM7 2V6H9V2H7ZM15 2V6H17V2H15ZM9 12H7V14H9V12ZM17 12H15V14H17V12ZM14 17H10V18H14V17Z" />;
            else if (n.includes('gold')) content = <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />;
            else if (n.includes('demon')) content = <path d="M4 4C4 4 6 10 8 11V16H16V11C18 10 20 4 20 4C20 4 17 8 16 9V16C16 18.2091 14.2091 20 12 20C9.79086 20 8 18.2091 8 16V9C7 8 4 4 4 4Z" />;
            else if (n.includes('angel')) content = <path d="M12 2C14.2091 2 16 3.79086 16 6H8C8 3.79086 9.79086 2 12 2ZM2 10L6 8L8 12L4 16L2 10ZM22 10L18 8L16 12L20 16L22 10Z" />;
            else if (n.includes('ape')) content = <path d="M4 8C4 8 2 12 4 16C4 16 6 20 12 20C18 20 20 16 20 16C22 12 20 8 20 8H4ZM8 12C7.44772 12 7 11.5523 7 11C7 10.4477 7.44772 10 8 10C8.55228 10 9 10.4477 9 11C9 11.5522 8.55228 12 8 12ZM16 12C15.4477 12 15 11.5523 15 11C15 10.4477 15.4477 10 16 10C16.5523 10 17 10.4477 17 11C17 11.5523 16.5523 12 16 12Z" />;
            else if (n.includes('skeleton')) content = <path d="M12 2C8 2 5 5 5 9V14H7V18H9V14H11V18H13V14H15V18H17V14H19V9C19 5 16 2 12 2ZM9 9C8.44772 9 8 8.55228 8 8C8 7.44772 8.44772 7 9 7C9.55228 7 10 7.44772 10 8C10 8.55228 9.55228 9 9 9ZM15 9C14.4477 9 14 8.55228 14 8C14 7.44772 14.4477 7 15 7C15.5523 7 16 7.44772 16 8C16 8.55228 15.5523 9 15 9Z" />;

            return <svg className={className} viewBox="0 0 24 24" fill={color} xmlns="http://www.w3.org/2000/svg">{content}</svg>;
        };

        // ==========================================
        // COMPONENTS
        // ==========================================
        const RarityBadge = ({ tier, showName = true, className = "" }) => {
            const [showLegend, setShowLegend] = React.useState(false);
            const stars = tier === 'Grail' ? 6 : tier === 'Legendary' ? 5 : tier === 'Epic' ? 4 : tier === 'Rare' ? 3 : tier === 'Uncommon' ? 2 : 1;
            const handleClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setShowLegend(!showLegend);
            };
            const getScoreRangeText = (level) => {
                switch(level) {
                    case 'Grail': return 'Score: 210+';
                    case 'Legendary': return 'Score: 175 - 210';
                    case 'Epic': return 'Score: 110 - 175';
                    case 'Rare': return 'Score: 60 - 110';
                    case 'Uncommon': return 'Score: 48 - 60';
                    case 'Common': return 'Score: < 48';
                    default: return '';
                }
            };
            const modalContent = showLegend ? (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" onClick={(e) => { e.stopPropagation(); setShowLegend(false); }}>
                    <div className="bg-white rounded-xl shadow-2xl overflow-hidden max-w-sm w-full border border-gray-200 animate-in fade-in zoom-in duration-200" onClick={(e) => e.stopPropagation()}>
                        <div className="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                            <h3 className="text-lg font-bold text-gray-800 font-serif">Rarity Legend</h3>
                            <button onClick={(e) => { e.stopPropagation(); setShowLegend(false); }} className="text-gray-400 hover:text-gray-700"><CloseIcon /></button>
                        </div>
                        <div className="p-4 space-y-2">
                            <p className="text-xs text-gray-500 text-center mb-2">Based on DI Score</p>
                            {RARITY_LEVELS.map(level => {
                                const levelStars = level === 'Grail' ? 6 : level === 'Legendary' ? 5 : level === 'Epic' ? 4 : level === 'Rare' ? 3 : level === 'Uncommon' ? 2 : 1;
                                return (
                                    <div key={level} className={`flex items-center justify-between p-2 rounded ${tier === level ? 'bg-purple-50 ring-1 ring-purple-200' : 'hover:bg-gray-50'}`}>
                                        <div className="flex items-center gap-2">
                                            <span className={`w-3 h-3 rounded-full ${RARITY_BG_COLORS[level]?.replace('bg-','text-') || 'text-gray-500'}`}></span>
                                            <div className="flex flex-col">
                                                <span className={`text-sm font-bold ${level === tier ? 'text-purple-700' : 'text-gray-700'}`}>{level}</span>
                                                <span className="text-[10px] text-gray-400 font-mono">{getScoreRangeText(level)}</span>
                                            </div>
                                        </div>
                                        <div className="flex text-yellow-500">{[...Array(levelStars)].map((_, i) => <StarIcon key={i} className="h-3 w-3" />)}</div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="bg-gray-50 px-6 py-3 border-t border-gray-200 text-center text-xs text-gray-500">Click anywhere to close</div>
                    </div>
                </div>
            ) : null;
            
            return (
                <React.Fragment>
                    <div onClick={handleClick} className={`flex items-center gap-1 text-xs font-bold text-white px-2 py-0.5 rounded-full whitespace-nowrap cursor-pointer hover:opacity-90 active:scale-95 transition-transform ${RARITY_BG_COLORS[tier]?.replace('bg-','bg-').replace('200','600') || 'bg-gray-500'} ${className}`} title="Click to view Rarity Legend">
                        {[...Array(stars)].map((_, i) => <StarIcon key={i} className="h-3 w-3" />)}
                        {showName && <span>{tier}</span>}
                    </div>
                    {showLegend && ReactDOM.createPortal(modalContent, document.body)}
                </React.Fragment>
            );
        };

        const NFTCard = React.memo(({ nft, onClick }) => {
            const { tier } = nft.rarity;
            const glowClass = tier === 'Grail' ? 'animate-grail-glow' : tier === 'Legendary' ? 'animate-legendary-glow' : tier === 'Epic' ? 'animate-epic-glow' : tier === 'Rare' ? 'animate-rare-glow' : '';
            
            return (
                <div onClick={() => onClick(nft)} className={`bg-white rounded-lg shadow-md overflow-hidden cursor-pointer hover:scale-105 transition-transform duration-200 ${glowClass} relative`} style={{ contentVisibility: 'auto', containIntrinsicSize: '200px' }}>
                    {nft.hasIpRisk && (
                        <div className="absolute top-1 right-1 bg-yellow-400 text-yellow-900 rounded-full p-1 z-10 shadow-sm" title="Community Flagged IP Risk"><CautionIcon className="w-4 h-4" /></div>
                    )}
                    <img src={nft.Image} alt={`Hemi Bro #${nft.ID}`} className="w-full aspect-square object-cover" loading="lazy" decoding="async" />
                    <div className="p-2 flex flex-col gap-1">
                        <div className="flex justify-between items-center">
                            <span className="font-bold text-sm">#{nft.ID}</span>
                            <span className="text-[10px] text-gray-500 font-mono">Rank: {nft.rank}</span>
                        </div>
                        <div className="flex justify-between items-center">
                            <RarityBadge tier={tier} />
                            <span className="text-[10px] text-purple-800 font-bold bg-purple-50 px-1 rounded">DI: {nft.diScore.toFixed(1)}</span>
                        </div>
                    </div>
                </div>
            );
        });

        const FilterBar = ({ filters, setFilters, traitOptions, traitDetails, facetedCounts, resetFilters, idInput, setIdInput, sortBy, setSortBy }) => {
            const [openMenu, setOpenMenu] = React.useState(null);
            const [activeTraitCategory, setActiveTraitCategory] = React.useState(null);
            const containerRef = React.useRef(null);
            
            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (containerRef.current && !containerRef.current.contains(event.target)) setOpenMenu(null);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleMenu = (menu) => {
                setOpenMenu(openMenu === menu ? null : menu);
                if (menu !== 'traits') setActiveTraitCategory(null);
            };

            const handleTraitSelect = (category, value) => {
                setFilters(prev => {
                    const newTraits = { ...prev.traits };
                    if (value === '') delete newTraits[category];
                    else newTraits[category] = value;
                    return { ...prev, traits: newTraits };
                });
                setOpenMenu(null);
            };

            const activeTraitCount = Object.keys(filters.traits).length;

            return (
                <div ref={containerRef} className="bg-[#d1d1d1] bg-opacity-95 backdrop-blur-sm border-b border-gray-300 py-3 px-4 shadow-sm relative z-30">
                    <div className="max-w-7xl mx-auto flex flex-col xl:flex-row gap-3 items-stretch xl:items-center">
                        <div className="relative flex-grow max-w-sm">
                            <input type="search" value={idInput} onChange={e => setIdInput(e.target.value)} placeholder="Search by ID..." className="w-full pl-4 pr-4 py-2 border border-gray-300 rounded-full shadow-inner focus:ring-2 focus:ring-purple-500 focus:outline-none bg-white text-gray-800" />
                        </div>
                        <div className="flex flex-wrap items-center gap-2">
                            {/* Sort Dropdown */}
                            <div className="relative">
                                <button onClick={() => toggleMenu('sort')} className="flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-sm">
                                    <span className="text-sm font-medium text-gray-700">Sort</span>
                                    <ChevronDownIcon className="w-4 h-4 text-gray-500" />
                                </button>
                                {openMenu === 'sort' && (
                                    <div className="absolute top-full mt-2 w-56 bg-white border border-gray-200 rounded-lg shadow-xl z-50 overflow-hidden animate-in fade-in zoom-in duration-100">
                                        {[
                                            { label: 'Most Rare (Rank 1-N)', value: 'rank-asc' },
                                            { label: 'Least Rare (Rank N-1)', value: 'rank-desc' },
                                            { label: 'Surprisal Score (High-Low)', value: 'surprisal-desc' },
                                            { label: 'Additive Score (Most Rare)', value: 'additive-asc' },
                                        ].map(opt => (
                                            <button key={opt.value} onClick={() => { setSortBy(opt.value); setOpenMenu(null); }} className={`w-full text-left px-4 py-2 text-sm hover:bg-purple-50 ${sortBy === opt.value ? 'font-bold text-purple-700 bg-purple-50' : 'text-gray-700'}`}>
                                                {opt.label}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                            
                            {/* Rarity Dropdown */}
                            <div className="relative">
                                <button onClick={() => toggleMenu('rarity')} className={`flex items-center gap-2 px-4 py-2 bg-white border rounded-lg hover:bg-gray-50 focus:outline-none shadow-sm ${filters.rarity ? 'border-purple-500 ring-1 ring-purple-500' : 'border-gray-300'}`}>
                                    <span className="text-sm font-medium text-gray-700">{filters.rarity || "Rarity"}</span>
                                    <ChevronDownIcon className="w-4 h-4 text-gray-500" />
                                </button>
                                {openMenu === 'rarity' && (
                                    <div className="absolute top-full mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-xl z-50 overflow-hidden animate-in fade-in zoom-in duration-100 left-0">
                                        <button onClick={() => { setFilters(f => ({ ...f, rarity: '' })); setOpenMenu(null); }} className="w-full text-left px-4 py-2 text-sm hover:bg-gray-100 text-gray-500 border-b border-gray-100">All Tiers</button>
                                        {RARITY_LEVELS.map(tier => {
                                            const count = facetedCounts.rarity[tier] || 0;
                                            if (count === 0 && filters.rarity !== tier) return null;
                                            return (
                                                <button key={tier} onClick={() => { setFilters(f => ({ ...f, rarity: tier })); setOpenMenu(null); }} className={`w-full text-left px-4 py-2 text-sm hover:bg-purple-50 flex justify-between ${filters.rarity === tier ? 'font-bold text-purple-700 bg-purple-50' : 'text-gray-700'}`}>
                                                    <span>{tier}</span><span className="text-xs text-gray-400 font-mono self-center">({count})</span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            {/* Traits Dropdown */}
                            <div className="relative">
                                <button onClick={() => toggleMenu('traits')} className={`flex items-center gap-2 px-4 py-2 bg-white border rounded-lg hover:bg-gray-50 focus:outline-none shadow-sm ${activeTraitCount > 0 ? 'border-purple-500 ring-1 ring-purple-500' : 'border-gray-300'}`}>
                                    <span className="text-sm font-medium text-gray-700">Traits</span>
                                    {activeTraitCount > 0 && <span className="bg-purple-600 text-white text-[10px] px-1.5 py-0.5 rounded-full">{activeTraitCount}</span>}
                                    <ChevronDownIcon className="w-4 h-4 text-gray-500" />
                                </button>
                                {openMenu === 'traits' && (
                                    <div className="absolute top-full mt-2 w-80 md:w-96 bg-white border border-gray-200 rounded-lg shadow-xl z-50 overflow-hidden animate-in fade-in zoom-in duration-100 left-0">
                                        {!activeTraitCategory ? (
                                            <div className="max-h-[60vh] overflow-y-auto">
                                                <div className="px-4 py-2 bg-gray-50 border-b text-xs font-bold text-gray-500 uppercase">Categories</div>
                                                {TRAIT_CATEGORIES.map(cat => {
                                                    const selectedVal = filters.traits[cat];
                                                    const displayVal = selectedVal ? selectedVal.split('(')[0].trim() : '';
                                                    return (
                                                        <button key={cat} onClick={() => setActiveTraitCategory(cat)} className={`w-full text-left px-4 py-3 text-sm hover:bg-gray-50 border-b border-gray-50 last:border-0 flex justify-between items-center ${selectedVal ? 'bg-purple-50' : ''}`}>
                                                            <span className={`font-medium ${selectedVal ? 'text-purple-700' : 'text-gray-700'}`}>{cat}</span>
                                                            <span className="flex items-center gap-2">{selectedVal && <span className="text-xs text-purple-600 font-bold truncate max-w-[100px]">{displayVal}</span>}<span className="text-gray-400">›</span></span>
                                                        </button>
                                                    );
                                                })}
                                                {activeTraitCount > 0 && (
                                                    <div className="p-2 border-t"><button onClick={() => setFilters(f => ({...f, traits: {}}))} className="w-full py-2 text-center text-red-600 text-sm font-bold hover:bg-red-50 rounded">Clear Traits</button></div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="flex flex-col h-full max-h-[60vh]">
                                                <div className="flex items-center gap-2 px-3 py-2 bg-gray-100 border-b flex-shrink-0">
                                                    <button onClick={() => setActiveTraitCategory(null)} className="p-1 hover:bg-gray-200 rounded-full text-gray-600"><ArrowLeftIcon className="w-4 h-4" /></button>
                                                    <span className="font-bold text-sm text-gray-800">{activeTraitCategory}</span>
                                                    <button onClick={() => handleTraitSelect(activeTraitCategory, '')} className="ml-auto text-xs text-red-500 hover:text-red-700 font-medium">Clear</button>
                                                </div>
                                                <div className="overflow-y-auto flex-grow p-1">
                                                    {traitOptions[activeTraitCategory]?.map(opt => {
                                                        const name = opt.split(' (')[0];
                                                        const key = getTraitKey(activeTraitCategory, name);
                                                        const detail = key ? traitDetails[key] : null;
                                                        const count = facetedCounts.traits[activeTraitCategory]?.[opt] || 0;
                                                        const isSelected = filters.traits[activeTraitCategory] === opt;
                                                        if (count === 0 && !isSelected) return null;
                                                        return (
                                                            <button key={opt} onClick={() => handleTraitSelect(activeTraitCategory, opt)} className={`w-full flex items-center gap-3 p-2 rounded-md hover:bg-purple-50 transition-colors text-left ${isSelected ? 'bg-purple-100 ring-1 ring-purple-200' : ''}`}>
                                                                <div className="w-8 h-8 flex-shrink-0 rounded bg-white border border-gray-200 flex items-center justify-center p-0.5">
                                                                    {detail?.thumbnailUrl && name.toLowerCase() !== 'none' ? <img src={detail.thumbnailUrl} alt="" className="w-full h-full object-contain" /> : <NoneIcon className="w-4 h-4 text-gray-300" />}
                                                                </div>
                                                                <div className="min-w-0 flex-grow">
                                                                    <div className="flex items-center justify-between">
                                                                        <span className={`text-sm font-medium truncate ${isSelected ? 'text-purple-900' : 'text-gray-700'}`}>{name}</span>
                                                                        <span className="text-xs text-gray-400 font-mono ml-2">{count}</span>
                                                                    </div>
                                                                    {checkIpRisk(detail?.['IP Risk']) && <div className="flex items-center gap-1 mt-0.5"><CautionIcon className="w-3 h-3 text-yellow-500" /><span className="text-[10px] text-yellow-600">IP Risk</span></div>}
                                                                </div>
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* IP Risk */}
                            <button onClick={() => setFilters(f => ({ ...f, showIpRisk: !f.showIpRisk }))} className={`flex items-center gap-2 px-4 py-2 border rounded-lg shadow-sm focus:outline-none transition-colors ${filters.showIpRisk ? 'bg-yellow-50 border-yellow-300 text-yellow-800' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'}`}>
                                <CautionIcon className={`w-4 h-4 ${filters.showIpRisk ? 'text-yellow-600' : 'text-gray-400'}`} />
                                <span className="text-sm font-medium hidden sm:inline">Show IP Risk</span>
                                <span className="text-sm font-medium sm:hidden">Risk</span>
                                <div className={`w-3 h-3 rounded-full ml-1 ${filters.showIpRisk ? 'bg-yellow-500' : 'bg-gray-300'}`}></div>
                            </button>

                            <button onClick={resetFilters} className="px-4 py-2 text-sm font-bold text-red-600 hover:bg-red-50 rounded-lg transition-colors ml-auto xl:ml-0">Reset</button>
                        </div>
                    </div>
                </div>
            );
        };

        const Encyclopedia = ({ traitDetails, onTraitClick }) => {
            const groupedTraits = React.useMemo(() => {
                const grouped = {};
                TRAIT_CATEGORIES.forEach(cat => grouped[cat] = []);
                Object.values(traitDetails).forEach(trait => {
                    if (trait.Category && grouped[trait.Category]) grouped[trait.Category].push(trait);
                });
                Object.keys(grouped).forEach(cat => {
                    grouped[cat].sort((a, b) => {
                        const supplyA = parseInt(a.Supply, 10) || 999;
                        const supplyB = parseInt(b.Supply, 10) || 999;
                        if (supplyA !== supplyB) return supplyB - supplyA;
                        return a['Unique Item List'].localeCompare(b['Unique Item List']);
                    });
                });
                return grouped;
            }, [traitDetails]);

            const scrollToCategory = (cat) => {
                const el = document.getElementById(`cat-${cat}`);
                if (el) {
                    const offset = 140; 
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = el.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;
                    window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                }
            };

            return (
                <div className="pb-12">
                    <div className="sticky top-[72px] z-10 bg-white/95 backdrop-blur-sm border-b border-gray-200 py-3 mb-6">
                        <div className="flex flex-wrap justify-center px-2 gap-2">
                            {TRAIT_CATEGORIES.map(cat => (
                                <button key={cat} onClick={() => scrollToCategory(cat)} className="px-3 py-1.5 md:px-4 md:py-2 bg-gray-100 hover:bg-purple-100 text-gray-700 hover:text-purple-800 rounded-full text-xs md:text-sm font-bold transition-colors border border-gray-200">
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="space-y-8 px-1">
                        {TRAIT_CATEGORIES.map(category => {
                            const traits = groupedTraits[category] || [];
                            if (traits.length === 0) return null;
                            return (
                                <div id={`cat-${category}`} key={category} className="bg-white rounded-xl shadow-md overflow-hidden scroll-mt-32">
                                    <div className="bg-gradient-to-r from-purple-800 to-gray-700 px-6 py-4"><h2 className="text-2xl font-bold text-white font-serif">{category}</h2></div>
                                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                                        {traits.map((trait) => {
                                            const hasRisk = checkIpRisk(trait['IP Risk']);
                                            return (
                                                <div key={trait['Unique Item List']} className="flex bg-white rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition-shadow cursor-pointer overflow-hidden group h-auto min-h-[8rem]" onClick={() => onTraitClick(category, trait['Unique Item List'])}>
                                                    <div className={`w-32 flex-shrink-0 flex items-center justify-center border-r border-gray-100 bg-gray-50`}>
                                                        <div className="w-24 h-24 relative flex items-center justify-center">
                                                            {trait.thumbnailUrl && trait['Unique Item List'].toLowerCase() !== 'none' ? <img src={trait.thumbnailUrl} alt={trait['Unique Item List']} className="w-full h-full object-contain" loading="lazy" /> : trait['Unique Item List'].toLowerCase() === 'none' ? <div className="w-full h-full flex items-center justify-center"><NoneIcon className="w-12 h-12 text-gray-300" /></div> : <span className="text-xs text-gray-400">No Image</span>}
                                                            {hasRisk && <div className="absolute top-0 right-0 text-yellow-600 bg-white/80 rounded-bl-lg p-0.5" title="IP Risk"><CautionIcon className="w-4 h-4" /></div>}
                                                        </div>
                                                    </div>
                                                    <div className="flex-grow p-2 pl-3 flex flex-col justify-between overflow-hidden">
                                                        <div>
                                                            <div className="flex justify-between items-start mb-1"><h3 className={`font-bold text-sm truncate pr-1 text-gray-800`}>{trait['Unique Item List']}</h3></div>
                                                            {trait.Title && <p className={`text-xs font-medium text-gray-600 mb-1 truncate`}>"{trait.Title}"</p>}
                                                            {trait.Description && <p className="text-[11px] text-gray-500 leading-tight" title={trait.Description}>{trait.Description}</p>}
                                                        </div>
                                                        <div className="flex items-center justify-between mt-1 pt-1 border-t border-gray-100"><span className="text-[10px] uppercase text-gray-400 font-bold tracking-wider">Supply</span><span className="text-sm font-mono text-gray-700">{trait.Supply}</span></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ItemDetailModal = ({ data, onClose }) => {
            if (!data) return null;
            const tags = data.detail?.tags ? Object.entries(data.detail.tags).sort((a, b) => b[1] - a[1]) : [];
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden relative animate-in fade-in zoom-in duration-200" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-3 right-3 text-gray-400 hover:text-gray-700 z-10 bg-white/80 rounded-full p-1 transition-colors"><CloseIcon className="w-5 h-5" /></button>
                        <div className="p-6 flex flex-col items-center">
                            <div className="w-24 h-24 rounded-lg bg-gray-50 border border-gray-200 flex items-center justify-center p-2 mb-3 relative">
                                {data.detail?.['IP Risk'] && <div className="absolute top-1 right-1 text-yellow-600 z-10" title="IP Risk"><CautionIcon className="w-5 h-5" /></div>}
                                {data.detail?.thumbnailUrl && data.name.toLowerCase() !== 'none' ? <img src={data.detail.thumbnailUrl} alt={data.name} className="w-full h-full object-contain" /> : <NoneIcon className="w-10 h-10 text-gray-300" />}
                            </div>
                            <h3 className="text-xl font-bold font-serif text-center leading-tight mb-1 text-gray-800">{data.name}</h3>
                            <p className="text-xs font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">{data.category}</p>
                            {tags.length > 0 && (
                                <div className="flex flex-wrap gap-2 justify-center mb-4">
                                    {tags.map(([tagName, score]) => {
                                        const color = SYNERGY_COLORS[tagName] || SYNERGY_COLORS.default;
                                        return (
                                            <span key={tagName} className="px-2 py-0.5 rounded-full text-gray-800 text-[10px] font-bold border border-black/10 shadow-sm flex items-center gap-1" style={{ backgroundColor: color }}>
                                                <IdentityIcon name={tagName} className="w-3 h-3 text-gray-800" />{tagName} +{score}
                                            </span>
                                        );
                                    })}
                                </div>
                            )}
                            {data.detail?.adjustedScore !== undefined && data.detail.adjustedScore !== 0 && (
                                <div className="mb-4 text-center"><span className="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-1">Adjusted Score</span><span className="text-xl font-mono font-bold text-purple-600">+{data.detail.adjustedScore.toFixed(2)}</span></div>
                            )}
                            <div className="w-full space-y-3 bg-gray-50 rounded-lg p-3 border border-gray-100 max-h-32 overflow-y-auto custom-scrollbar">
                                {data.detail?.Title && <div className="text-center"><h4 className="text-sm italic font-serif text-gray-700">"{data.detail.Title}"</h4></div>}
                                {data.detail?.Description ? <p className="text-gray-600 leading-relaxed font-serif text-xs text-center">{data.detail.Description}</p> : <p className="text-gray-400 italic text-center text-xs">No description available.</p>}
                            </div>
                            <div className="w-full mt-4 flex justify-between items-center bg-white border border-gray-200 rounded-lg p-2.5 shadow-sm">
                                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Total Supply</span>
                                <span className="font-mono font-bold text-lg text-gray-700">{data.supply}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const NFTModal = ({ nft, traitDetails, onClose }) => {
            const [activeSlot, setActiveSlot] = React.useState(null);
            React.useEffect(() => setActiveSlot(null), [nft]);
            if (!nft) return null;

            const slots = [
                { category: 'Headwear', label: 'Head' },
                { category: 'Eyes', label: 'Eyes' },
                { category: 'Eyewear', label: 'Eyewear' },
                { category: 'Bro Type', label: 'Bro Type' },
                { category: 'Mouth Items', label: 'Mouth' },
                { category: 'Clothes', label: 'Clothes' },
            ];

            const slotDataList = [];
            const identityTotals = {};
            const contributingItems = [];
            let totalIdentityScore = 0;

            slots.forEach(slot => {
                const category = slot.category;
                const value = nft[category];
                if (!value || typeof value !== 'string') { slotDataList.push({ ...slot, data: null }); return; }
                const name = value.split(' (')[0].trim();
                const key = getTraitKey(category, name);
                const detail = key ? traitDetails[key] : undefined;
                let tagsList = [];
                if (detail && detail.tags) {
                    Object.entries(detail.tags).forEach(([tagName, score]) => {
                        const s = typeof score === 'number' ? score : parseFloat(score) || 0;
                        identityTotals[tagName] = (identityTotals[tagName] || 0) + s;
                        totalIdentityScore += s;
                        tagsList.push({ name: tagName, score: s });
                    });
                    tagsList.sort((a, b) => b.score - a.score);
                }
                const localDiBonus = detail?.adjustedScore || 0;
                if (name.toLowerCase() === 'none') {
                    if (!detail || (!detail.Title && !detail.Description)) { slotDataList.push({ ...slot, data: null }); return; }
                }
                const match = value.match(/\((\d+)\)/);
                const supplyStr = match ? match[1] : (detail ? detail.Supply : '999');
                const supply = parseInt(supplyStr, 10) || 999;
                if (localDiBonus > 0) contributingItems.push({ name, bonus: localDiBonus, category });
                slotDataList.push({ ...slot, data: { name, detail, supply, value, category, localDiBonus, tagsList } });
            });

            const handleSlotClick = (data) => { if(data) setActiveSlot(data); };
            const sortedIdentities = Object.entries(identityTotals).map(([name, score]) => ({ name, score, percentage: totalIdentityScore > 0 ? (score / totalIdentityScore) * 100 : 0 })).sort((a, b) => b.score - a.score);
            contributingItems.sort((a, b) => b.bonus - a.bonus);

            return (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-white w-full max-w-6xl h-auto max-h-[90vh] rounded-xl border border-gray-300 shadow-2xl flex flex-col md:flex-row relative overflow-hidden" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 z-50 text-gray-400 hover:text-black bg-white/80 hover:bg-white rounded-full p-2 transition-all shadow-sm"><CloseIcon className="w-8 h-8" /></button>
                        <div className="w-full md:w-1/4 flex-shrink-0 p-6 flex flex-col items-center bg-gray-50 border-b md:border-b-0 md:border-r border-gray-200 overflow-y-auto custom-scrollbar relative">
                            <div className="flex flex-col items-center w-full mb-6 mt-4 md:mt-0">
                                <div className="relative w-40 h-40 md:w-48 md:h-48 aspect-square mb-4 shadow-lg rounded-xl overflow-hidden bg-white border-4 border-white">
                                    <img src={nft.Image} alt={`Hemi Bro #${nft.ID}`} className="w-full h-full object-contain" />
                                    {nft.hasIpRisk && <div className="absolute top-2 right-2 bg-yellow-400 text-yellow-900 rounded-full p-1.5 z-10 shadow-md border-2 border-white" title="Contains IP Risk Content"><CautionIcon className="w-4 h-4" /></div>}
                                </div>
                                <div className="text-center w-full">
                                    <h2 className="text-3xl font-bold text-gray-800 font-serif tracking-wide leading-none mb-2">#{nft.ID}</h2>
                                    <div className="flex flex-col gap-1 items-center"><RarityBadge tier={nft.rarity.tier} /><div className="text-xs font-mono text-gray-500 mt-1 space-x-2"><span>Rank: {nft.rank}</span><span className="text-purple-600 font-bold">DI: {nft.diScore.toFixed(2)}</span></div></div>
                                </div>
                            </div>
                            <div className="w-full mb-6">
                                <h4 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 text-center border-b border-gray-200 pb-1">Bro Identity</h4>
                                {sortedIdentities.length > 0 ? (
                                    <div className="space-y-3">
                                        {sortedIdentities.map((identity) => {
                                            const color = SYNERGY_COLORS[identity.name] || SYNERGY_COLORS.default;
                                            return (
                                                <div key={identity.name} className="flex flex-col gap-1">
                                                    <div className="flex justify-between items-end text-xs"><span className="font-bold text-gray-700 flex items-center gap-1.5"><div className="p-0.5 rounded-full bg-white border border-gray-100"><IdentityIcon name={identity.name} className="w-3 h-3 text-gray-600" /></div>{identity.name}</span><span className="font-mono font-bold text-gray-500">{identity.percentage.toFixed(1)}%</span></div>
                                                    <div className="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden border border-black/80"><div className="h-full rounded-l-full transition-all duration-500 ease-out" style={{ width: `${identity.percentage}%`, backgroundColor: color }}></div></div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : <div className="text-center text-xs text-gray-400 italic py-2">No specific identity data.</div>}
                            </div>
                            <div className="w-full mt-2">
                                <h4 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 text-center border-b border-gray-200 pb-1">Score Contribution</h4>
                                {contributingItems.length > 0 ? (
                                    <table className="w-full text-xs">
                                        <tbody>
                                            {contributingItems.map((item, idx) => (<tr key={idx} className="border-b border-gray-50 last:border-0 hover:bg-gray-50"><td className="py-1.5 text-gray-700 font-medium truncate pr-2 max-w-[140px]" title={item.name}>{item.name}</td><td className="py-1.5 text-right font-mono font-bold text-purple-600">+{item.bonus.toFixed(1)}</td></tr>))}
                                            <tr className="bg-purple-50"><td className="py-2 text-purple-900 font-bold pl-2">Total DI</td><td className="py-2 text-right font-mono font-bold text-purple-900 pr-1">{nft.diScore.toFixed(2)}</td></tr>
                                        </tbody>
                                    </table>
                                ) : <p className="text-center text-xs text-gray-400 italic">No score modifiers.</p>}
                            </div>
                        </div>
                        <div className="w-full md:w-3/4 flex-1 bg-white p-6 md:p-8 overflow-y-auto">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 h-full content-center pt-8">
                                {slotDataList.map(({ label, category, data }) => {
                                    const hasRisk = checkIpRisk(data?.detail?.['IP Risk']);
                                    const hasData = !!data;
                                    return (
                                        <div key={category} className={`flex p-2 rounded-lg border transition-all h-28 group relative ${hasData ? 'border-gray-200 hover:border-purple-400 bg-white hover:shadow-md cursor-pointer' : 'border-dashed border-gray-200 bg-gray-50'}`} onClick={() => handleSlotClick(data)}>
                                            {hasData && <div className="absolute top-2 right-2 px-1.5 py-0.5 bg-gray-100 rounded text-[9px] font-mono text-gray-500 font-bold">Qty: {data.supply}</div>}
                                            <div className="flex flex-col items-center justify-center min-w-[70px] mr-2">
                                                <div className="w-16 h-16 relative bg-gray-50 rounded-md border border-gray-100 flex items-center justify-center overflow-hidden">
                                                    {data?.detail?.thumbnailUrl && data.name.toLowerCase() !== 'none' ? <img src={data.detail.thumbnailUrl} alt={label} className="w-full h-full object-contain p-1" /> : data?.name.toLowerCase() === 'none' ? <NoneIcon className="w-8 h-8 text-gray-300" /> : hasData ? <span className="text-xs text-gray-400 font-serif">?</span> : <span className="text-gray-200 text-xl font-bold opacity-30">X</span>}
                                                    {hasRisk && <div className="absolute top-0 right-0 text-yellow-600 bg-white/90 rounded-bl p-0.5" title="IP Risk"><CautionIcon className="w-3 h-3" /></div>}
                                                </div>
                                                {hasData && data.localDiBonus > 0 && <span className="text-[11px] font-bold text-purple-700 mt-1 font-mono">+{data.localDiBonus.toFixed(1)}</span>}
                                                {hasData && data.localDiBonus === 0 && <span className="text-[11px] font-bold text-gray-300 mt-1 font-mono">--</span>}
                                            </div>
                                            <div className="flex flex-col min-w-0 flex-grow h-full overflow-hidden pt-1">
                                                <span className="text-[9px] uppercase text-gray-400 font-bold tracking-wider mb-0.5">{label}</span>
                                                {hasData ? (
                                                    <div className="flex flex-col h-full pr-8"> 
                                                        <span className="text-sm font-bold text-gray-800 leading-tight mb-2 truncate" title={data.name}>{data.name}</span>
                                                        <div className="flex-grow overflow-y-auto custom-scrollbar">
                                                            {data.tagsList && data.tagsList.length > 0 ? (
