<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --ink:      #0b0c14;
  --ink2:     #12141f;
  --ink3:     #1a1d2e;
  --ink4:     #222639;
  --line:     #2d3251;
  --line2:    #3d4470;
  --pop:      #5b52ff;
  --pop-soft: rgba(91,82,255,.14);
  --pop-glow: rgba(91,82,255,.35);
  --teal:     #00d4b8;
  --teal-soft:rgba(0,212,184,.12);
  --txt:      #e8eaf8;
  --txt2:     #8890b8;
  --txt3:     #4d5580;
  --red:      #ff5e6c;
  --gold:     #f5c542;
  --green:    #3ddc97;
  --H: 52px;
  --SIDEBAR: 272px;
}
/* Light theme */
html.light {
  --ink:      #f5f5f8;
  --ink2:     #ffffff;
  --ink3:     #eef0f4;
  --ink4:     #e2e5ec;
  --line:     #d1d5e0;
  --line2:    #b8bdd0;
  --pop:      #4f46e5;
  --pop-soft: rgba(79,70,229,.1);
  --pop-glow: rgba(79,70,229,.25);
  --teal:     #0d9488;
  --teal-soft:rgba(13,148,136,.1);
  --txt:      #1a1d2e;
  --txt2:     #4b5068;
  --txt3:     #8890a8;
  --red:      #ef4444;
  --gold:     #d97706;
  --green:    #16a34a;
}
html.light body{background:var(--ink)}
html.light ::-webkit-scrollbar-thumb{background:var(--line2)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--ink)}
/* Ambient NFT art overlay */
.ambient-grid{
  position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;
  opacity:.08;
}
html.light .ambient-grid{opacity:.12}
.ambient-grid img{
  width:48px;height:48px;object-fit:cover;border-radius:6px;
  position:absolute;
}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  opacity:.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;
  mix-blend-mode:overlay;
}
html.light body::after{opacity:.03}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--line2)}
input,button{font-family:inherit}
img{display:block}
button{cursor:pointer}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
#root{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.shell{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* ── Header ── */
.hd{
  height:var(--H);flex-shrink:0;
  background:var(--ink2);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 14px;gap:10px;
  position:relative;z-index:60;
}
.logo{
  font-family:'VT323',monospace;
  font-size:1.45rem;letter-spacing:.1em;
  color:var(--txt);cursor:pointer;user-select:none;white-space:nowrap;
  flex-shrink:0;
}
.logo em{color:var(--teal);font-style:normal}

/* search */
.srch-wrap{flex:1;position:relative;max-width:340px}
.srch{
  width:100%;height:34px;
  background:var(--ink);
  border:1.5px solid var(--line);
  border-radius:8px;
  color:var(--txt);
  font-size:13px;
  padding:0 32px 0 34px;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.srch::placeholder{color:var(--txt3)}
.srch:focus{border-color:var(--pop);box-shadow:0 0 0 3px var(--pop-glow)}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;display:flex}
.srch-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt3);display:flex;padding:2px;border-radius:4px}
.srch-x:hover{color:var(--txt);background:var(--ink4)}

.hd-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0}

/* icon buttons */
.ibtn{
  width:34px;height:34px;border-radius:8px;
  background:var(--ink3);border:1.5px solid var(--line);
  color:var(--txt2);display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
}
.ibtn:hover{color:var(--txt);border-color:var(--line2)}
.ibtn.on{background:var(--pop-soft);border-color:var(--pop);color:var(--txt)}
.tbtn{
  height:34px;padding:0 12px;border-radius:8px;
  background:var(--ink3);border:1.5px solid var(--line);
  color:var(--txt2);font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:5px;
  transition:all .12s;white-space:nowrap;
}
.tbtn:hover{color:var(--txt);border-color:var(--line2)}
.tbtn.on{background:var(--pop-soft);border-color:var(--pop);color:var(--txt)}
.tbtn .ct{
  background:var(--pop);color:white;
  font-size:10px;font-weight:800;
  border-radius:999px;padding:1px 5px;line-height:1.5;
}

/* ── Body ── */
.body{flex:1;display:flex;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  width:var(--SIDEBAR);flex-shrink:0;
  background:var(--ink2);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .2s ease,opacity .2s ease;
}
.sidebar.closed{width:0;opacity:0;pointer-events:none;overflow:hidden}
.sb-top{
  padding:10px 14px 8px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.sb-top-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)}
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:16px}

/* Accordion sections */
.acc-sec{border-bottom:1px solid var(--line)}
.acc-hd{
  width:100%;display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:none;border:none;
  color:var(--txt);font-size:13px;font-weight:600;
  text-align:left;cursor:pointer;transition:background .1s;
}
.acc-hd:hover{background:var(--ink3)}
.acc-hd .sel-badge{
  margin-left:auto;
  background:var(--pop);color:white;
  font-size:10px;font-weight:800;
  border-radius:999px;padding:1px 6px;line-height:1.5;
}
.acc-hd .chev{margin-left:auto;color:var(--txt3);transition:transform .15s;flex-shrink:0}
.acc-hd .chev.open{transform:rotate(180deg)}
.acc-body{padding:4px 10px 10px}
.trait-search-inp{
  width:100%;height:28px;
  background:var(--ink);border:1.5px solid var(--line);
  border-radius:6px;color:var(--txt);
  font-size:11.5px;padding:0 8px;outline:none;
  margin-bottom:4px;transition:border-color .12s;
}
.trait-search-inp:focus{border-color:var(--pop)}
.trait-search-inp::placeholder{color:var(--txt3)}
.chkbox.on{background:var(--pop);border-color:var(--pop)}

/* Trait options */
.topt{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:5px 8px;
  background:none;border:none;border-radius:7px;
  color:var(--txt2);font-size:12.5px;font-weight:500;
  text-align:left;cursor:pointer;transition:all .1s;
}
.topt:hover{background:var(--ink3);color:var(--txt)}
.topt.sel{background:var(--pop-soft);color:var(--txt)}
.topt.zero{opacity:.38;cursor:not-allowed}
.topt.zero:hover{background:none}
.topt .chkbox{
  width:15px;height:15px;border-radius:4px;
  border:1.5px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .1s;background:transparent;
}
.topt.sel .chkbox{background:var(--pop);border-color:var(--pop)}
.topt .tthumb{
  width:26px;height:26px;border-radius:5px;
  background:var(--ink4);object-fit:contain;flex-shrink:0;
}
.topt .tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topt .tcnt{font-size:11px;color:var(--txt3);flex-shrink:0;font-variant-numeric:tabular-nums}

/* Family chips in sidebar */
.fam-grid{display:flex;flex-wrap:wrap;gap:5px;padding:6px 10px 10px}
.fam-c{
  display:flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:999px;
  border:1.5px solid var(--line);background:var(--ink3);
  color:var(--txt2);font-size:11.5px;font-weight:600;
  cursor:pointer;transition:all .1s;
}
.fam-c:hover{border-color:var(--line2);color:var(--txt)}
.fam-c.sel{border-color:var(--pop);background:var(--pop-soft);color:var(--txt)}
.fam-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Gallery pane ── */
.gallery-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Filter bar (active pills row) */
.filter-bar{
  padding:0 14px;height:44px;
  background:var(--ink2);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:6px;
  overflow-x:auto;flex-shrink:0;
}
.filter-bar::-webkit-scrollbar{height:0}
.fpill{
  display:flex;align-items:center;gap:4px;
  padding:3px 8px 3px 10px;
  border-radius:999px;
  background:var(--pop-soft);border:1px solid var(--pop);
  color:var(--txt);font-size:11.5px;font-weight:600;
  white-space:nowrap;flex-shrink:0;
}
.fpill button{background:none;border:none;color:var(--txt3);padding:0;line-height:1;font-size:15px;display:flex}
.fpill button:hover{color:var(--red)}
.clear-btn{
  background:none;border:none;color:var(--red);
  font-size:11px;font-weight:700;padding:3px 7px;
  border-radius:6px;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.clear-btn:hover{background:rgba(255,94,108,.1)}
.res-ct{
  margin-left:auto;flex-shrink:0;
  font-size:11.5px;color:var(--txt2);white-space:nowrap;
}
.res-ct b{font-family:'Space Mono',monospace;color:var(--teal);font-size:13px}

/* ── Grid ── */
.grid-scroll{flex:1;overflow-y:auto;padding:12px;overflow-x:hidden;contain:layout style;position:relative}
.grid-scroll.virtual{padding:0}
.nft-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:9px;
}
@media(max-width:480px){
  .nft-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
}

/* ── NFT card ── */
/* Skeleton shimmer */
@keyframes shimmer{
  0%{background-position:-400px 0}
  100%{background-position:400px 0}
}
@media(prefers-reduced-motion:reduce){
  .card,.nav-drawer,.sidebar,.sheet{transition:none!important;animation:none!important}
  .img-skeleton{animation:none!important;background:var(--ink4)!important}
  *{scroll-behavior:auto!important}
}
.img-skeleton{
  position:absolute;inset:0;
  background:linear-gradient(90deg,var(--ink3) 25%,var(--ink4) 50%,var(--ink3) 75%);
  background-size:400px 100%;
  animation:shimmer 1.4s ease-in-out infinite;
}
.card{
  background:var(--ink2);
  border:1.5px solid var(--line);
  border-radius:11px;overflow:hidden;
  cursor:pointer;
  transition:transform .12s,border-color .12s,box-shadow .12s;
  will-change:transform;
  /* Virtual grid handles visibility — no content-visibility needed */
}
.card:hover{
  transform:translateY(-3px);
  border-color:var(--pop);
  box-shadow:0 6px 20px var(--pop-glow);
}
.card:active{transform:translateY(-1px)}
.card-img{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--ink3)}
.card-img-fallback{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:var(--ink3);color:var(--txt3);font-size:10px;font-family:'Space Mono',monospace}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card-rank{
  position:absolute;top:0;left:0;
  background:var(--pop);color:white;
  font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
  padding:2px 6px;border-bottom-right-radius:7px;
}
.card-ip{
  position:absolute;top:4px;right:4px;
  background:rgba(245,197,66,.9);border-radius:50%;
  padding:2px;display:flex;
}
.card-info{padding:6px 8px 7px;text-align:center}
.card-id{font-size:11.5px;font-weight:700;color:var(--txt);line-height:1.2}
.card-score{
  font-family:'Space Mono',monospace;
  font-size:.85rem;color:var(--teal);
  line-height:1.2;margin-top:1px;
  letter-spacing:-.02em;
}
/* score tier glows */
.tier-s{box-shadow:0 0 10px rgba(0,212,184,.25);border-color:rgba(0,212,184,.4)!important}
.tier-a{box-shadow:0 0 8px rgba(91,82,255,.3);border-color:rgba(91,82,255,.45)!important}

/* Watchlist star on card */
.card-watch{
  position:absolute;bottom:4px;right:4px;
  background:rgba(0,0,0,.55);border:none;border-radius:50%;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;
  transition:color .1s,background .1s;z-index:2;padding:0;line-height:1;
}
.card-watch:hover{background:rgba(0,0,0,.8);color:var(--gold)}
.card-watch.on{color:var(--gold);background:rgba(0,0,0,.65)}

/* ETH price on card */
.card-eth{font-size:9.5px;color:var(--txt3);line-height:1.2;font-family:'Space Mono',monospace;letter-spacing:-.02em}


/* Modal price estimate */
.mprice{
  margin-top:5px;
  font-family:'Space Mono',monospace;font-size:.8rem;
  color:var(--green);line-height:1.3;
}
.mprice-usd{color:var(--txt3);font-size:.72rem}

/* Mobile sticky filter FAB */
.mobile-filter-fab{
  display:none;
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  height:44px;padding:0 24px;
  background:var(--ink2);border:1.5px solid var(--line2);
  border-radius:999px;
  color:var(--txt2);font-size:13px;font-weight:700;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  gap:8px;align-items:center;cursor:pointer;
  z-index:90;white-space:nowrap;
  transition:all .15s;
}
.mobile-filter-fab.active{border-color:var(--pop);color:var(--txt);background:var(--ink3)}
.fab-badge{
  background:var(--pop);color:white;
  border-radius:99px;padding:1px 6px;font-size:10px;font-weight:800;
}
@media(max-width:639px){
  .mobile-filter-fab{display:flex}
  /* give gallery a bottom padding so FAB doesn't cover last card */
  .grid-scroll{padding-bottom:80px}
  .grid-scroll.virtual{padding-bottom:0}
}

/* ── Bottom Tab Bar (mobile) ── */
.btab-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:56px;
  background:var(--ink2);
  border-top:1px solid var(--line);
  z-index:100;
  padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0);
}
.btab-bar-inner{
  display:flex;align-items:stretch;justify-content:space-around;
  height:100%;max-width:480px;margin:0 auto;
}
.btab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;color:var(--txt3);
  font-size:9px;font-weight:700;letter-spacing:.03em;
  cursor:pointer;transition:color .12s;position:relative;
  padding:4px 0 2px;
  -webkit-tap-highlight-color:transparent;
}
.btab.active{color:var(--teal)}
.btab.active::before{
  content:'';position:absolute;top:0;left:25%;right:25%;
  height:2px;background:var(--teal);border-radius:0 0 2px 2px;
}
.btab-icon{font-size:20px;line-height:1}
.btab-label{line-height:1;white-space:nowrap}
@media(max-width:600px){
  .btab-bar{display:block}
  /* Adjust body to not be covered by tab bar */
  .shell{padding-bottom:56px}
  /* Hide the old mobile filter FAB — tab bar replaces it */
  .mobile-filter-fab{bottom:68px!important}
  /* Hide old nav-current-pill — tab bar handles navigation */
  .nav-current-pill{display:none!important}
  .nav-hamburger{display:none!important}
}

/* ── Nav Drawer ── */
.nav-drawer-backdrop{
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
  opacity:0;transition:opacity .25s ease;
}
.nav-drawer-backdrop.open{opacity:1}
.nav-drawer{
  position:fixed;top:0;right:0;bottom:0;
  width:260px;max-width:82vw;
  background:var(--ink2);
  border-left:1px solid var(--line);
  display:flex;flex-direction:column;
  z-index:201;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  overscroll-behavior:contain;
}
.nav-drawer.open{transform:translateX(0)}
.nav-drawer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.nav-drawer-logo{
  font-family:'VT323',monospace;font-size:1.3rem;
  letter-spacing:.1em;color:var(--txt);
}
.nav-drawer-logo em{color:var(--teal);font-style:normal}
.nav-drawer-close{
  width:32px;height:32px;border-radius:8px;
  background:var(--ink3);border:1px solid var(--line);
  color:var(--txt2);display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.nav-drawer-close:hover{color:var(--txt);border-color:var(--line2)}
.nav-drawer-scroll{flex:1;overflow-y:auto;padding:8px 10px 20px;}
/* Pinned favourites section */
.nav-drawer-section-label{
  font-size:9px;font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:var(--txt3);
  padding:8px 6px 4px;
}
.nav-item{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:10px 12px;border-radius:10px;
  border:none;background:none;
  color:var(--txt2);font-size:14px;font-weight:600;
  text-align:left;cursor:pointer;
  transition:background .12s,color .12s;
  position:relative;
}
.nav-item:hover{background:var(--ink3);color:var(--txt)}
.nav-item.active{background:var(--pop-soft);color:var(--txt)}
.nav-item.active::before{
  content:'';position:absolute;right:0;top:20%;bottom:20%;
  width:3px;border-radius:2px;background:var(--pop);
}
.nav-item-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.nav-item-label{flex:1}
.nav-item-pin{
  width:24px;height:24px;border-radius:6px;border:none;
  background:none;color:var(--txt3);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  opacity:1;transition:color .1s;
  flex-shrink:0;
}
.nav-item-pin.pinned{color:#f59e0b}
.nav-item-pin:hover{color:#fbbf24}
/* Hamburger button in header */
.nav-hamburger{
  width:36px;height:36px;border-radius:9px;
  background:var(--ink3);border:1.5px solid var(--line);
  color:var(--txt2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;flex-shrink:0;cursor:pointer;
  transition:all .12s;
}
.nav-hamburger:hover{color:var(--txt);border-color:var(--line2)}
.nav-hamburger.active{background:var(--pop-soft);border-color:var(--pop);color:var(--txt)}
.nav-hamburger-bar{
  width:16px;height:2px;background:currentColor;border-radius:1px;
  transition:transform .2s,opacity .2s;
}
/* current view pill in header (mobile) */
.nav-current-pill{
  display:none;
  height:30px;padding:0 12px;border-radius:8px;
  background:var(--ink3);border:1px solid var(--line);
  color:var(--txt2);font-size:12px;font-weight:700;
  align-items:center;gap:5px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:130px;
}
@media(max-width:600px){
  .nav-current-pill{display:flex}
  .nav-hamburger{display:flex}
}
@media(min-width:601px){
  .nav-hamburger{display:none}
  .nav-drawer-backdrop,.nav-drawer{display:none!important}
}

/* ── Empty / loading ── */
.state-box{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;color:var(--txt2);padding:40px;text-align:center;
}
.state-box .big{
  font-family:'VT323',monospace;
  font-size:2.2rem;color:var(--txt3);letter-spacing:.06em;
}
.spinner{
  width:34px;height:34px;
  border:3px solid var(--line);
  border-top-color:var(--pop);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NFT Modal ── */
.mbd{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.82);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  padding:14px;
}
.mbox{
  background:var(--ink2);
  border:1px solid var(--line2);
  border-radius:18px;
  width:100%;max-width:660px;max-height:92vh;
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
.mclose{
  position:absolute;top:12px;right:12px;
  background:var(--ink3);border:1px solid var(--line);
  border-radius:8px;padding:4px;
  color:var(--txt2);display:flex;z-index:10;
  transition:color .1s;
}
.mclose:hover{color:var(--txt)}
.mclose-lbl{font-size:11px;font-weight:700;display:none}
.mhero{
  display:flex;gap:16px;
  padding:20px 20px 16px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.mimg{
  width:96px;height:96px;border-radius:12px;
  object-fit:contain;background:var(--ink3);
  border:1px solid var(--line);flex-shrink:0;
  animation:scoreReveal .35s cubic-bezier(.22,1,.36,1);
}
.mmeta{flex:1;min-width:0;position:relative}
.mid{font-family:'VT323',monospace;font-size:2rem;color:var(--txt);line-height:1}
.mscore{
  font-family:'Space Mono',monospace;
  font-size:1.9rem;color:var(--teal);line-height:1;
  margin:5px 0 3px;
  animation:scoreReveal .4s cubic-bezier(.22,1,.36,1);
}
@keyframes scoreReveal{0%{opacity:0;transform:translateY(8px) scale(.9)}100%{opacity:1;transform:translateY(0) scale(1)}}
.mscore-shimmer{
  background:linear-gradient(90deg,var(--teal),#fff,var(--teal));
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:scoreReveal .4s cubic-bezier(.22,1,.36,1),scoreShimmer 2s linear infinite;
}
@keyframes scoreShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.mslabel{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)}
.mrank{font-size:11px;color:var(--txt2);margin-top:4px;animation:scoreReveal .5s cubic-bezier(.22,1,.36,1) .1s both}
.mtabs{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.mtab{scroll-snap-align:center}
.mtab{
  flex:1;padding:10px 8px;
  background:none;border:none;
  font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--txt2);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .1s;
}
.mtab.on{color:var(--teal);border-bottom-color:var(--teal)}
.mbody{flex:1;overflow-y:auto;padding:16px}

/* ── Mobile modal: full-screen native bottom sheet ── */
@media(max-width:600px){
  .mbd{padding:0;align-items:flex-end}
  .mbox{
    max-width:100%;height:92vh;
    border-radius:22px 22px 0 0;
    border-left:none;border-right:none;border-bottom:none;
    animation:slideUp .28s cubic-bezier(.32,1,.56,1);
  }
  @keyframes slideUp{from{transform:translateY(80px);opacity:.3}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.view-fade{animation:fadeIn .2s ease-out}

  /* Modal top bar: drag handle left + close button right — no ::before needed */
  .mbox::before{content:none}
  .mmodal-topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px 6px;flex-shrink:0;
  }
  .mmodal-draghandle{
    width:40px;height:4px;border-radius:99px;background:var(--line2);flex-shrink:0;
  }

  /* Hero: row layout on mobile — compact image to the right */
  .mhero{
    flex-direction:row;
    padding:14px 14px 14px;
    gap:12px;
    align-items:flex-start;
  }
  .mimg{
    width:88px;height:88px;
    border-radius:10px;
    object-fit:contain;
    border:1px solid var(--line);
    flex-shrink:0;
    order:2;
  }
  .mmeta{
    flex:1;
    min-width:0;
    order:1;
  }
  .mid{font-size:1.6rem}
  .mscore{font-size:1.5rem;margin:2px 0 1px}
  .mslabel{font-size:9px}
  .mrank{font-size:10px;margin-top:2px}
  .mprice{font-size:.85rem;margin-top:2px}
  .mmeta>div[style*="flex"]{margin-top:6px;justify-content:flex-start}
  .mclose-lbl{display:inline}
  .mclose{
    position:static;
    background:var(--ink3);border:1px solid var(--line2);
    border-radius:8px;padding:5px 10px;
    display:flex;align-items:center;gap:5px;
    font-size:11px;font-weight:700;color:var(--txt2);
  }
  .mtabs{position:sticky;top:0;z-index:5;background:var(--ink2)}
  .mtab{font-size:10.5px;padding:10px 6px}
  .tgrid{grid-template-columns:repeat(2,1fr)}
}

/* Traits grid in modal */
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.tslot{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;
  background:var(--ink3);
  border:1px solid var(--line);border-radius:9px;
  min-height:56px;
  transition:border-color .15s, transform .1s, background .15s;
}
.tslot[title]:hover{transform:translateY(-1px);border-color:var(--line2);}
.tslot-img{
  width:32px;height:32px;border-radius:6px;
  object-fit:contain;background:var(--ink4);flex-shrink:0;
}
.tslot-none{
  width:32px;height:32px;border-radius:6px;
  background:var(--ink4);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--txt3);
}
.tslot-info{flex:1;min-width:0}
.tslot-cat{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3)}
.tslot-name{font-size:12px;font-weight:700;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tslot-sup{font-size:10px;color:var(--txt3)}
.tslot-bonus{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--teal);flex-shrink:0}

/* Score breakdown */
.stbl{width:100%;border-collapse:collapse}
.stbl td{padding:7px 4px;font-size:12px;border-bottom:1px solid var(--line);color:var(--txt2)}
.stbl td:last-child{text-align:right;font-family:'Space Mono',monospace;font-size:.85rem;color:var(--teal)}
.stbl tr.tot td{color:var(--txt);font-weight:700;border-bottom:none;padding-top:12px}
.stbl tr.tot td:last-child{font-size:1rem;color:var(--teal)}
/* Identity bars */
.id-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.id-lbl{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--txt);align-items:center}
.id-bar{width:100%;height:4px;background:var(--ink4);border-radius:99px;overflow:hidden}
.id-fill{height:100%;border-radius:99px}

/* ── Rarity tiers — font color only, no backgrounds ── */
:root {
  --r-uncommon: #7dd3fc;   /* light blue — clearly distinct from rare green */
  --r-rare:     #1eff00;
  --r-epic:     #a335ee;
  --r-legendary:#ff8000;
  --r-grail:    #e52b2b;
}
/* Slot rarity — NO background tints, font color is the only signal */
.tslot-name.r-uncommon { color: var(--r-uncommon) !important; font-weight:800; }
.tslot-name.r-rare     { color: var(--r-rare)     !important; font-weight:800; }
.tslot-name.r-epic     { color: var(--r-epic)     !important; font-weight:800; }
.tslot-name.r-legendary{ color: var(--r-legendary)!important; font-weight:800; }
.tslot-name.r-grail    { color: var(--r-grail)    !important; font-weight:800; }
.tslot-bonus.r-uncommon { color: var(--r-uncommon); }
.tslot-bonus.r-rare     { color: var(--r-rare); }
.tslot-bonus.r-epic     { color: var(--r-epic); }
.tslot-bonus.r-legendary{ color: var(--r-legendary); }
.tslot-bonus.r-grail    { color: var(--r-grail); }
.rarity-badge {
  display:inline-flex;align-items:center;
  font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;border:1px solid currentColor;
  flex-shrink:0;
}

/* ── Item detail sub-modal ── */
.item-mbd{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.88);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.item-mbox{
  background:var(--ink2);
  border:1px solid var(--line2);
  border-radius:18px;
  width:100%;max-width:340px;
  display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}
.item-mbox .mclose{position:static;margin:12px 12px 0 auto;flex-shrink:0}
.item-hero-img{
  width:180px;height:180px;
  object-fit:contain;border-radius:12px;
  background:var(--ink3);margin:0 auto 0;
  display:block;padding:8px;
}
.item-body{padding:16px 20px 24px}
.item-title{
  font-family:'VT323',monospace;
  font-size:1.6rem;line-height:1.1;
  margin-bottom:4px;
}
.item-desc{
  font-size:12.5px;color:var(--txt2);
  line-height:1.5;margin-bottom:12px;
  font-style:italic;
}
.item-meta-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;
}
.item-supply{color:var(--txt2)}
.item-supply b{color:var(--txt);font-weight:700}

/* ── Offers tab ── */
.offer-section{display:flex;flex-direction:column;gap:12px}
.offer-wallet-banner{
  background:var(--ink3);border:1px solid var(--line);
  border-radius:10px;padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.offer-wallet-addr{
  font-family:'Space Mono',monospace;
  font-size:10px;color:var(--teal);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.offer-connect-btn{
  height:32px;padding:0 14px;
  background:var(--pop);color:white;
  border:none;border-radius:8px;
  font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:background .1s;
}
.offer-connect-btn:hover{background:#6e66ff}
.offer-connect-btn:disabled{background:var(--ink4);color:var(--txt3);cursor:not-allowed}
.offer-form{
  background:var(--ink3);border:1px solid var(--line);
  border-radius:10px;padding:12px 14px;
  display:flex;flex-direction:column;gap:8px;
}
.offer-form-title{
  font-size:11px;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--txt3);
}
.offer-inp-row{display:flex;align-items:center;gap:6px}
.offer-prefix{font-size:13px;font-weight:700;color:var(--txt2);flex-shrink:0}
.offer-inp{
  flex:1;height:34px;min-width:0;
  background:var(--ink);border:1.5px solid var(--line);
  border-radius:7px;color:var(--txt);
  font-size:13px;font-family:'Space Mono',monospace;
  padding:0 10px;outline:none;
  transition:border-color .15s;
}
.offer-inp:focus{border-color:var(--pop)}
.offer-inp::placeholder{color:var(--txt3);font-family:'DM Sans',sans-serif;font-size:12px}
.offer-msg-inp{
  width:100%;min-height:58px;resize:none;
  background:var(--ink);border:1.5px solid var(--line);
  border-radius:7px;color:var(--txt);
  font-size:12.5px;font-family:'DM Sans',sans-serif;
  padding:8px 10px;outline:none;
  transition:border-color .15s;
  line-height:1.5;
}
.offer-msg-inp:focus{border-color:var(--pop)}
.offer-msg-inp::placeholder{color:var(--txt3)}
.offer-submit-btn{
  height:36px;
  background:var(--pop);color:white;
  border:none;border-radius:8px;
  font-size:13px;font-weight:700;
  cursor:pointer;transition:background .1s;
}
.offer-submit-btn:hover{background:#6e66ff}
.offer-submit-btn:disabled{background:var(--ink4);color:var(--txt3);cursor:not-allowed}
.offer-list{display:flex;flex-direction:column;gap:6px}
.offer-list-title{
  font-size:11px;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--txt3);
}
.offer-card{
  background:var(--ink3);border:1px solid var(--line);
  border-radius:9px;padding:10px 12px;
}
.offer-card-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:4px;
}
.offer-amount{
  font-family:'Space Mono',monospace;
  font-size:1rem;color:var(--teal);font-weight:700;
}
.offer-time{font-size:10px;color:var(--txt3)}
.offer-addr{font-size:10px;color:var(--txt2);margin-bottom:3px;font-family:'Space Mono',monospace}
.offer-msg-text{font-size:12px;color:var(--txt2);font-style:italic;line-height:1.4}
.offer-empty{
  text-align:center;padding:20px;
  font-size:13px;color:var(--txt3);
}
.offer-status{
  font-size:12px;padding:6px 10px;border-radius:7px;
  text-align:center;
}
.offer-status.ok{background:rgba(61,220,151,.12);color:var(--green)}
.offer-status.err{background:rgba(255,94,108,.1);color:var(--red)}
.offer-status.loading{background:rgba(91,82,255,.1);color:var(--txt2)}
/* ── Offer expiry + withdraw ── */
.offer-card-actions{display:flex;align-items:center;gap:8px;margin-top:6px}
.offer-withdraw-btn{font-size:10px;font-weight:700;color:var(--red);background:none;border:1px solid var(--red);border-radius:6px;padding:2px 8px;cursor:pointer;opacity:.8;transition:opacity .1s}
.offer-withdraw-btn:hover{opacity:1}
.offer-expiry{font-size:10px;color:var(--txt3)}
.offer-expiry.soon{color:#f59e0b}
.offer-expiry.expired{color:var(--red);opacity:.7}
.offer-badge-top{font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 7px;border-radius:5px;text-transform:uppercase;flex-shrink:0}
.offer-badge-top.best{background:rgba(61,220,151,.15);color:var(--green)}
.offer-badge-top.yours{background:rgba(91,82,255,.15);color:var(--pop)}
/* ── My Offers / Portfolio view ── */
.myoffers-wrap{max-width:720px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:20px}
.myoffers-hd{font-size:18px;font-weight:900;color:var(--txt);letter-spacing:-.01em}
.myoffers-wallet-row{display:flex;gap:8px;align-items:center}
.myoffers-wallet-inp{flex:1;height:38px;background:var(--ink3);border:1.5px solid var(--line);border-radius:9px;color:var(--txt);font-size:11px;font-family:'Space Mono',monospace;padding:0 12px;outline:none;transition:border-color .15s}
.myoffers-wallet-inp:focus{border-color:var(--pop)}
.myoffers-wallet-btn{height:38px;padding:0 18px;background:var(--pop);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .1s}
.myoffers-wallet-btn:hover{background:#6e66ff}
.myoffers-section-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.myoffers-bro-card{background:var(--ink3);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;gap:12px;align-items:flex-start}
.myoffers-bro-img{width:64px;height:64px;border-radius:9px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1.5px solid var(--line)}
.myoffers-bro-info{flex:1;min-width:0}
.myoffers-bro-id{font-size:13px;font-weight:900;color:var(--txt);cursor:pointer}
.myoffers-bro-id:hover{color:var(--teal)}
.myoffers-bro-meta{font-size:11px;color:var(--txt3);margin-bottom:6px}
.myoffers-incoming{display:flex;flex-direction:column;gap:5px}
.myoffers-offer-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--ink2);border-radius:7px;font-size:12px}
.myoffers-offer-amt{font-family:'Space Mono',monospace;font-weight:700;color:var(--teal);min-width:70px}
.myoffers-offer-wallet{font-family:'Space Mono',monospace;font-size:10px;color:var(--txt3);flex:1}
.myoffers-offer-time{font-size:10px;color:var(--txt3);white-space:nowrap}
.myoffers-empty{text-align:center;padding:32px 20px;font-size:13px;color:var(--txt3)}
.myoffers-no-offers{font-size:11px;color:var(--txt3);font-style:italic;padding:4px 0}
.myoffers-stats{display:flex;gap:12px;flex-wrap:wrap}
.myoffers-stat{background:var(--ink3);border:1px solid var(--line);border-radius:10px;padding:10px 14px;flex:1;min-width:100px;text-align:center}
.myoffers-stat-val{font-size:20px;font-weight:900;color:var(--teal);font-family:'Space Mono',monospace}
.myoffers-stat-lbl{font-size:10px;color:var(--txt3);margin-top:2px}
/* ── Feed upgrades ── */
.feed-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.feed-filter-btn{font-size:11px;font-weight:700;padding:4px 12px;border-radius:7px;border:1.5px solid var(--line);background:none;color:var(--txt2);cursor:pointer;transition:all .1s}
.feed-filter-btn.active{background:var(--pop);color:#fff;border-color:var(--pop)}
.sheet-bg{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.65);
}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--ink2);
  border-radius:18px 18px 0 0;
  border-top:1px solid var(--line);
  max-height:88vh;
  display:flex;flex-direction:column;overflow:hidden;
}
.sheet-handle{
  width:36px;height:4px;background:var(--line2);
  border-radius:2px;margin:10px auto 4px;flex-shrink:0;
}
.sheet-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 16px 12px;flex-shrink:0;
}
.sheet-title{font-size:15px;font-weight:700;color:var(--txt)}
.sheet-body{flex:1;overflow-y:auto}
.sheet-ft{
  padding:12px 16px;
  border-top:1px solid var(--line);
  flex-shrink:0;
}
.sheet-apply{
  width:100%;height:44px;
  background:var(--pop);color:white;
  border:none;border-radius:10px;
  font-size:14px;font-weight:700;
  cursor:pointer;transition:background .1s;
}
.sheet-apply:hover{background:#6e66ff}

/* ── Home screen ── */
.home{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 0 80px;
}
.home-hero{
  text-align:center;width:100%;
  padding:36px 16px 32px;
  background:linear-gradient(180deg, rgba(91,82,255,.12) 0%, rgba(0,212,184,.04) 50%, transparent 100%);
  border-bottom:1px solid var(--line);
  margin-bottom:24px;
  position:relative;
}
.home-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 80%, rgba(91,82,255,.08) 0%, transparent 50%),
             radial-gradient(ellipse at 80% 20%, rgba(0,212,184,.06) 0%, transparent 50%);
  pointer-events:none;
}
.home-hero-inner{max-width:460px;margin:0 auto;position:relative;z-index:1}
/* Activity feed */
.home-activity{
  width:100%;max-width:480px;margin:0 auto 20px;padding:0 16px;
}
.home-activity-lbl{
  font-size:9px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.home-activity-lbl::after{content:'';flex:1;height:1px;background:var(--line)}
.activity-feed{
  display:flex;flex-direction:column;gap:6px;
}
.activity-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;
  background:var(--ink3);border:1px solid var(--line);
  border-radius:10px;cursor:pointer;
  transition:border-color .12s,transform .12s;
}
.activity-row:hover{border-color:var(--pop);transform:translateX(2px)}
.activity-img{
  width:40px;height:40px;border-radius:8px;
  object-fit:cover;background:var(--ink4);flex-shrink:0;
  border:1px solid var(--line);
}
.activity-info{flex:1;min-width:0}
.activity-title{font-size:11px;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:4px}
.activity-detail{font-size:10px;color:var(--txt3);margin-top:1px;display:flex;align-items:center;gap:4px}
.activity-price{font-family:'Space Mono',monospace;font-weight:700;color:var(--teal)}
.activity-time{font-size:9px;color:var(--txt3);flex-shrink:0;white-space:nowrap}
.activity-mult{
  font-family:'Space Mono',monospace;font-size:10px;font-weight:800;
  padding:2px 6px;border-radius:5px;flex-shrink:0;
  background:rgba(91,82,255,.12);
}
/* Flagship badge */
.home-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 14px;border-radius:999px;
  background:rgba(0,212,184,.1);border:1px solid rgba(0,212,184,.3);
  font-size:10px;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--teal);
  margin-bottom:14px;
}
.home-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
/* Showcase strip — horizontal scroll of random NFTs */
.home-showcase-wrap{
  width:100%;max-width:480px;margin:0 auto 20px;padding:0 16px;
}
.home-showcase-lbl{
  font-size:9px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:8px;
}
.home-showcase{
  display:flex;gap:10px;overflow-x:auto;
  padding:0 0 6px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.home-showcase::-webkit-scrollbar{height:0}
.home-showcase-card{
  flex-shrink:0;width:90px;
  scroll-snap-align:center;
  cursor:pointer;transition:transform .12s;
}
.home-showcase-card:hover{transform:translateY(-2px)}
.home-showcase-card img{
  width:90px;height:90px;border-radius:10px;
  object-fit:cover;border:1.5px solid var(--line);
  background:var(--ink3);display:block;
}
.home-showcase-card .sc-id{
  font-size:8px;font-weight:700;color:var(--txt3);
  text-align:center;margin-top:3px;
  font-family:'Space Mono',monospace;
}
.home-showcase-card .sc-score{
  font-size:8px;font-weight:800;color:var(--teal);
  text-align:center;font-family:'Space Mono',monospace;
}
/* Quick stats row */
.home-qstats{
  display:flex;justify-content:center;gap:0;
  max-width:400px;width:100%;margin:0 auto 20px;
  background:var(--ink3);border:1px solid var(--line);
  border-radius:12px;overflow:hidden;
}
.home-qstat{
  flex:1;padding:10px 6px;text-align:center;
  border-right:1px solid var(--line);
}
.home-qstat:last-child{border-right:none}
.home-qstat-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:800;color:var(--txt);line-height:1.2}
.home-qstat-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:3px}
/* Feature cards */
.home-features{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  max-width:460px;width:100%;padding:0 16px;margin-bottom:24px;
}
@media(max-width:360px){.home-features{grid-template-columns:1fr}}
.home-feat{
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:12px;padding:14px 12px;
  cursor:pointer;transition:all .12s;
  display:flex;flex-direction:column;gap:4px;
}
.home-feat:hover{border-color:var(--pop);transform:translateY(-2px);box-shadow:0 4px 16px rgba(91,82,255,.15)}
.home-feat-icon{font-size:22px;line-height:1}
.home-feat-title{font-size:12px;font-weight:800;color:var(--txt)}
.home-feat-desc{font-size:10px;color:var(--txt3);line-height:1.4}
/* Collection health stats bar */
.home-stats{
  display:flex;align-items:center;justify-content:center;
  width:100%;max-width:480px;
  background:var(--ink3);border:1px solid var(--line);
  border-radius:14px;padding:14px 0;margin-bottom:28px;
}
.hs-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:0 8px}
.hs-val{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--txt);line-height:1}
.hs-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:2px}
.hs-div{width:1px;height:32px;background:var(--line);flex-shrink:0}
/* Bigger cards on mobile */
@media(max-width:520px){
  .grid-scroll>div{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))!important}
}
.home-eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.22em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:14px;
}
.home-h1{
  font-family:'VT323',monospace;
  font-size:clamp(2.4rem,8vw,3.4rem);
  color:var(--txt);line-height:1.05;margin-bottom:10px;
}
.home-h1 span{color:var(--teal)}
.home-sub{font-size:13px;color:var(--txt2);margin-bottom:26px;line-height:1.5}
.home-row{display:flex;gap:8px;width:100%}
.home-inp{
  flex:1;height:50px;
  background:var(--ink3);
  border:2px solid var(--line);
  border-radius:12px;color:var(--txt);
  font-family:'Space Mono',monospace;font-size:1.5rem;
  padding:0 14px;outline:none;text-align:center;
  transition:border-color .15s,box-shadow .15s;
}
.home-inp::placeholder{color:var(--txt3)}
.home-inp:focus{border-color:var(--pop);box-shadow:0 0 0 3px var(--pop-glow)}
.home-go{
  height:50px;padding:0 20px;
  background:var(--pop);color:white;
  border:none;border-radius:12px;
  font-family:'VT323',monospace;font-size:1.25rem;
  letter-spacing:.1em;cursor:pointer;flex-shrink:0;
  transition:background .1s;
}
.home-go:hover{background:#6e66ff}

/* quick result */
.qres{
  margin-top:14px;width:100%;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:13px;padding:13px 15px;
  display:flex;align-items:center;gap:13px;
  cursor:pointer;transition:border-color .12s;
}
.qres:hover{border-color:var(--pop)}
.qres-img{
  width:58px;height:58px;border-radius:10px;
  object-fit:cover;background:var(--ink4);flex-shrink:0;
}
.qres-score{font-family:'Space Mono',monospace;font-size:1.7rem;color:var(--teal);line-height:1}
.qres-lbl{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--txt3)}
.qres-hint{font-size:11px;color:var(--txt2);margin-top:2px}

/* Browse sections */
.browse{width:100%;max-width:720px}
.browse+.browse{margin-top:28px}
.browse-lbl{
  font-size:10px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:var(--txt3);
  margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.browse-lbl::after{content:'';flex:1;height:1px;background:var(--line)}
.fam-browse{display:flex;flex-wrap:wrap;gap:6px}
.fam-bchip{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:999px;
  background:var(--ink3);border:1.5px solid var(--line);
  color:var(--txt);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .1s;
}
.fam-bchip:hover{border-color:var(--pop);background:var(--pop-soft)}
.cat-browse{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cat-bchip{
  padding:11px 10px;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:10px;text-align:center;
  font-size:12.5px;font-weight:700;color:var(--txt);
  cursor:pointer;transition:all .1s;
}
.cat-bchip:hover{border-color:var(--pop);background:var(--pop-soft)}
.enc-chip{
  grid-column:span 3;
  padding:12px;
  background:rgba(91,82,255,.08);
  border:1.5px solid var(--pop);
  border-radius:10px;text-align:center;
  font-size:13px;font-weight:700;color:var(--txt);
  cursor:pointer;transition:all .1s;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.enc-chip:hover{background:var(--pop-soft)}

/* ── Trait co-occurrence explorer ── */
.cooc-wrap{padding:14px}
.cooc-header{margin-bottom:14px}
.cooc-selects{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.cooc-select{
  flex:1;min-width:140px;height:34px;
  background:var(--ink3);border:1.5px solid var(--line);
  color:var(--txt);border-radius:8px;padding:0 10px;
  font-size:12px;outline:none;cursor:pointer;
}
.cooc-select:focus{border-color:var(--pop)}
.cooc-selected-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:99px;
  background:var(--pop-soft);border:1.5px solid var(--pop);
  color:var(--txt);font-size:12px;font-weight:600;
}
.cooc-results{display:flex;flex-direction:column;gap:4px;margin-top:14px}
.cooc-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:8px;
  background:var(--ink3);border:1px solid var(--line);
  cursor:pointer;transition:border-color .1s;
}
.cooc-row:hover{border-color:var(--pop)}
.cooc-rank{font-size:10px;color:var(--txt3);width:18px;text-align:right;flex-shrink:0}
.cooc-name{flex:1;font-size:12px;font-weight:600;color:var(--txt);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cooc-cat{font-size:10px;color:var(--txt3);flex-shrink:0}
.cooc-bar-wrap{width:80px;height:4px;background:var(--ink4);border-radius:99px;overflow:hidden;flex-shrink:0}
.cooc-bar-fill{height:100%;border-radius:99px;background:var(--pop)}
.cooc-pct{font-family:'Space Mono',monospace;font-size:10px;color:var(--teal);width:36px;text-align:right;flex-shrink:0}
.cooc-count{font-size:10px;color:var(--txt3);width:32px;text-align:right;flex-shrink:0}

/* ── Holder distribution ── */
.holder-dist-page{padding:14px;display:flex;flex-direction:column;gap:16px;max-width:560px}
.holder-section{background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.holder-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;transition:background .1s;cursor:default}
.holder-row:hover{background:var(--ink3)}
.holder-rank{font-size:10px;color:var(--txt3);width:22px;text-align:right;flex-shrink:0;font-family:'Space Mono',monospace}
.holder-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.holder-name{font-size:12px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.holder-addr{font-size:10px;color:var(--txt3);font-family:'Space Mono',monospace}
.holder-addr-full{font-size:11px;color:var(--txt2);font-family:'Space Mono',monospace}
.holder-count-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;width:52px}
.holder-count{font-size:12px;font-weight:700;color:var(--teal);font-family:'Space Mono',monospace}
.holder-count-bar{height:2px;background:var(--teal);border-radius:99px;opacity:.5}
.holder-load-more{margin-top:10px;width:100%;padding:8px;background:var(--ink3);border:1px solid var(--line2);border-radius:8px;color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:border-color .1s,color .1s}
.holder-load-more:hover:not(:disabled){border-color:var(--pop);color:var(--txt)}
.holder-load-more:disabled{opacity:.5;cursor:not-allowed}
.holder-rank-card{background:var(--ink3);border:1px solid var(--line2);border-radius:10px;padding:10px 12px}
.holder-rank-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.holder-rank-val{font-family:'Space Mono',monospace;font-size:1.4rem;color:var(--teal)}
.holder-rank-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3)}

/* ── Wallet rank badge in sidebar ── */
.wallet-rank-badge{
  margin:8px 0 4px;padding:8px 10px;
  background:var(--teal-soft);border:1px solid rgba(0,212,184,.3);
  border-radius:8px;font-size:11.5px;color:var(--txt);
  display:flex;align-items:center;gap:8px;
}
.wallet-rank-badge b{color:var(--teal);font-family:'Space Mono',monospace}

/* ── Encyclopedia ── */
.enc-wrap{padding:14px}
.enc-cat{
  font-family:'VT323',monospace;
  font-size:1.3rem;color:var(--txt);letter-spacing:.07em;
  padding:6px 0 5px;
  border-bottom:1px solid var(--line);
  margin-bottom:9px;margin-top:22px;
}
.enc-cat:first-child{margin-top:0}
.enc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px}
.enc-card{
  display:flex;background:var(--ink3);
  border:1px solid var(--line);border-radius:9px;
  overflow:hidden;cursor:pointer;transition:border-color .1s;
  min-height:64px;
}
.enc-card:hover{border-color:var(--pop)}
.enc-twr{
  width:64px;flex-shrink:0;background:var(--ink4);
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--line);
}
.enc-img{width:44px;height:44px;object-fit:contain}
.enc-info{flex:1;padding:8px 10px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;overflow:hidden}
.enc-name{font-size:12px;font-weight:700;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.enc-ti{font-size:11px;color:var(--txt2);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.enc-sup{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--txt3)}

/* ── Wallet section ── */
.wallet-sec{border-bottom:1px solid var(--line)}
.wallet-body{padding:10px 14px 14px}
.wallet-input-row{display:flex;gap:6px;margin-bottom:8px}
.wallet-inp{
  flex:1;height:32px;min-width:0;
  background:var(--ink);border:1.5px solid var(--line);
  border-radius:7px;color:var(--txt);font-size:11px;
  padding:0 8px;outline:none;font-family:'Space Mono',monospace;
  transition:border-color .15s;
}
.wallet-inp::placeholder{color:var(--txt3);font-family:'DM Sans',sans-serif;font-size:11.5px}
.wallet-inp:focus{border-color:var(--pop)}
.wallet-fetch-btn{
  height:32px;padding:0 10px;flex-shrink:0;
  background:var(--pop);color:white;
  border:none;border-radius:7px;
  font-size:11.5px;font-weight:700;
  cursor:pointer;transition:background .1s;white-space:nowrap;
}
.wallet-fetch-btn:hover{background:#6e66ff}
.wallet-fetch-btn:disabled{background:var(--ink4);color:var(--txt3);cursor:not-allowed}
.wallet-status{
  font-size:11px;color:var(--txt3);
  display:flex;align-items:center;gap:5px;
  margin-bottom:6px;
}
.wallet-status.ok{color:var(--green)}
.wallet-status.err{color:var(--red)}
.wallet-status .mini-spin{
  width:11px;height:11px;border:1.5px solid var(--line2);
  border-top-color:var(--pop);border-radius:50%;
  animation:spin .6s linear infinite;flex-shrink:0;
}
.wallet-toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:4px;
}
.wallet-toggle-label{font-size:12px;font-weight:600;color:var(--txt2)}
.toggle-switch{
  position:relative;width:34px;height:18px;flex-shrink:0;cursor:pointer;
}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{
  position:absolute;inset:0;background:var(--ink4);
  border-radius:999px;border:1.5px solid var(--line2);
  transition:background .15s,border-color .15s;
}
.toggle-switch input:checked~.toggle-track{background:var(--pop);border-color:var(--pop)}
.toggle-knob{
  position:absolute;top:2px;left:2px;
  width:10px;height:10px;background:var(--txt3);
  border-radius:50%;transition:transform .15s,background .15s;
}
.toggle-switch input:checked~.toggle-knob{transform:translateX(16px);background:white}

/* ── Portfolio calculator ── */
.calc-sec{border-bottom:1px solid var(--line)}
.calc-body{padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px}
.calc-field{}
.calc-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:4px}
.calc-inp-row{display:flex;align-items:center;gap:5px}
.calc-prefix{font-size:12px;font-weight:700;color:var(--txt2);flex-shrink:0}
.calc-inp{
  flex:1;height:32px;min-width:0;
  background:var(--ink);border:1.5px solid var(--line);
  border-radius:7px;color:var(--txt);
  font-size:13px;font-family:'Space Mono',monospace;
  padding:0 8px;outline:none;
  transition:border-color .15s;
}
.calc-inp:focus{border-color:var(--pop)}
.calc-inp::placeholder{color:var(--txt3)}
.calc-results{
  background:var(--ink);border:1px solid var(--line);
  border-radius:9px;padding:10px 12px;
  margin-top:2px;
}
.calc-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 0;border-bottom:1px solid var(--line);font-size:12px;
}
.calc-row:last-child{border-bottom:none;padding-top:8px;margin-top:2px}
.calc-row-lbl{color:var(--txt2)}
.calc-row-val{font-family:'Space Mono',monospace;font-size:.82rem;color:var(--teal);text-align:right}
.calc-row-val.gold{color:var(--gold)}
.calc-row-val.green{color:var(--green)}
.calc-row-val.big{font-size:1rem;color:var(--teal)}
.calc-range-row{
  display:flex;gap:4px;align-items:center;margin-top:6px;
}
.calc-range-item{flex:1;text-align:center;background:var(--ink3);border-radius:7px;padding:5px 4px}
.calc-range-item .rv{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--teal)}
.calc-range-item .rl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:2px}
.calc-range-mid .rv{color:var(--gold)}
.calc-range-hi .rv{color:var(--green)}
.calc-no-wallet{
  font-size:11px;color:var(--txt3);
  text-align:center;padding:8px 0 4px;
  line-height:1.5;
}

/* ══════════════════════════════════════════
   NEW FEATURES CSS
══════════════════════════════════════════ */

/* ── Sort bar ── */
.sort-bar{
  display:flex;align-items:center;gap:6px;
  padding:0 14px;height:38px;
  background:var(--ink2);border-bottom:1px solid var(--line);
  flex-shrink:0;overflow-x:auto;
}
.sort-bar::-webkit-scrollbar{height:0}
.sort-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);white-space:nowrap;flex-shrink:0}
.sort-btn{
  height:26px;padding:0 10px;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:999px;color:var(--txt2);font-size:11.5px;font-weight:600;
  white-space:nowrap;flex-shrink:0;
  transition:all .1s;display:flex;align-items:center;gap:4px;
}
.sort-btn:hover{border-color:var(--line2);color:var(--txt)}
.sort-btn.on{background:var(--pop-soft);border-color:var(--pop);color:var(--txt)}
.sort-arrow{font-size:10px;opacity:.7}

/* ── Score range filter ── */
.score-range-body{padding:8px 14px 14px;display:flex;flex-direction:column;gap:8px}
.score-range-row{display:flex;gap:6px;align-items:center}
.score-range-inp{
  flex:1;height:30px;min-width:0;
  background:var(--ink);border:1.5px solid var(--line);
  border-radius:7px;color:var(--txt);
  font-size:12px;font-family:'Space Mono',monospace;
  padding:0 8px;outline:none;transition:border-color .15s;
}
.score-range-inp:focus{border-color:var(--pop)}
.score-range-sep{color:var(--txt3);font-size:12px;flex-shrink:0}
.score-range-tiers{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.score-tier-btn{
  padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;
  border:1.5px solid currentColor;background:transparent;cursor:pointer;
  transition:opacity .1s,background .1s;opacity:.6;
}
.score-tier-btn:hover,.score-tier-btn.on{opacity:1;background:rgba(255,255,255,.06)}

/* ── Rarity filter pills ── */
.rarity-filter-body{padding:6px 10px 10px;display:flex;flex-wrap:wrap;gap:5px}
.rarity-fbtn{
  padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;
  border:1.5px solid currentColor;background:transparent;cursor:pointer;
  transition:opacity .1s,background .1s;opacity:.55;
  display:flex;align-items:center;gap:4px;
}
.rarity-fbtn:hover,.rarity-fbtn.on{opacity:1;background:rgba(255,255,255,.07)}

/* ── IP Risk toggle ── */
.ip-toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
}
.ip-toggle-label{font-size:12px;font-weight:600;color:var(--txt2);display:flex;align-items:center;gap:6px}
.ip-warn-icon{color:var(--gold);display:flex}

/* ── Leaderboard ── */
.lb-wrap{padding:14px;display:flex;flex-direction:column;gap:8px}
.lb-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.lb-tab{
  height:28px;padding:0 12px;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:999px;color:var(--txt2);font-size:11.5px;font-weight:600;
  transition:all .1s;white-space:nowrap;
}
.lb-tab:hover{border-color:var(--line2);color:var(--txt)}
.lb-tab.on{background:var(--pop-soft);border-color:var(--pop);color:var(--txt)}
.lb-row{
  display:flex;align-items:center;gap:12px;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:12px;padding:10px 12px;cursor:pointer;
  transition:border-color .12s,transform .1s;
}
.lb-row:hover{border-color:var(--pop);transform:translateX(3px)}
.lb-rank{
  font-family:'VT323',monospace;font-size:1.6rem;color:var(--txt3);
  width:36px;text-align:center;flex-shrink:0;line-height:1;
}
.lb-rank.gold{color:var(--gold)}
.lb-rank.silver{color:#c0c0c0}
.lb-rank.bronze{color:#cd7f32}
.lb-img{width:56px;height:56px;border-radius:10px;object-fit:cover;background:var(--ink4);flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-id{font-family:'VT323',monospace;font-size:1.3rem;color:var(--txt);line-height:1}
.lb-score{font-family:'Space Mono',monospace;font-size:.95rem;color:var(--teal)}
.lb-meta{font-size:10.5px;color:var(--txt3);margin-top:2px}
.lb-badge{
  flex-shrink:0;padding:3px 8px;border-radius:6px;
  font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  border:1.5px solid currentColor;
}

/* ── Stats dashboard ── */
.stats-wrap{padding:14px;display:flex;flex-direction:column;gap:14px}
.stats-section-title{
  font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.stats-section-title::after{content:'';flex:1;height:1px;background:var(--line)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.stat-card{
  background:var(--ink3);border:1px solid var(--line);
  border-radius:10px;padding:10px 12px;
}
.stat-val{
  font-family:'Space Mono',monospace;
  font-size:1.4rem;color:var(--teal);line-height:1;margin-bottom:3px;
}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3)}
.stat-card.accent-pop .stat-val{color:var(--pop)}
.stat-card.accent-gold .stat-val{color:var(--gold)}
.stat-card.accent-green .stat-val{color:var(--green)}
.stat-card.accent-red .stat-val{color:var(--red)}
.dist-row{display:flex;flex-direction:column;gap:5px}
.dist-item{display:flex;align-items:center;gap:8px}
.dist-label{font-size:11px;font-weight:600;width:80px;flex-shrink:0}
.dist-bar-wrap{flex:1;height:6px;background:var(--ink4);border-radius:99px;overflow:hidden}
.dist-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.dist-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--txt3);width:32px;text-align:right;flex-shrink:0}

/* ── Bro Builder / Simulator ── */
.builder-wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
.builder-slots{display:flex;flex-direction:column;gap:6px}
.builder-slot{
  display:flex;align-items:center;gap:8px;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:9px;padding:7px 10px;cursor:pointer;
  transition:border-color .1s;
}
.builder-slot:hover{border-color:var(--line2)}
.builder-slot-img{width:30px;height:30px;border-radius:6px;object-fit:contain;background:var(--ink4);flex-shrink:0}
.builder-slot-cat{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3)}
.builder-slot-val{font-size:12px;font-weight:700;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.builder-slot-pts{font-family:'Space Mono',monospace;font-size:.78rem;margin-left:auto;flex-shrink:0}
.builder-result{
  background:var(--ink);border:1.5px solid var(--pop);
  border-radius:12px;padding:14px 16px;
  display:flex;flex-direction:column;gap:8px;
}
.builder-score-big{
  font-family:'VT323',monospace;font-size:3rem;color:var(--teal);
  line-height:1;text-align:center;
}
.builder-score-sub{font-size:11px;color:var(--txt3);text-align:center;margin-top:-4px}
.builder-fam-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:4px}
.builder-fam-pill{
  padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;
  border:1px solid rgba(255,255,255,.15);
}
.builder-picker{
  position:absolute;z-index:500;
  background:var(--ink2);border:1.5px solid var(--pop);
  border-radius:12px;
  max-height:260px;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  min-width:220px;
}
.builder-picker-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 12px;cursor:pointer;
  transition:background .1s;
}
.builder-picker-item:hover{background:var(--ink3)}
.builder-picker-img{width:28px;height:28px;border-radius:5px;object-fit:contain;background:var(--ink4);flex-shrink:0}
.builder-picker-name{font-size:12px;font-weight:600;color:var(--txt);flex:1}
.builder-picker-pts{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--teal);flex-shrink:0}
.builder-share-btn{
  height:34px;background:var(--pop);color:white;
  border:none;border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;transition:background .1s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.builder-share-btn:hover{background:#6e66ff}

/* ── Similar Bros in modal ── */
.similar-row{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px}
.similar-row::-webkit-scrollbar{height:3px}
.similar-card{
  flex-shrink:0;width:72px;cursor:pointer;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:9px;overflow:hidden;
  transition:border-color .1s,transform .1s;
}
.similar-card:hover{border-color:var(--pop);transform:translateY(-2px)}
.similar-card img{width:100%;aspect-ratio:1;object-fit:cover}
.similar-card-score{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--teal);text-align:center;padding:3px 0}

/* ── Offer activity feed ── */
.feed-wrap{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.feed-item{
  display:flex;align-items:center;gap:10px;
  background:var(--ink3);border:1px solid var(--line);
  border-radius:9px;padding:8px 10px;cursor:pointer;
  transition:border-color .1s;
}
.feed-item:hover{border-color:var(--line2)}
.feed-img{width:36px;height:36px;border-radius:7px;object-fit:cover;background:var(--ink4);flex-shrink:0}
.feed-info{flex:1;min-width:0}
.feed-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.feed-nft{font-size:12px;font-weight:700;color:var(--txt)}
.feed-amount{font-family:'Space Mono',monospace;font-size:.9rem;color:var(--teal);margin-left:auto;flex-shrink:0}
.feed-addr{font-size:10px;color:var(--txt3);font-family:'Space Mono',monospace}
.feed-time{font-size:10px;color:var(--txt3)}
.feed-msg{font-size:11px;color:var(--txt2);font-style:italic;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-empty{text-align:center;padding:20px;font-size:13px;color:var(--txt3)}
.feed-refresh{
  height:28px;padding:0 12px;font-size:11px;font-weight:700;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:7px;color:var(--txt2);cursor:pointer;
  transition:all .1s;
}
.feed-refresh:hover{border-color:var(--line2);color:var(--txt)}

/* ── Shareable card modal ── */
.share-mbd{
  position:fixed;inset:0;z-index:350;
  background:rgba(0,0,0,.88);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.share-mbox{
  background:var(--ink2);border:1px solid var(--line2);
  border-radius:18px;width:100%;max-width:380px;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
.share-canvas-wrap{
  background:var(--ink);display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.share-actions{padding:14px 18px;display:flex;gap:8px}
.share-dl-btn{
  flex:1;height:38px;background:var(--pop);color:white;
  border:none;border-radius:9px;font-size:13px;font-weight:700;
  cursor:pointer;transition:background .1s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.share-dl-btn:hover{background:#6e66ff}
.share-copy-btn{
  height:38px;padding:0 14px;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:9px;color:var(--txt2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .1s;white-space:nowrap;
}
.share-copy-btn:hover{border-color:var(--line2);color:var(--txt)}

/* ── Recently Viewed ── */
.recents-row{display:flex;gap:6px;overflow-x:auto;padding:10px 14px}
.recents-row::-webkit-scrollbar{height:0}
.recent-card{
  flex-shrink:0;width:56px;cursor:pointer;
  background:var(--ink3);border:1.5px solid var(--line);
  border-radius:8px;overflow:hidden;
  transition:border-color .1s,transform .1s;
}
.recent-card:hover{border-color:var(--pop);transform:translateY(-2px)}
.recent-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.recent-id{font-size:9px;color:var(--txt3);text-align:center;padding:2px 0}

/* ── Compare mode ── */
.compare-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:80;
  background:var(--ink2);border-top:2px solid var(--pop);
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  transform:translateY(100%);transition:transform .2s ease;
}
.compare-bar.open{transform:translateY(0)}
.compare-slots{display:flex;gap:6px;flex:1;overflow-x:auto}
.compare-slot{
  width:44px;height:44px;border-radius:8px;
  background:var(--ink3);border:1.5px dashed var(--line2);
  flex-shrink:0;overflow:hidden;position:relative;cursor:pointer;
  transition:border-color .1s;
}
.compare-slot.filled{border-style:solid;border-color:var(--pop)}
.compare-slot img{width:100%;height:100%;object-fit:cover}
.compare-slot .cs-rm{
  position:absolute;top:-3px;right:-3px;
  width:14px;height:14px;border-radius:50%;
  background:var(--red);color:white;font-size:9px;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--ink2);
}
.compare-count{font-size:11px;color:var(--txt2);white-space:nowrap;flex-shrink:0}
.compare-open-btn{
  height:36px;padding:0 14px;background:var(--pop);color:white;
  border:none;border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;transition:background .1s;white-space:nowrap;flex-shrink:0;
}
.compare-open-btn:hover{background:#6e66ff}
.compare-open-btn:disabled{background:var(--ink4);color:var(--txt3);cursor:not-allowed}
.compare-clear{
  height:36px;padding:0 10px;background:none;
  border:1.5px solid var(--line);border-radius:8px;
  color:var(--txt3);font-size:12px;font-weight:600;cursor:pointer;
  transition:all .1s;flex-shrink:0;
}
.compare-clear:hover{border-color:var(--red);color:var(--red)}

/* ── Compare modal ── */
.cmp-mbd{
  position:fixed;inset:0;z-index:250;
  background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;overflow:hidden;
}
.cmp-hd{
  padding:14px 18px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:var(--ink2);
}
.cmp-title{font-family:'VT323',monospace;font-size:1.6rem;color:var(--txt);letter-spacing:.08em}
.cmp-body{flex:1;overflow-x:auto;overflow-y:auto;padding:14px}
.cmp-table{border-collapse:collapse;width:100%;min-width:400px}
.cmp-table th{
  background:var(--ink3);padding:10px 12px;
  text-align:center;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);
  border:1px solid var(--line);
}
.cmp-table th.hero-col{width:120px}
.cmp-table td{
  padding:10px 12px;text-align:center;
  border:1px solid var(--line);font-size:12px;color:var(--txt2);
  vertical-align:middle;
}
.cmp-table td.row-label{
  text-align:left;font-size:10px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--txt3);background:var(--ink3);
  white-space:nowrap;
}
.cmp-table td.best{color:var(--teal);font-weight:800}
.cmp-nft-col{
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.cmp-nft-img{width:80px;height:80px;border-radius:10px;object-fit:cover;background:var(--ink4)}
.cmp-nft-id{font-family:'VT323',monospace;font-size:1.1rem;color:var(--txt)}
.cmp-nft-score{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--teal)}

/* ── Deep link toast ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink3);border:1px solid var(--pop);
  border-radius:10px;padding:9px 16px;
  font-size:12px;font-weight:600;color:var(--txt);
  z-index:400;pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Keyboard shortcut hint ── */
.kbd-hint{
  display:inline-flex;align-items:center;
  background:var(--ink4);border:1px solid var(--line2);
  border-radius:4px;padding:1px 5px;
  font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);
}

/* ── Grand Exchange ── */
.gx-wrap{padding:0 0 40px;max-width:720px;margin:0 auto}
.gx-header{
  padding:14px 14px 0;
  background:var(--ink2);
  margin-bottom:0;
}
.gx-sticky{
  position:sticky;top:0;z-index:10;
  background:var(--ink2);border-bottom:1px solid var(--line);
}
.gx-title{font-family:'VT323',monospace;font-size:1.7rem;color:var(--txt);letter-spacing:.06em;line-height:1}
.gx-tabs{display:flex;gap:4px;margin-top:10px;overflow-x:auto;padding-bottom:1px}
.gx-tab{
  flex:1;padding:8px 10px;
  background:none;border:none;border-bottom:2px solid transparent;
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--txt2);cursor:pointer;white-space:nowrap;transition:all .1s;
}
.gx-tab.on{color:var(--teal);border-bottom-color:var(--teal)}
.gx-filters{
  display:flex;flex-direction:column;gap:8px;
  padding:10px 14px;border-bottom:1px solid var(--line);
  background:var(--ink2);
}
.gx-cat-chips{display:flex;gap:5px;flex-wrap:wrap}
.gx-cat-chip{
  padding:4px 10px;font-size:11px;font-weight:700;
  background:var(--ink3);border:1px solid var(--line);border-radius:99px;
  color:var(--txt2);cursor:pointer;transition:all .1s;white-space:nowrap;
}
.gx-cat-chip.on{background:var(--teal-soft);border-color:var(--teal);color:var(--teal)}
.gx-cat-chip:hover{border-color:var(--line2);color:var(--txt)}
.gx-search-wrap{position:relative;display:flex;align-items:center}
.gx-search{
  width:100%;height:32px;padding:0 28px 0 10px;
  background:var(--ink3);border:1px solid var(--line);border-radius:8px;
  color:var(--txt);font-size:12px;outline:none;
}
.gx-search:focus{border-color:var(--pop)}
.gx-search-clear{
  position:absolute;right:6px;background:none;border:none;
  color:var(--txt3);cursor:pointer;padding:0;display:flex;font-size:14px;
}
/* Table */
.gx-table-head{
  display:grid;
  grid-template-columns:1fr 46px 40px 38px 60px 60px 66px;
  gap:2px;padding:6px 14px;
  border-bottom:1px solid var(--line);
  background:var(--ink2);
}
.gx-table-body{display:flex;flex-direction:column}
.gx-row{
  display:grid;
  grid-template-columns:1fr 46px 40px 38px 60px 60px 66px;
  gap:2px;padding:7px 14px;
  border-bottom:1px solid var(--ink4);
  cursor:pointer;transition:background .1s;align-items:center;
}
.gx-row:hover{background:var(--ink3)}
.gx-sort-btn{
  background:none;border:none;padding:0;font-size:10px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;color:var(--txt2);cursor:pointer;
  white-space:normal;line-height:1.3;text-align:left;display:block;width:100%;
}
.gx-sort-btn:hover{color:var(--txt)}
.gx-col-name{display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden}
.gx-col-score,.gx-col-supply,.gx-col-sales,.gx-col-price,.gx-col-prem,.gx-col-miss{
  display:flex;align-items:center;justify-content:flex-start;
  font-size:11px;
}
.gx-thumb{width:32px;height:32px;border-radius:6px;object-fit:contain;flex-shrink:0;background:var(--ink4)}
.gx-name-stack{display:flex;flex-direction:column;gap:2px;min-width:0;overflow:hidden}
.gx-trait-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gx-cat-badge{
  display:inline-flex;align-items:center;
  font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  border:1px solid;border-radius:4px;padding:1px 5px;width:fit-content;
}
/* Summary / KPIs */
.gx-summary{padding:14px}
.gx-kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.gx-kpi{
  background:var(--ink3);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;
}
.gx-kpi-val{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;line-height:1.2}
.gx-kpi-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:3px}
.gx-insight-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.gx-insight-card{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;background:var(--ink3);border:1px solid var(--line);
  border-radius:10px;cursor:pointer;transition:border-color .1s;
}
.gx-insight-card:hover{border-color:var(--pop)}
.gx-insight-icon{font-size:1.3rem;flex-shrink:0;margin-top:2px}
.gx-insight-img{width:40px;height:40px;border-radius:8px;object-fit:contain;background:var(--ink4);flex-shrink:0}
.gx-section-title{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
/* Scatter */
.gx-scatter-wrap{padding:14px}
/* Sale history rows */
.gx-sale-row:hover{background:var(--ink3)}
.gx-sale-id{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--teal)}
.gx-sale-date{font-size:9px;color:var(--txt2);white-space:nowrap}
.gx-sale-price{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--txt);text-align:right}
.gx-sale-di{font-family:'Space Mono',monospace;font-size:10px;text-align:center}
.gx-sale-model{display:flex;align-items:center;justify-content:center;}
.gx-view-btn{
  font-size:8px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  padding:2px 4px;border-radius:4px;border:1px solid;background:none;cursor:pointer;
  transition:opacity .1s,transform .1s;white-space:nowrap;
}
.gx-view-btn:hover{opacity:.75;transform:scale(1.05)}
/* Table scroll */
.gx-table-scroll{overflow-y:auto}
/* Mobile */
@media(max-width:600px){
  .gx-table-head,.gx-row{grid-template-columns:1fr 60px 80px 90px;padding:5px 8px}
  .gx-kpi-row{grid-template-columns:repeat(2,1fr)}
  .gx-thumb{width:26px;height:26px}

}

/* ── Responsive ── */
@media(max-width:600px){
  .sidebar{display:none}
  .nft-grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:7px}
  .tgrid{grid-template-columns:1fr}
  .cat-browse{grid-template-columns:repeat(2,1fr)}
  .enc-chip{grid-column:span 2}
  .desktop-only{display:none!important}
  .home{padding-bottom:60px}
}
@media(min-width:601px){
  .mobile-only{display:none!important}
}

function injectIcons() {
  // Apple touch icon
  let appleLink = document.querySelector('link[rel="apple-touch-icon"]');
  if (!appleLink) { appleLink = document.createElement('link'); appleLink.rel = 'apple-touch-icon'; document.head.appendChild(appleLink); }
  appleLink.href = ICON_180;

  // Favicon
  let favicon = document.querySelector('link[rel="icon"]');
  if (!favicon) { favicon = document.createElement('link'); favicon.rel = 'icon'; favicon.type = 'image/png'; document.head.appendChild(favicon); }
  favicon.href = ICON_32;

  // Manifest
  const manifest = {
    name: 'Hemi Bros',
    short_name: 'HemiBros',
    description: 'Hemi Bros NFT rarity checker, Grand Exchange and analytics.',
    start_url: './',
    display: 'standalone',
    background_color: '#0b0c14',
    theme_color: '#0b0c14',
    orientation: 'portrait-primary',
    categories: ['finance', 'utilities'],
    icons: [
      { src: ICON_192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: ICON_512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const manifestURL = URL.createObjectURL(manifestBlob);
  let manifestLink = document.querySelector('link[rel="manifest"]');
  if (!manifestLink) { manifestLink = document.createElement('link'); manifestLink.rel = 'manifest'; document.head.appendChild(manifestLink); }
  manifestLink.href = manifestURL;
}

// Inject immediately — no network call needed
injectIcons();

// 5. Register service worker (inline via blob)
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'hemi-bros-v1';
const CORE = [self.registration.scope];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(CORE)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  // Cache-first for the app shell; network-first for CSV data
  const url = new URL(e.request.url);
  const isData = url.hostname.includes('cdn.jsdelivr') ||
                 url.hostname.includes('raw.githubusercontent') ||
                 url.hostname.includes('fonts.googleapis') ||
                 url.hostname.includes('unpkg.com');

  if (isData) {
    // Network first, fall back to cache
    e.respondWith(
      fetch(e.request).then(r => {
        if (r.ok) {
          const clone = r.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return r;
      }).catch(() => caches.match(e.request))
    );
  } else {
    // Cache first (app shell)
    e.respondWith(
      caches.match(e.request).then(cached => cached ||
        fetch(e.request).then(r => {
          const clone = r.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return r;
        })
      )
    );
  }
});
`;
  const swBlob = new Blob([swCode], {type: 'text/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, {scope: './'})
    .then(reg => console.log('[SW] Registered', reg.scope))
    .catch(err => console.warn('[SW] Registration failed (normal on file://):', err));
}

// 6. Install prompt — store the beforeinstallprompt event for the UI banner
window._pwaInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  window._pwaInstallPrompt = e;
  window.dispatchEvent(new Event('pwaInstallReady'));
});

window.addEventListener('appinstalled', () => {
  window._pwaInstallPrompt = null;
  window.dispatchEvent(new Event('pwaInstalled'));
});

})();
</script>
