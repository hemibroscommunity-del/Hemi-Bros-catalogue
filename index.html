const Encyclopedia=({traitMap,onPick})=>{
  const grouped=useMemo(()=>{
    const g={};
    CATS.forEach(c=>g[c]=[]);
    Object.values(traitMap).forEach(t=>{if(t.Category&&g[t.Category]) g[t.Category].push(t);});
    CATS.forEach(c=>g[c].sort((a,b)=>(parseInt(b.Supply)||0)-(parseInt(a.Supply)||0)));
    return g;
  },[traitMap]);
  return(
    <div className="enc-wrap">
      {CATS.map(cat=>{
        const traits=grouped[cat];if(!traits?.length) return null;
        return(
          <div key={cat}>
            <div className="enc-cat">{cat.toUpperCase()}</div>
            <div className="enc-grid">
              {traits.map(t=>(
                <div className="enc-card" key={t['Unique Item List']} onClick={()=>onPick(t.Category,t['Unique Item List'])}>
                  <div className="enc-twr">
                    {t['Unique Item List'].toLowerCase()!=='none'
                      ?<TraitImg className="enc-img" src={t.thumbnailUrl} alt={t['Unique Item List']}/>
                      :<span style={{color:'var(--txt3)'}}>{I.none}</span>}
                  </div>
                  <div className="enc-info">
                    <div><div className="enc-name">{t['Unique Item List']}</div>{t.Title&&<div className="enc-ti">"{t.Title}"</div>}</div>
                    <div className="enc-sup">×{t.Supply||'?'}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
};

/* ════════════════════════════════════
   LEADERBOARD VIEW
════════════════════════════════════ */
const Leaderboard = ({nfts, traitMap, onSelect}) => {
  const [lbTab, setLbTab] = useState('overall');
  const TABS = [
    {k:'overall', label:'Top Bros'},
    ...CATS.map(c=>({k:c, label:c})),
  ];

  const rows = useMemo(()=>{
    if(lbTab==='overall') return [...nfts].sort((a,b)=>b.diScore-a.diScore).slice(0,25);
    // Category tabs: one row per UNIQUE TRAIT, ranked by adjustedScore desc — no repetition
    const catTraits = Object.values(traitMap)
      .filter(d => d.Category === lbTab && (parseInt(d.Supply)||0) > 0)
      .sort((a,b) => (b.adjustedScore||0) - (a.adjustedScore||0))
      .slice(0, 25);
    return catTraits.map(detail => {
      const name = detail['Unique Item List'];
      const exampleNft = nfts.find(n => {
        const v = n[lbTab]; if(!v) return false;
        return String(v).split('(')[0].trim().toLowerCase() === name.toLowerCase();
      });
      return { name, detail, exampleNft, score: detail.adjustedScore||0, isTraitRow: true };
    });
  },[nfts, lbTab, traitMap]);

  const rankCls = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';

  return (
    <div className="lb-wrap">
      <div className="lb-tabs">
        {TABS.map(t=>(
          <button key={t.k} className={`lb-tab ${lbTab===t.k?'on':''}`} onClick={()=>setLbTab(t.k)}>{t.label}</button>
        ))}
      </div>
      {rows.map((row,i)=>{
        if(row.isTraitRow){
          const {name, detail, exampleNft, score} = row;
          const rarity = getRarityTier(score);
          return(
            <div key={name} className="lb-row"
              onClick={()=>exampleNft&&onSelect(exampleNft)}
              style={{cursor:exampleNft?'pointer':'default'}}
            >
              <div className={`lb-rank ${rankCls(i)}`}>{i===0?'👑':i+1}</div>
              <TraitImg className="lb-img" src={detail.thumbnailUrl} alt={name}/>
              <div className="lb-info">
                <div className="lb-id" style={{fontSize:13,color:'var(--txt)'}}>{name}</div>
                <div className="lb-score" style={{fontSize:'1rem'}}>{score.toFixed(1)}</div>
                <div className="lb-meta">×{detail.Supply||'?'} supply{exampleNft?` · e.g. #${exampleNft.ID}`:''}</div>
              </div>
              {rarity&&<div className="lb-badge" style={{color:rarity.color,borderColor:rarity.color}}>{rarity.tier}</div>}
            </div>
          );
        }
        // Overall tab — NFT rows
        const nft = row;
        let badgeRarity = null, topScore = 0;
        CATS.forEach(cat=>{
          const val = nft[cat]; if(!val) return;
          const name = String(val).split('(')[0].trim();
          const sc = traitMap[tk(cat,name)]?.adjustedScore||0;
          if(sc > topScore){ topScore = sc; badgeRarity = getRarityTier(sc); }
        });
        return(
          <div key={nft.ID} className="lb-row" onClick={()=>onSelect(nft)}>
            <div className={`lb-rank ${rankCls(i)}`}>{i===0?'👑':i+1}</div>
            <img className="lb-img" src={nft.Image} alt={`#${nft.ID}`} loading="lazy"/>
            <div className="lb-info">
              <div className="lb-id">#{nft.ID}</div>
              <div className="lb-score">{fmtScore(nft)}</div>
              <div className="lb-meta">Rank #{nft.rank} · {nft.dominantFamilies[0]||'—'}</div>
            </div>
            {badgeRarity&&<div className="lb-badge" style={{color:badgeRarity.color,borderColor:badgeRarity.color}}>{badgeRarity.tier}</div>}
          </div>
        );
      })}
    </div>
  );
};

/* ════════════════════════════════════
   STATS DASHBOARD
════════════════════════════════════ */
const StatsDashboard = ({nfts, traitMap}) => {
  const stats = useMemo(()=>{
    if(!nfts.length) return null;
    const scores = nfts.map(n=>n.diScore);
    const total = nfts.length;
    const avg = scores.reduce((a,b)=>a+b,0)/total;
    // Rarity distribution is TRAIT-LEVEL not NFT-level.
    // Bucket each unique trait by its adjusted score (< 10 = Common, per scoring system).
    // None traits (adjustedScore ~0.03–1.05) correctly land in Common.
    const tiers = {Grail:0,Legendary:0,Epic:0,Rare:0,Uncommon:0,Common:0};
    let traitTotalCount = 0;
    Object.values(traitMap).forEach(detail=>{
      const sup = parseInt(detail.Supply)||0;
      if(!sup) return; // skip traits with no supply data
      const score = detail.adjustedScore||0;
      const r = getRarityTier(score);
      tiers[r ? r.tier : 'Common'] += sup;  // sum quantities, not unique trait count
      traitTotalCount += sup;
    });
    // Most and least common trait per category (exclude None from rarest display — it's a meta-trait)
    const traitFreq = {};
    CATS.forEach(cat=>{
      const counts = {};
      nfts.forEach(n=>{
        const v = n[cat]; if(!v) return;
        const name = String(v).split('(')[0].trim();
        if(name.toLowerCase()==='none') return; // None is valid but skip for rarest-named-trait display
        counts[name]=(counts[name]||0)+1;
      });
      const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
      traitFreq[cat] = {most:sorted[0], least:sorted[sorted.length-1]};
    });
    const top = [...nfts].sort((a,b)=>b.diScore-a.diScore)[0];
    const bottom = [...nfts].sort((a,b)=>a.diScore-b.diScore)[0];

    // Floor multiple cohorts — group NFTs by their displayMultiple label.
    // NFTs with a range label (e.g. "10x - 30x") get grouped as-is.
    // NFTs with a numeric multiple get grouped by their value.
    // NFTs with neither get a fallback label from their DI score.
    const multiples = {};
    nfts.forEach(n=>{
      let label;
      const dm = n.displayMultiple;
      if(dm != null && String(dm).trim() && String(dm).trim() !== 'null'){
        const s = String(dm).trim();
        // Range string like "10x - 30x" or numeric
        label = isNaN(Number(s.replace(/,/g,''))) ? s : `${parseFloat(s.replace(/,/g,''))}x`;
      } else {
        // Fallback: derive approximate multiple from DI score
        const sc = n.diScore;
        if(sc>=300) label='30x – 50x';
        else if(sc>=150) label='10x – 30x';
        else if(sc>=45)  label='5x – 10x';
        else if(sc>=25)  label='3x – 5x';
        else if(sc>=10)  label='2x – 3x';
        else             label='1x – 2x';
      }
      multiples[label] = (multiples[label]||0) + 1;
    });
    // Sort cohorts: try to sort by the lower bound number descending
    const parseMultLow = lbl => {
      const m = String(lbl).match(/^(\d+\.?\d*)/);
      return m ? parseFloat(m[1]) : 0;
    };
    const multipleCohorts = Object.entries(multiples)
      .sort((a,b) => parseMultLow(b[0]) - parseMultLow(a[0]));

    return {total,avg,tiers,traitFreq,top,bottom,traitTotalCount,multipleCohorts};
  },[nfts]);

  if(!stats) return <div style={{padding:20,color:'var(--txt3)',fontSize:13}}>Loading…</div>;
  const RARITY_ORDER = ['Grail','Legendary','Epic','Rare','Uncommon','Common'];
  const RARITY_COLORS = {Grail:'var(--r-grail)',Legendary:'var(--r-legendary)',Epic:'var(--r-epic)',Rare:'var(--r-rare)',Uncommon:'var(--r-uncommon)',Common:'var(--txt3)'};

  return (
    <div className="stats-wrap">
      {/* Key numbers */}
      <div>
        <div className="stats-section-title">Collection Overview</div>
        <div className="stats-grid">
          <div className="stat-card"><div className="stat-val">{stats.total.toLocaleString()}</div><div className="stat-lbl">Total Bros</div></div>
          <div className="stat-card accent-teal"><div className="stat-val">{stats.avg.toFixed(1)}</div><div className="stat-lbl">Avg Score</div></div>
          <div className="stat-card accent-gold"><div className="stat-val">{fmtScore(stats.top)}</div><div className="stat-lbl">Highest Score</div></div>
          <div className="stat-card accent-pop"><div className="stat-val">{stats.tiers.Grail}</div><div className="stat-lbl">Grails 🔴</div></div>
        </div>
      </div>

      {/* Floor multiple cohorts — how many NFTs in each price tier */}
      <div>
        <div className="stats-section-title">Floor Multiple Cohorts
          <span style={{fontWeight:400,fontSize:9,textTransform:'none',letterSpacing:0,color:'var(--txt3)',marginLeft:4}}>NFTs per price tier</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {stats.multipleCohorts.map(([label,count])=>{
            const pct = stats.total > 0 ? count/stats.total*100 : 0;
            // Color by approximate tier — higher multiple = warmer color
            const lo = parseFloat(String(label).match(/^(\d+\.?\d*)/)?.[1]||0);
            const color = lo>=30?'var(--r-grail)':lo>=10?'var(--r-legendary)':lo>=5?'var(--r-epic)':lo>=3?'var(--r-rare)':lo>=2?'var(--r-uncommon)':'var(--txt3)';
            return(
              <div key={label} className="dist-item">
                <div className="dist-label" style={{color,fontWeight:700,minWidth:80}}>{label}</div>
                <div className="dist-bar-wrap">
                  <div className="dist-bar-fill" style={{
                    width:`${Math.max(pct,count>0?1:0)}%`,
                    background:color,opacity:.85
                  }}/>
                </div>
                <div className="dist-count">{count.toLocaleString()}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Rarity distribution — trait level */}
      <div>
        <div className="stats-section-title">Trait Rarity Distribution <span style={{fontWeight:400,fontSize:9,textTransform:'none',letterSpacing:0,color:'var(--txt3)',marginLeft:4}}>({stats.traitTotalCount.toLocaleString()} total trait instances)</span></div>
        <div className="dist-row">
          {RARITY_ORDER.map(tier=>{
            const count = stats.tiers[tier]||0;
            const maxCount = Math.max(...RARITY_ORDER.map(t=>stats.tiers[t]||0));
            const pct = maxCount > 0 ? (count/maxCount*100) : 0;
            return(
              <div key={tier} className="dist-item">
                <div className="dist-label" style={{color:RARITY_COLORS[tier],fontWeight:700}}>{tier}</div>
                <div className="dist-bar-wrap">
                  <div className="dist-bar-fill" style={{width:`${Math.max(pct,count>0?2:0)}%`,background:RARITY_COLORS[tier]}}/>
                </div>
                <div className="dist-count">{count}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Rarest traits */}
      <div>
        <div className="stats-section-title">Rarest Traits</div>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {CATS.map(cat=>{
            const {least} = stats.traitFreq[cat]||{};
            if(!least) return null;
            return(
              <div key={cat} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 10px',background:'var(--ink3)',borderRadius:8,border:'1px solid var(--line)'}}>
                <div>
                  <div style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)'}}>{cat}</div>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--txt)'}}>{least[0]}</div>
                </div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:'.8rem',color:'var(--r-grail)'}}>{least[1]} <span style={{fontSize:9,color:'var(--txt3)'}}>supply</span></div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════
   BRO BUILDER
════════════════════════════════════ */
const BroBuilder = ({traitMap, nfts, onSelect}) => {
  const [selections, setSelections] = useState({});
  const [pickerCat,  setPickerCat]  = useState(null);
  const [pickerRef,  setPickerRef]  = useState(null);
  const pickerContainerRef = useRef(null);

  useEffect(()=>{
    const handler = e => {
      if(pickerContainerRef.current && !pickerContainerRef.current.contains(e.target)) setPickerCat(null);
    };
    document.addEventListener('mousedown', handler);
    return ()=>document.removeEventListener('mousedown', handler);
  },[]);

  // Build options per category from traitMap
  const opts = useMemo(()=>{
    const o = {};
    CATS.forEach(cat=>{
      const items = [];
      Object.entries(traitMap).forEach(([key, detail])=>{
        if(!key.startsWith(cat.trim().toLowerCase()+':')) return;
        const name = key.split(':').slice(1).join(':');
        items.push({name: name.charAt(0).toUpperCase()+name.slice(1), detail, score: detail.adjustedScore||0});
      });
      o[cat] = items.sort((a,b)=>b.score-a.score);
    });
    return o;
  },[traitMap]);

  // Calculate builder score
  const result = useMemo(()=>{
    let total = 0;
    const famTot = {};
    CATS.forEach(cat=>{
      const sel = selections[cat];
      if(!sel) return;
      total += sel.score;
      if(sel.detail?.tags) Object.entries(sel.detail.tags).forEach(([t,s])=>{
        famTot[t]=(famTot[t]||0)+(typeof s==='number'?s:parseFloat(s)||0);
      });
    });
    const fams = Object.entries(famTot).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const rarity = getRarityTier(total);
    return {total, fams, rarity};
  },[selections]);

  // Find the closest real Bro to this build
  const closestBro = useMemo(()=>{
    if(Object.keys(selections).length < 2) return null;
    const selCats = Object.keys(selections);
    let best = null, bestScore = -1;
    nfts.forEach(n=>{
      let matches = 0;
      selCats.forEach(cat=>{
        const val = n[cat];
        if(!val) return;
        const name = String(val).split('(')[0].trim().toLowerCase();
        if(name === selections[cat].name.toLowerCase()) matches++;
      });
      if(matches > bestScore){bestScore=matches;best=n;}
    });
    return bestScore > 0 ? {nft:best,matches:bestScore} : null;
  },[selections, nfts]);

  const clear = () => setSelections({});

  return (
    <div className="builder-wrap" ref={pickerContainerRef}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:11,color:'var(--txt3)'}}>Pick traits to build your dream Bro</div>
        {Object.keys(selections).length>0&&<button onClick={clear} style={{fontSize:11,color:'var(--red)',background:'none',border:'none',cursor:'pointer',fontWeight:700}}>Reset</button>}
      </div>

      <div className="builder-slots">
        {CATS.map(cat=>{
          const sel = selections[cat];
          const rarity = sel ? getRarityTier(sel.score) : null;
          return(
            <div key={cat} style={{position:'relative'}}>
              <div className="builder-slot" onClick={()=>setPickerCat(pickerCat===cat?null:cat)}>
                <TraitImg className="builder-slot-img" src={sel?.detail?.thumbnailUrl} alt={sel?.name}/>
                <div style={{flex:1,minWidth:0}}>
                  <div className="builder-slot-cat">{cat}</div>
                  <div className="builder-slot-val" style={{color:rarity?rarity.color:'var(--txt2)'}}>{sel?sel.name:'— Any —'}</div>
                </div>
                {sel&&sel.score>0&&<div className="builder-slot-pts" style={{color:rarity?rarity.color:'var(--teal)'}}>+{sel.score.toFixed(1)}</div>}
                <span style={{color:'var(--txt3)',fontSize:10,marginLeft:4}}>{pickerCat===cat?'▲':'▼'}</span>
              </div>
              {pickerCat===cat&&(
                <div className="builder-picker" style={{top:'100%',left:0,right:0,marginTop:4}}>
                  <div
                    className="builder-picker-item"
                    onClick={()=>{ setSelections(s=>{ const ns={...s}; delete ns[cat]; return ns;}); setPickerCat(null); }}
                  >
                    <div className="builder-picker-img" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--txt3)'}}>{I.none}</div>
                    <div className="builder-picker-name" style={{color:'var(--txt3)'}}>— None —</div>
                  </div>
                  {opts[cat]?.map(item=>(
                    <div key={item.name} className="builder-picker-item" onClick={()=>{setSelections(s=>({...s,[cat]:item}));setPickerCat(null);}}>
                      <TraitImg className="builder-picker-img" src={item.detail?.thumbnailUrl} alt={item.name}/>
                      <div className="builder-picker-name">{item.name}</div>
                      {item.score>0&&<div className="builder-picker-pts">+{item.score.toFixed(1)}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {Object.keys(selections).length>0&&(
        <div className="builder-result">
          <div className="builder-score-big">{result.total.toFixed(1)}</div>
          <div className="builder-score-sub" style={{color:result.rarity?result.rarity.color:'var(--txt3)'}}>
            {result.rarity?result.rarity.tier+' Tier':'No rarity tier'}
          </div>
          {result.fams.length>0&&(
            <div className="builder-fam-row">
              {result.fams.map(([name,score])=>(
                <div key={name} className="builder-fam-pill" style={{color:FAM_COLORS[name]||FAM_COLORS.default,background:`${FAM_COLORS[name]||FAM_COLORS.default}18`}}>
                  {name} {score.toFixed(0)}pts
                </div>
              ))}
            </div>
          )}
          {closestBro&&(
            <div style={{marginTop:6,textAlign:'center'}}>
              <div style={{fontSize:10,color:'var(--txt3)',marginBottom:5}}>Closest real match ({closestBro.matches} traits)</div>
              <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center',cursor:'pointer',background:'var(--ink3)',borderRadius:8,padding:'6px 10px',border:'1px solid var(--line)'}} onClick={()=>onSelect(closestBro.nft)}>
                <img src={closestBro.nft.Image} alt="" style={{width:32,height:32,borderRadius:6,objectFit:'cover'}}/>
                <div style={{fontSize:12}}>
                  <div style={{fontWeight:700,color:'var(--txt)'}}>#{closestBro.nft.ID}</div>
                  <div style={{fontFamily:'Space Mono,monospace',fontSize:'.78rem',color:'var(--teal)'}}>{fmtScore(closestBro.nft)}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   SHARE CARD (Canvas)
════════════════════════════════════ */
const ShareCard = ({nft, onClose}) => {
  const canvasRef = useRef(null);
  const [copied, setCopied] = useState(false);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas||!nft) return;
    const ctx = canvas.getContext('2d');
    const W=400, H=400;
    canvas.width=W; canvas.height=H;

    const rarity = getRarityTier(nft.diScore);
    const accentColor = rarity ? rarity.color : '#00d4b8';
    const famColor = FAM_COLORS[nft.dominantFamilies[0]]||FAM_COLORS.default;

    // Background gradient
    const bg = ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#0b0c14');
    bg.addColorStop(1,'#12141f');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Accent border
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 3;
    ctx.strokeRect(2,2,W-4,H-4);

    // Corner decorations
    const drawCorner = (x,y,flip)=>{
      ctx.save();ctx.translate(x,y);if(flip)ctx.scale(-1,-1);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(30,0);ctx.moveTo(0,0);ctx.lineTo(0,30);
      ctx.strokeStyle=accentColor+'99';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    };
    drawCorner(8,8,false);drawCorner(W-8,H-8,true);

    // Load and draw NFT image
    const img = new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      // Image centered, large
      const iSize=220;
      ctx.save();
      ctx.beginPath();
      const ix=(W-iSize)/2, iy=40;
      ctx.roundRect(ix,iy,iSize,iSize,12);
      ctx.clip();
      ctx.drawImage(img,ix,iy,iSize,iSize);
      ctx.restore();

      // Family color bar under image
      ctx.fillStyle=famColor+'66';
      ctx.fillRect((W-iSize)/2,iy+iSize-4,iSize,4);

      // ID
      ctx.fillStyle='#e8eaf8';
      ctx.font='bold 28px "Space Mono", monospace';
      ctx.textAlign='center';
      ctx.fillText(`#${nft.ID}`,W/2,290);

      // Score
      ctx.fillStyle=accentColor;
      ctx.font='bold 42px "Space Mono", monospace';
      ctx.fillText(fmtScore(nft),W/2,340);

      // Rarity
      if(rarity){
        ctx.fillStyle=accentColor+'33';
        const rx=W/2-50,ry=350,rw=100,rh=22;
        ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,11);ctx.fill();
        ctx.fillStyle=accentColor;
        ctx.font='bold 11px sans-serif';
        ctx.fillText(rarity.tier.toUpperCase(),W/2,365);
      }

      // Branding
      ctx.fillStyle='#4d5580';
      ctx.font='11px sans-serif';
      ctx.fillText('HEMI BROS · Rarity Checker',W/2,392);
    };
    img.onerror=()=>{
      // Fallback without image
      ctx.fillStyle='#e8eaf8';ctx.font='bold 60px "VT323"';ctx.textAlign='center';
      ctx.fillText(`#${nft.ID}`,W/2,180);
      ctx.fillStyle=accentColor;ctx.font='bold 48px monospace';
      ctx.fillText(fmtScore(nft),W/2,250);
    };
    img.src=nft.Image;
  },[nft]);

  const download = () => {
    const canvas = canvasRef.current;
    if(!canvas) return;
    const a = document.createElement('a');
    a.download=`hemi-bro-${nft.ID}.png`;
    a.href=canvas.toDataURL('image/png');
    a.click();
  };

  const copyLink = () => {
    const url = `${window.location.href.split('?')[0]}?id=${nft.ID}`;
    navigator.clipboard.writeText(url).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false),2000);
    });
  };

  return(
    <div className="share-mbd" onClick={onClose}>
      <div className="share-mbox" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px 0'}}>
          <span style={{fontSize:13,fontWeight:700,color:'var(--txt)'}}>Share Bro #{nft.ID}</span>
          <button className="mclose" style={{position:'static'}} onClick={onClose}>{I.x}</button>
        </div>
        <div className="share-canvas-wrap">
          <canvas ref={canvasRef} style={{maxWidth:'100%',borderRadius:8}}/>
        </div>
        <div className="share-actions">
          <button className="share-dl-btn" onClick={download}>{I.dl} Download PNG</button>
          <button className="share-copy-btn" onClick={copyLink} style={{color:copied?'var(--green)':'var(--txt2)'}}>
            {copied?<>{I.check} Copied!</>:<>{I.link} Copy Link</>}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════
   GLOBAL OFFER FEED
════════════════════════════════════ */
const OfferFeed = ({nfts, onSelectNft}) => {
  const [offers, setOffers]   = useState([]);
  const [loading,setLoading]  = useState(true);

  const load = useCallback(()=>{
    setLoading(true);
    supa.select('offers','limit=30')
      .then(d=>{ setOffers(d||[]); setLoading(false); })
      .catch(()=>{ setOffers([]); setLoading(false); });
  },[]);

  useEffect(()=>{ load(); },[]);

  const nftById = useMemo(()=>{
    const m={};
    nfts.forEach(n=>m[String(n.ID)]=n);
    return m;
  },[nfts]);

  const shortAddr = a => a?`${a.slice(0,6)}…${a.slice(-4)}`:'';
  const fmtTime = ts=>{
    try{
      const diff = Date.now()-new Date(ts).getTime();
      if(diff<60000) return 'just now';
      if(diff<3600000) return `${Math.floor(diff/60000)}m ago`;
      if(diff<86400000) return `${Math.floor(diff/3600000)}h ago`;
      return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }catch{return '';}
  };

  return(
    <div className="feed-wrap">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)'}}>Live Offers</div>
        <button className="feed-refresh" onClick={load}>↻ Refresh</button>
      </div>
      {loading
        ? <div className="feed-empty">Loading…</div>
        : offers.length===0
          ? <div className="feed-empty">No offers yet. Be the first to make one!</div>
          : offers.map(o=>{
              const nft = nftById[String(o.nft_id)];
              return(
                <div key={o.id} className="feed-item" onClick={()=>nft&&onSelectNft(nft)}>
                  {nft&&<img className="feed-img" src={nft.Image} alt={`#${o.nft_id}`} loading="lazy"/>}
                  <div className="feed-info">
                    <div className="feed-top">
                      <span className="feed-nft">Bro #{o.nft_id}</span>
                      <span className="feed-amount">Ξ {parseFloat(o.offer_amount).toFixed(3)}</span>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <span className="feed-addr">{shortAddr(o.wallet_address)}</span>
                      <span className="feed-time">{I.clock} {fmtTime(o.created_at)}</span>
                    </div>
                    {o.message&&<div className="feed-msg">"{o.message}"</div>}
                  </div>
                </div>
              );
            })
      }
    </div>
  );
};

/* ════════════════════════════════════
   COMPARE MODAL
════════════════════════════════════ */
const CompareModal = ({nfts: compareBros, traitMap, onClose, onSelect}) => {
  if(!compareBros.length) return null;
  const rows = [
    {label:'Score',    fn: n=>fmtScore(n), sort:n=>n.diScore},
    {label:'Rank',     fn: n=>`#${n.rank}`, sort:n=>-n.rank},
    {label:'Rarity',   fn: n=>{ const r=getRarityTier(n.diScore); return r?r.tier:'Common'; }, sort:n=>n.diScore},
    {label:'Family',   fn: n=>n.dominantFamilies[0]||'—', sort:null},
    ...CATS.map(cat=>({label:cat, fn:n=>{const v=n[cat]||'—';return String(v).split('(')[0].trim();}, sort:null})),
  ];
  const bestIdx = compareBros.reduce((bi,n,i)=>n.diScore>compareBros[bi].diScore?i:bi,0);

  return(
    <div className="cmp-mbd">
      <div className="cmp-hd">
        <div className="cmp-title">COMPARE BROS</div>
        <button className="mclose" style={{position:'static'}} onClick={onClose}>{I.x}</button>
      </div>
      <div className="cmp-body">
        <table className="cmp-table">
          <thead>
            <tr>
              <th style={{textAlign:'left'}}>Trait</th>
              {compareBros.map((n,i)=>(
                <th key={n.ID} className="hero-col">
                  <div className="cmp-nft-col">
                    <img className="cmp-nft-img" src={n.Image} alt={`#${n.ID}`}/>
                    <div className="cmp-nft-id" style={{cursor:'pointer'}} onClick={()=>{onSelect(n);onClose();}}>{`#${n.ID}`}</div>
                    <div className="cmp-nft-score">{fmtScore(n)}</div>
                    {i===bestIdx&&<span style={{fontSize:9,fontWeight:800,color:'var(--gold)',letterSpacing:'.1em'}}>BEST</span>}
                  </div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map(row=>(
              <tr key={row.label}>
                <td className="row-label">{row.label}</td>
                {compareBros.map((n,i)=>{
                  const val = row.fn(n);
                  const isBest = row.sort && i===compareBros.reduce((bi,x,xi)=>row.sort(x)>row.sort(compareBros[bi])?xi:bi,0);
                  return <td key={n.ID} className={isBest?'best':''}>{val}</td>;
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ════════════════════════════════════
   SIMILAR BROS (used inside Modal)
════════════════════════════════════ */
const SimilarBros = ({nft, nfts, onSelect}) => {
  const similar = useMemo(()=>{
    if(!nft||!nfts.length) return [];
    return nfts
      .filter(n=>n.ID!==nft.ID)
      .map(n=>{
        let score=0;
        CATS.forEach(cat=>{ if(n[cat]&&n[cat]===nft[cat]) score++; });
        return {nft:n,score};
      })
      .filter(x=>x.score>0)
      .sort((a,b)=>b.score-a.score||b.nft.diScore-a.nft.diScore)
      .slice(0,8);
  },[nft,nfts]);

  if(!similar.length) return null;
  return(
    <div style={{marginTop:8}}>
      <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:6}}>Similar Bros</div>
      <div className="similar-row">
        {similar.map(({nft:s,score})=>(
          <div key={s.ID} className="similar-card" onClick={()=>onSelect(s)} title={`${score} matching traits`}>
            <img src={s.Image} alt={`#${s.ID}`} loading="lazy"/>
            <div className="similar-card-score">{fmtScore(s)}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ════════════════════════════════════
   TOAST
════════════════════════════════════ */
const Toast = ({msg, show}) => (
  <div className={`toast ${show?'show':''}`}>{msg}</div>
);

/* ════════════════════════════════════
   APP
════════════════════════════════════ */
const App=()=>{
  const [data,setData]           = useState(null);
  const [loading,setLoading]     = useState(true);
  const [error,setError]         = useState(null);
  const [view,setView]           = useState('home');   // home | gallery | encyclopedia | leaderboard | stats | builder | feed
  const [search,setSearch]       = useState('');
  const [homeQ,setHomeQ]         = useState('');
  const [filters,setFilters]     = useState({traits:{},families:[]});
  const [selected,setSelected]   = useState(null);
  const [sidebar,setSidebar]     = useState(true);
  const [sheet,setSheet]         = useState(false);
  const [ownedIds,setOwnedIds]   = useState([]);
  const [walletFilter,setWalletFilter] = useState(false);
  const [sortKey,setSortKey]     = useState('score_desc');  // NEW: sort
  const [scoreMin,setScoreMin]   = useState('');            // NEW: score range
  const [scoreMax,setScoreMax]   = useState('');
  const [rarityFilter,setRarityFilter] = useState([]);      // NEW: rarity tier filter
  const [hideIp,setHideIp]       = useState(false);         // NEW: IP filter
  const [compareBros,setCompareBros]   = useState([]);      // NEW: compare
  const [showCompare,setShowCompare]   = useState(false);
  const [recentlyViewed,setRecentlyViewed] = useState(()=>{ // NEW: recently viewed
    try{const s=localStorage.getItem('hb_recent');return s?JSON.parse(s):[];}catch{return [];}
  });
  const [toast,setToast]         = useState({msg:'',show:false}); // NEW: toast
  const [deepLinkHandled,setDeepLinkHandled] = useState(false);

  useEffect(()=>{
    loadData()
      .then(d=>{setData(d);setLoading(false);})
      .catch(e=>{setError(e.message);setLoading(false);});
  },[]);

  // Deep link: ?id=1234
  useEffect(()=>{
    if(!data||deepLinkHandled) return;
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if(id){
      const nft = data.nfts.find(n=>String(n.ID)===id);
      if(nft){ setSelected(nft); setView('gallery'); }
    }
    setDeepLinkHandled(true);
  },[data]);

  // Keyboard navigation
  useEffect(()=>{
    const handler = e => {
      if(e.key==='Escape'){ setSelected(null); setShowCompare(false); return; }
      if(!selected||showCompare) return;
      const nfts = data?.nfts||[];
      const idx = nfts.findIndex(n=>n.ID===selected.ID);
      if(e.key==='ArrowRight'||e.key==='ArrowDown'){
        const next=nfts[idx+1]; if(next) setSelected(next);
      }
      if(e.key==='ArrowLeft'||e.key==='ArrowUp'){
        const prev=nfts[idx-1]; if(prev) setSelected(prev);
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[selected,data,showCompare]);

  const showToast = useCallback((msg)=>{
    setToast({msg,show:true});
    setTimeout(()=>setToast(t=>({...t,show:false})),2200);
  },[]);

  const addToRecent = useCallback((nft)=>{
    setRecentlyViewed(prev=>{
      const next = [nft,...prev.filter(n=>n.ID!==nft.ID)].slice(0,8);
      try{localStorage.setItem('hb_recent',JSON.stringify(next));}catch{}
      return next;
    });
  },[]);

  const handleCardClick = useCallback(nft=>{
    setSelected(nft);
    addToRecent(nft);
  },[addToRecent]);

  const handleAddCompare = useCallback(nft=>{
    setCompareBros(prev=>{
      if(prev.find(n=>n.ID===nft.ID)){showToast('Already in compare');return prev;}
      if(prev.length>=4){showToast('Max 4 Bros to compare');return prev;}
      return [...prev,nft];
    });
    showToast(`#${nft.ID} added to compare`);
  },[showToast]);

  const nfts     = data?.nfts||[];
  const traitMap = data?.traitMap||{};
  const debouncedSearch = useDebounce(search, 80);

  const SORT_OPTIONS = [
    {k:'score_desc',  label:'Score ↓'},
    {k:'score_asc',   label:'Score ↑'},
    {k:'id_asc',      label:'ID ↑'},
    {k:'id_desc',     label:'ID ↓'},
    {k:'rarest',      label:'Rarest'},
    {k:'common',      label:'Most Common'},
  ];

  const filtered = useMemo(()=>{
    if(!nfts.length) return [];
    const q = debouncedSearch.trim();
    const ownedSet = walletFilter && ownedIds.length > 0 ? new Set(ownedIds) : null;
    const famLen   = filters.families.length;
    const traitEntries = Object.entries(filters.traits);
    const traitLen = traitEntries.length;
    const sMin = scoreMin!==''?parseFloat(scoreMin):null;
    const sMax = scoreMax!==''?parseFloat(scoreMax):null;
    const rarSet = rarityFilter.length>0 ? new Set(rarityFilter) : null;

    let result = nfts.filter(nft=>{
      if(ownedSet && !ownedSet.has(nft.idStr)) return false;
      if(q){
        const ql = q.toLowerCase();
        const idMatch = nft.idStr.startsWith(q);
        const traitMatch = !idMatch && CATS.some(cat=>{
          const v = nft[cat]; if(!v) return false;
          return String(v).split('(')[0].trim().toLowerCase().includes(ql);
        });
        if(!idMatch && !traitMatch) return false;
      }
      if(hideIp && nft.hasIpRisk) return false;
      if(famLen > 0) {
        let ok = false;
        for(let i=0;i<famLen;i++) if(nft.famSet.has(filters.families[i])){ ok=true; break; }
        if(!ok) return false;
      }
      // Multi-select: cat filter is an array — NFT must match AT LEAST ONE value (OR within cat)
      // AND must satisfy ALL selected categories (AND across cats)
      for(let i=0;i<traitLen;i++){
        const [cat,vals]=traitEntries[i];
        if(!Array.isArray(vals)||vals.length===0) continue;
        if(!vals.includes(nft[cat])) return false;
      }
      if(sMin!==null && nft.diScore<sMin) return false;
      if(sMax!==null && nft.diScore>sMax) return false;
      if(rarSet){
        // Rarity filter is TRAIT-LEVEL: pass if the NFT has at least one trait
        // whose adjustedScore puts it in one of the selected tiers
        let traitMatch = false;
        for(const cat of CATS){
          const val = nft[cat]; if(!val) continue;
          const name = String(val).split('(')[0].trim();
          const detail = traitMap[tk(cat,name)];
          const r = detail ? getRarityTier(detail.adjustedScore||0) : null;
          const tierName = r ? r.tier : 'Common';
          if(rarSet.has(tierName)){ traitMatch=true; break; }
        }
        if(!traitMatch) return false;
      }
      return true;
    });

    // Sort
    switch(sortKey){
      case 'score_asc':  result.sort((a,b)=>a.diScore-b.diScore); break;
      case 'id_asc':     result.sort((a,b)=>Number(a.ID)-Number(b.ID)); break;
      case 'id_desc':    result.sort((a,b)=>Number(b.ID)-Number(a.ID)); break;
      case 'rarest':     result.sort((a,b)=>b.diScore-a.diScore); break; // highest score = rarest
      case 'common':     result.sort((a,b)=>a.diScore-b.diScore); break; // lowest score = most common
      default: break; // score_desc is default (already sorted by loadData)
    }

    return result;
  },[nfts, debouncedSearch, filters, walletFilter, ownedIds, sortKey, scoreMin, scoreMax, rarityFilter, hideIp, traitMap]);

  const traitOpts = useMemo(()=>{
    const o={};
    CATS.forEach(cat=>{
      const s=new Set();
      nfts.forEach(n=>{const v=n[cat];if(v) s.add(v);});
      o[cat]=[...s].sort((a,b)=>{
        // Sort None to bottom, rest alphabetical
        const aNone=a.split('(')[0].trim().toLowerCase()==='none';
        const bNone=b.split('(')[0].trim().toLowerCase()==='none';
        if(aNone&&!bNone) return 1;
        if(!aNone&&bNone) return -1;
        return a.localeCompare(b);
      });
    });
    return o;
  },[nfts]);

  const facetedCounts = useMemo(()=>{
    const fc={};
    CATS.forEach(cat=>fc[cat]={});
    const q = debouncedSearch.trim();
    const famLen = filters.families.length;
    const traitEntries = Object.entries(filters.traits);
    const ownedSet = walletFilter && ownedIds.length > 0 ? new Set(ownedIds) : null;
    const sMin = scoreMin!==''?parseFloat(scoreMin):null;
    const sMax = scoreMax!==''?parseFloat(scoreMax):null;
    const rarSet = rarityFilter.length>0 ? new Set(rarityFilter) : null;

    nfts.forEach(nft=>{
      // Apply ALL global filters first — only then count this NFT toward options
      if(ownedSet && !ownedSet.has(nft.idStr)) return;
      if(q){
        const ql = q.toLowerCase();
        const idMatch = nft.idStr.startsWith(q);
        const traitMatch = !idMatch && CATS.some(cat=>{
          const v = nft[cat]; if(!v) return false;
          return String(v).split('(')[0].trim().toLowerCase().includes(ql);
        });
        if(!idMatch && !traitMatch) return;
      }
      if(hideIp && nft.hasIpRisk) return;
      if(famLen > 0) {
        let ok=false;
        for(let i=0;i<famLen;i++) if(nft.famSet.has(filters.families[i])){ ok=true; break; }
        if(!ok) return;
      }
      if(sMin!==null && nft.diScore<sMin) return;
      if(sMax!==null && nft.diScore>sMax) return;
      if(rarSet){
        let traitMatch=false;
        for(const cat of CATS){
          const val=nft[cat]; if(!val) continue;
          const name=String(val).split('(')[0].trim();
          const detail=traitMap[tk(cat,name)];
          const r=detail?getRarityTier(detail.adjustedScore||0):null;
          if(rarSet.has(r?r.tier:'Common')){traitMatch=true;break;}
        }
        if(!traitMatch) return;
      }
      // For each category: count this option if all OTHER trait-category filters pass
      CATS.forEach(cat=>{
        const v=nft[cat]; if(!v) return;
        for(let i=0;i<traitEntries.length;i++){
          const [c,vals]=traitEntries[i];
          if(c===cat) continue;
          if(!Array.isArray(vals)||vals.length===0) continue;
          if(!vals.includes(nft[c])) return;
        }
        fc[cat][v]=(fc[cat][v]||0)+1;
      });
    });
    return fc;
  },[nfts, filters, debouncedSearch, walletFilter, ownedIds, hideIp, scoreMin, scoreMax, rarityFilter, traitMap]);

  const famCounts = useMemo(()=>{
    const fc={};
    nfts.forEach(n=>n.famSet.forEach(f=>{fc[f]=(fc[f]||0)+1;}));
    return fc;
  },[nfts]);

  const activeCount = Object.values(filters.traits).reduce((s,v)=>s+(Array.isArray(v)?v.length:1),0)+filters.families.length+(walletFilter?1:0)+(rarityFilter.length>0?1:0)+(hideIp?1:0)+((scoreMin||scoreMax)?1:0);
  const totalActive = activeCount+(search?1:0);

  const ownedNfts = useMemo(()=>{
    if(!ownedIds.length) return [];
    const s = new Set(ownedIds);
    return nfts.filter(n => s.has(n.idStr));
  },[nfts, ownedIds]);

  const clearAll=()=>{
    setFilters({traits:{},families:[]});setSearch('');setWalletFilter(false);
    setRarityFilter([]);setScoreMin('');setScoreMax('');setHideIp(false);
  };
  const rmTrait=cat=>setFilters(f=>{const t={...f.traits};delete t[cat];return {...f,traits:t};});
  const rmFam=fam=>setFilters(f=>({...f,families:f.families.filter(x=>x!==fam)}));

  const goGallery=()=>setView('gallery');
  const goHome=()=>{setView('home');setSearch('');setFilters({traits:{},families:[]});setHomeQ('');};

  const commitHome=()=>{
    const q=homeQ.trim();
    if(!q) return;
    setSearch(q); setView('gallery');
  };

  const onEncPick=(cat,name)=>{
    const key=tk(cat,name);
    if(!key||!traitMap[key]) return;
    const fullVal=`${name} (${traitMap[key].Supply||'?'})`;
    setFilters({traits:{[cat]:[fullVal]},families:[]});
    setSearch('');
    setView('gallery');
  };

  const homePreview = useMemo(()=>{
    const q=homeQ.trim();
    if(!q) return null;
    return nfts.find(n=>String(n.ID).startsWith(q))||null;
  },[nfts,homeQ]);
  const homeMatchCount = useMemo(()=>{
    const q=homeQ.trim();
    if(!q) return 0;
    return nfts.filter(n=>String(n.ID).startsWith(q)).length;
  },[nfts,homeQ]);

  /* ── Loading / Error ── */
  if(loading) return(
    <div className="shell"><div className="state-box"><div className="spinner"/><div style={{fontSize:13,color:'var(--txt2)'}}>Loading Hemi Bros…</div></div></div>
  );
  if(error) return(
    <div className="shell"><div className="state-box"><div className="big">Error</div><div style={{fontSize:12,color:'var(--txt3)',marginTop:4,maxWidth:320}}>{error}</div></div></div>
  );

  const isGallery  = view==='gallery';
  const isHome     = view==='home';
  const isEnc      = view==='encyclopedia';
  const isLb       = view==='leaderboard';
  const isStats    = view==='stats';
  const isBuilder  = view==='builder';
  const isFeed     = view==='feed';
  const showFilBar = isGallery && (totalActive>0);
  const showSortBar= isGallery;

  const NAV_VIEWS = [
    {k:'gallery',     icon:I.filter,   label:'Gallery'},
    {k:'leaderboard', icon:I.trophy,   label:'Top Bros'},
    {k:'stats',       icon:I.chart,    label:'Stats'},
    {k:'builder',     icon:I.build,    label:'Builder'},
    {k:'feed',        icon:I.feed,     label:'Offers Feed'},
    {k:'encyclopedia',icon:I.book,     label:'Encyclopedia'},
  ];

  /* ── RENDER ── */
  return(
    <div className="shell">

      {/* ══ HEADER ══ */}
      <header className="hd">
        <div className="logo" onClick={goHome}>HEMI<em>BROS</em></div>

        {(isGallery||isEnc)&&(
          <div className="srch-wrap">
            <span className="srch-ico">{I.search}</span>
            <input
              className="srch"
              placeholder="ID or trait name…"
              value={search}
              onChange={e=>setSearch(e.target.value)}
              type="text"
              inputMode="numeric"
              autoComplete="off"
            />
            {search&&<button className="srch-x" onClick={()=>setSearch('')}>{I.x}</button>}
          </div>
        )}

        <div className="hd-right">
          {/* Nav buttons */}
          {NAV_VIEWS.map(({k,icon,label})=>(
            <button
              key={k}
              className={`tbtn desktop-only ${view===k?'on':''}`}
              onClick={()=>setView(k)}
              title={label}
            >{icon}<span style={{fontSize:11}}>{label}</span></button>
          ))}

          {isGallery&&(
            <>
              <button
                className={`ibtn desktop-only ${sidebar?'on':''}`}
                title="Toggle filters"
                onClick={()=>setSidebar(p=>!p)}
              >{I.sidebar}</button>
              <button
                className={`tbtn mobile-only ${activeCount>0?'on':''}`}
                onClick={()=>setSheet(true)}
              >
                {I.filter}
                {activeCount>0&&<span className="ct">{activeCount}</span>}
              </button>
            </>
          )}
        </div>
      </header>

      {/* Mobile nav row */}
      <div className="mobile-only" style={{display:'flex',gap:4,padding:'6px 10px',background:'var(--ink2)',borderBottom:'1px solid var(--line)',overflowX:'auto',flexShrink:0}}>
        {NAV_VIEWS.map(({k,icon,label})=>(
          <button key={k} className={`sort-btn ${view===k?'on':''}`} style={{gap:4}} onClick={()=>setView(k)}>
            {icon}{label}
          </button>
        ))}
      </div>

      {/* ── Filter bar ── */}
      {showFilBar&&(
        <div className="filter-bar">
          {walletFilter&&(
            <div className="fpill" style={{borderColor:'var(--green)',background:'rgba(61,220,151,.12)'}}>
              👛 My Wallet ({ownedIds.length})
              <button onClick={()=>setWalletFilter(false)}>{I.x}</button>
            </div>
          )}
          {rarityFilter.map(t=>{
            const RARITY_COLORS={Grail:'var(--r-grail)',Legendary:'var(--r-legendary)',Epic:'var(--r-epic)',Rare:'var(--r-rare)',Uncommon:'var(--r-uncommon)',Common:'var(--txt3)'};
            return(
              <div key={t} className="fpill" style={{borderColor:RARITY_COLORS[t]||'var(--pop)',background:`${RARITY_COLORS[t]||'var(--pop)'}18`}}>
                {t}<button onClick={()=>setRarityFilter(r=>r.filter(x=>x!==t))}>{I.x}</button>
              </div>
            );
          })}
          {(scoreMin||scoreMax)&&(
            <div className="fpill">
              Score: {scoreMin||'0'}–{scoreMax||'∞'}
              <button onClick={()=>{setScoreMin('');setScoreMax('');}}>{I.x}</button>
            </div>
          )}
          {hideIp&&(
            <div className="fpill">{I.warn} No IP Risk<button onClick={()=>setHideIp(false)}>{I.x}</button></div>
          )}
          {search&&(
            <div className="fpill">ID: {search}<button onClick={()=>setSearch('')}>{I.x}</button></div>
          )}
          {filters.families.map(f=>(
            <div key={f} className="fpill">
              <span className="fam-dot" style={{background:FAM_COLORS[f],marginRight:3,width:7,height:7,borderRadius:'50%',display:'inline-block',flexShrink:0}}></span>
              {f}<button onClick={()=>rmFam(f)}>{I.x}</button>
            </div>
          ))}
          {Object.entries(filters.traits).flatMap(([cat,vals])=>{
            if(!Array.isArray(vals)) return [];
            if(vals.length===1){
              return [<div key={`${cat}-0`} className="fpill">
                {cat}: {vals[0].split('(')[0].trim()}<button onClick={()=>rmTrait(cat)}>{I.x}</button>
              </div>];
            }
            // Multiple selected — show one chip with count
            return [<div key={cat} className="fpill">
              {cat}: {vals.length} selected
              <button onClick={()=>rmTrait(cat)}>{I.x}</button>
            </div>];
          })}
          {totalActive>1&&<button className="clear-btn" onClick={clearAll}>Clear all</button>}
          <div className="res-ct"><b>{filtered.length}</b> result{filtered.length!==1?'s':''}</div>
        </div>
      )}

      {/* ── Sort bar ── */}
      {showSortBar&&(
        <div className="sort-bar">
          <span className="sort-lbl">{I.sort} Sort</span>
          {SORT_OPTIONS.map(({k,label})=>(
            <button key={k} className={`sort-btn ${sortKey===k?'on':''}`} onClick={()=>setSortKey(k)}>{label}</button>
          ))}
        </div>
      )}

      {/* ══ BODY ══ */}
      <div className="body">

        {/* Desktop sidebar */}
        {isGallery&&(
          <aside className={`sidebar ${sidebar?'':'closed'}`}>
            <div className="sb-top">
              <span className="sb-top-label">Filters</span>
              {activeCount>0&&(
                <button className="clear-btn" style={{fontSize:11,padding:'2px 5px'}} onClick={()=>setFilters({traits:{},families:[]})}>
                  Clear
                </button>
              )}
            </div>
            <div className="sb-scroll">
              <WalletSection
                ownedIds={ownedIds} setOwnedIds={setOwnedIds}
                walletFilter={walletFilter} setWalletFilter={v=>{setWalletFilter(v);if(v)setView('gallery');}}
              />
              <PortfolioCalc ownedNfts={ownedNfts} />

              {/* Quick Filters */}
              <div className="acc-sec">
                <div style={{padding:'10px 14px 4px'}}>
                  <span style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)'}}>Quick Filters</span>
                </div>
                <div style={{padding:'0 10px 10px',display:'flex',flexDirection:'column',gap:4}}>
                  {[
                    {label:'🔴 Has Grail Trait',     tiers:['Grail']},
                    {label:'🟠 Has Legendary+ Trait', tiers:['Grail','Legendary']},
                    {label:'🟣 Has Epic+ Trait',      tiers:['Grail','Legendary','Epic']},
                    {label:'🟢 Has Rare+ Trait',      tiers:['Grail','Legendary','Epic','Rare']},
                  ].map(({label,tiers})=>{
                    const active=tiers.every(t=>rarityFilter.includes(t))&&rarityFilter.length===tiers.length;
                    return(
                      <button key={label}
                        onClick={()=>setRarityFilter(active?[]:tiers)}
                        style={{
                          textAlign:'left',padding:'5px 9px',borderRadius:7,fontSize:11.5,fontWeight:600,
                          background:active?'var(--pop-soft)':'var(--ink3)',
                          border:`1.5px solid ${active?'var(--pop)':'var(--line)'}`,
                          color:active?'var(--txt)':'var(--txt2)',cursor:'pointer',transition:'all .12s'
                        }}
                      >{label}</button>
                    );
                  })}
                </div>
              </div>

              {/* Rarity filter */}
              <div className="acc-sec">
                <div style={{padding:'10px 14px 4px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)'}}>Rarity Tier</span>
                  {rarityFilter.length>0&&<span className="sel-badge">{rarityFilter.length}</span>}
                </div>
                <div className="rarity-filter-body">
                  {[{t:'Grail',c:'var(--r-grail)'},{t:'Legendary',c:'var(--r-legendary)'},{t:'Epic',c:'var(--r-epic)'},{t:'Rare',c:'var(--r-rare)'},{t:'Uncommon',c:'var(--r-uncommon)'},{t:'Common',c:'var(--txt3)'}].map(({t,c})=>(
                    <button key={t} className={`rarity-fbtn ${rarityFilter.includes(t)?'on':''}`}
                      style={{color:c,borderColor:c}}
                      onClick={()=>setRarityFilter(r=>r.includes(t)?r.filter(x=>x!==t):[...r,t])}
                    >{t}</button>
                  ))}
                </div>
              </div>

              {/* Score range */}
              <div className="acc-sec">
                <div style={{padding:'10px 14px 4px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)'}}>Score Range</span>
                  {(scoreMin||scoreMax)&&<span className="sel-badge">1</span>}
                </div>
                <div className="score-range-body">
                  <div className="score-range-row">
                    <input className="score-range-inp" placeholder="Min" value={scoreMin} onChange={e=>setScoreMin(e.target.value)} type="number"/>
                    <span className="score-range-sep">—</span>
                    <input className="score-range-inp" placeholder="Max" value={scoreMax} onChange={e=>setScoreMax(e.target.value)} type="number"/>
                  </div>
                  <div className="score-range-tiers">
                    {[{l:'Uncommon',min:10,max:24},{l:'Rare',min:25,max:44},{l:'Epic',min:45,max:149},{l:'Legendary',min:150,max:299},{l:'Grail',min:300,max:''}].map(({l,min,max,c})=>{
                      const RARITY_COLORS={Grail:'var(--r-grail)',Legendary:'var(--r-legendary)',Epic:'var(--r-epic)',Rare:'var(--r-rare)',Uncommon:'var(--r-uncommon)'};
                      return(
                        <button key={l} className="score-tier-btn" style={{color:RARITY_COLORS[l]||'var(--txt2)'}}
                          onClick={()=>{setScoreMin(String(min));setScoreMax(max?String(max):'');}}
                        >{l}</button>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* IP Risk toggle */}
              <div className="acc-sec">
                <div className="ip-toggle-row">
                  <span className="ip-toggle-label"><span className="ip-warn-icon">{I.warn}</span> Hide IP Risk Items</span>
                  <label className="toggle-switch">
                    <input type="checkbox" checked={hideIp} onChange={e=>setHideIp(e.target.checked)}/>
                    <div className="toggle-track"/>
                    <div className="toggle-knob"/>
                  </label>
                </div>
              </div>

              <FilterContent
                filters={filters} setFilters={setFilters}
                traitOpts={traitOpts} traitMap={traitMap}
                facetedCounts={facetedCounts} famCounts={famCounts}
              />
            </div>
            <div style={{padding:'10px 14px',borderTop:'1px solid var(--line)',flexShrink:0,textAlign:'center'}}>
              <span style={{fontFamily:'Space Mono,monospace',fontSize:'1rem',color:'var(--teal)'}}>{filtered.length}</span>
              <span style={{fontSize:11,color:'var(--txt3)',marginLeft:5}}>result{filtered.length!==1?'s':''}</span>
            </div>
          </aside>
        )}

        {/* Main content */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

          {/* ── HOME ── */}
          {isHome&&(
            <div className="home">
              <div className="home-hero">
                <div className="home-eyebrow">Rarity Checker</div>
                <h1 className="home-h1">FIND YOUR<br/><span>SCORE</span></h1>
                <p className="home-sub">Type your Hemi Bro ID to instantly check<br/>its rarity score.</p>
                <div className="home-row">
                  <input
                    className="home-inp"
                    placeholder="Bro ID…"
                    value={homeQ}
                    onChange={e=>setHomeQ(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&commitHome()}
                    type="text"
                    inputMode="numeric"
                    autoFocus
                  />
                  <button className="home-go" onClick={commitHome}>GO</button>
                </div>
                {homeQ&&homePreview&&(
                  <div className="qres" onClick={()=>{setSelected(homePreview);addToRecent(homePreview);}}>
                    <img className="qres-img" src={homePreview.Image} alt=""/>
                    <div style={{flex:1}}>
                      <div className="qres-lbl">Hemi Bro #{homePreview.ID}</div>
                      <div className="qres-score">{fmtScore(homePreview)}</div>
                      <div className="qres-hint">Rank #{homePreview.rank} · tap to view</div>
                    </div>
                    {homeMatchCount>1&&(
                      <button
                        style={{background:'var(--pop-soft)',border:'1px solid var(--pop)',color:'var(--txt)',fontSize:11,fontWeight:700,padding:'4px 9px',borderRadius:7,flexShrink:0,cursor:'pointer'}}
                        onClick={e=>{e.stopPropagation();commitHome();}}
                      >+{homeMatchCount-1} more</button>
                    )}
                  </div>
                )}
                {homeQ&&!homePreview&&nfts.length>0&&(
                  <p style={{color:'var(--red)',fontSize:13,marginTop:12}}>No Bro found with ID "{homeQ}"</p>
                )}
              </div>

              {/* Recently viewed */}
              {recentlyViewed.length>0&&(
                <div className="browse" style={{maxWidth:720}}>
                  <div className="browse-lbl">{I.clock} Recently Viewed</div>
                  <div className="recents-row">
                    {recentlyViewed.map(n=>(
                      <div key={n.ID} className="recent-card" onClick={()=>{setSelected(n);addToRecent(n);}}>
                        <img src={n.Image} alt={`#${n.ID}`} loading="lazy"/>
                        <div className="recent-id">#{n.ID}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Quick links */}
              <div className="browse" style={{maxWidth:720}}>
                <div className="browse-lbl">Explore</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                  {NAV_VIEWS.map(({k,icon,label})=>(
                    <button key={k} className="fam-bchip" onClick={()=>setView(k)} style={{gap:6}}>
                      {icon}{label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Browse by Family */}
              <div className="browse">
                <div className="browse-lbl">Browse by Family</div>
                <div className="fam-browse">
                  {Object.keys(FAM_COLORS).filter(f=>f!=='default').sort().map(fam=>{
                    const cnt=famCounts[fam]||0; if(!cnt) return null;
                    return(
                      <button key={fam} className="fam-bchip" onClick={()=>{setFilters({traits:{},families:[fam]});setSearch('');setView('gallery');}}>
                        <span className="fam-dot" style={{background:FAM_COLORS[fam]}}></span>
                        {fam}
                        <span style={{fontSize:10,color:'var(--txt3)'}}>{cnt}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Browse by Trait */}
              <div className="browse">
                <div className="browse-lbl">Browse by Trait</div>
                <div className="cat-browse">
                  {CATS.map(cat=>(
                    <button key={cat} className="cat-bchip" onClick={()=>{setView('gallery');setSidebar(true);}}>
                      {cat}
                    </button>
                  ))}
                  <div className="enc-chip" onClick={()=>setView('encyclopedia')}>
                    {I.book} Trait Encyclopedia
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── GALLERY ── */}
          {isGallery&&(
            filtered.length===0
              ?<div className="grid-scroll"><div className="state-box">
                  <div className="big">NO RESULTS</div>
                  {(()=>{
                    // Smart diagnosis: which filter is the likely culprit?
                    const activeTraits = Object.entries(filters.traits).filter(([,v])=>Array.isArray(v)&&v.length>0);
                    const conflictHints = [];
                    if(activeTraits.length>=2){
                      conflictHints.push('These trait combinations may not exist together on any Bro.');
                    }
                    if(rarityFilter.length>0 && activeTraits.length>0){
                      conflictHints.push('The selected rarity tier may conflict with the chosen traits.');
                    }
                    if((scoreMin||scoreMax) && activeTraits.length>0){
                      conflictHints.push('The score range may exclude all Bros with these traits.');
                    }
                    if(walletFilter){
                      conflictHints.push('Your wallet Bros may not match the active filters.');
                    }
                    return conflictHints.length>0
                      ? <div style={{fontSize:12,color:'var(--txt3)',maxWidth:280,textAlign:'center',lineHeight:1.6}}>{conflictHints[0]}</div>
                      : <div style={{fontSize:13}}>Try removing some filters.</div>;
                  })()}
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',marginTop:8}}>
                    {Object.keys(filters.traits).length>0&&(
                      <button style={{background:'none',border:'1.5px solid var(--line)',borderRadius:8,padding:'6px 14px',color:'var(--txt2)',fontSize:12,fontWeight:600,cursor:'pointer'}} onClick={()=>setFilters({traits:{},families:[]})}>Clear traits</button>
                    )}
                    {(rarityFilter.length>0||(scoreMin||scoreMax))&&(
                      <button style={{background:'none',border:'1.5px solid var(--line)',borderRadius:8,padding:'6px 14px',color:'var(--txt2)',fontSize:12,fontWeight:600,cursor:'pointer'}} onClick={()=>{setRarityFilter([]);setScoreMin('');setScoreMax('');}}>Clear score filters</button>
                    )}
                    <button style={{background:'none',border:'1.5px solid var(--pop)',borderRadius:8,padding:'6px 14px',color:'var(--pop)',fontSize:12,fontWeight:600,cursor:'pointer'}} onClick={clearAll}>Clear all</button>
                  </div>
                </div></div>
              :<VirtualGrid items={filtered} onCardClick={handleCardClick}/>
          )}

          {/* ── ENCYCLOPEDIA ── */}
          {isEnc&&(
            <div className="grid-scroll">
              <Encyclopedia traitMap={traitMap} onPick={onEncPick}/>
            </div>
          )}

          {/* ── LEADERBOARD ── */}
          {isLb&&(
            <div className="grid-scroll">
              <Leaderboard nfts={nfts} traitMap={traitMap} onSelect={n=>{setSelected(n);addToRecent(n);}}/>
            </div>
          )}

          {/* ── STATS ── */}
          {isStats&&(
            <div className="grid-scroll">
              <StatsDashboard nfts={nfts} traitMap={traitMap}/>
            </div>
          )}

          {/* ── BUILDER ── */}
          {isBuilder&&(
            <div className="grid-scroll">
              <BroBuilder traitMap={traitMap} nfts={nfts} onSelect={n=>{setSelected(n);addToRecent(n);}}/>
            </div>
          )}

          {/* ── OFFER FEED ── */}
          {isFeed&&(
            <div className="grid-scroll">
              <OfferFeed nfts={nfts} onSelectNft={n=>{setSelected(n);addToRecent(n);}}/>
            </div>
          )}
        </div>
      </div>

      {/* ══ MOBILE FILTER SHEET ══ */}
      {sheet&&isGallery&&(
        <div className="sheet-bg" onClick={()=>setSheet(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div className="sheet-hd">
              <span className="sheet-title">Filters</span>
              {activeCount>0&&<button className="clear-btn" onClick={()=>setFilters({traits:{},families:[]})}>Clear all</button>}
            </div>
            <div className="sheet-body">
              <WalletSection
                ownedIds={ownedIds} setOwnedIds={setOwnedIds}
                walletFilter={walletFilter} setWalletFilter={v=>{setWalletFilter(v);if(v)setView('gallery');}}
              />
              <PortfolioCalc ownedNfts={ownedNfts} />
              {/* Rarity filter mobile */}
              <div className="acc-sec" style={{padding:'10px 14px'}}>
                <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:8}}>Rarity Tier</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {[{t:'Grail',c:'var(--r-grail)'},{t:'Legendary',c:'var(--r-legendary)'},{t:'Epic',c:'var(--r-epic)'},{t:'Rare',c:'var(--r-rare)'},{t:'Uncommon',c:'var(--r-uncommon)'},{t:'Common',c:'var(--txt3)'}].map(({t,c})=>(
                    <button key={t} className={`rarity-fbtn ${rarityFilter.includes(t)?'on':''}`}
                      style={{color:c,borderColor:c}}
                      onClick={()=>setRarityFilter(r=>r.includes(t)?r.filter(x=>x!==t):[...r,t])}
                    >{t}</button>
                  ))}
                </div>
              </div>
              {/* IP toggle mobile */}
              <div className="acc-sec">
                <div className="ip-toggle-row">
                  <span className="ip-toggle-label"><span className="ip-warn-icon">{I.warn}</span> Hide IP Risk</span>
                  <label className="toggle-switch">
                    <input type="checkbox" checked={hideIp} onChange={e=>setHideIp(e.target.checked)}/>
                    <div className="toggle-track"/>
                    <div className="toggle-knob"/>
                  </label>
                </div>
              </div>
              <FilterContent
                filters={filters} setFilters={setFilters}
                traitOpts={traitOpts} traitMap={traitMap}
                facetedCounts={facetedCounts} famCounts={famCounts}
              />
            </div>
            <div className="sheet-ft">
              <button className="sheet-apply" onClick={()=>setSheet(false)}>
                Show {filtered.length} result{filtered.length!==1?'s':''}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══ COMPARE BAR ══ */}
      <div className={`compare-bar ${compareBros.length>0?'open':''}`}>
        <div className="compare-count">{I.compare} Compare ({compareBros.length}/4)</div>
        <div className="compare-slots">
          {compareBros.map(n=>(
            <div key={n.ID} className="compare-slot filled" title={`Bro #${n.ID}`}>
              <img src={n.Image} alt={`#${n.ID}`}/>
              <div className="cs-rm" onClick={e=>{e.stopPropagation();setCompareBros(p=>p.filter(x=>x.ID!==n.ID));}}>×</div>
            </div>
          ))}
          {Array.from({length:4-compareBros.length}).map((_,i)=>(
            <div key={i} className="compare-slot"/>
          ))}
        </div>
        <button className="compare-open-btn" disabled={compareBros.length<2} onClick={()=>setShowCompare(true)}>
          Compare
        </button>
        <button className="compare-clear" onClick={()=>setCompareBros([])}>Clear</button>
      </div>

      {/* ══ MODAL ══ */}
      {selected&&(
        <Modal
          nft={selected} traitMap={traitMap} nfts={nfts}
          onClose={()=>setSelected(null)}
          onAddCompare={handleAddCompare}
          onSelect={n=>{setSelected(n);addToRecent(n);}}
        />
      )}

      {/* ══ COMPARE MODAL ══ */}
      {showCompare&&compareBros.length>=2&&(
        <CompareModal
          nfts={compareBros} traitMap={traitMap}
          onClose={()=>setShowCompare(false)}
          onSelect={n=>{setSelected(n);addToRecent(n);}}
        />
      )}

      {/* ══ TOAST ══ */}
      <Toast msg={toast.msg} show={toast.show}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
