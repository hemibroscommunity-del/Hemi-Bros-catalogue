const MysteryBro = ({nfts, onReveal}) => {
  // phases: idle | loading | spinning | revealed
  const [phase,    setPhase]   = React.useState('idle');
  const [frames,   setFrames]  = React.useState([]);
  const [frameIdx, setFrameIdx]= React.useState(0);
  const [picked,   setPicked]  = React.useState(null);
  const [loadPct,  setLoadPct] = React.useState(0);
  const [flashOn,   setFlashOn]   = React.useState(false);
  const [handleRot, setHandleRot] = React.useState(0);
  // Jackpot chain scoring
  const [chainActive,   setChainActive]   = React.useState(false); // true after first jackpot hit
  const [chainCanSpin,  setChainCanSpin]  = React.useState(false); // true only when last spin was jackpot
  const [chainScore,    setChainScore]    = React.useState(0);     // accumulated DI score
  const [chainSpins,    setChainSpins]    = React.useState(0);     // # of jackpot spins so far
  const [chainBros,     setChainBros]     = React.useState([]);    // all picked bros in chain
  const [bestPick,      setBestPick]      = React.useState(null); // highest DI single spin this session
  const [bestChain,     setBestChain]     = React.useState(null); // {score, spins, bro} best chain this session
  const [canClaimNow,   setCanClaimNow]   = React.useState(false); // true in final 10 frames
  const [framesLeft,    setFramesLeft]    = React.useState(0);     // countdown in final 10 frames
  const [showLbSubmit,  setShowLbSubmit]  = React.useState(false);
  const [lbName,        setLbName]        = React.useState('');
  const [lbWallet,      setLbWallet]      = React.useState('');
  const [lbSubmitted,   setLbSubmitted]   = React.useState(false);
  const [lbError,       setLbError]       = React.useState('');
  const [lbScores,      setLbScores]      = React.useState([]);
  const [lbLoading,     setLbLoading]     = React.useState(false);
  const timerRef  = React.useRef(null);
  const stepRef   = React.useRef(null);  // ref to current step fn for instant stop
  const canvasRef = React.useRef(null);
  const animRef   = React.useRef(null);
  const flashRef    = React.useRef(null);
  const claimRef    = React.useRef(false); // set true when user hits Claim Now
  const claimTickRef = React.useRef(-1);  // tick value at moment user hit stop
  const tickRef     = React.useRef(0);    // mirrors tick closure for stop button access
  const audioCtxRef = React.useRef(null);

  // Leaderboard loader
  React.useEffect(()=>{
    (async()=>{
      setLbLoading(true);
      try{ const rows = await supa.select(MYSTERY_LB_TABLE,'select=name,score,spins,wallet&limit=20&order=score.desc'); setLbScores(rows||[]); }
      catch{ setLbScores([]); }
      setLbLoading(false);
    })();
  },[]);

  const submitChainScore = React.useCallback(async()=>{
    if(!lbName.trim()) return;
    const wallet = lbWallet.trim();
    const isValidWallet = /^0x[0-9a-fA-F]{40}$/.test(wallet);
    try{
      await supa.insert(MYSTERY_LB_TABLE,{
        name:lbName.trim(),
        score:parseFloat(chainScore.toFixed(1)),
        spins:chainSpins,
        wallet: isValidWallet ? wallet.toLowerCase() : null
      });
      setLbSubmitted(true);
      const rows = await supa.select(MYSTERY_LB_TABLE,'select=name,score,spins,wallet&limit=20&order=score.desc');
      setLbScores(rows||[]);
    } catch{ setLbError('Could not save. Try again.'); }
  },[lbName, lbWallet, chainScore, chainSpins]);

  // Create AudioContext lazily on first user gesture
  const getAudioCtx = () => {
    if(!audioCtxRef.current) {
      try { audioCtxRef.current = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) {}
    }
    return audioCtxRef.current;
  };

  // ── Audio helpers ──────────────────────────────────────────────────────────
  // Handle pull: Gemini-style oscillator ratchet clicks + bottom thud + spring return
  const playHandlePullSound = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    try {
      const now = ctx.currentTime;
      // 8 ratchet clicks — square osc with rapid pitch drop, spaced like Gemini's formula
      for(let i=0;i<8;i++){
        const dt = i*0.06 + i*i*0.002; // Gemini spacing: accelerating then decelerating
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.type='square';
        osc.frequency.setValueAtTime(150,now+dt);
        osc.frequency.exponentialRampToValueAtTime(40,now+dt+0.05); // rapid pitch drop = clack
        g.gain.setValueAtTime(0,now+dt);
        g.gain.linearRampToValueAtTime(0.4,now+dt+0.01);
        g.gain.exponentialRampToValueAtTime(0.01,now+dt+0.05);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(now+dt); osc.stop(now+dt+0.06);
      }
      // Bottom-out thud at 600ms (when CSS pull transition completes)
      const thudOsc=ctx.createOscillator(), thudG=ctx.createGain();
      thudOsc.frequency.setValueAtTime(100,now+0.6);
      thudOsc.frequency.exponentialRampToValueAtTime(20,now+0.7);
      thudG.gain.setValueAtTime(0.6,now+0.6);
      thudG.gain.exponentialRampToValueAtTime(0.01,now+0.7);
      thudOsc.connect(thudG); thudG.connect(ctx.destination);
      thudOsc.start(now+0.6); thudOsc.stop(now+0.71);
    } catch(e) {}
  };

  // Short mechanical click (noise burst, rising pitch through spin)
  const playClick = (pitch=1.0) => {
    const ctx = getAudioCtx(); if(!ctx) return;
    try {
      const sr = ctx.sampleRate;
      const buf = ctx.createBuffer(1, sr*0.035, sr);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 4);
      const src = ctx.createBufferSource(); src.buffer = buf;
      src.playbackRate.value = 0.6 + pitch * 1.1;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.035);
      src.connect(g); g.connect(ctx.destination); src.start();
    } catch(e) {}
  };

  // makeCoins: 4-layer coin: smack transient + low body tone + bright ring + inharmonic partial + echo
  const makeCoins = (ctx, t, count, spread, vol=0.2) => {
    const sr = ctx.sampleRate;
    for(let i=0;i<count;i++){
      const dt = Math.random() * spread;
      const freq = 2200 + Math.random()*1400; // bright ring 2200-3600Hz

      // Layer 1: noise smack — the hard metal-on-metal impact transient
      const smackLen = Math.floor(sr * 0.016);
      const smackBuf = ctx.createBuffer(1, smackLen, sr);
      const sd = smackBuf.getChannelData(0);
      for(let j=0;j<smackLen;j++) sd[j]=(Math.random()*2-1)*Math.pow(1-j/smackLen,3);
      const smackSrc=ctx.createBufferSource(); smackSrc.buffer=smackBuf;
      const smackHp=ctx.createBiquadFilter(); smackHp.type='highpass'; smackHp.frequency.value=2800;
      const smackG=ctx.createGain();
      smackG.gain.setValueAtTime(vol*2.2, t+dt);
      smackG.gain.exponentialRampToValueAtTime(0.0001, t+dt+0.016);
      smackSrc.connect(smackHp); smackHp.connect(smackG); smackG.connect(ctx.destination);
      smackSrc.start(t+dt);

      // Layer 2: LOW body tone — 500-900Hz, gives the coin mass/weight (not wind-chimey)
      const bodyFreq = 500 + Math.random()*400;
      const bodyOsc=ctx.createOscillator(), bodyG=ctx.createGain();
      bodyOsc.type='sine'; bodyOsc.frequency.value=bodyFreq;
      bodyG.gain.setValueAtTime(0, t+dt);
      bodyG.gain.linearRampToValueAtTime(vol*0.55, t+dt+0.006);
      bodyG.gain.exponentialRampToValueAtTime(0.0001, t+dt+0.12); // dies quickly — just the hit
      bodyOsc.connect(bodyG); bodyG.connect(ctx.destination);
      bodyOsc.start(t+dt); bodyOsc.stop(t+dt+0.13);

      // Layer 3: bright ring-out (fundamental)
      const osc=ctx.createOscillator(), og=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      og.gain.setValueAtTime(0, t+dt);
      og.gain.linearRampToValueAtTime(vol*0.85, t+dt+0.007);
      og.gain.exponentialRampToValueAtTime(0.008, t+dt+0.26);
      osc.connect(og); og.connect(ctx.destination);
      osc.start(t+dt); osc.stop(t+dt+0.27);

      // Layer 4: inharmonic overtone (×2.76) — metallic character, not pure chime
      const osc2=ctx.createOscillator(), og2=ctx.createGain();
      osc2.type='sine'; osc2.frequency.value=freq*2.76;
      og2.gain.setValueAtTime(0, t+dt);
      og2.gain.linearRampToValueAtTime(vol*0.3, t+dt+0.003);
      og2.gain.exponentialRampToValueAtTime(0.0001, t+dt+0.08);
      osc2.connect(og2); og2.connect(ctx.destination);
      osc2.start(t+dt); osc2.stop(t+dt+0.09);

      // Echo: faint delayed repeat (55ms) simulates coin bouncing in the metal tray
      if(Math.random() > 0.4) {
        const echoOsc=ctx.createOscillator(), echoG=ctx.createGain();
        echoOsc.type='sine'; echoOsc.frequency.value=freq*0.97; // slightly detuned echo
        echoG.gain.setValueAtTime(0, t+dt+0.055);
        echoG.gain.linearRampToValueAtTime(vol*0.22, t+dt+0.062);
        echoG.gain.exponentialRampToValueAtTime(0.0001, t+dt+0.18);
        echoOsc.connect(echoG); echoG.connect(ctx.destination);
        echoOsc.start(t+dt+0.055); echoOsc.stop(t+dt+0.19);
      }
    }
  };

  // Standard win: a handful of coins drop into the tray
  const playWinSound = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    try { makeCoins(ctx, ctx.currentTime, 14, 0.8, 0.22); } catch(e) {}
  };

  // Big winner: heavy coin pour — louder, more coins, longer
  const playBigWinSound = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    try {
      const t = ctx.currentTime;
      makeCoins(ctx, t, 30, 1.8, 0.22);
      makeCoins(ctx, t+0.4, 20, 1.0, 0.2);
    } catch(e) {}
  };

  // Jackpot: massive coin flood — three rolling waves
  const playJackpotSound = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    try {
      const t = ctx.currentTime;
      // First wave: explosive burst
      makeCoins(ctx, t,      50, 2.0, 0.25);
      makeCoins(ctx, t+0.5,  40, 1.5, 0.22);
      makeCoins(ctx, t+1.2,  30, 1.2, 0.18);
    } catch(e) {}
  };

  const cleanup = () => {
    clearTimeout(timerRef.current);
    clearTimeout(flashRef.current);
    cancelAnimationFrame(timerRef.current);
    if(animRef.current) cancelAnimationFrame(animRef.current);
  };
  React.useEffect(() => cleanup, []);

  // ── Confetti: burst from centre of card ──────────────────────────
  const launchConfetti = React.useCallback((tierCol, wLevel=0) => {
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const BASE = ['#5b52ff','#00d4b8','#f5c542','#ff5e6c','#3ddc97','#a335ee','#ff8000'];
    const count  = wLevel === 4 ? 220 : wLevel >= 2 ? 160 : 100;
    const spMul  = wLevel === 4 ? 1.6 : wLevel >= 2 ? 1.25 : 1.0;
    const szMul  = wLevel === 4 ? 1.5 : wLevel >= 2 ? 1.2  : 1.0;
    const JACKPOT_COLS = ['#ffe234','#fbbf24','#f59e0b','#fff7a1','#fef9c3','#d97706','#fff'];
    const COLORS = wLevel===4 ? JACKPOT_COLS : tierCol ? [tierCol, tierCol, tierCol, ...BASE] : BASE;
    const cx = canvas.width/2, cy = canvas.height*0.45;
    const pieces = Array.from({length:count}, (_,i) => {
      const angle = (Math.random()*360) * Math.PI/180;
      const speed = (Math.random()*16+4) * spMul;
      return {
        x: cx + (Math.random()-0.5)*30,
        y: cy + (Math.random()-0.5)*30,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - 8*spMul,
        color: COLORS[i % COLORS.length],
        size: (Math.random()*8+3) * szMul,
        rotation: Math.random()*360,
        rotSpeed: (Math.random()-0.5)*15,
        shape: wLevel===4 ? (i%3===0 ? 'star' : 'rect') : Math.random()>0.45 ? 'rect' : 'circle',
        alpha: 1,
        decay: 0.007 + Math.random()*0.006,
      };
    });
    const draw = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      let alive = false;
      pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.45; p.vx *= 0.98;
        p.rotation += p.rotSpeed;
        p.alpha -= p.decay;
        if(p.alpha <= 0) return;
        alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI/180);
        ctx.fillStyle = p.color;
        if(p.shape === 'rect') {
          ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.6);
        } else if(p.shape === 'star') {
          ctx.beginPath();
          for(let s=0;s<5;s++){
            const a1=(s*4*Math.PI/5)-Math.PI/2, a2=((s*4+2)*Math.PI/5)-Math.PI/2;
            s===0?ctx.moveTo(Math.cos(a1)*p.size/2,Math.sin(a1)*p.size/2):ctx.lineTo(Math.cos(a1)*p.size/2,Math.sin(a1)*p.size/2);
            ctx.lineTo(Math.cos(a2)*p.size/4,Math.sin(a2)*p.size/4);
          }
          ctx.closePath(); ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      });
      if(alive) animRef.current = requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    };
    if(animRef.current) cancelAnimationFrame(animRef.current);
    animRef.current = requestAnimationFrame(draw);
  }, []);

  // ── Start: preload then auto-play immediately ─────────────────────
  const startLoad = () => {
    // If revealed and not a jackpot chain continuation, reset chain
    if(phase === 'idle') {
      setChainActive(false);
      setChainCanSpin(false);
      setChainScore(0);
      setChainSpins(0);
      setChainBros([]);
      setShowLbSubmit(false);
      setLbSubmitted(false);
      setLbError('');
    }
    if(!nfts.length || phase==='loading' || phase==='spinning') return;
    getAudioCtx(); // init AudioContext on user gesture before async preload
    playHandlePullSound();
    // 0 = up (rest) → 115 = fully down → spring back to 0
    setHandleRot(115);
    const t1=setTimeout(()=>setHandleRot(0), 950); // spring return after bottom-out
    setCanClaimNow(false);
    setFramesLeft(0);
    claimRef.current = false;
    setLoadPct(0);
    setPicked(null);
    setFrames([]);
    setFlashOn(false);
    const canvas = canvasRef.current;
    if(canvas) { const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }

    const winner = nfts[Math.floor(Math.random()*nfts.length)];
    const pool   = nfts.filter(n => n.ID !== winner.ID);
    const decoys = [];
    while(decoys.length < 24 && pool.length > 0)
      decoys.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
    const allFrames = [...decoys, winner]; // winner = last frame (index 24)

    let done = 0;
    const resolvedFrames = new Array(allFrames.length).fill(null);
    allFrames.forEach((nft, i) => {
      preloadImg(nft.Image, 2500, 400).then(url => {
        resolvedFrames[i] = {...nft, _resolvedUrl: url || buildImgSources(nft.Image, 400)[0]};
        done++;
        setLoadPct(Math.round(done/allFrames.length*100));
        if(done === allFrames.length) {
          setFrames(resolvedFrames);
          setPicked(resolvedFrames[resolvedFrames.length-1]);
          setFrameIdx(0);
          // Auto-launch spin immediately — no GO button
          playSpinAnimation(resolvedFrames, resolvedFrames[resolvedFrames.length-1]);
        }
      });
    });
  };

  // ── Spin: ease-in-out timing, instant reveal, confetti ───────────
  const playSpinAnimation = (resolvedFrames, winner) => {
    setPhase('spinning');
    setFrameIdx(0);

    // Frame timings: fast at start (slot-machine rush), ease out toward end
    // Total ~1.5s for 10 frames: [50,60,70,85,100,120,150,185,230,0]
    // Frame 9 (winner) has 0 delay — it reveals immediately, confetti fires
    // 25 frames: fast slot-machine rush easing to a tense slow finale (~3.2s total)
    const delays = [
      40, 44, 48, 52, 56, 60, 65, 70, 76, 83,   // frames 0-9:  fast rush
      92, 104, 117, 131, 147, 164, 182, 202,      // frames 10-17: decelerating
      225, 378, 420, 465, 510, 563               // frames 18-23: suspense crawl (19-23 ~50% slower)
    ]; // 24 transitions; frame 24 = winner, fires confetti immediately
    // Each frame also gets a brief white-flash on entry
    let tick = 0;
    let claimedFrame = null; // set when user hits stop; holds the NFT to reveal
    const step = () => {
      // If we have a claimed frame queued for reveal, fire it immediately
      if(claimedFrame) {
        const actualWinner = claimedFrame;
        claimedFrame = null;
        const tierInfo  = getRarityTier(actualWinner.diScore);
        const tierCol   = tierInfo ? tierInfo.color : null;
        const wRange    = diScoreToRange(actualWinner.diScore);
        const wLevel    = wRange.lo >= 30 ? 4 : wRange.lo >= 10 ? 3 : wRange.lo >= 5 ? 2 : wRange.lo >= 2 ? 1 : 0;
        setTimeout(() => launchConfetti(tierCol, wLevel), 30);
        setTimeout(() => {
          if(wLevel === 4)      playJackpotSound();
          else if(wLevel >= 2)  playBigWinSound();
          else                  playWinSound();
        }, 60);
        setTimeout(() => {
          setPhase('revealed');
          setPicked(actualWinner);
          const wLv = wRange.lo >= 30 ? 4 : wRange.lo >= 10 ? 3 : wRange.lo >= 5 ? 2 : wRange.lo >= 2 ? 1 : 0;
          const earnedFreeSpin = wLv >= 3;
          if(earnedFreeSpin) {
            setChainActive(true);
            setChainCanSpin(true);
            setChainScore(prev => {
              const next = prev + actualWinner.diScore;
              setChainBros(prevBros => {
                const newBros = [...prevBros, actualWinner];
                setBestChain(bc => {
                  const spins = (bc?.spins||0) + 1;
                  const topBro = (!bc?.topBro || actualWinner.diScore > bc.topBro.diScore) ? actualWinner : bc.topBro;
                  return (!bc || next > bc.score) ? {score:next, spins, bro:actualWinner, topBro, bros:newBros} : {...bc, spins, topBro, bros:newBros};
                });
                return newBros;
              });
              return next;
            });
            setChainSpins(prev => prev + 1);
            setShowLbSubmit(false);
            setLbSubmitted(false);
            setLbError('');
          } else if(chainActive) {
            setChainCanSpin(false);
            setChainScore(prev => {
              const next = prev + actualWinner.diScore;
              setChainBros(prevBros => {
                const newBros = [...prevBros, actualWinner];
                setBestChain(bc => (!bc || next > bc.score) ? {score:next, spins:bc?.spins||0, bro:actualWinner, topBro:bc?.topBro||actualWinner, bros:newBros} : bc);
                return newBros;
              });
              return next;
            });
          }
          setCanClaimNow(false);
          claimRef.current = false;
          claimTickRef.current = -1;
          setBestPick(prev => (!prev || actualWinner.diScore > prev.diScore) ? actualWinner : prev);
        }, 80);
        return;
      }

      // If user hit Stop & Pick: briefly flash back 1 frame (reversal feel), then reveal claimed frame
      if(claimRef.current && tick < resolvedFrames.length - 1) {
        const capturedTick = claimTickRef.current >= 0 ? claimTickRef.current : tick;
        claimedFrame = resolvedFrames[capturedTick] || winner;
        const rewindTo = Math.max(0, capturedTick - 1);
        setFrameIdx(rewindTo);
        setFlashOn(true);
        flashRef.current = setTimeout(() => setFlashOn(false), 60);
        timerRef.current = setTimeout(() => {
          setFrameIdx(capturedTick);
          step(); // re-enter — claimedFrame is set, fires reveal immediately
        }, 120);
        return;
      } else if(tick < resolvedFrames.length - 1) {
        tick++;
        setFrameIdx(tick);
      }
      tickRef.current = tick;
      // Flash effect: short white overlay on each new frame
      setFlashOn(true);
      flashRef.current = setTimeout(() => setFlashOn(false), 60);
      // Click sound — pitch rises as frames slow (increases tension)
      const progress = tick / (resolvedFrames.length - 1);
      playClick(0.3 + progress * 0.9);

      // Enable "Claim Now" button once in the final 10 frames (frame 15+)
      if(tick >= 15) {
        setCanClaimNow(true);
        setFramesLeft(resolvedFrames.length - 1 - tick); // live countdown to winner
      }

      if(tick < resolvedFrames.length - 1) {
        timerRef.current = setTimeout(step, delays[tick] || 250);
      } else {
        // Landed on winner — use whichever frame is at current tick (claimed or natural end)
        const actualWinner = resolvedFrames[tick] || winner;
        // Landed on winner — fire confetti + tiered sound immediately
        const tierInfo  = getRarityTier(actualWinner.diScore);
        const tierCol   = tierInfo ? tierInfo.color : null;
        const wRange    = diScoreToRange(actualWinner.diScore);
        const wLevel    = wRange.lo >= 30 ? 4 : wRange.lo >= 10 ? 3 : wRange.lo >= 5 ? 2 : wRange.lo >= 2 ? 1 : 0;
        setTimeout(() => launchConfetti(tierCol, wLevel), 30);
        setTimeout(() => {
          if(wLevel === 4)      playJackpotSound();
          else if(wLevel >= 2)  playBigWinSound();
          else                  playWinSound();
        }, 60);
        setTimeout(() => {
          setPhase('revealed');
          setPicked(actualWinner);
          const wLv = wRange.lo >= 30 ? 4 : wRange.lo >= 10 ? 3 : wRange.lo >= 5 ? 2 : wRange.lo >= 2 ? 1 : 0;
          const earnedFreeSpin = wLv >= 3; // MEGA WIN (10x–30x) or JACKPOT (30x–50x) = spin again free
          if(earnedFreeSpin) {
            setChainActive(true);
            setChainCanSpin(true); // ← unlocks "Spin Again" handle
            setChainScore(prev => {
              const next = prev + actualWinner.diScore;
              setChainBros(prevBros => {
                const newBros = [...prevBros, actualWinner];
                setBestChain(bc => {
                  const spins = (bc?.spins||0) + 1;
                  const topBro = (!bc?.topBro || actualWinner.diScore > bc.topBro.diScore) ? actualWinner : bc.topBro;
                  return (!bc || next > bc.score) ? {score:next, spins, bro:actualWinner, topBro, bros:newBros} : {...bc, spins, topBro, bros:newBros};
                });
                return newBros;
              });
              return next;
            });
            setChainSpins(prev => prev + 1);
            setShowLbSubmit(false);
            setLbSubmitted(false);
            setLbError('');
          } else if(chainActive) {
            // Below 10x during active chain — add to score, chain ends (no more free spins)
            setChainCanSpin(false);
            setChainScore(prev => {
              const next = prev + actualWinner.diScore;
              setChainBros(prevBros => {
                const newBros = [...prevBros, actualWinner];
                setBestChain(bc => (!bc || next > bc.score) ? {score:next, spins:bc?.spins||0, bro:actualWinner, topBro:bc?.topBro||actualWinner, bros:newBros} : bc);
                return newBros;
              });
              return next;
            });
          }
          setCanClaimNow(false);
          claimRef.current = false;
          claimTickRef.current = -1;
          // Always track best single spin
          setBestPick(prev => (!prev || actualWinner.diScore > prev.diScore) ? actualWinner : prev);
        }, 80);
      }
    };
    stepRef.current = step;
    timerRef.current = setTimeout(step, delays[0]);
  };

  const reset = () => {
    cleanup();
    setPhase('idle');
    setFrames([]);
    setPicked(null);
    setFrameIdx(0);
    setLoadPct(0);
    setFlashOn(false);
    setChainCanSpin(false);
    setChainActive(false);
    setChainScore(0);
    setChainSpins(0);
    setChainBros([]);
    setCanClaimNow(false);
    claimRef.current = false;
    claimTickRef.current = -1;
    tickRef.current = 0;
    // bestPick + bestChain intentionally NOT reset — persist for the whole session
    setShowLbSubmit(false);
    setLbSubmitted(false);
    setLbError('');
    const canvas = canvasRef.current;
    if(canvas) { const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }
  };

  const currentBro =
    (phase==='spinning'||phase==='revealed') ? (frames[frameIdx]||picked) :
    phase==='loading' && frames.length > 0   ? frames[Math.floor(Math.random()*frames.length)] :
    null;

  const isSpinning = phase==='spinning';
  const isRevealed = phase==='revealed';
  const isLoading  = phase==='loading';

  const tierInfo = picked ? getRarityTier(picked.diScore) : null;
  const tierColor = tierInfo ? tierInfo.color : 'var(--teal)';
  const pickedRange = picked ? diScoreToRange(picked.diScore) : null;
  const pickedMultLabel = pickedRange
    ? (pickedRange.lo===pickedRange.hi ? `${pickedRange.lo}x` : `${pickedRange.lo}x\u2013${pickedRange.hi}x`)
    : null;
  // 0 = standard, 1 = big winner (10x–30x), 2 = jackpot (30x–50x)
  const winLevel = pickedRange
    ? (pickedRange.lo >= 30 ? 4 : pickedRange.lo >= 10 ? 3 : pickedRange.lo >= 5 ? 2 : pickedRange.lo >= 2 ? 1 : 0)
    : 0;

  // Border pulses toward tier colour as spin decelerates
  const spinProgress = isSpinning && frames.length ? frameIdx / (frames.length-1) : 0;
  const cardBorder = isRevealed
    ? `2.5px solid ${tierColor}`
    : isSpinning && spinProgress > 0.6
      ? `2px solid var(--pop)`
      : '2px solid var(--line)';
  const cardGlow = isRevealed
    ? `0 0 40px ${tierColor}88, 0 0 80px ${tierColor}22`
    : isSpinning && spinProgress > 0.7
      ? '0 0 18px rgba(91,82,255,.45)'
      : 'none';

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      minHeight:'70vh',padding:'32px 20px',gap:20,
      animation: isRevealed && winLevel===4 ? 'jackpotBg 1.2s ease 0.1s 3' : 'none'}}>

      {/* Title */}
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:32,marginBottom:6,
          animation: isSpinning ? 'mbSpin .4s linear infinite' : 'none'}}>🎲</div>
        <div style={{fontSize:22,fontWeight:900,letterSpacing:'-.02em',color:'var(--txt)'}}>Mystery Bro</div>
        <div style={{fontSize:12,color:'var(--txt3)',marginTop:4,minHeight:18}}>
          {isLoading  ? `Preloading\u2026 ${loadPct}%`
          : isSpinning ? (spinProgress > 0.75 ? 'Almost there\u2026' : spinProgress > 0.4 ? 'Slowing down\u2026' : 'Rolling\u2026')
          : isRevealed ? 'Your Mystery Bro!'
          : 'Discover a random Hemi Bro from the collection'}
        </div>
      </div>

      {/* Card + slot handle row */}
      <div style={{display:'flex',alignItems:'flex-start',gap:0,justifyContent:'center',width:'100%',paddingLeft:54,overflow:'visible'}}>

      <div style={{position:'relative',width:220,height:270}}>
        <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',
          pointerEvents:'none',zIndex:10,borderRadius:18,overflow:'visible'}}/>

        <div style={{
          width:220,height:220,borderRadius:18,overflow:'hidden',
          border: cardBorder,
          background:'var(--ink3)',
          boxShadow: cardGlow,
          transition:'border-color .15s, box-shadow .15s',
          transform: isRevealed ? 'scale(1.04)' : 'scale(1.0)',
          transitionProperty:'border-color,box-shadow,transform',
          transitionDuration: isRevealed ? '.3s' : '.15s',
        }}>
          {/* Flash — inside card so overflow:hidden clips it to exactly 220×220 */}
          {flashOn && (
            <div style={{position:'absolute',inset:0,zIndex:8,
              background:'rgba(255,255,255,0.20)',pointerEvents:'none'}}/>
          )}

          {/* Loading bar inside card */}
          {isLoading && (
            <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',
              alignItems:'center',justifyContent:'center',gap:14,background:'var(--ink2)'}}>
              <div style={{fontSize:36,animation:'mbSpin .8s linear infinite'}}>🎰</div>
              <div style={{width:130,height:5,background:'var(--ink4)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${loadPct}%`,
                  background:'linear-gradient(90deg,var(--pop),var(--teal))',
                  borderRadius:3,transition:'width .15s'}}/>
              </div>
              <div style={{fontSize:10,color:'var(--txt3)',fontFamily:'Space Mono,monospace',
                letterSpacing:'.06em'}}>{loadPct}%</div>
            </div>
          )}

          {/* Idle placeholder */}
          {phase==='idle' && (
            <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',
              justifyContent:'center',fontSize:52,opacity:.12}}>🎲</div>
          )}

          {/* Spinning frames — key forces img remount on each frame for instant swap */}
          {isSpinning && currentBro && (
            <img key={`frame-${frameIdx}`}
              src={currentBro._resolvedUrl||currentBro.Image}
              alt={`#${currentBro.ID}`}
              style={{width:'100%',height:'100%',objectFit:'cover',
                filter: spinProgress < 0.5
                  ? 'brightness(0.6) saturate(1.5) blur(1px)'
                  : spinProgress < 0.8
                    ? 'brightness(0.8) saturate(1.2)'
                    : 'brightness(1.0) saturate(1.0)',
                transition:'filter .06s'}}/>
          )}
          {/* STOP & CLAIM overlay — appears once in final 10 frames */}
          {isSpinning && canClaimNow && (
            <div style={{position:'absolute',bottom:12,left:'50%',transform:'translateX(-50%)',
              zIndex:30,animation:'fadeInUp .18s ease'}}>
              <button
                onClick={()=>{ claimRef.current = true; }}
                style={{padding:'9px 24px',borderRadius:20,fontSize:13,fontWeight:900,
                  background:'linear-gradient(135deg,#fbbf24,#f59e0b)',
                  color:'#000',border:'none',cursor:'pointer',whiteSpace:'nowrap',
                  boxShadow:'0 0 20px rgba(251,191,36,0.75)',
                  letterSpacing:'.05em'}}>
                ⚡ STOP &amp; CLAIM
              </button>
            </div>
          )}

          {/* Revealed */}
          {isRevealed && currentBro && (
            <img src={currentBro._resolvedUrl||currentBro.Image}
              alt={`#${currentBro.ID}`}
              style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          )}
        </div>

        {/* Winner badge fades in on reveal */}
        {isRevealed && picked && (
          <div style={{position:'absolute',bottom:6,left:'50%',transform:'translateX(-50%)',
            background: tierColor,
            borderRadius:8,padding:'4px 14px',fontSize:12,fontWeight:800,
            color:'#000',whiteSpace:'nowrap',
            boxShadow:`0 2px 14px ${tierColor}99`,
            animation:'fadeInUp .3s ease'}}>
            #{picked.ID}
          </div>
        )}

        {/* 3D win label — text + style scales with winLevel */}
        {isRevealed && (() => {
          const cfg = winLevel === 4
            ? { text:'JACKPOT!!!',  fontSize:28, grad:'linear-gradient(180deg,#fff 0%,#ffe234 15%,#f59e0b 40%,#fff7a1 60%,#b45309 80%,#fbbf24 100%)', shine:'winnerShine .9s linear infinite', shadow:'drop-shadow(0 1px 0 #92400e) drop-shadow(0 4px 0 #78350f) drop-shadow(0 8px 16px rgba(0,0,0,.8))', anim:'winnerPop .55s cubic-bezier(.18,1.4,.4,1) forwards', extra:'jackpotPulse .35s ease-in-out infinite alternate', topOff:-36 }
            : winLevel === 3
            ? { text:'MEGA WIN!',   fontSize:26, grad:'linear-gradient(180deg,#e0f2fe 0%,#38bdf8 20%,#0284c7 45%,#bae6fd 65%,#0369a1 85%,#7dd3fc 100%)', shine:'winnerShine 1.1s linear infinite', shadow:'drop-shadow(0 1px 0 #075985) drop-shadow(0 4px 0 #0c4a6e) drop-shadow(0 7px 14px rgba(0,0,0,.8))', anim:'winnerPop .57s cubic-bezier(.18,1.4,.4,1) forwards', extra:'jackpotPulse .4s ease-in-out infinite alternate', topOff:-34 }
            : winLevel === 2
            ? { text:'SUPER WIN!',  fontSize:25, grad:'linear-gradient(180deg,#fdf4ff 0%,#e879f9 20%,#a21caf 45%,#f5d0fe 65%,#86198f 85%,#d946ef 100%)', shine:'winnerShine 1.3s linear infinite', shadow:'drop-shadow(0 1px 0 #701a75) drop-shadow(0 3px 0 #4a044e) drop-shadow(0 6px 12px rgba(0,0,0,.75))', anim:'winnerPop .6s cubic-bezier(.22,1.2,.36,1) forwards', extra:'', topOff:-32 }
            : winLevel === 1
            ? { text:'BIG WIN!',    fontSize:27, grad:'linear-gradient(180deg,#fff7a1 0%,#ffe234 25%,#f59e0b 50%,#fef9c3 65%,#b45309 85%,#fbbf24 100%)', shine:'winnerShine 1.5s linear infinite', shadow:'drop-shadow(0 1px 0 #92400e) drop-shadow(0 3px 0 #78350f) drop-shadow(0 6px 12px rgba(0,0,0,.75))', anim:'winnerPop .62s cubic-bezier(.22,1.2,.36,1) forwards', extra:'', topOff:-30 }
            : { text:'WINNER!',     fontSize:30, grad:'linear-gradient(180deg,#fff7a1 0%,#ffe234 20%,#f59e0b 45%,#fef9c3 60%,#b45309 80%,#fbbf24 100%)', shine:'winnerShine 1.8s linear infinite', shadow:'drop-shadow(0 1px 0 #92400e) drop-shadow(0 3px 0 #78350f) drop-shadow(0 5px 10px rgba(0,0,0,.7))',  anim:'winnerPop .65s cubic-bezier(.22,1.2,.36,1) forwards', extra:'', topOff:-28 };
          return (
            <div style={{position:'absolute', top:cfg.topOff, left:'50%',
              zIndex:20, pointerEvents:'none',
              transformOrigin:'bottom center',
              animation:cfg.anim}}>
              {winLevel>=3 && (

              ViewBox 0 0 56 220. Pivot at (28, 32).

              staying within the wider filter margins but never going negative-Y.

                  <stop offset="65%"  stopColor="#aa0f0f"/>
                  <stop offset="100%" stopColor="#5a0000"/>

                  <feDropShadow dx="2" dy="3" stdDeviation="3" floodOpacity="0.5"/>

              <circle cx="18" cy="32" r="6"  fill="#94a3b8"/>
              <circle cx="15" cy="29" r="2"  fill="#e2e8f0" opacity="0.7"/>

              {/*
                Arm group — pivot at (18, 32).
                At handleRot=0:   arm hangs straight DOWN  → ball at (18, 170). Inside box ✓
                At handleRot=-100: arm has swung ~left-upward → ball at roughly (18-130sin, 32+130cos(-100°))
                  = (18-128, 32-23) ≈ (-110, 9) — this goes off left. Bad.

                Better: pivot bottom, arm goes UP. Keep the ball always inside by
                placing pivot at BOTTOM of the SVG and arm pointing UP:
                pivot at (28, 190). Rest: ball at top y≈35. Pull: +100° clockwise → ball swings right.
                viewBox width 56, so ball at x=28 stays centred, and at +100° it swings to x~28+130sin(100°)=156 — off right.

                Cleanest solution that truly can't clip:
                Make a SHORT arm (length 90px). Pivot in MIDDLE vertically (y=110).
                Rest (0°): arm straight UP, ball at y=20. That's still near top of a 220px box — fine.
                Pulled (90°): arm horizontal, ball at x=28+90=118 — off right of 56px wide box.

                The ONLY way to guarantee no clipping with rotation is to make the
                arm short enough that at ALL angles it stays within the padded viewBox.
                Arm length 60px, pivot at (28,130), ball radius 20.
                Rest (0°): ball at (28, 130-60) = (28, 70). ✓
                Pulled (90°): ball at (28+60, 130) = (88, 130) → off 56px wide box still.

                TRUE fix: don't rotate a long arm. Instead animate the ball position
                directly using CSS translateX/translateY — no rotation, no clip risk.
                Ball travels: rest=(28,55) → pulled=(28,155). Pure vertical translation.
              */}
              {/* Shaft — static vertical chrome rod */}

            </svg>
          </div>

          55% {opacity:1;transform:translateX(-50%) translateY(-18px) scale(1.18) rotateX(-8deg);}
          75% {transform:translateX(-50%) translateY(-6px) scale(0.96) rotateX(3deg);}
          88% {transform:translateX(-50%) translateY(-14px) scale(1.05) rotateX(-2deg);}

        @keyframes winnerShine{

          100%{background-position:-200% center;}

        @keyframes jackpotPulse{
          from{filter:drop-shadow(0 1px 0 #92400e) drop-shadow(0 4px 0 #78350f) drop-shadow(0 8px 16px rgba(0,0,0,.8)) drop-shadow(0 0 12px #ffe234);}
          to  {filter:drop-shadow(0 1px 0 #92400e) drop-shadow(0 4px 0 #78350f) drop-shadow(0 8px 16px rgba(0,0,0,.8)) drop-shadow(0 0 28px #fff7a1);}

          from{opacity:.5;transform:scale(.95);}
          to  {opacity:1;transform:scale(1.05);}

          65% {transform:translateY(-4px);}

          100%{transform:translateY(0);}
        }
      `}</style>

  );
};

const TAB_GROUPS = {
  home:      {icon:'🏠', label:'Home',      views:['home']},
  browse:    {icon:'🖼',  label:'Browse',    views:['gallery','leaderboard','encyclopedia','cooccurrence','traitgallery']},
  analytics: {icon:'📊', label:'Analytics', views:['stats','exchange','dimodel','holders']},
  mystuff:   {icon:'👤', label:'My Stuff',  views:['watchlist','feed','builder']},
  more:      {icon:'☰',  label:'More',      views:['arcade','battle','pricecheck']},
};
const TAB_KEYS = Object.keys(TAB_GROUPS);
const viewToTab = (v) => TAB_KEYS.find(tk => TAB_GROUPS[tk].views.includes(v)) || 'home';

/* ════════════════════════════════════
   AMBIENT ART — Faint NFT collage background
   Scattered NFT thumbnails as atmospheric texture.
   Only renders on home screen for performance.
════════════════════════════════════ */
const AmbientArt = React.memo(({nfts}) => {
  const tiles = React.useMemo(()=>{
    if(!nfts.length) return [];
    // Pick 20 random NFTs spread across the collection
    const step = Math.max(1, Math.floor(nfts.length / 20));
    const picked = [];
    for(let i=0; i<nfts.length && picked.length<20; i+=step){
      picked.push(nfts[i]);
    }
    // Position them in a scattered grid pattern
    return picked.map((n,i)=>{
      const col = i % 5;
      const row = Math.floor(i / 5);
      const x = col * 20 + (row % 2 ? 10 : 0) + (Math.random()*6-3);
      const y = row * 25 + (Math.random()*8-4);
      return {id:n.ID, src:wsrvUrl(n.Image,48), x, y, rot:(Math.random()-0.5)*20};
    });
  },[nfts]);

  if(!tiles.length) return null;

  return (
    <div className="ambient-grid">
      {tiles.map(t=>(
        <img key={t.id} src={t.src} alt=""
          style={{left:t.x+'%',top:t.y+'%',transform:`rotate(${t.rot}deg)`}}
          loading="lazy" decoding="async"/>
      ))}
    </div>
  );
});


const BottomTabBar = ({view, setView, onMoreTap}) => {
  const activeTab = viewToTab(view);
  return (
    <div className="btab-bar">
      <div className="btab-bar-inner">
        {TAB_KEYS.map(tk => {
          const {icon, label, views} = TAB_GROUPS[tk];
          const isActive = activeTab === tk;
          const handleTap = () => {
            if(tk === 'more') { onMoreTap(); return; }
            setView(views[0]);
          };
          return (
            <button key={tk} className={`btab${isActive?' active':''}`} onClick={handleTap}>
              <span className="btab-icon">{icon}</span>
              <span className="btab-label">{label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
};


const App=()=>{
  // ── Data loading ──
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  useEffect(()=>{
    loadData().then(d=>{setData(d);setLoading(false);}).catch(e=>{setError(e.message);setLoading(false);});
  },[]);

  // ── UI state ──
  const [view,         setView]         = useState('home');
  const [homeQ,        setHomeQ]        = useState('');
  const [selected,     setSelected]     = useState(null);
  const [sidebar,      setSidebar]      = useState(true);
  const [openCat,      setOpenCat]      = useState(null); // auto-expand a category in filter sidebar
  const [sheet,        setSheet]        = useState(false);
  const [navDrawer,    setNavDrawer]    = useState(false);
  const [theme, setTheme] = useState(()=>{
    try{ return localStorage.getItem('hb_theme')||'dark'; }catch{ return 'dark'; }
  });
  useEffect(()=>{
    document.documentElement.classList.toggle('light', theme==='light');
    try{localStorage.setItem('hb_theme',theme);}catch{}
  },[theme]);
  const [toast,        setToast]        = useState({msg:'',show:false});
  const [compareBros,  setCompareBros]  = useState([]);
  const [showCompare,  setShowCompare]  = useState(false);
  const [deepLinkDone, setDeepLinkDone] = useState(false);

  // ── Persisted state ──
  const [recentlyViewed, setRecentlyViewed] = useState(()=>{
    try{const s=localStorage.getItem('hb_recent');return s?JSON.parse(s):[];}catch{return [];}
  });
  const [watchlist, setWatchlist] = useState(()=>{
    try{const s=localStorage.getItem('hb_watch');return s?new Set(JSON.parse(s)):new Set();}catch{return new Set();}
  });

  // ── ETH price ──
  const [ethPrice, setEthPrice] = useState(null);
  useEffect(()=>{
    if(!FEATURES.ethPrice) return;
    fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd')
      .then(r=>r.json()).then(d=>setEthPrice(d?.ethereum?.usd||null)).catch(()=>{});
  },[]);

  const nfts              = data?.nfts||[];
  const traitMap          = data?.traitMap||{};
  const salesMap          = data?.salesMap||{};
  const globalLatestFloor = data?.globalLatestFloor||null;
  const floorHistory      = data?.floorHistory||[];

  // ── Floor valuation method (persisted) ──
  // 'current' = global latest hist floor (default)
  // 'sale'    = most recent sale's hist floor per NFT
  // 'custom'  = user-defined slider
  const [floorMethod, setFloorMethodState] = useState(()=>{
    try{ const v=localStorage.getItem('hb_floor_method'); return ['current','sale','custom'].includes(v)?v:'current'; }catch{ return 'current'; }
  });
  const setFloorMethod = useCallback(v=>{ setFloorMethodState(v); try{localStorage.setItem('hb_floor_method',v);}catch{}; },[]);

  // ── Custom floor range (persisted, used when floorMethod==='custom') ──
  const [floorLo, setFloorLoState] = useState(()=>{ try{const v=parseFloat(localStorage.getItem('hb_floor_lo'));return(!isNaN(v)&&v>0)?v:FLOOR_LO;}catch{return FLOOR_LO;} });
  const [floorHi, setFloorHiState] = useState(()=>{ try{const v=parseFloat(localStorage.getItem('hb_floor_hi'));return(!isNaN(v)&&v>0)?v:FLOOR_HI;}catch{return FLOOR_HI;} });
  const setFloorLo = useCallback(v=>{ setFloorLoState(v); try{localStorage.setItem('hb_floor_lo',v);}catch{} },[]);
  const setFloorHi = useCallback(v=>{ setFloorHiState(v); try{localStorage.setItem('hb_floor_hi',v);}catch{} },[]);
  const resetFloor = useCallback(()=>{ setFloorLoState(FLOOR_LO); setFloorHiState(FLOOR_HI); try{localStorage.removeItem('hb_floor_lo');localStorage.removeItem('hb_floor_hi');}catch{} },[]);

  // ── Score overrides (DI Model editor) ──
  const [scoreOverrides, setScoreOverrides] = useState(()=>{
    try{const s=localStorage.getItem('hb_score_overrides');return s?JSON.parse(s):{};}catch{return {};}
  });
  const setScoreOverride = useCallback((key, val)=>{
    setScoreOverrides(prev=>{
      const next={...prev};
      if(val===null) delete next[key]; else next[key]=val;
      try{localStorage.setItem('hb_score_overrides',JSON.stringify(next));}catch{}
      return next;
    });
  },[]);
  const resetAllOverrides = useCallback(()=>{
    setScoreOverrides({});
    try{localStorage.removeItem('hb_score_overrides');}catch{}
  },[]);
  const overrideCount = Object.keys(scoreOverrides).length;
  // All views consume effectiveTraitMap — overrides merged on top of loaded data
  const effectiveTraitMap = useMemo(()=>{
    if(!overrideCount) return traitMap;
    const out={...traitMap};
    Object.entries(scoreOverrides).forEach(([k,v])=>{ if(out[k]) out[k]={...out[k],adjustedScore:v}; });
    return out;
  },[traitMap,scoreOverrides,overrideCount]);

  // Recompute per-NFT diScore when trait overrides are active.
  // For each NFT, sum the delta of (effective - base) adjustedScore across its traits,
  // add to the CSV diScore, then re-rank the whole collection.
  const effectiveNftsArray = useMemo(()=>{
    if(!overrideCount) return nfts;
    const updated = nfts.map(nft => {
      let delta = 0;
      CATS.forEach(cat => {
        const val = nft[cat]; if(!val) return;
        const name = String(val).split('(')[0].trim();
        const key = tk(cat, name); if(!key) return;
        const base = traitMap[key]?.adjustedScore || 0;
        const eff  = effectiveTraitMap[key]?.adjustedScore || 0;
        delta += (eff - base);
      });
      return delta === 0 ? nft : {...nft, diScore: Math.max(0, nft.diScore + delta), originalRank: nft.rank, originalDiScore: nft.diScore};
    });
    // Re-rank by new diScore
    const sorted = [...updated].sort((a,b) => b.diScore - a.diScore);
    const rankMap = {};
    sorted.forEach((n,i) => { rankMap[n.ID] = i + 1; });
    return updated.map(n => {
      const newRank = rankMap[n.ID];
      if(newRank === n.rank) return n;
      return {...n, rank: newRank, originalRank: n.originalRank ?? n.rank};
    });
  },[nfts, traitMap, effectiveTraitMap, overrideCount]);

  // ── Gallery state (all filter/sort logic) ──
  const gs = useGalleryState(effectiveNftsArray, effectiveTraitMap);

  // ── Deep link ──
  useEffect(()=>{
    if(!data||deepLinkDone||!FEATURES.deepLinks) return;
    const id=new URLSearchParams(window.location.search).get('id');
    if(id){ const nft=data.nfts.find(n=>String(n.ID)===id); if(nft){setSelected(nft);setView('gallery');} }
    setDeepLinkDone(true);
  },[data, deepLinkDone]);

  // ── Keyboard navigation + shortcuts ──
  const [showKbHelp, setShowKbHelp] = useState(false);
  useEffect(()=>{
    const handler=e=>{
      const tag=e.target.tagName;
      if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'){
        if(e.key==='Escape') e.target.blur();
        return;
      }
      if(e.key==='Escape'){setSelected(null);setShowCompare(false);setShowKbHelp(false);return;}
      if(e.key==='?'){e.preventDefault();setShowKbHelp(p=>!p);return;}
      if(e.key==='/'){e.preventDefault();const inp=document.querySelector('.srch');if(inp)inp.focus();return;}
      if(!selected||showCompare) return;
      const idx=effectiveNftsArray.findIndex(n=>n.ID===selected.ID);
      if(e.key==='ArrowRight'||e.key==='ArrowDown'){const next=effectiveNftsArray[idx+1];if(next)setSelected(next);}
      if(e.key==='ArrowLeft'||e.key==='ArrowUp'){const prev=effectiveNftsArray[idx-1];if(prev)setSelected(prev);}
      if(e.key==='w'&&toggleWatch){toggleWatch(selected.ID);showToast(watchlist.has(selected.ID)?'Removed from watchlist':'Added to watchlist');}
      if(e.key==='c'&&handleAddCompare){handleAddCompare(selected);}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[selected,nfts,showCompare,toggleWatch,watchlist,handleAddCompare,showToast]);

  // ── Callbacks ──
  const showToast    = useCallback((msg)=>{setToast({msg,show:true});setTimeout(()=>setToast(t=>({...t,show:false})),2200);},[]);
  const addToRecent  = useCallback((nft)=>{
    setRecentlyViewed(prev=>{
      const next=[nft,...prev.filter(n=>n.ID!==nft.ID)].slice(0,8);
      try{localStorage.setItem('hb_recent',JSON.stringify(next));}catch{}
      return next;
    });
  },[]);
  const toggleWatch  = useCallback((id)=>{
    setWatchlist(prev=>{
      const next=new Set(prev); next.has(id)?next.delete(id):next.add(id);
      try{localStorage.setItem('hb_watch',JSON.stringify([...next]));}catch{}
      return next;
    });
  },[]);
  const isWatched    = useCallback((id)=>watchlist.has(id),[watchlist]);
  const handleCardClick = useCallback(nft=>{setSelected(nft);addToRecent(nft);},[addToRecent]);
  const handleAddCompare = useCallback(nft=>{
    setCompareBros(prev=>{
      if(prev.find(n=>n.ID===nft.ID)){showToast('Already in compare');return prev;}
      if(prev.length>=4){showToast('Max 4 Bros to compare');return prev;}
      return [...prev,nft];
    });
    showToast(`#${nft.ID} added to compare`);
  },[showToast]);

  const [encDetail, setEncDetail] = useState(null);

  // Shared helper: open ItemDetailModal for any cat/name from any view
  const onOpenItemDetail = useCallback((cat,name)=>{
    const key=tk(cat,name); if(!key) return;
    const detail = effectiveTraitMap[key]||null;
    const supply = detail?.Supply||'?';
    const bonus  = detail?.adjustedScore||0;
    setEncDetail({name, detail, supply, bonus, label:cat});
  },[effectiveTraitMap]);
  const onEncPick = onOpenItemDetail;

  // View in Collection: filter gallery to NFTs with that trait, sorted score_desc
  const onViewInCollection = useCallback((item)=>{
    const cat = item.label;
    const name = item.name;
    const matchingNft = effectiveNftsArray.find(n => {
      const v = n[cat]; if(!v) return false;
      return String(v).split('(')[0].trim() === name;
    });
    const fullVal = matchingNft ? matchingNft[cat] : name;
    gs.setFilters({traits:{[cat]:[fullVal]}, families:[]});
    gs.setSearch('');
    gs.setSortKey('score_desc');
    setView('gallery');
  },[effectiveNftsArray, gs]);

  // Holders: click wallet address → fetch their NFTs and jump to gallery with wallet filter
  const onViewWallet = useCallback(async (address) => {
    showToast('Loading wallet\u2026');
    try {
      const ids = await fetchWalletNFTs(address, () => {});
      if(ids.length === 0) {
        showToast('No Hemi Bros found for that wallet');
        return;
      }
      gs.setOwnedIds(ids);
      gs.setWalletFilter(true);
      gs.setSearch('');
      gs.setSortKey('score_desc');
      gs.setFilters({traits:{},families:[]});
      setView('gallery');
      showToast(`Showing ${ids.length} Bro${ids.length!==1?'s':''} for that wallet`);
    } catch(e) {
      showToast('Failed to load wallet: ' + e.message);
    }
  },[showToast, gs]);

  const commitHome = useCallback(()=>{
    const q=homeQ.trim(); if(!q) return;
    gs.setSearch(q); setView('gallery');
  },[homeQ, gs]);

  const debouncedHomeQ = useDebounce(homeQ, 120);
  const homePreview   = useMemo(()=>{ const q=debouncedHomeQ.trim();if(!q)return null;return effectiveNftsArray.find(n=>String(n.ID).startsWith(q))||null;},[effectiveNftsArray,debouncedHomeQ]);
  const homeMatchCount= useMemo(()=>{ const q=debouncedHomeQ.trim();if(!q)return 0;return effectiveNftsArray.filter(n=>String(n.ID).startsWith(q)).length;},[effectiveNftsArray,debouncedHomeQ]);
  const homeShowcase  = useMemo(()=>{
    if(!effectiveNftsArray.length) return [];
    const top200 = [...effectiveNftsArray].sort((a,b)=>b.diScore-a.diScore).slice(0,200);
    const shuffled = [...top200].sort(()=>Math.random()-0.5);
    return shuffled.slice(0,12);
  },[effectiveNftsArray]);
  const headerMascot = useMemo(()=>{
    if(!effectiveNftsArray.length) return null;
    const top50 = [...effectiveNftsArray].sort((a,b)=>b.diScore-a.diScore).slice(0,50);
    return top50[Math.floor(Math.random()*top50.length)]||null;
  },[effectiveNftsArray]);
  const homeSalesCount = useMemo(()=>effectiveNftsArray.reduce((sum,n)=>(n.sales?sum+n.sales.length:sum),0),[effectiveNftsArray]);
  const marketSentiment = useMemo(()=>{
    const now = new Date();
    const d30 = new Date(now.getTime() - 30*86400000);
    const d60 = new Date(now.getTime() - 60*86400000);
    const recent=[], prior=[];
    effectiveNftsArray.forEach(n=>{
      (n.sales||[]).forEach(s=>{
        const p=parseFloat(s.price)||0; const d=new Date(s.date);
        if(!p||isNaN(d.getTime())) return;
        if(d>=d30) recent.push(p);
        else if(d>=d60) prior.push(p);
      });
    });
    if(!recent.length&&!prior.length) return null;
    const rAvg = recent.length ? recent.reduce((a,b)=>a+b,0)/recent.length : 0;
    const pAvg = prior.length ? prior.reduce((a,b)=>a+b,0)/prior.length : 0;
    const trend = pAvg>0 ? ((rAvg-pAvg)/pAvg*100) : 0;
    return {recentCount:recent.length, priorCount:prior.length, rAvg, pAvg, trend};
  },[effectiveNftsArray]);
  const homeRecentSales = useMemo(()=>{
    const all = [];
    effectiveNftsArray.forEach(n=>{
      (n.sales||[]).forEach(s=>{
        const p = parseFloat(s.price)||0;
        const d = new Date(s.date);
        if(p>0 && !isNaN(d.getTime())) all.push({nft:n, price:p, date:d, histFloorLo:s.histFloorLo, histFloorHi:s.histFloorHi});
      });
    });
    all.sort((a,b)=>b.date-a.date);
    return all.slice(0,8);
  },[effectiveNftsArray]);

  // ── Build context value ──
  const ctx = useMemo(()=>({
    nfts: effectiveNftsArray, traitMap: effectiveTraitMap, ethPrice,
    selected, setSelected,
    view, setView,
    watchlist, toggleWatch, isWatched,
    handleCardClick, handleAddCompare,
    addToRecent,
  }),[effectiveNftsArray, effectiveTraitMap, ethPrice, selected, view, watchlist, toggleWatch, isWatched, handleCardClick, handleAddCompare, addToRecent]);

  /* ── Loading / Error ── */
  if(loading) return <div className="shell"><div className="state-box" style={{background:'radial-gradient(ellipse at center, rgba(91,82,255,.06) 0%, transparent 70%)',position:'relative'}}>
      <div style={{fontFamily:'VT323,monospace',fontSize:'2.8rem',letterSpacing:'.1em',color:'var(--txt)',lineHeight:1}}>HEMI<span style={{color:'var(--teal)'}}>BROS</span></div>
      <div className="spinner"/>
      <div style={{fontSize:11,color:'var(--txt3)',letterSpacing:'.06em'}}>Loading collection…</div>
      <div style={{fontSize:9,color:'var(--txt3)',marginTop:12,opacity:.5}}>The Flagship NFT Collection on Hemi</div>
    </div></div>;
  if(error)   return <div className="shell"><div className="state-box"><div className="big">Error</div><div style={{fontSize:12,color:'var(--txt3)',marginTop:4,maxWidth:320}}>{error}</div></div></div>;

  const isGallery = view==='gallery';
  const showSearch= VIEW_REGISTRY[view]?.showSearch||false;
  const showSort  = isGallery;
  const showFilBar= isGallery && gs.totalActive>0;

  /* ── RENDER ── */
  return(
    <AppCtx.Provider value={ctx}>
    <div className="shell">

      {/* ══ HEADER ══ */}
      <header className="hd">
        <div className="logo" onClick={()=>{setView('home');gs.setSearch('');gs.setFilters({traits:{},families:[]});setHomeQ('');}}>
              {headerMascot&&<img src={wsrvUrl(headerMascot.Image,32)} alt="" style={{width:26,height:26,borderRadius:6,objectFit:'cover',border:'1px solid var(--line)',marginRight:6,verticalAlign:'middle',display:'inline-block'}}/>}
              HEMI<em>BROS</em></div>
        {showSearch&&(
          <div className="srch-wrap">
            <span className="srch-ico">{I.search}</span>
            <input className="srch" placeholder="ID or trait name…" value={gs.search} onChange={e=>gs.setSearch(e.target.value)} type="text" inputMode="text" autoComplete="off" autoCapitalize="none"/>
            {gs.search&&<button className="srch-x" onClick={()=>gs.setSearch('')}>{I.x}</button>}
          </div>
        )}
        <div className="hd-right">
          {NAV_VIEWS.map(({k,icon,label})=>(
            <button key={k} className={`tbtn desktop-only ${view===k?'on':''}`} onClick={()=>setView(k)} title={label}>
              {icon}<span style={{fontSize:11}}>{label}</span>
            </button>

            <div className="sheet-body">
              {/* ── Rarity quick-filter ── */}
              <div style={{padding:'10px 14px',display:'flex',gap:5,flexWrap:'wrap',borderBottom:'1px solid var(--line)',alignItems:'center'}}>
                <span style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginRight:2}}>Rarity</span>
                {[
                  {label:'Grail',tiers:['Grail'],color:'var(--r-grail)'},
                  {label:'Legend+',tiers:['Grail','Legendary'],color:'var(--r-legendary)'},
                  {label:'Epic+',tiers:['Grail','Legendary','Epic'],color:'var(--r-epic)'},
                  {label:'Rare+',tiers:['Grail','Legendary','Epic','Rare'],color:'var(--r-rare)'},
                ].map(({label,tiers,color})=>{
                  const active=tiers.every(t=>gs.rarityFilter.includes(t))&&gs.rarityFilter.length===tiers.length;
                  return(<button key={label} onClick={()=>gs.setRarityFilter(active?[]:tiers)} style={{
                    padding:'4px 10px',borderRadius:20,fontSize:10,fontWeight:700,
                    background:active?color+'22':'var(--ink3)',
                    border:`1.5px solid ${active?color:'var(--line)'}`,
                    color:active?color:'var(--txt2)',cursor:'pointer',flexShrink:0,transition:'all .1s'
                  }}>{label}</button>);
                })}
                {FEATURES.ipFilter&&(
                  <button onClick={()=>gs.setHideIp(!gs.hideIp)} style={{padding:'4px 10px',borderRadius:20,fontSize:10,fontWeight:700,
                    background:gs.hideIp?'rgba(245,197,66,.12)':'var(--ink3)',border:`1.5px solid ${gs.hideIp?'var(--gold)':'var(--line)'}`,
                    color:gs.hideIp?'var(--gold)':'var(--txt2)',cursor:'pointer',flexShrink:0}}>
                    {gs.hideIp?'✓ ':''} No IP
                  </button>
                )}
              </div>
              {/* ── Score range ── */}
              <div style={{padding:'8px 14px 10px',borderBottom:'1px solid var(--line)',display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',flexShrink:0}}>Score</span>
                <input style={{flex:1,height:28,background:'var(--ink)',border:'1.5px solid var(--line)',borderRadius:6,
                  color:'var(--txt)',fontSize:11,padding:'0 8px',outline:'none',fontFamily:'Space Mono,monospace'}}
                  placeholder="Min" value={gs.scoreMin} onChange={e=>gs.setScoreMin(e.target.value)} type="number"/>
                <span style={{color:'var(--txt3)',fontSize:10}}>–</span>
                <input style={{flex:1,height:28,background:'var(--ink)',border:'1.5px solid var(--line)',borderRadius:6,
                  color:'var(--txt)',fontSize:11,padding:'0 8px',outline:'none',fontFamily:'Space Mono,monospace'}}
                  placeholder="Max" value={gs.scoreMax} onChange={e=>gs.setScoreMax(e.target.value)} type="number"/>
              </div>
              {/* ── Trait filters ── */}
              <FilterContent filters={gs.filters} setFilters={gs.setFilters} traitOpts={gs.traitOpts} traitMap={effectiveTraitMap} facetedCounts={gs.facetedCounts} famCounts={gs.famCounts} openCat={openCat} setOpenCat={setOpenCat}/>
              {/* ── Wallet + Portfolio (at bottom) ── */}
              {FEATURES.walletConnect&&<WalletSection ownedIds={gs.ownedIds} setOwnedIds={gs.setOwnedIds} walletFilter={gs.walletFilter} setWalletFilter={gs.setWalletFilter} nfts={effectiveNftsArray}/>}
              {FEATURES.portfolio&&<PortfolioCalc ownedNfts={gs.ownedNfts}/>}
              {FEATURES.portfolio&&gs.ownedNfts.length>0&&<PortfolioSummary ownedNfts={gs.ownedNfts} allNfts={effectiveNftsArray}/>}
            </div>
            <div className="sheet-ft">
              <button className="sheet-apply" onClick={()=>setSheet(false)}>Show {gs.filtered.length} result{gs.filtered.length!==1?'s':''}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Compare bar ── */}
      {FEATURES.compareMode&&(
        <div className={`compare-bar ${compareBros.length>0?'open':''}`}>
          <div className="compare-count">{I.compare} Compare ({compareBros.length}/4)</div>
          <div className="compare-slots">
            {compareBros.map(n=>(<div key={n.ID} className="compare-slot filled" title={`Bro #${n.ID}`}><img src={wsrvUrl(n.Image,80)} alt={`#${n.ID}`} loading="lazy"/><div className="cs-rm" onClick={e=>{e.stopPropagation();setCompareBros(p=>p.filter(x=>x.ID!==n.ID));}}>×</div></div>))}
            {Array.from({length:4-compareBros.length}).map((_,i)=>(<div key={i} className="compare-slot"/>))}
          </div>
          <button className="compare-open-btn" disabled={compareBros.length<2} onClick={()=>setShowCompare(true)}>Compare</button>
          <button className="compare-clear" onClick={()=>setCompareBros([])}>Clear</button>
        </div>
      )}

      {/* ── Modal ── */}
      {selected&&(
        <Modal
          nft={effectiveNftsArray.find(n=>n.ID===selected.ID)||selected}
          traitMap={effectiveTraitMap} originalTraitMap={traitMap}
          nfts={effectiveNftsArray} ethPriceVal={ethPrice}
          onClose={()=>setSelected(null)} onAddCompare={FEATURES.compareMode?handleAddCompare:null}
          onSelect={n=>{setSelected(n);addToRecent(n);}}
          isWatched={isWatched(selected?.ID)} onToggleWatch={FEATURES.watchlist?toggleWatch:null}
          scoreOverrides={scoreOverrides} setScoreOverride={setScoreOverride}
          floorLo={floorLo} floorHi={floorHi} setFloorLo={setFloorLo} setFloorHi={setFloorHi} resetFloor={resetFloor}
          floorMethod={floorMethod} setFloorMethod={setFloorMethod} globalLatestFloor={globalLatestFloor}/>
      )}

      {/* ── Compare modal ── */}
      {FEATURES.compareMode&&showCompare&&compareBros.length>=2&&(
        <CompareModal nfts={compareBros} traitMap={effectiveTraitMap} onClose={()=>setShowCompare(false)} onSelect={n=>{setSelected(n);addToRecent(n);}}/>
      )}

      {/* ── Bottom Tab Bar (mobile) ── */}
      <BottomTabBar view={view} setView={setView} onMoreTap={()=>setNavDrawer(v=>!v)}/>

      {/* ── Toast ── */}
      <Toast msg={toast.msg} show={toast.show}/>
      {showKbHelp&&(
        <div onClick={()=>setShowKbHelp(false)} style={{position:'fixed',inset:0,zIndex:9999,
          background:'rgba(0,0,0,.7)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--ink2)',border:'1px solid var(--line)',
            borderRadius:14,padding:'20px 24px',maxWidth:340,width:'100%'}}>
            <div style={{fontSize:14,fontWeight:800,color:'var(--txt)',marginBottom:12}}>Keyboard Shortcuts</div>
            {[['/', 'Focus search'],['Esc', 'Close modal / overlay'],['← →', 'Prev / next Bro'],
              ['W', 'Toggle watchlist'],['C', 'Add to compare'],['?', 'Show this help']
            ].map(([key,desc])=>(
              <div key={key} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--ink4)'}}>
                <kbd style={{fontFamily:'Space Mono,monospace',fontSize:11,fontWeight:700,color:'var(--teal)',
                  background:'var(--ink4)',padding:'2px 8px',borderRadius:4,border:'1px solid var(--line)'}}>{key}</kbd>
                <span style={{fontSize:12,color:'var(--txt2)'}}>{desc}</span>
              </div>
            ))}
            <div style={{textAlign:'center',marginTop:12}}>
              <button onClick={()=>setShowKbHelp(false)} style={{padding:'6px 18px',background:'var(--pop)',
                color:'#fff',border:'none',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer'}}>Got it</button>
            </div>
          </div>
        </div>
      )}
    </div>
      <InstallBanner/>
    </AppCtx.Provider>
  );
};
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);


</script>
</body>
</html>
