/* ════════════════════════════════════
   FILTER PANEL CONTENT (shared desktop/mobile)
════════════════════════════════════ */
const FilterContent=({filters,setFilters,traitOpts,traitMap,facetedCounts,famCounts,openCat,setOpenCat})=>{
  const [open,setOpen]=useState(()=>openCat?{[openCat]:true}:{});
  const [catSearch,setCatSearch]=useState({}); // search string per category
  const toggleOpen=cat=>setOpen(p=>({...p,[cat]:!p[cat]}));

  // When openCat changes (e.g. from home screen chip), scroll-open that category
  useEffect(()=>{
    if(openCat){ setOpen(p=>({...p,[openCat]:true})); if(setOpenCat) setOpenCat(null); }
  },[openCat]);

  // Multi-select: filters.traits[cat] is now an array of selected values
  const toggleTrait=(cat,val)=>setFilters(f=>{
    const prev=f.traits[cat]||[];
    const next=prev.includes(val)?prev.filter(x=>x!==val):[...prev,val];
    const t={...f.traits};
    if(next.length===0) delete t[cat]; else t[cat]=next;
    return {...f,traits:t};
  });
  const setFam=fam=>setFilters(f=>{
    const fs=f.families.includes(fam)?f.families.filter(x=>x!==fam):[...f.families,fam];
    return {...f,families:fs};
  });

  const families=Object.keys(FAM_COLORS).filter(f=>f!=='default').sort().filter(f=>(famCounts[f]||0)>0);

  return(
    <>
      {/* Family */}
      <div className="acc-sec">
        <button className="acc-hd" onClick={()=>toggleOpen('_fam')}>
          Family
          {filters.families.length>0&&<span className="sel-badge">{filters.families.length}</span>}
          <span className={`chev ${open['_fam']?'open':''}`}>{I.chev}</span>
        </button>
        {open['_fam']&&(
          <div className="fam-grid">
            {families.map(f=>(
              <button key={f} className={`fam-c ${filters.families.includes(f)?'sel':''}`} onClick={()=>setFam(f)}>
                <span className="fam-dot" style={{background:FAM_COLORS[f]}}></span>
                {f}
                <span style={{fontSize:10,color:'var(--txt3)',marginLeft:2}}>{famCounts[f]||0}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Trait cats */}
      {CATS.map(cat=>{
        const opts=traitOpts[cat]||[];
        const selArr=filters.traits[cat]||[];
        const selSet=new Set(selArr);
        const counts=facetedCounts[cat]||{};
        const catQ=(catSearch[cat]||'').toLowerCase().trim();
        // Sort: selected first, then by count desc, then alpha
        const sorted=[...opts].sort((a,b)=>{
          const aSel=selSet.has(a),bSel=selSet.has(b);
          if(aSel!==bSel) return aSel?-1:1;
          return (counts[b]||0)-(counts[a]||0)||a.localeCompare(b);
        });
        const visible=catQ?sorted.filter(o=>o.split(' (')[0].toLowerCase().includes(catQ)):sorted;
        return(
          <div className="acc-sec" key={cat}>
            <button className="acc-hd" onClick={()=>toggleOpen(cat)}>
              {cat}
              {selArr.length>0&&<span className="sel-badge">{selArr.length}</span>}
              <span className={`chev ${open[cat]?'open':''}`}>{I.chev}</span>
            </button>
            {open[cat]&&(
              <div className="acc-body">
                {opts.length>8&&(
                  <input
                    className="trait-search-inp"
                    placeholder={`Search ${cat.toLowerCase()}…`}
                    value={catSearch[cat]||''}
                    onChange={e=>setCatSearch(p=>({...p,[cat]:e.target.value}))}
                    onClick={e=>e.stopPropagation()}
                  />
                )}
                {visible.map(opt=>{
                  const name=opt.split(' (')[0];
                  const key=tk(cat,name);
                  const detail=key?traitMap[key]:null;
                  const cnt=counts[opt]||0;
                  const isSel=selSet.has(opt);
                  const rarity=detail?getRarityTier(detail.adjustedScore||0):null;
                  // Zero-result: show greyed out if other filters make this impossible
                  // but only hide if there are no active filters at all (unfiltered zero = truly no NFTs)
                  const hasActiveFilters = selArr.length > 0 || Object.keys(filters.traits).some(c=>c!==cat&&(filters.traits[c]||[]).length>0) || filters.families.length>0;
                  if(cnt===0 && !isSel && !hasActiveFilters) return null; // truly no NFTs with this trait
                  return(
                    <button
                      key={opt}
                      className={`topt ${isSel?'sel':''} ${cnt===0&&!isSel?'zero':''}` }
                      onClick={()=>cnt>0||isSel?toggleTrait(cat,opt):null}
                      disabled={cnt===0&&!isSel}
                      title={cnt===0&&!isSel?'No results with current filters':undefined}
                    >
                      <div className={`chkbox ${isSel?'on':''}`}>{isSel&&I.check}</div>
                      {name.toLowerCase()!=='none'
                        ?<TraitImg className="tthumb" src={detail?.thumbnailUrl} alt={name}/>
                        :<div className="tthumb" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--txt3)'}}>{I.none}</div>}
                      <span className="tname" style={{color:cnt===0&&!isSel?'var(--txt3)':rarity?rarity.color:'var(--txt2)'}}>{name}</span>
                      <span className="tcnt" style={{color:cnt===0?'var(--txt3)':undefined}}>{cnt>0?cnt:isSel?'0':'—'}</span>
                    </button>
                  );
                })}
                {catQ&&visible.length===0&&(
                  <div style={{padding:'6px 4px',fontSize:11,color:'var(--txt3)'}}>No matches</div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
};

/* ════════════════════════════════════
   WALLET SECTION
════════════════════════════════════ */
const WalletSection = ({ownedIds, setOwnedIds, walletFilter, setWalletFilter, nfts}) => {
  const [open, setOpen]       = useState(false);
  const [addr, setAddr]       = useState('');
  const [status, setStatus]   = useState(null); // null | {type:'loading'|'ok'|'err', msg}
  const inputRef              = useRef(null);

  // Compute rank badge when wallet is loaded
  const holderRank = useMemo(()=>{
    if(!ownedIds.length||!nfts.length) return null;
    const ownedSet = new Set(ownedIds);
    const ownedNfts = nfts.filter(n=>ownedSet.has(n.idStr));
    if(!ownedNfts.length) return null;
    const bestRank = Math.min(...ownedNfts.map(n=>n.rank));
    const pct = Math.round(bestRank/nfts.length*100);
    return {bestRank, count:ownedNfts.length, pct: Math.max(1,pct)};
  },[ownedIds, nfts]);

  const fetch_ = async () => {
    const a = addr.trim();
    if (!a) return;
    if (!/^0x[0-9a-fA-F]{40}$/.test(a)) {
      setStatus({type:'err', msg:'Invalid address format'});
      return;
    }
    setStatus({type:'loading', msg:'Connecting…'});
    try {
      const ids = await fetchWalletNFTs(a, msg => setStatus({type:'loading', msg}));
      if (ids.length === 0) {
        setStatus({type:'err', msg:'No Hemi Bros found for this address'});
        setOwnedIds([]);
      } else {
        setStatus({type:'ok', msg:`Found ${ids.length} Bro${ids.length!==1?'s':''}`});
        setOwnedIds(ids);
      }
    } catch(e) {
      setStatus({type:'err', msg: e.message});
      setOwnedIds([]);
    }
  };

  const clear = () => {
    setOwnedIds([]);
    setWalletFilter(false);
    setStatus(null);
    setAddr('');
  };

  const isLoading = status?.type === 'loading';

  return (
    <div className="wallet-sec">
      <button className="acc-hd" onClick={() => setOpen(p=>!p)}>
        {I.wallet} My Wallet
        {ownedIds.length > 0 && <span className="sel-badge">{ownedIds.length}</span>}
        <span className={`chev ${open?'open':''}`}>{I.chev}</span>
      </button>
      {open && (
        <div className="wallet-body">
          <div className="wallet-input-row">
            <input
              ref={inputRef}
              className="wallet-inp"
              placeholder="Paste wallet address (0x…)"
              value={addr}
              onChange={e => setAddr(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && fetch_()}
              spellCheck={false}
            />
            <button className="wallet-fetch-btn" onClick={fetch_} disabled={isLoading || !addr.trim()}>
              {isLoading ? '…' : 'Load'}
            </button>
          </div>

          {status && (
            <div className={`wallet-status ${status.type === 'ok' ? 'ok' : status.type === 'err' ? 'err' : ''}`}>
              {status.type === 'loading' && <span className="mini-spin"/>}
              {status.msg}
            </div>
          )}

          {ownedIds.length > 0 && (
            <div className="wallet-toggle-row">
              <span className="wallet-toggle-label">Show only my Bros</span>
              <label className="toggle-switch">
                <input type="checkbox" checked={walletFilter} onChange={e => setWalletFilter(e.target.checked)}/>
                <span className="toggle-track"/>
                <span className="toggle-knob"/>
              </label>
            </div>
          )}
          {ownedIds.length > 0 && holderRank && (
            <div className="wallet-rank-badge">
              🏆 <span>Rank <b>#{holderRank.bestRank}</b> · <b>{holderRank.count}</b> Bro{holderRank.count!==1?'s':''} · top <b>{holderRank.pct}%</b></span>
            </div>
          )}

          {ownedIds.length > 0 && (
            <button
              onClick={clear}
              style={{marginTop:8,background:'none',border:'none',color:'var(--red)',fontSize:11,fontWeight:700,cursor:'pointer',padding:0,display:'block'}}
            >
              × Clear wallet
            </button>
          )}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   PORTFOLIO CALCULATOR
════════════════════════════════════ */
const PortfolioCalc = ({ownedNfts}) => {
  const [open, setOpen]     = useState(false);
  const [floor, setFloor]   = useState('');   // ETH
  const [ethUsd, setEthUsd] = useState('');   // USD per ETH

  const count = ownedNfts.length;
  const floorN = parseFloat(floor);
  const ethN   = parseFloat(ethUsd);
  const hasFloor = !isNaN(floorN) && floorN > 0;
  const hasEth   = !isNaN(ethN)   && ethN   > 0;

  // For each owned NFT, estimate its value range based on displayMultiple / diScore
  // Low  = floor price
  // High = floor × the high end of their display multiple (or diScore-derived multiple)
  // Mid  = average of low + high per NFT, summed
  const stats = useMemo(() => {
    if (!hasFloor || !count) return null;
    let totalLow = 0, totalHigh = 0, totalMid = 0;
    const perBro = ownedNfts.map(nft => {
      const dm = nft.displayMultiple;
      let lowMult = 1, highMult = 1;
      if (dm != null) {
        const s = String(dm).trim();
        // Range like "10x - 30x" or "10x-30x"
        const rangeMatch = s.match(/^([\d.]+)x?\s*[-–]\s*([\d.]+)x?$/i);
        if (rangeMatch) {
          lowMult  = parseFloat(rangeMatch[1]) || 1;
          highMult = parseFloat(rangeMatch[2]) || lowMult;
        } else {
          const n = parseFloat(s.replace(/x/gi,'').replace(/,/g,''));
          if (!isNaN(n) && n > 0) { lowMult = n; highMult = n; }
        }
      }
      // Cap mults reasonably — floor is the absolute minimum
      if (lowMult < 1) lowMult = 1;
      if (highMult < lowMult) highMult = lowMult;
      const low  = floorN * 1;          // floor = lowest estimate for any bro
      const high = floorN * highMult;
      const mid  = floorN * ((lowMult + highMult) / 2);
      totalLow  += low;
      totalHigh += high;
      totalMid  += mid;
      return {nft, low, mid, high, lowMult, highMult};
    });
    return {totalLow, totalMid, totalHigh, perBro};
  }, [ownedNfts, floorN]);

  const fmt  = (eth) => eth >= 0.001 ? `${eth.toFixed(3)} ETH` : `${eth.toFixed(6)} ETH`;
  const fmtU = (eth) => hasEth ? `$${(eth * ethN).toLocaleString('en-US',{maximumFractionDigits:0})}` : null;

  return (
    <div className="calc-sec">
      <button className="acc-hd" onClick={() => setOpen(p=>!p)}>
        {I.calc} Portfolio Value
        {count > 0 && <span className="sel-badge">{count}</span>}
        <span className={`chev ${open?'open':''}`}>{I.chev}</span>
      </button>
      {open && (
        <div className="calc-body">
          {count === 0 ? (
            <div className="calc-no-wallet">Load your wallet first to<br/>calculate portfolio value.</div>
          ) : (
            <>
              <div className="calc-field">
                <div className="calc-label">Floor Price</div>
                <div className="calc-inp-row">
                  <span className="calc-prefix">Ξ</span>
                  <input
                    className="calc-inp"
                    placeholder="e.g. 0.05"
                    value={floor}
                    onChange={e => setFloor(e.target.value)}
                    type="number"
                    min="0"
                    step="0.001"
                  />
                </div>
              </div>

              <div className="calc-field">
                <div className="calc-label">ETH Price (USD)</div>
                <div className="calc-inp-row">
                  <span className="calc-prefix">$</span>
                  <input
                    className="calc-inp"
                    placeholder="e.g. 3200"
                    value={ethUsd}
                    onChange={e => setEthUsd(e.target.value)}
                    type="number"
                    min="0"
                    step="1"
                  />
                </div>
              </div>

              {stats && (
                <div className="calc-results">
                  {/* Range bars */}
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:6}}>
                    Portfolio Range ({count} Bros)
                  </div>
                  <div className="calc-range-row">
                    <div className="calc-range-item calc-range-lo">
                      <div className="rv">{fmt(stats.totalLow)}</div>
                      {hasEth && <div className="rv" style={{fontSize:'.68rem',color:'var(--txt3)'}}>{fmtU(stats.totalLow)}</div>}
                      <div className="rl">Floor</div>
                    </div>
                    <div style={{color:'var(--txt3)',fontSize:11}}>–</div>
                    <div className="calc-range-item calc-range-mid">
                      <div className="rv">{fmt(stats.totalMid)}</div>
                      {hasEth && <div className="rv" style={{fontSize:'.68rem',color:'var(--txt3)'}}>{fmtU(stats.totalMid)}</div>}
                      <div className="rl">Mid</div>
                    </div>
                    <div style={{color:'var(--txt3)',fontSize:11}}>–</div>
                    <div className="calc-range-item calc-range-hi">
                      <div className="rv">{fmt(stats.totalHigh)}</div>
                      {hasEth && <div className="rv" style={{fontSize:'.68rem',color:'var(--txt3)'}}>{fmtU(stats.totalHigh)}</div>}
                      <div className="rl">High</div>
                    </div>
                  </div>

                  {/* Per-bro breakdown — top 5 by high value */}
                  {stats.perBro.filter(b=>b.highMult>1).length > 0 && (
                    <>
                      <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)',marginTop:10,marginBottom:5}}>
                        Notable Holdings
                      </div>
                      {stats.perBro
                        .filter(b => b.highMult > 1)
                        .sort((a,b) => b.highMult - a.highMult)
                        .slice(0, 5)
                        .map(({nft, low, high, highMult}) => (
                          <div className="calc-row" key={nft.ID}>
                            <span className="calc-row-lbl">#{nft.ID}</span>
                            <span className="calc-row-val">
                              {fmt(low)}
                              {highMult > 1 && <span style={{color:'var(--green)'}}> – {fmt(high)}</span>}
                            </span>
                          </div>
                        ))
                      }
                    </>
                  )}
                </div>
              )}

              {!hasFloor && (
                <div className="calc-no-wallet">Enter a floor price to see<br/>your portfolio estimate.</div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   HOLDER DISTRIBUTION
   Shows how a wallet's holdings compare
   to all other holders in the collection.
════════════════════════════════════ */
const HolderDistribution = ({nfts}) => {
  const [holders,   setHolders]   = useState([]);   // [{address, value}]
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState(null);
  const [nextPage,  setNextPage]  = useState(null);
  const [loadingMore, setLoadingMore] = useState(false);

  // Build address→nfts lookup from our NFT data
  // NFT data doesn't have owner addresses — we rely purely on explorer API
  const EXPLORER_API = 'https://explorer.hemi.xyz/api/v2';

  const fetchHolders = async (pageParams = null, append = false) => {
    if (!append) { setLoading(true); setError(null); setHolders([]); }
    else setLoadingMore(true);
    try {
      let url = `${EXPLORER_API}/tokens/${CONTRACT}/holders?page_size=50`;
      if (pageParams) url += `&${new URLSearchParams(pageParams).toString()}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      const rows = (data.items || []).map((h, i) => ({
        address: h.address?.hash || h.address || '?',
        label:   h.address?.name || null,
        value:   parseInt(h.value || 0, 10),
        idx:     (append ? holders.length : 0) + i,
      }));
      setHolders(prev => append ? [...prev, ...rows] : rows);
      setNextPage(data.next_page_params || null);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setLoadingMore(false);
    }
  };

  useEffect(() => { fetchHolders(); }, []);

  // Score distribution across collection
  // DI score distribution stats — mean, std dev, percentile bands
  const diStats = useMemo(() => {
    if (!nfts.length) return null;
    const scores = nfts.map(n => n.diScore);
    const n = scores.length;
    const mean = scores.reduce((a,b)=>a+b,0)/n;
    const variance = scores.reduce((a,b)=>a+(b-mean)**2,0)/n;
    const sd = Math.sqrt(variance);
    const sorted = [...scores].sort((a,b)=>a-b);
    const pct = p => sorted[Math.floor(p/100*n)];
    // Count in each band
    const inBand = (lo, hi) => scores.filter(s=>s>=lo&&s<=hi).length;
    const band1 = inBand(mean-sd, mean+sd);
    const band2 = inBand(mean-2*sd, mean+2*sd);
    const band3 = inBand(mean-3*sd, mean+3*sd);
    // Histogram for bell curve shape (30 bins)
    const BINS=30;
    const minS=sorted[0], maxS=sorted[n-1], range=maxS-minS||1;
    const bins=Array.from({length:BINS},(_,i)=>{
      const lo=minS+(range/BINS)*i, hi=minS+(range/BINS)*(i+1);
      return{lo,hi,count:0};
    });
    scores.forEach(s=>{bins[Math.min(BINS-1,Math.floor((s-minS)/range*BINS))].count++;});
    const maxC=Math.max(...bins.map(b=>b.count),1);
    return {mean, sd, n, band1, band2, band3, bins, minS, maxS, maxC,
      pct10:pct(10), pct25:pct(25), pct50:pct(50), pct75:pct(75), pct90:pct(90)};
  }, [nfts]);

  // Named positions in the holder leaderboard (by rank index, 0-based)
  const HOLDER_NAMES = [
    {name:'DAO Founder',                badge:'🏛️'},
    {name:'Developer Treasury',          badge:'⚙️'},
    {name:'Developer Upgrade Campaign',  badge:'🎰'},

              return(

            {label:'Within 2σ (95%)',  actual:`${((diStats.band2/diStats.n)*100).toFixed(1)}%`, count:diStats.band2, range:`${(diStats.mean-2*diStats.sd).toFixed(1)} – ${(diStats.mean+2*diStats.sd).toFixed(1)}`, color:'var(--pop)', expected:'~95%'},
            {label:'Within 3σ (99.7%)',actual:`${((diStats.band3/diStats.n)*100).toFixed(1)}%`, count:diStats.band3, range:`${(diStats.mean-3*diStats.sd).toFixed(1)} – ${(diStats.mean+3*diStats.sd).toFixed(1)}`, color:'var(--r-grail)', expected:'~99.7%'},

                    })()}

const Encyclopedia=({traitMap,onPick})=>{
  const grouped=useMemo(()=>{
    const g={};
    CATS.forEach(c=>g[c]=[]);
    Object.values(traitMap).forEach(t=>{if(t.Category&&g[t.Category]) g[t.Category].push(t);});
    CATS.forEach(c=>g[c].sort((a,b)=>(parseInt(b.Supply)||0)-(parseInt(a.Supply)||0)));
    return g;
  },[traitMap]);
  return(
    <div className="enc-wrap">
      {CATS.map(cat=>{
        const traits=grouped[cat];if(!traits?.length) return null;
        return(
          <div key={cat}>
            <div className="enc-cat">{cat.toUpperCase()}</div>
            <div className="enc-grid">
              {traits.map(t=>(
                <div className="enc-card" key={t['Unique Item List']} onClick={()=>onPick(t.Category,t['Unique Item List'])}>
                  <div className="enc-twr">
                    {t['Unique Item List'].toLowerCase()!=='none'
                      ?<TraitImg className="enc-img" src={t.thumbnailUrl} alt={t['Unique Item List']}/>
                      :<span style={{color:'var(--txt3)'}}>{I.none}</span>}

                    <div><div className="enc-name">{t['Unique Item List']}</div>{t.Title&&<div className="enc-ti">"{t.Title}"</div>}</div>
                    <div className="enc-sup">×{t.Supply||'?'}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
};


const TraitCooccurrence = ({nfts, traitMap, onFilterTo}) => {
  const [selCat,  setSelCat]  = useState('');
  const [selTrait,setSelTrait] = useState('');

  // Build trait options per category
  const traitOpts = useMemo(()=>{
    const o = {};
    CATS.forEach(cat=>{
      const s = new Set();
      nfts.forEach(n=>{ const v=n[cat]; if(v) s.add(String(v).split('(')[0].trim()); });
      o[cat] = [...s].filter(v=>v.toLowerCase()!=='none').sort();
    });
    return o;
  },[nfts]);

  // Compute co-occurrences when a trait is selected
  const results = useMemo(()=>{
    if(!selCat||!selTrait) return [];
    // Find all NFTs that have the selected trait
    const base = nfts.filter(n=>{
      const v = n[selCat]; if(!v) return false;
      return String(v).split('(')[0].trim() === selTrait;
    });
    if(!base.length) return [];

    // Count every other trait across these NFTs
    const counts = {};
    base.forEach(n=>{
      CATS.forEach(cat=>{
        if(cat===selCat) return;
        const v = n[cat]; if(!v) return;
        const name = String(v).split('(')[0].trim();
        if(name.toLowerCase()==='none') return;
        const key = `${cat}|||${name}`;
        counts[key] = (counts[key]||0)+1;
      });
    });

    return Object.entries(counts)
      .map(([key,count])=>{
        const [cat,name] = key.split('|||');
        const tkey = tk(cat,name);
        const detail = tkey ? traitMap[tkey] : null;
        const pct = count/base.length*100;
        return {cat, name, count, pct, detail, baseCount: base.length};
      })
      .sort((a,b)=>b.count-a.count)
      .slice(0,30);
  },[nfts, selCat, selTrait, traitMap]);

  const maxPct = results[0]?.pct || 1;

  return (
    <div className="cooc-wrap">
      <div className="cooc-header">
        <div className="browse-lbl" style={{marginBottom:10}}>Trait Co-occurrence Explorer</div>
        <p style={{fontSize:12,color:'var(--txt2)',marginBottom:12,lineHeight:1.5}}>
          Pick a trait to see which other traits appear most often alongside it.
        </p>
        <div className="cooc-selects">
          <select className="cooc-select" value={selCat} onChange={e=>{setSelCat(e.target.value);setSelTrait('');}}>
            <option value="">Select category…</option>
            {CATS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select className="cooc-select" value={selTrait} onChange={e=>setSelTrait(e.target.value)} disabled={!selCat}>
            <option value="">Select trait…</option>
            {selCat && traitOpts[selCat]?.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        {selTrait&&(
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <div className="cooc-selected-chip">{selCat}: {selTrait}</div>
            <span style={{fontSize:11,color:'var(--txt3)'}}>
              {results[0]?.baseCount||0} Bros have this trait
            </span>
          </div>
        )}
      </div>

      {selTrait&&results.length>0&&(
        <div className="cooc-results">
          <div style={{display:'flex',gap:8,padding:'0 10px 6px',fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)'}}>
            <span style={{flex:1}}>Trait</span>
            <span style={{width:80}}>Co-occur %</span>
            <span style={{width:36,textAlign:'right'}}>%</span>
            <span style={{width:32,textAlign:'right'}}>n</span>
          </div>
          {results.map((r,i)=>(
            <div key={`${r.cat}-${r.name}`} className="cooc-row"
              title={`Filter gallery to ${selCat}: ${selTrait} + ${r.cat}: ${r.name}`}
              onClick={()=>onFilterTo&&onFilterTo(selCat, selTrait, r.cat, r.name)}
            >
              <span className="cooc-rank">{i+1}</span>
              <span className="cooc-name">{r.name}</span>
              <span className="cooc-cat">{r.cat}</span>
              <div className="cooc-bar-wrap">
                <div className="cooc-bar-fill" style={{width:`${r.pct/maxPct*100}%`}}/>
              </div>
              <span className="cooc-pct">{r.pct.toFixed(0)}%</span>
              <span className="cooc-count">{r.count}</span>
            </div>
          ))}
        </div>
      )}
      {selTrait&&results.length===0&&(
        <div style={{color:'var(--txt3)',fontSize:13,padding:'20px 0',textAlign:'center'}}>No co-occurrence data found.</div>
      )}
      {!selTrait&&(
        <div style={{color:'var(--txt3)',fontSize:13,padding:'20px 0',textAlign:'center'}}>Select a category and trait above to begin.</div>
      )}
    </div>
  );
};

const Leaderboard = ({nfts, traitMap, onSelect}) => {
  const [lbTab, setLbTab] = useState('overall');
  const TABS = [
    {k:'overall', label:'Top Bros'},
    ...CATS.map(c=>({k:c, label:c})),
  ];

  const rows = useMemo(()=>{
    if(lbTab==='overall') return [...nfts].sort((a,b)=>b.diScore-a.diScore).slice(0,25);
    // Category tabs: one row per UNIQUE TRAIT, ranked by adjustedScore desc — no repetition
    const catTraits = Object.values(traitMap)
      .filter(d => d.Category === lbTab && (parseInt(d.Supply)||0) > 0)
      .sort((a,b) => (b.adjustedScore||0) - (a.adjustedScore||0))
      .slice(0, 25);
    return catTraits.map(detail => {
      const name = detail['Unique Item List'];
      const exampleNft = nfts.find(n => {
        const v = n[lbTab]; if(!v) return false;
        return String(v).split('(')[0].trim().toLowerCase() === name.toLowerCase();
      });
      return { name, detail, exampleNft, score: detail.adjustedScore||0, isTraitRow: true };
    });
  },[nfts, lbTab, traitMap]);

  // Pre-compute display ranks with proper tie handling
  const rankLabels = useMemo(() => {
    const getScore = r => r.isTraitRow ? r.score : r.diScore;
    const labels = [];
    let displayPos = 1;
    for(let i=0; i<rows.length; i++){
      if(i>0 && Math.abs(getScore(rows[i])-getScore(rows[i-1]))<0.001){
        // Tied — same display position as previous
        labels.push(labels[i-1]);
      } else {
        displayPos = i+1;
        labels.push(displayPos===1 ? '👑' : displayPos);
      }
    }
    return labels;
  },[rows]);

  const rankCls = i => rankLabels&&rankLabels[i]==='👑'?'gold':rankLabels&&rankLabels[i]===2?'silver':rankLabels&&rankLabels[i]===3?'bronze':'';

  return (
    <div className="lb-wrap">
      <div className="lb-tabs">
        {TABS.map(t=>(
          <button key={t.k} className={`lb-tab ${lbTab===t.k?'on':''}`} onClick={()=>setLbTab(t.k)}>{t.label}</button>
        ))}
      </div>
      {rows.map((row,i)=>{
        if(row.isTraitRow){
          const {name, detail, exampleNft, score} = row;
          const rarity = getRarityTier(score);
          return(
            <div key={name} className="lb-row"
              onClick={()=>exampleNft&&onSelect(exampleNft)}
              style={{cursor:exampleNft?'pointer':'default'}}
            >
              <div className={`lb-rank ${rankCls(i)}`}>{rankLabels[i]}</div>
              <TraitImg className="lb-img" src={detail.thumbnailUrl} alt={name}/>
              <div className="lb-info">
                <div className="lb-id" style={{fontSize:13,color:'var(--txt)'}}>{name}</div>
                <div className="lb-score" style={{fontSize:'1rem'}}>{score.toFixed(1)}</div>
                <div className="lb-meta">×{detail.Supply||'?'} supply{exampleNft?` · e.g. #${exampleNft.ID}`:''}</div>
              </div>
              {rarity&&<div className="lb-badge" style={{color:rarity.color,borderColor:rarity.color}}>{rarity.tier}</div>}
            </div>
          );
        }
        // Overall tab — NFT rows
        const nft = row;
        let badgeRarity = null, topScore = 0;
        CATS.forEach(cat=>{
          const val = nft[cat]; if(!val) return;
          const name = String(val).split('(')[0].trim();
          const sc = traitMap[tk(cat,name)]?.adjustedScore||0;
          if(sc > topScore){ topScore = sc; badgeRarity = getRarityTier(sc); }
        });
        return(
          <div key={nft.ID} className="lb-row" onClick={()=>onSelect(nft)}>
            <div className={`lb-rank ${rankCls(i)}`}>{rankLabels[i]}</div>
            <img className="lb-img" src={nft.Image} alt={`#${nft.ID}`} loading="lazy"/>
            <div className="lb-info">
              <div className="lb-id">#{nft.ID}</div>
              <div className="lb-score">{fmtScore(nft)}</div>
              <div className="lb-meta">Rank #{nft.rank} · {nft.dominantFamilies[0]||'—'}</div>
            </div>
            {badgeRarity&&<div className="lb-badge" style={{color:badgeRarity.color,borderColor:badgeRarity.color}}>{badgeRarity.tier}</div>}
          </div>
        );
      })}
    </div>
  );
};

/* ════════════════════════════════════
   STATS DASHBOARD
════════════════════════════════════ */
const StatsDashboard = ({nfts, traitMap}) => {
  const stats = useMemo(()=>{
    if(!nfts.length) return null;
    const scores = nfts.map(n=>n.diScore);
    const total = nfts.length;
    const avg = scores.reduce((a,b)=>a+b,0)/total;
    // Rarity distribution is TRAIT-LEVEL not NFT-level.
    // Bucket each unique trait by its adjusted score (< 10 = Common, per scoring system).
    // None traits (adjustedScore ~0.03–1.05) correctly land in Common.
    const tiers = {Grail:0,Legendary:0,Epic:0,Rare:0,Uncommon:0,Common:0};
    let traitTotalCount = 0;
    Object.values(traitMap).forEach(detail=>{
      const sup = parseInt(detail.Supply)||0;
      if(!sup) return; // skip traits with no supply data
      const score = detail.adjustedScore||0;
      const r = getRarityTier(score);
      tiers[r ? r.tier : 'Common'] += sup;  // sum quantities, not unique trait count
      traitTotalCount += sup;
    });
    // Rarest trait per category — use Supply from traitMap (not raw count)
    // This handles ties: collect ALL traits tied at min supply
    const traitFreq = {};
    CATS.forEach(cat=>{
      const entries = Object.values(traitMap)
        .filter(t => t.Category===cat && t['Unique Item List']?.toLowerCase()!=='none')
        .map(t => ({name: t['Unique Item List'], supply: parseInt(t.Supply)||0}))
        .filter(t => t.supply > 0);
      if(!entries.length){ traitFreq[cat]={least:null,leastTied:[]}; return; }
      const sorted = [...entries].sort((a,b)=>a.supply-b.supply);
      const minSupply = sorted[0].supply;
      const tied = sorted.filter(t=>t.supply===minSupply);
      const mostSorted = [...entries].sort((a,b)=>b.supply-a.supply);
      traitFreq[cat] = {
        least: [sorted[0].name, sorted[0].supply],
        leastTied: tied, // all traits tied at rarest
        most: [mostSorted[0].name, mostSorted[0].supply],
      };
    });
    const top = [...nfts].sort((a,b)=>b.diScore-a.diScore)[0];
    const bottom = [...nfts].sort((a,b)=>a.diScore-b.diScore)[0];

    // Floor multiple cohorts — group NFTs by their displayMultiple label.
    // NFTs with a range label (e.g. "10x - 30x") get grouped as-is.
    // NFTs with a numeric multiple get grouped by their value.
    // NFTs with neither get a fallback label from their DI score.
    const multiples = {};
    nfts.forEach(n=>{
      let label;
      const dm = n.displayMultiple;
      if(dm != null && String(dm).trim() && String(dm).trim() !== 'null'){
        const s = String(dm).trim();
        // Range string like "10x - 30x" or numeric
        label = isNaN(Number(s.replace(/,/g,''))) ? s : `${parseFloat(s.replace(/,/g,''))}x`;
      } else {
        // Fallback: derive approximate multiple from DI score
        const sc = n.diScore;
        if(sc>=300) label='30x – 50x';
        else if(sc>=150) label='10x – 30x';
        else if(sc>=45)  label='5x – 10x';
        else if(sc>=25)  label='3x – 5x';
        else if(sc>=10)  label='2x – 3x';
        else             label='1x – 2x';
      }
      multiples[label] = (multiples[label]||0) + 1;
    });
    // Sort cohorts: try to sort by the lower bound number descending
    const parseMultLow = lbl => {
      const m = String(lbl).match(/^(\d+\.?\d*)/);
      return m ? parseFloat(m[1]) : 0;
    };
    const multipleCohorts = Object.entries(multiples)
      .sort((a,b) => parseMultLow(b[0]) - parseMultLow(a[0]));

    return {total,avg,tiers,traitFreq,top,bottom,traitTotalCount,multipleCohorts};
  },[nfts]);

  if(!stats) return <div style={{padding:20,color:'var(--txt3)',fontSize:13}}>Loading…</div>;
  const RARITY_ORDER = ['Grail','Legendary','Epic','Rare','Uncommon','Common'];
  const RARITY_COLORS = {Grail:'var(--r-grail)',Legendary:'var(--r-legendary)',Epic:'var(--r-epic)',Rare:'var(--r-rare)',Uncommon:'var(--r-uncommon)',Common:'var(--txt3)'};

  return (
    <div className="stats-wrap">
      {/* Key numbers */}
      <div>
        <div className="stats-section-title">Collection Overview</div>
        <div className="stats-grid">
          <div className="stat-card"><div className="stat-val">{stats.total.toLocaleString()}</div><div className="stat-lbl">Total Bros</div></div>
          <div className="stat-card accent-teal"><div className="stat-val">{stats.avg.toFixed(1)}</div><div className="stat-lbl">Avg Score</div></div>
          <div className="stat-card accent-gold"><div className="stat-val">{fmtScore(stats.top)}</div><div className="stat-lbl">Highest Score</div></div>
          <div className="stat-card accent-pop"><div className="stat-val">{stats.tiers.Grail}</div><div className="stat-lbl">Grails 🔴</div></div>
        </div>
      </div>

      {/* Floor multiple cohorts — how many NFTs in each price tier */}
      <div>
        <div className="stats-section-title">Floor Multiple Cohorts
          <span style={{fontWeight:400,fontSize:9,textTransform:'none',letterSpacing:0,color:'var(--txt3)',marginLeft:4}}>NFTs per price tier</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {stats.multipleCohorts.map(([label,count])=>{
            const pct = stats.total > 0 ? count/stats.total*100 : 0;
            // Color by approximate tier — higher multiple = warmer color
            const lo = parseFloat(String(label).match(/^(\d+\.?\d*)/)?.[1]||0);
            const color = lo>=30?'var(--r-grail)':lo>=10?'var(--r-legendary)':lo>=5?'var(--r-epic)':lo>=3?'var(--r-rare)':lo>=2?'var(--r-uncommon)':'var(--txt3)';
            return(
              <div key={label} className="dist-item">
                <div className="dist-label" style={{color,fontWeight:700,minWidth:80}}>{label}</div>
                <div className="dist-bar-wrap">
                  <div className="dist-bar-fill" style={{
                    width:`${Math.max(pct,count>0?1:0)}%`,
                    background:color,opacity:.85
                  }}/>
                </div>
                <div className="dist-count">{count.toLocaleString()}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Rarity distribution — trait level */}
      <div>
        <div className="stats-section-title">Trait Rarity Distribution <span style={{fontWeight:400,fontSize:9,textTransform:'none',letterSpacing:0,color:'var(--txt3)',marginLeft:4}}>({stats.traitTotalCount.toLocaleString()} total trait instances)</span></div>
        <div className="dist-row">
          {RARITY_ORDER.map(tier=>{
            const count = stats.tiers[tier]||0;
            const maxCount = Math.max(...RARITY_ORDER.map(t=>stats.tiers[t]||0));
            const pct = maxCount > 0 ? (count/maxCount*100) : 0;
            return(
              <div key={tier} className="dist-item">
                <div className="dist-label" style={{color:RARITY_COLORS[tier],fontWeight:700}}>{tier}</div>
                <div className="dist-bar-wrap">
                  <div className="dist-bar-fill" style={{width:`${Math.max(pct,count>0?2:0)}%`,background:RARITY_COLORS[tier]}}/>
                </div>
                <div className="dist-count">{count}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Rarest traits */}
      <div>
        <div className="stats-section-title">Rarest Traits</div>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {CATS.map(cat=>{
            const {least, leastTied} = stats.traitFreq[cat]||{};
            if(!least) return null;
            const tied = leastTied||[];
            return(
              <div key={cat} style={{background:'var(--ink3)',borderRadius:8,padding:'8px 10px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)'}}>{cat}</div>
                  <div style={{fontFamily:'Space Mono,monospace',fontSize:'.8rem',color:'var(--r-grail)'}}>{least[1]} <span style={{fontSize:10,color:'var(--txt3)'}}>minted</span></div>
                </div>
                {tied.length<=1
                  ? <div style={{fontSize:12,fontWeight:700,color:'var(--txt)',marginTop:2}}>{least[0]}</div>
                  : <div style={{fontSize:11,color:'var(--txt)',lineHeight:1.5,marginTop:2}}>{tied.map(t=>t.name).join(' · ')}<span style={{fontSize:9,color:'var(--txt3)',marginLeft:4,fontWeight:700}}>({tied.length}-WAY TIE)</span></div>
                }
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════
   BRO BUILDER
════════════════════════════════════ */
const BroBuilder = ({traitMap, nfts, onSelect}) => {
  const [selections, setSelections] = useState({});
  const [pickerCat,  setPickerCat]  = useState(null);
  const [pickerRef,  setPickerRef]  = useState(null);
  const pickerContainerRef = useRef(null);

  useEffect(()=>{
    const handler = e => {
      if(pickerContainerRef.current && !pickerContainerRef.current.contains(e.target)) setPickerCat(null);
    };
    document.addEventListener('mousedown', handler);
    return ()=>document.removeEventListener('mousedown', handler);
  },[]);

  // Build options per category from traitMap
  const opts = useMemo(()=>{
    const o = {};
    CATS.forEach(cat=>{
      const items = [];
      Object.entries(traitMap).forEach(([key, detail])=>{
        if(!key.startsWith(cat.trim().toLowerCase()+':')) return;
        const name = key.split(':').slice(1).join(':');
        items.push({name: name.charAt(0).toUpperCase()+name.slice(1), detail, score: detail.adjustedScore||0});
      });
      o[cat] = items.sort((a,b)=>b.score-a.score);
    });
    return o;
  },[traitMap]);

  // Calculate builder score
  const result = useMemo(()=>{
    let total = 0;
    const famTot = {};
    CATS.forEach(cat=>{
      const sel = selections[cat];
      if(!sel) return;
      total += sel.score;
      if(sel.detail?.tags) Object.entries(sel.detail.tags).forEach(([t,s])=>{
        famTot[t]=(famTot[t]||0)+(typeof s==='number'?s:parseFloat(s)||0);
      });
    });
    const fams = Object.entries(famTot).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const rarity = getRarityTier(total);
    return {total, fams, rarity};
  },[selections]);

  // Find the closest real Bro to this build
  const closestBro = useMemo(()=>{
    if(Object.keys(selections).length < 2) return null;
    const selCats = Object.keys(selections);
    let best = null, bestScore = -1;
    nfts.forEach(n=>{
      let matches = 0;
      selCats.forEach(cat=>{
        const val = n[cat];
        if(!val) return;
        const name = String(val).split('(')[0].trim().toLowerCase();
        if(name === selections[cat].name.toLowerCase()) matches++;
      });
      if(matches > bestScore){bestScore=matches;best=n;}
    });
    return bestScore > 0 ? {nft:best,matches:bestScore} : null;
  },[selections, nfts]);

  const clear = () => setSelections({});

  return (
    <div className="builder-wrap" ref={pickerContainerRef}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:11,color:'var(--txt3)'}}>Pick traits to build your dream Bro</div>
        {Object.keys(selections).length>0&&<button onClick={clear} style={{fontSize:11,color:'var(--red)',background:'none',border:'none',cursor:'pointer',fontWeight:700}}>Reset</button>}
      </div>

      <div className="builder-slots">
        {CATS.map(cat=>{
          const sel = selections[cat];
          const rarity = sel ? getRarityTier(sel.score) : null;
          return(
            <div key={cat} style={{position:'relative'}}>
              <div className="builder-slot" onClick={()=>setPickerCat(pickerCat===cat?null:cat)}>
                <TraitImg className="builder-slot-img" src={sel?.detail?.thumbnailUrl} alt={sel?.name}/>
                <div style={{flex:1,minWidth:0}}>
                  <div className="builder-slot-cat">{cat}</div>
                  <div className="builder-slot-val" style={{color:rarity?rarity.color:'var(--txt2)'}}>{sel?sel.name:'— Any —'}</div>
                </div>
                {sel&&sel.score>0&&<div className="builder-slot-pts" style={{color:rarity?rarity.color:'var(--teal)'}}>+{sel.score.toFixed(1)}</div>}
                <span style={{color:'var(--txt3)',fontSize:10,marginLeft:4}}>{pickerCat===cat?'▲':'▼'}</span>
              </div>
              {pickerCat===cat&&(
                <div className="builder-picker" style={{top:'100%',left:0,right:0,marginTop:4}}>
                  <div
                    className="builder-picker-item"
                    onClick={()=>{ setSelections(s=>{ const ns={...s}; delete ns[cat]; return ns;}); setPickerCat(null); }}
                  >
                    <div className="builder-picker-img" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--txt3)'}}>{I.none}</div>
                    <div className="builder-picker-name" style={{color:'var(--txt3)'}}>— None —</div>
                  </div>
                  {opts[cat]?.map(item=>(
                    <div key={item.name} className="builder-picker-item" onClick={()=>{setSelections(s=>({...s,[cat]:item}));setPickerCat(null);}}>
                      <TraitImg className="builder-picker-img" src={item.detail?.thumbnailUrl} alt={item.name}/>
                      <div className="builder-picker-name">{item.name}</div>
                      {item.score>0&&<div className="builder-picker-pts">+{item.score.toFixed(1)}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {Object.keys(selections).length>0&&(
        <div className="builder-result">
          <div className="builder-score-big">{result.total.toFixed(1)}</div>
          <div className="builder-score-sub" style={{color:result.rarity?result.rarity.color:'var(--txt3)'}}>
            {result.rarity?result.rarity.tier+' Tier':'No rarity tier'}
          </div>
          {result.fams.length>0&&(
            <div className="builder-fam-row">
              {result.fams.map(([name,score])=>(
                <div key={name} className="builder-fam-pill" style={{color:FAM_COLORS[name]||FAM_COLORS.default,background:`${FAM_COLORS[name]||FAM_COLORS.default}18`}}>
                  {name} {score.toFixed(0)}pts
                </div>
              ))}
            </div>
          )}
          {closestBro&&(
            <div style={{marginTop:6,textAlign:'center'}}>
              <div style={{fontSize:10,color:'var(--txt3)',marginBottom:5}}>Closest real match ({closestBro.matches} traits)</div>
              <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center',cursor:'pointer',background:'var(--ink3)',borderRadius:8,padding:'6px 10px',border:'1px solid var(--line)'}} onClick={()=>onSelect(closestBro.nft)}>
                <img src={closestBro.nft.Image} alt="" style={{width:32,height:32,borderRadius:6,objectFit:'cover'}}/>
                <div style={{fontSize:12}}>
                  <div style={{fontWeight:700,color:'var(--txt)'}}>#{closestBro.nft.ID}</div>
                  <div style={{fontFamily:'Space Mono,monospace',fontSize:'.78rem',color:'var(--teal)'}}>{fmtScore(closestBro.nft)}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   SHARE CARD (Canvas)
════════════════════════════════════ */
const ShareCard = ({nft, onClose}) => {
  const canvasRef = useRef(null);
  const [copied, setCopied] = useState(false);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas||!nft) return;
    const ctx = canvas.getContext('2d');
    const W=400, H=400;
    canvas.width=W; canvas.height=H;

    const rarity = getRarityTier(nft.diScore);
    const accentColor = rarity ? rarity.color : '#00d4b8';
    const famColor = FAM_COLORS[nft.dominantFamilies[0]]||FAM_COLORS.default;

    // Background gradient
    const bg = ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#0b0c14');
    bg.addColorStop(1,'#12141f');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Accent border
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 3;
    ctx.strokeRect(2,2,W-4,H-4);

    // Corner decorations
    const drawCorner = (x,y,flip)=>{
      ctx.save();ctx.translate(x,y);if(flip)ctx.scale(-1,-1);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(30,0);ctx.moveTo(0,0);ctx.lineTo(0,30);
      ctx.strokeStyle=accentColor+'99';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    };
    drawCorner(8,8,false);drawCorner(W-8,H-8,true);

    // Load and draw NFT image
    const img = new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      // Image centered, large
      const iSize=220;
      ctx.save();
      ctx.beginPath();
      const ix=(W-iSize)/2, iy=40;
      ctx.roundRect(ix,iy,iSize,iSize,12);
      ctx.clip();
      ctx.drawImage(img,ix,iy,iSize,iSize);
      ctx.restore();

      // Family color bar under image
      ctx.fillStyle=famColor+'66';
      ctx.fillRect((W-iSize)/2,iy+iSize-4,iSize,4);

      // ID
      ctx.fillStyle='#e8eaf8';
      ctx.font='bold 28px "Space Mono", monospace';
      ctx.textAlign='center';
      ctx.fillText(`#${nft.ID}`,W/2,290);

      // Score
      ctx.fillStyle=accentColor;
      ctx.font='bold 42px "Space Mono", monospace';
      ctx.fillText(fmtScore(nft),W/2,340);

      // Rarity
      if(rarity){
        ctx.fillStyle=accentColor+'33';
        const rx=W/2-50,ry=350,rw=100,rh=22;
        ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,11);ctx.fill();
        ctx.fillStyle=accentColor;
        ctx.font='bold 11px sans-serif';
        ctx.fillText(rarity.tier.toUpperCase(),W/2,365);
      }

      // Branding
      ctx.fillStyle='#4d5580';
      ctx.font='11px sans-serif';
      ctx.fillText('HEMI BROS · Rarity Checker',W/2,392);
    };
    img.onerror=()=>{
      // Fallback without image
      ctx.fillStyle='#e8eaf8';ctx.font='bold 60px "VT323"';ctx.textAlign='center';
      ctx.fillText(`#${nft.ID}`,W/2,180);
      ctx.fillStyle=accentColor;ctx.font='bold 48px monospace';
      ctx.fillText(fmtScore(nft),W/2,250);
    };
    img.src=nft.Image;
  },[nft]);

  const download = () => {
    const canvas = canvasRef.current;
    if(!canvas) return;
    const a = document.createElement('a');
    a.download=`hemi-bro-${nft.ID}.png`;
    a.href=canvas.toDataURL('image/png');
    a.click();
  };

  const copyLink = () => {
    const url = `${window.location.href.split('?')[0]}?id=${nft.ID}`;
    navigator.clipboard.writeText(url).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false),2000);
    });
  };

  return(
    <div className="share-mbd" onClick={onClose}>
      <div className="share-mbox" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px 0'}}>
          <span style={{fontSize:13,fontWeight:700,color:'var(--txt)'}}>Share Bro #{nft.ID}</span>
          <button className="mclose" style={{position:'static'}} onClick={onClose}>{I.x}</button>
        </div>
        <div className="share-canvas-wrap">
          <canvas ref={canvasRef} style={{maxWidth:'100%',borderRadius:8}}/>
        </div>
        <div className="share-actions">
          <button className="share-dl-btn" onClick={download}>{I.dl} Download PNG</button>
          <button className="share-copy-btn" onClick={copyLink} style={{color:copied?'var(--green)':'var(--txt2)'}}>
            {copied?<>{I.check} Copied!</>:<>{I.link} Copy Link</>}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════
   GLOBAL OFFER FEED
════════════════════════════════════ */
const OfferFeed = ({nfts, onSelectNft}) => {
  const [offers, setOffers]   = useState([]);
  const [loading,setLoading]  = useState(true);

  const load = useCallback(()=>{
    setLoading(true);
    supa.select('offers','limit=30')
      .then(d=>{ setOffers(d||[]); setLoading(false); })
      .catch(()=>{ setOffers([]); setLoading(false); });
  },[]);

  useEffect(()=>{ load(); },[]);

  const nftById = useMemo(()=>{
    const m={};
    nfts.forEach(n=>m[String(n.ID)]=n);
    return m;
  },[nfts]);

  const shortAddr = a => a?`${a.slice(0,6)}…${a.slice(-4)}`:'';
  const fmtTime = ts=>{
    try{
      const diff = Date.now()-new Date(ts).getTime();
      if(diff<60000) return 'just now';
      if(diff<3600000) return `${Math.floor(diff/60000)}m ago`;
      if(diff<86400000) return `${Math.floor(diff/3600000)}h ago`;
      return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }catch{return '';}
  };

  return(
    <div className="feed-wrap">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)'}}>Live Offers</div>
        <button className="feed-refresh" onClick={load}>↻ Refresh</button>
      </div>
      {loading
        ? <div className="feed-empty">Loading…</div>
        : offers.length===0
          ? <div className="feed-empty">No offers yet. Be the first to make one!</div>
          : offers.map(o=>{
              const nft = nftById[String(o.nft_id)];
              return(
                <div key={o.id} className="feed-item" onClick={()=>nft&&onSelectNft(nft)}>
                  {nft&&<img className="feed-img" src={nft.Image} alt={`#${o.nft_id}`} loading="lazy"/>}
                  <div className="feed-info">
                    <div className="feed-top">
                      <span className="feed-nft">Bro #{o.nft_id}</span>
                      <span className="feed-amount">Ξ {parseFloat(o.offer_amount).toFixed(3)}</span>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <span className="feed-addr">{shortAddr(o.wallet_address)}</span>
                      <span className="feed-time">{I.clock} {fmtTime(o.created_at)}</span>
                    </div>
                    {o.message&&<div className="feed-msg">"{o.message}"</div>}
                  </div>
                </div>
              );
            })
      }
    </div>
  );
};

   COMPARE MODAL
════════════════════════════════════ */
const CompareModal = ({nfts: compareBros, traitMap, onClose, onSelect}) => {
  if(!compareBros.length) return null;
  const rows = [
    {label:'Score',    fn: n=>fmtScore(n), sort:n=>n.diScore},
    {label:'Rank',     fn: n=>`#${n.rank}`, sort:n=>-n.rank},
    {label:'Rarity',   fn: n=>{ const r=getRarityTier(n.diScore); return r?r.tier:'Common'; }, sort:n=>n.diScore},
    {label:'Family',   fn: n=>n.dominantFamilies[0]||'—', sort:null},
    ...CATS.map(cat=>({label:cat, fn:n=>{const v=n[cat]||'—';return String(v).split('(')[0].trim();}, sort:null})),
  ];
  const bestIdx = compareBros.reduce((bi,n,i)=>n.diScore>compareBros[bi].diScore?i:bi,0);

  return(
    <div className="cmp-mbd">
      <div className="cmp-hd">
        <div className="cmp-title">COMPARE BROS</div>
        <button className="mclose" style={{position:'static'}} onClick={onClose}>{I.x}</button>
      </div>
      <div className="cmp-body">
        <table className="cmp-table">
          <thead>
            <tr>
              <th style={{textAlign:'left'}}>Trait</th>
              {compareBros.map((n,i)=>(
                <th key={n.ID} className="hero-col">
                  <div className="cmp-nft-col">
                    <img className="cmp-nft-img" src={n.Image} alt={`#${n.ID}`}/>
                    <div className="cmp-nft-id" style={{cursor:'pointer'}} onClick={()=>{onSelect(n);onClose();}}>{`#${n.ID}`}</div>
                    <div className="cmp-nft-score">{fmtScore(n)}</div>
                    {i===bestIdx&&<span style={{fontSize:9,fontWeight:800,color:'var(--gold)',letterSpacing:'.1em'}}>BEST</span>}
                  </div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map(row=>(
              <tr key={row.label}>
                <td className="row-label">{row.label}</td>
                {compareBros.map((n,i)=>{
                  const val = row.fn(n);
                  const isBest = row.sort && i===compareBros.reduce((bi,x,xi)=>row.sort(x)>row.sort(compareBros[bi])?xi:bi,0);
                  return <td key={n.ID} className={isBest?'best':''}>{val}</td>;
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ════════════════════════════════════
   SIMILAR BROS (used inside Modal)
════════════════════════════════════ */
const SimilarBros = ({nft, nfts, traitMap, onSelect}) => {
  const {similar, rareCombo} = useMemo(()=>{
    if(!nft||!nfts.length) return {similar:[],rareCombo:[]};

    const similar = nfts
      .filter(n=>n.ID!==nft.ID)
      .map(n=>{
        let score=0; const sharedCats=[];
        CATS.forEach(cat=>{ if(n[cat]&&n[cat]===nft[cat]){score++;sharedCats.push(cat);} });
        return {nft:n,score,sharedCats};
      })
      .filter(x=>x.score>0)
      .sort((a,b)=>b.score-a.score||b.nft.diScore-a.nft.diScore)
      .slice(0,8);

    // Rare trait co-occurrence: which pairs on this Bro are hardest to find together
    const thisCats = CATS.filter(cat=>{
      const v=nft[cat]; if(!v) return false;
      return String(v).split('(')[0].trim().toLowerCase()!=='none';
    });
    const combos = [];
    for(let i=0;i<thisCats.length;i++){
      for(let j=i+1;j<thisCats.length;j++){
        const catA=thisCats[i], catB=thisCats[j];
        const valA=nft[catA], valB=nft[catB]; if(!valA||!valB) continue;
        const nameA=String(valA).split('(')[0].trim();
        const nameB=String(valB).split('(')[0].trim();
        const scoreA=traitMap[tk(catA,nameA)]?.adjustedScore||0;
        const scoreB=traitMap[tk(catB,nameB)]?.adjustedScore||0;
        if(scoreA<10&&scoreB<10) continue; // skip all-common combos
        const count = nfts.filter(n=>n[catA]===valA&&n[catB]===valB).length;
        combos.push({catA,catB,nameA,nameB,count,scoreA,scoreB});
      }
    }
    combos.sort((a,b)=>a.count-b.count||(b.scoreA+b.scoreB)-(a.scoreA+a.scoreB));
    return {similar, rareCombo:combos.slice(0,3)};
  },[nft,nfts,traitMap]);

  return(
    <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:16}}>
      {rareCombo.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:6}}>Rare Trait Combos</div>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {rareCombo.map(({nameA,nameB,count,catA,catB,scoreA,scoreB})=>{
              const rA=getRarityTier(scoreA), rB=getRarityTier(scoreB);
              return(
                <div key={`${nameA}-${nameB}`} style={{
                  display:'flex',alignItems:'center',justifyContent:'space-between',
                  padding:'6px 10px',background:'var(--ink3)',borderRadius:8,border:'1px solid var(--line)'
                }}>
                  <div style={{fontSize:12,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginRight:8}}>
                    <span style={{color:rA?rA.color:'var(--txt)',fontWeight:700}}>{nameA}</span>
                    <span style={{color:'var(--txt3)',margin:'0 4px'}}>+</span>
                    <span style={{color:rB?rB.color:'var(--txt)',fontWeight:700}}>{nameB}</span>
                  </div>
                  <div style={{fontFamily:'Space Mono,monospace',fontSize:'.75rem',color:count<=3?'var(--r-grail)':count<=10?'var(--r-legendary)':'var(--txt3)',flexShrink:0}}>
                    ×{count}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {similar.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:6}}>Similar Bros</div>
          <div className="similar-row">
            {similar.map(({nft:s,score,sharedCats})=>(
              <div key={s.ID} className="similar-card" onClick={()=>onSelect(s)}
                title={`${score} shared: ${sharedCats.join(', ')}`}>
                <img src={s.Image} alt={`#${s.ID}`} loading="lazy"/>
                <div className="similar-card-score">{fmtScore(s)}</div>
                <div style={{fontSize:9,color:'var(--txt3)',textAlign:'center',marginTop:1}}>{score} shared</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {!similar.length&&!rareCombo.length&&(
        <p style={{color:'var(--txt2)',fontSize:13,padding:'18px 0'}}>No similar Bros found.</p>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   TRAIT CO-OCCURRENCE EXPLORER

/* All gallery filter/sort state in one place.
   Import via useApp() ctx or pass down once. */
const useGalleryState = (nfts, traitMap) => {
  const [search,        setSearch]        = useState('');
  const [filters,       setFilters]       = useState({traits:{},families:[]});
  const [sortKey,       setSortKey]       = useState('score_desc');
  const [scoreMin,      setScoreMin]      = useState('');
  const [scoreMax,      setScoreMax]      = useState('');
  const [rarityFilter,  setRarityFilter]  = useState([]);
  const [hideIp,        setHideIp]        = useState(false);
  const [walletFilter,  setWalletFilter]  = useState(false);
  const [ownedIds,      setOwnedIds]      = useState([]);
  const debouncedSearch = useDebounce(search, 80);

  const filtered = useMemo(()=>{
    if(!nfts.length) return [];
    const q = debouncedSearch.trim();
    const ownedSet = walletFilter && ownedIds.length > 0 ? new Set(ownedIds) : null;
    const famLen   = filters.families.length;
    const traitEntries = Object.entries(filters.traits);
    const traitLen = traitEntries.length;
    const sMin = scoreMin!==''?parseFloat(scoreMin):null;
    const sMax = scoreMax!==''?parseFloat(scoreMax):null;
    const rarSet = rarityFilter.length>0 ? new Set(rarityFilter) : null;

    let result = nfts.filter(nft=>{
      if(ownedSet && !ownedSet.has(nft.idStr)) return false;
      if(q){
        const ql = q.toLowerCase();
        const idMatch = nft.idStr.startsWith(q);
        const traitMatch = !idMatch && CATS.some(cat=>{
          const v = nft[cat]; if(!v) return false;
          return String(v).split('(')[0].trim().toLowerCase().includes(ql);
        });
        if(!idMatch && !traitMatch) return false;
      }
      if(hideIp && nft.hasIpRisk) return false;
      if(famLen > 0) {
        let ok = false;
        for(let i=0;i<famLen;i++) if(nft.famSet.has(filters.families[i])){ ok=true; break; }
        if(!ok) return false;
      }
      for(let i=0;i<traitLen;i++){
        const [cat,vals]=traitEntries[i];
        if(!Array.isArray(vals)||vals.length===0) continue;
        if(!vals.includes(nft[cat])) return false;
      }
      if(sMin!==null && nft.diScore<sMin) return false;
      if(sMax!==null && nft.diScore>sMax) return false;
      if(rarSet){
        let traitMatch = false;
        for(const cat of CATS){
          const val = nft[cat]; if(!val) continue;
          const name = String(val).split('(')[0].trim();
          const detail = traitMap[tk(cat,name)];
          const r = detail ? getRarityTier(detail.adjustedScore||0) : null;
          const tierName = r ? r.tier : 'Common';
          if(rarSet.has(tierName)){ traitMatch=true; break; }
        }
        if(!traitMatch) return false;
      }
      return true;
    });

    switch(sortKey){
      case 'score_asc':  result.sort((a,b)=>a.diScore-b.diScore); break;
      case 'id_asc':     result.sort((a,b)=>Number(a.ID)-Number(b.ID)); break;
      case 'id_desc':    result.sort((a,b)=>Number(b.ID)-Number(a.ID)); break;
      case 'rarest':{
        const topTrait = n => Math.max(0,...CATS.map(cat=>{
          const v=n[cat]; if(!v) return 0;
          return traitMap[tk(cat,String(v).split('(')[0].trim())]?.adjustedScore||0;
        }));
        result.sort((a,b)=>topTrait(b)-topTrait(a)); break;
      }
      case 'common':{
        const topTraitC = n => Math.max(0,...CATS.map(cat=>{
          const v=n[cat]; if(!v) return 0;
          return traitMap[tk(cat,String(v).split('(')[0].trim())]?.adjustedScore||0;
        }));
        result.sort((a,b)=>topTraitC(a)-topTraitC(b)); break;
      }
      default: break;
    }
    return result;
  },[nfts, debouncedSearch, filters, walletFilter, ownedIds, sortKey, scoreMin, scoreMax, rarityFilter, hideIp, traitMap]);

  const traitOpts = useMemo(()=>{
    const o={};
    CATS.forEach(cat=>{
      const s=new Set();
      nfts.forEach(n=>{const v=n[cat];if(v) s.add(v);});
      o[cat]=[...s].sort((a,b)=>{
        const aNone=a.split('(')[0].trim().toLowerCase()==='none';
        const bNone=b.split('(')[0].trim().toLowerCase()==='none';
        if(aNone&&!bNone) return 1; if(!aNone&&bNone) return -1;
        return a.localeCompare(b);
      });
    });
    return o;
  },[nfts]);

  const facetedCounts = useMemo(()=>{
    const fc={}; CATS.forEach(cat=>fc[cat]={});
    const q = debouncedSearch.trim();
    const famLen = filters.families.length;
    const traitEntries = Object.entries(filters.traits);
    const ownedSet = walletFilter && ownedIds.length > 0 ? new Set(ownedIds) : null;
    const sMin = scoreMin!==''?parseFloat(scoreMin):null;
    const sMax = scoreMax!==''?parseFloat(scoreMax):null;
    const rarSet = rarityFilter.length>0 ? new Set(rarityFilter) : null;
    nfts.forEach(nft=>{
      if(ownedSet && !ownedSet.has(nft.idStr)) return;
      if(q){
        const ql=q.toLowerCase();
        const idMatch=nft.idStr.startsWith(q);
        const traitMatch=!idMatch&&CATS.some(cat=>{const v=nft[cat];if(!v)return false;return String(v).split('(')[0].trim().toLowerCase().includes(ql);});
        if(!idMatch&&!traitMatch) return;
      }
      if(hideIp&&nft.hasIpRisk) return;
      if(famLen>0){let ok=false;for(let i=0;i<famLen;i++)if(nft.famSet.has(filters.families[i])){ok=true;break;}if(!ok)return;}
      if(sMin!==null&&nft.diScore<sMin) return;
      if(sMax!==null&&nft.diScore>sMax) return;
      if(rarSet){
        let tm=false;
        for(const cat of CATS){const val=nft[cat];if(!val)continue;const name=String(val).split('(')[0].trim();const detail=traitMap[tk(cat,name)];const r=detail?getRarityTier(detail.adjustedScore||0):null;if(rarSet.has(r?r.tier:'Common')){tm=true;break;}}
        if(!tm) return;
      }
      CATS.forEach(cat=>{
        const v=nft[cat]; if(!v) return;
        for(let i=0;i<traitEntries.length;i++){
          const [c,vals]=traitEntries[i];
          if(c===cat) continue;
          if(!Array.isArray(vals)||vals.length===0) continue;
          if(!vals.includes(nft[c])) return;
        }
        fc[cat][v]=(fc[cat][v]||0)+1;
      });
    });
    return fc;
  },[nfts, filters, debouncedSearch, walletFilter, ownedIds, hideIp, scoreMin, scoreMax, rarityFilter, traitMap]);

  const famCounts = useMemo(()=>{
    const fc={};
    nfts.forEach(n=>n.famSet.forEach(f=>{fc[f]=(fc[f]||0)+1;}));
    return fc;
  },[nfts]);

  const activeCount = Object.values(filters.traits).reduce((s,v)=>s+(Array.isArray(v)?v.length:1),0)
    +filters.families.length+(walletFilter?1:0)+(rarityFilter.length>0?1:0)+(hideIp?1:0)+((scoreMin||scoreMax)?1:0);
  const totalActive = activeCount+(search?1:0);

  const ownedNfts = useMemo(()=>{
    if(!ownedIds.length) return [];
    const s=new Set(ownedIds);
    return nfts.filter(n=>s.has(n.idStr));
  },[nfts, ownedIds]);

  const clearAll = useCallback(()=>{
    setFilters({traits:{},families:[]});setSearch('');setWalletFilter(false);
    setRarityFilter([]);setScoreMin('');setScoreMax('');setHideIp(false);
  },[]);
  const rmTrait = useCallback(cat=>setFilters(f=>{const t={...f.traits};delete t[cat];return {...f,traits:t};}),[]);
  const rmFam   = useCallback(fam=>setFilters(f=>({...f,families:f.families.filter(x=>x!==fam)})),[]);

  return {
    search, setSearch, filters, setFilters, sortKey, setSortKey,
    scoreMin, setScoreMin, scoreMax, setScoreMax,
    rarityFilter, setRarityFilter, hideIp, setHideIp,
    walletFilter, setWalletFilter, ownedIds, setOwnedIds,
    filtered, traitOpts, facetedCounts, famCounts,
    activeCount, totalActive, ownedNfts, clearAll, rmTrait, rmFam,
  };
};
