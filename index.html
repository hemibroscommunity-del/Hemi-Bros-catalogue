/* ════════════════════════════════════
   GRAND EXCHANGE
   Trait-level market analytics
════════════════════════════════════ */
const GrandExchange = ({nfts, traitMap, onSelectNft}) => {
  const [tab,       setTab]      = useState('table');
  const [catFilter, setCatFilter]= useState('All');
  const [search,    setSearch]   = useState('');
  const [sortKey,   setSortKey]  = useState('score');
  const [sortDir,   setSortDir]  = useState('desc');
  const [hoverDot,  setHoverDot] = useState(null);
  const [salesPage, setSalesPage]= useState(0);
  const SALES_PER_PAGE = 50;

  const CAT_COLORS = {
    'Bro Type':   'var(--r-grail)',
    'Headwear':   'var(--r-legendary)',
    'Clothes':    'var(--r-epic)',
    'Eyes':       'var(--r-rare)',
    'Eyewear':    'var(--r-uncommon)',
    'Mouth Items':'var(--gold)',
  };

  // ── Per-trait analytics ──────────────────────────────────────────
  const allSales = useMemo(() => {
    // 1. Collect all valid sales with timestamps
    const raw = [];
    nfts.forEach(n => {
      (n.sales||[]).forEach(s => {
        if(s.price > 0) raw.push({...s, nft:n, ts: new Date(s.date||0).getTime()});
      });
    });
    raw.sort((a,b) => a.ts - b.ts);

    // 2. For each sale, estimate the floor at that moment using a rolling window.
    //    Window: all sales within ±45 days. If fewer than 3 in window, widen to ±90 days.
    //    Floor = lowest price seen in that window. Falls back to global min if still empty.
    const DAY = 86400000;

    // Back-calculate implied floor from each sale: impliedFloor = price / multiple
    // This gives us the floor the market was pricing against at time of sale.
    const rawWithImpl = raw.map(s => {
      const m = getMultiple(s.nft);
      return { ...s, impliedFloor: m && m > 0 ? s.price / m : null };
    });
    const impliedFloors = rawWithImpl.filter(s => s.impliedFloor != null);
    const globalImpliedFloor = impliedFloors.length
      ? impliedFloors.reduce((a,s)=>a+s.impliedFloor,0)/impliedFloors.length
      : FLOOR_ETH;

    // Time-local floor: median implied floor in rolling window
    // Using median (not min) to reduce outlier distortion
    const timeLocalFloor = (ts, minWindow=45, wideWindow=90) => {
      const w = minWindow * DAY;
      let window = impliedFloors.filter(s => Math.abs(s.ts - ts) <= w);
      if(window.length < 3) window = impliedFloors.filter(s => Math.abs(s.ts - ts) <= wideWindow * DAY);
      if(!window.length) return globalImpliedFloor;
      const sorted = window.map(s=>s.impliedFloor).sort((a,b)=>a-b);
      const mid = Math.floor(sorted.length/2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid-1]+sorted[mid])/2;
    };

    // 3. Attach localFloor, expectedEth, miss to each sale
    return raw.map(s => {
      const localFloor   = timeLocalFloor(s.ts);
      const m            = getMultiple(s.nft);
      const expectedEth  = m && m > 0 ? localFloor * m : null;
      return {
        ...s,
        localFloor,
        expectedEth,
        miss: expectedEth != null ? s.price - expectedEth : null,
      };
    }).sort((a,b) => b.ts - a.ts); // keep newest-first for display
  }, [nfts]);

  // ── All individual sale events ───────────────────────────────────
  // ── Build sorted-by-date sales list first, then compute time-local floors ──
  const traitRows = useMemo(() => {
    const rows = [];
    Object.values(traitMap).forEach(detail => {
      const name = detail['Unique Item List'];
      const cat  = detail.Category;
      if(!name || !cat || !CATS.includes(cat)) return;
      if(name.toLowerCase() === 'none') return;
      const supply = parseInt(detail.Supply) || 0;
      const score  = detail.adjustedScore || 0;
      const rarity = getRarityTier(score);

      const hasTraitNfts = nfts.filter(n => {
        const v = n[cat]; if(!v) return false;
        return String(v).split('(')[0].trim().toLowerCase() === name.toLowerCase();
      });
      const sales      = hasTraitNfts.flatMap(n => (n.sales||[]).map(s => ({...s, nft:n})));
      const validSales = sales.filter(s => s.price > 0);
      const prices     = validSales.map(s => s.price);
      const avgPrice   = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : null;
      const minPrice   = prices.length ? Math.min(...prices) : null;
      const maxPrice   = prices.length ? Math.max(...prices) : null;

      // Premium: actual price vs time-local floor for that specific sale
      // Each sale in allSales already has localFloor attached — look them up by matching nft+date
      // We compute per-sale premium then average
      const salesWithFloor = validSales.map(s => {
        // Find matching enriched sale in allSales (by nft ID + price + date)
        const enriched = allSales.find(as =>
          as.nft.ID === s.nft.ID && as.price === s.price && as.date === s.date
        );
        const floor = enriched?.localFloor ?? FLOOR_ETH;
        return { ...s, localFloor: floor };
      });
      const premiums = salesWithFloor.map(s => s.price - s.localFloor);
      const premium  = premiums.length ? premiums.reduce((a,b)=>a+b,0)/premiums.length : null;
      const efficiency = premium && premium > 0 && score > 0 ? score / (premium * 1000) : null;

      // Miss = actual − (localFloor × DI multiple) per sale
      const missSales = salesWithFloor.filter(s => {
        const m = getMultiple(s.nft);
        return m && m > 0;
      });
      const avgMiss = missSales.length
        ? missSales.reduce((acc, s) => {
            const exp = s.localFloor * getMultiple(s.nft);
            return acc + (s.price - exp);
          }, 0) / missSales.length
        : null;

      rows.push({
        name, cat, supply, score, rarity,
        thumbnailUrl: detail.thumbnailUrl || null,
        saleCount: validSales.length,
        avgPrice, minPrice, maxPrice, premium, efficiency,
        avgMiss, missSaleCount: missSales.length,
        sales: validSales,
        exampleNft: hasTraitNfts[0] || null,
        nftCount: hasTraitNfts.length,
      });
    });
    return rows;
  }, [nfts, traitMap, allSales]);

  const allSalesByScore = useMemo(() =>
    [...allSales].sort((a,b) => a.nft.diScore - b.nft.diScore)
  , [allSales]);

  // ── Filtered + sorted trait table ───────────────────────────────
  const filteredRows = useMemo(() => {
    let rows = [...traitRows];
    if(catFilter !== 'All') rows = rows.filter(r => r.cat === catFilter);
    if(search.trim()) {
      const q = search.trim().toLowerCase();
      rows = rows.filter(r => r.name.toLowerCase().includes(q));
    }
    const getVal = (r,k) => ({
      name:r.name, cat:r.cat, supply:r.supply||0, score:r.score||0,
      sales:r.saleCount||0, price:r.avgPrice||0, prem:r.premium||0, miss:r.avgMiss||0,
    }[k]??0);
    rows.sort((a,b) => {
      const av=getVal(a,sortKey), bv=getVal(b,sortKey);
      if(typeof av==='string') return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
      return sortDir==='asc'?av-bv:bv-av;
    });
    return rows;
  }, [traitRows, catFilter, search, sortKey, sortDir]);

  // ── Summary insights ─────────────────────────────────────────────
  const summary = useMemo(() => {
    const withSales = traitRows.filter(r => r.saleCount > 0);
    if(!allSales.length) return null;
    const prices = allSales.map(s=>s.price);
    const avg    = prices.reduce((a,b)=>a+b,0)/prices.length;
    const topPremium = [...withSales].filter(r=>r.premium!=null).sort((a,b)=>(b.premium||0)-(a.premium||0))[0]||null;
    const topEff     = [...withSales].filter(r=>(r.efficiency||0)>0).sort((a,b)=>(b.efficiency||0)-(a.efficiency||0))[0]||null;
    const mostSold   = [...withSales].sort((a,b)=>b.saleCount-a.saleCount)[0]||null;
    const highSale   = [...allSales].sort((a,b)=>b.price-a.price)[0]||null;
    // Pearson r: DI score vs price
    const xs=allSalesByScore.map(s=>s.nft.diScore), ys=allSalesByScore.map(s=>s.price);
    const n=xs.length, mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
    const r = xs.reduce((a,v,i)=>a+(v-mx)*(ys[i]-my),0) /
      (Math.sqrt(xs.reduce((a,v)=>a+(v-mx)**2,0)*ys.reduce((a,v)=>a+(v-my)**2,0))||1);
    // Avg DI score of sold NFTs vs collection avg
    const soldDI    = allSales.map(s=>s.nft.diScore);
    const avgSoldDI = soldDI.reduce((a,b)=>a+b,0)/soldDI.length;
    const collDI    = nfts.length ? nfts.reduce((a,n)=>a+n.diScore,0)/nfts.length : 0;
    // Miss analysis — model validation
    const withMiss   = allSales.filter(s => s.miss != null);
    const avgMiss    = withMiss.length ? withMiss.reduce((a,s)=>a+s.miss,0)/withMiss.length : null;
    const overshoot  = withMiss.filter(s=>s.miss>0.0005).length;
    const undershoot = withMiss.filter(s=>s.miss<-0.0005).length;
    const exact      = withMiss.length - overshoot - undershoot;
    const byMiss     = traitRows.filter(r=>r.avgMiss!=null).sort((a,b)=>(b.avgMiss||0)-(a.avgMiss||0));
    const topOverTrait  = byMiss[0]||null;
    const topUnderTrait = byMiss[byMiss.length-1]||null;

    return { total:allSales.length, avg, min:Math.min(...prices), max:Math.max(...prices),
      topPremium, topEff, mostSold, highSale, r, avgSoldDI, collDI,
      traitsWithSales: withSales.length,
      avgMiss, overshoot, undershoot, exact, withMissCount:withMiss.length,
      topOverTrait, topUnderTrait };
  }, [traitRows, allSales, allSalesByScore, nfts]);

  const toggleSort = key => {
    if(sortKey===key) setSortDir(d=>d==='desc'?'asc':'desc');
    else { setSortKey(key); setSortDir('desc'); }
  };
  const SH = key => sortKey===key?(sortDir==='desc'?'↓':'↑'):'⇅';
  const fE = v => v==null?'—':v.toFixed(4)+' Ξ';
  const fP = v => v==null?'—':`${v>=0?'+':''}${v.toFixed(4)} Ξ`;

  // ── Scatter Plot ─────────────────────────────────────────────────
  const ScatterPlot = () => {
    if(!allSalesByScore.length) return (
      <div style={{color:'var(--txt3)',padding:'40px 0',textAlign:'center'}}>No sales data to plot.</div>
    );
    const W=340,H=220,PL=50,PR=14,PT=14,PB=38;
    const IW=W-PL-PR, IH=H-PT-PB;
    const xs=allSalesByScore.map(s=>s.nft.diScore), ys=allSalesByScore.map(s=>s.price);
    const xMn=Math.min(...xs),xMx=Math.max(...xs)||1;
    const yMn=0, yMx=Math.max(...ys)*1.2||1;
    const px=v=>PL+(v-xMn)/(xMx-xMn)*IW;
    const py=v=>H-PB-(v-yMn)/(yMx-yMn)*IH;
    const n=xs.length,mx2=xs.reduce((a,b)=>a+b,0)/n,my2=ys.reduce((a,b)=>a+b,0)/n;
    const sl=xs.reduce((a,v,i)=>a+(v-mx2)*(ys[i]-my2),0)/(xs.reduce((a,v)=>a+(v-mx2)**2,0)||1);
    const ic=my2-sl*mx2;
    const xTicks=[xMn, Math.round((xMn+xMx)/2), xMx];
    const yTicks=[0, parseFloat((yMx/2).toFixed(4)), parseFloat(yMx.toFixed(4))];
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{maxWidth:520,display:'block',margin:'0 auto',overflow:'visible'}}>
        {yTicks.map((v,i)=>(
          <line key={i} x1={PL} x2={W-PR} y1={py(v)} y2={py(v)} stroke="var(--line)" strokeWidth={.5} strokeDasharray="3,3"/>
        ))}
        <line x1={px(xMn)} y1={py(sl*xMn+ic)} x2={px(xMx)} y2={py(sl*xMx+ic)}
          stroke="var(--pop)" strokeWidth={1.5} strokeDasharray="5,3" opacity={.75}/>
        {allSalesByScore.map((s,i)=>{
          const isH=hoverDot===i;
          const col = CAT_COLORS[Object.keys(CAT_COLORS)[i % 6]] || 'var(--teal)';
          return(
            <circle key={i} cx={px(s.nft.diScore)} cy={py(s.price)} r={isH?6:3.5}
              fill="var(--teal)" stroke="var(--ink2)" strokeWidth={.8}
              opacity={isH?1:.6} style={{cursor:'pointer',transition:'r .1s'}}
              onMouseEnter={()=>setHoverDot(i)} onMouseLeave={()=>setHoverDot(null)}
              onClick={()=>onSelectNft&&onSelectNft(s.nft)}/>
          );
        })}
        <line x1={PL} y1={H-PB} x2={W-PR} y2={H-PB} stroke="var(--line2)" strokeWidth={1}/>
        <line x1={PL} y1={PT}   x2={PL}   y2={H-PB} stroke="var(--line2)" strokeWidth={1}/>
        {xTicks.map((v,i)=>(
          <g key={i}>
            <line x1={px(v)} y1={H-PB} x2={px(v)} y2={H-PB+4} stroke="var(--line2)"/>
            <text x={px(v)} y={H-PB+13} textAnchor="middle" fill="var(--txt3)" fontSize={8}>{Math.round(v)}</text>
          </g>
        ))}
        {yTicks.map((v,i)=>(
          <g key={i}>
            <line x1={PL-4} y1={py(v)} x2={PL} y2={py(v)} stroke="var(--line2)"/>
            <text x={PL-6} y={py(v)+3} textAnchor="end" fill="var(--txt3)" fontSize={8}>{v}</text>
          </g>
        ))}
        <text x={PL+IW/2} y={H-2} textAnchor="middle" fill="var(--txt3)" fontSize={9}>NFT DI Score →</text>
        <text x={10} y={PT+IH/2} textAnchor="middle" fill="var(--txt3)" fontSize={9}
          transform={`rotate(-90,10,${PT+IH/2})`}>Sale Price (Ξ)</text>
        {hoverDot!=null&&allSalesByScore[hoverDot]&&(()=>{
          const s=allSalesByScore[hoverDot];
          const cx=px(s.nft.diScore),cy=py(s.price);
          const tx=cx>W*.65?cx-100:cx+8, ty=cy<36?cy+10:cy-34;
          return(
            <g>
              <rect x={tx-4} y={ty-14} width={104} height={34} rx={5}
                fill="var(--ink3)" stroke="var(--teal)" strokeWidth={.8}/>
              <text x={tx+1} y={ty} fill="var(--teal)" fontSize={9} fontWeight="bold">
                {`#${s.nft.ID} · ${s.price} Ξ`}
              </text>
              <text x={tx+1} y={ty+12} fill="var(--txt3)" fontSize={8}>
                {`DI ${s.nft.diScore.toFixed(1)}`}
              </text>
              <text x={tx+1} y={ty+22} fill="var(--txt3)" fontSize={8}>
                {s.date||''}
              </text>
            </g>
          );
        })()}
      </svg>
    );
  };

  const pagedSales = allSales.slice(salesPage*SALES_PER_PAGE, (salesPage+1)*SALES_PER_PAGE);
  const totalPages = Math.ceil(allSales.length / SALES_PER_PAGE);

  return (
    <div className="gx-wrap">

      {/* ── Header ── */}
      <div className="gx-header">
        <div style={{display:'flex',alignItems:'baseline',gap:10,flexWrap:'wrap'}}>
          <div className="gx-title">💹 Grand Exchange</div>
          <div style={{fontSize:10,color:'var(--txt3)'}}>
            {allSales.length} sale{allSales.length!==1?'s':''} · {traitRows.filter(r=>r.saleCount>0).length} traits with data
          </div>
        </div>
        <div className="gx-tabs">
          {[['table','📋 Traits'],['scatter','📈 Scatter'],['summary','🔍 Insights'],['history','🕒 History']].map(([k,l])=>(
            <button key={k} className={`gx-tab ${tab===k?'on':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
      </div>

      {/* ── SCATTER ── */}
      {tab==='scatter'&&(
        <div className="gx-scroll">
          <div style={{marginBottom:6}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--txt)'}}>
              Sale Price vs NFT DI Score
              {summary&&<span style={{fontSize:10,fontWeight:400,color:'var(--txt3)',marginLeft:8}}>
                Pearson r = {summary.r.toFixed(3)} {Math.abs(summary.r)>0.4?'· strong correlation':Math.abs(summary.r)>0.2?'· moderate':'· weak'}
              </span>}
            </div>
            <div style={{fontSize:10,color:'var(--txt3)',marginBottom:14}}>
              Each dot = one sale event. Purple line = trend. Tap/click a dot to open that Bro.
            </div>
          </div>
          <ScatterPlot/>
          {summary&&(
            <div style={{marginTop:16}}>
              <div className="gx-section-title">Sales by DI Score Tier</div>
              {[
                {label:'Grail 300+',    col:'var(--r-grail)',     lo:300, hi:Infinity},
                {label:'Legendary 150+',col:'var(--r-legendary)', lo:150, hi:299},
                {label:'Epic 45+',      col:'var(--r-epic)',      lo:45,  hi:149},
                {label:'Rare 25+',      col:'var(--r-rare)',      lo:25,  hi:44},
                {label:'Uncommon 10+',  col:'var(--r-uncommon)',  lo:10,  hi:24},
                {label:'Common <10',    col:'var(--txt3)',         lo:0,   hi:9},
              ].map(b=>{
                const bs=allSalesByScore.filter(s=>s.nft.diScore>=b.lo&&s.nft.diScore<=b.hi);
                if(!bs.length) return null;
                const ps=bs.map(s=>s.price);
                const avg=ps.reduce((a,v)=>a+v,0)/ps.length;
                const mn=Math.min(...ps), mx=Math.max(...ps);
                return(
                  <div key={b.label} className="gx-band-row">
                    <div style={{width:9,height:9,borderRadius:2,background:b.col,flexShrink:0}}/>
                    <div style={{flex:1,fontSize:11,fontWeight:700,color:'var(--txt)'}}>{b.label}</div>
                    <div style={{fontSize:10,color:'var(--txt3)',marginRight:6}}>{bs.length} sale{bs.length!==1?'s':''}</div>
                    <div style={{fontFamily:'Space Mono,monospace',fontSize:10,color:b.col}}>
                      avg {avg.toFixed(4)} Ξ
                      {bs.length>1&&<span style={{color:'var(--txt3)',fontSize:9}}> ({mn.toFixed(4)}–{mx.toFixed(4)})</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── INSIGHTS ── */}
      {tab==='summary'&&(
        <div className="gx-scroll gx-summary">
          {!summary
            ? <div style={{color:'var(--txt3)',padding:'40px 0',textAlign:'center'}}>No sales data loaded yet.</div>
            : <>
              <div className="gx-kpi-row">
                {[
                  {label:'Total Sales',      val:summary.total,                           col:'var(--txt)'},
                  {label:'Avg Sale Price',   val:`${summary.avg.toFixed(4)} Ξ`,           col:'var(--teal)'},
                  {label:'Highest Sale',     val:`${summary.max.toFixed(4)} Ξ`,           col:'var(--r-grail)'},
                  {label:'Score↔Price Corr', val:summary.r.toFixed(3),                    col:Math.abs(summary.r)>.3?'var(--green)':'var(--txt2)'},
                  {label:'Avg DI (sold)',    val:summary.avgSoldDI.toFixed(1),             col:'var(--pop)'},
                  {label:'Traits w/ Sales',  val:`${summary.traitsWithSales} traits`,      col:'var(--txt2)'},
                ].map(({label,val,col})=>(
                  <div key={label} className="gx-kpi">
                    <div className="gx-kpi-val" style={{color:col}}>{val}</div>
                    <div className="gx-kpi-lbl">{label}</div>
                  </div>
                ))}
              </div>

              {summary.avgSoldDI > summary.collDI && (
                <div style={{background:'rgba(0,212,184,.08)',border:'1px solid var(--teal)',borderRadius:8,padding:'9px 12px',fontSize:11,color:'var(--txt2)',marginBottom:12}}>
                  📊 Sold Bros average DI <b style={{color:'var(--teal)'}}>{summary.avgSoldDI.toFixed(1)}</b> vs collection avg <b style={{color:'var(--txt)'}}>{summary.collDI.toFixed(1)}</b> — higher-scored Bros trade more actively.
                </div>
              )}

              <div className="gx-section-title">Notable Traits</div>
              <div className="gx-insight-grid">
                {[
                  {icon:'💎', label:'Highest Avg Sale Premium',   row:summary.topPremium, sub:r=>`+${r.premium.toFixed(4)} Ξ above floor · ${r.saleCount} sale${r.saleCount!==1?'s':''}`},
                  {icon:'⚡', label:'Best Score/Price Efficiency', row:summary.topEff,     sub:r=>`${r.efficiency.toFixed(1)} DI pts per 0.001 Ξ premium`},
                  {icon:'🔥', label:'Most Traded Trait',           row:summary.mostSold,   sub:r=>`${r.saleCount} sale${r.saleCount!==1?'s':''} · avg ${r.avgPrice?.toFixed(4)||'?'} Ξ`},
                ].filter(({row})=>row).map(({icon,label,row,sub})=>(
                  <div key={label} className="gx-insight-card"
                    onClick={()=>row.exampleNft&&onSelectNft&&onSelectNft(row.exampleNft)}>
                    <div className="gx-insight-icon">{icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:5}}>{label}</div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <TraitImg className="gx-insight-img" src={row.thumbnailUrl} alt={row.name}/>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:row.rarity?.color||'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.name}</div>
                          <div style={{fontSize:10,color:'var(--txt3)',marginTop:1}}>{row.cat}</div>
                          <div style={{fontSize:10,fontFamily:'Space Mono,monospace',color:'var(--teal)',marginTop:2}}>
                            +{row.score.toFixed(1)} DI pts · ×{row.supply||'?'} supply
                          </div>
                          <div style={{fontSize:10,color:'var(--txt2)',marginTop:1}}>{sub(row)}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {summary.highSale&&(
                <>
                  <div className="gx-section-title">Highest Recorded Sale</div>
                  <div className="gx-insight-card" onClick={()=>onSelectNft&&onSelectNft(summary.highSale.nft)}>
                    <div className="gx-insight-icon">👑</div>
                    <div>
                      <div style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:4}}>Peak Sale</div>
                      <div style={{fontSize:14,fontWeight:700,color:'var(--r-grail)'}}>
                        Bro #{summary.highSale.nft.ID} · {summary.highSale.price} Ξ
                      </div>
                      <div style={{fontSize:11,color:'var(--txt3)',marginTop:2}}>
                        DI Score {summary.highSale.nft.diScore.toFixed(1)} · Rank #{summary.highSale.nft.rank} · {summary.highSale.date}
                      </div>
                    </div>
                  </div>
                </>
              )}

              {/* ── DI Model Validation ── */}
              {summary.withMissCount>0&&(
                <div style={{marginTop:16,padding:'12px 14px',background:'var(--ink3)',border:'1px solid var(--line)',borderRadius:10}}>
                  <div className="gx-section-title" style={{marginBottom:6}}>DI Model Validation</div>
                  <div style={{fontSize:10,color:'var(--txt3)',marginBottom:10}}>
                    Expected price = floor × DI multiple. Miss = actual − expected. Across {summary.withMissCount} sale{summary.withMissCount!==1?'s':''}.
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:10}}>
                    {[
                      {label:'Above Model', val:summary.overshoot,  col:'var(--green)', icon:'↑'},
                      {label:'~On Model',   val:summary.exact,      col:'var(--txt2)',  icon:'≈'},
                      {label:'Below Model', val:summary.undershoot, col:'var(--red)',   icon:'↓'},
                    ].map(({label,val,col,icon})=>(
                      <div key={label} style={{background:'var(--ink4)',borderRadius:8,padding:'8px',textAlign:'center',border:`1px solid ${col}44`}}>
                        <div style={{fontSize:20,color:col,fontWeight:900,lineHeight:1}}>{icon} {val}</div>
                        <div style={{fontSize:8,color:'var(--txt3)',marginTop:3,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em'}}>{label}</div>
                      </div>
                    ))}
                  </div>
                  {summary.avgMiss!=null&&(
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderTop:'1px solid var(--line)',marginBottom:8}}>
                      <span style={{fontSize:10,color:'var(--txt3)'}}>Avg miss (actual − expected)</span>
                      <span style={{fontFamily:'Space Mono,monospace',fontSize:12,fontWeight:700,
                        color:summary.avgMiss>0.0005?'var(--green)':summary.avgMiss<-0.0005?'var(--red)':'var(--txt3)'}}>
                        {summary.avgMiss>=0?'+':''}{summary.avgMiss.toFixed(4)} Ξ
                      </span>
                    </div>
                  )}
                  <div style={{fontSize:10,color:'var(--txt3)',fontStyle:'italic',lineHeight:1.5,marginBottom:8}}>
                    {Math.abs(summary.avgMiss||0)<0.001
                      ? '✓ Model appears well-calibrated on average.'
                      : (summary.avgMiss||0)>0
                        ? '↑ Market is paying above model predictions — DI scores may be underestimating value.'
                        : '↓ Market is paying below model predictions — floor multiple expectations may be set too high.'}
                  </div>
                  {[
                    {label:'Most market-preferred (sold above model)', row:summary.topOverTrait,  icon:'📈'},
                    {label:'Most market-discounted (sold below model)',row:summary.topUnderTrait, icon:'📉'},
                  ].filter(({row})=>row&&row.avgMiss!=null).map(({label,row,icon})=>(
                    <div key={label} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderTop:'1px solid var(--line)',marginTop:4}}>
                      <span style={{fontSize:14}}>{icon}</span>
                      <TraitImg className="gx-insight-img" src={row.thumbnailUrl} alt={row.name} style={{width:28,height:28,borderRadius:5}}/>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:11,fontWeight:700,color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.name}</div>
                        <div style={{fontSize:9,color:'var(--txt3)'}}>{label}</div>
                        <div style={{fontSize:10,fontFamily:'Space Mono,monospace',color:(row.avgMiss||0)>0?'var(--green)':'var(--red)',marginTop:1}}>
                          {(row.avgMiss||0)>=0?'+':''}{(row.avgMiss||0).toFixed(4)} Ξ avg miss
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </>
          }
        </div>
      )}

      {/* ── HISTORY ── */}
      {tab==='history'&&(
        <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
          <div style={{padding:'8px 14px 6px',borderBottom:'1px solid var(--line)',flexShrink:0,fontSize:10,color:'var(--txt3)'}}>
            {allSales.length} total sales · sorted newest first
          </div>
          <div className="gx-sale-head">
            {['ID','Date','Price','DI'].map(h=>(
              <div key={h} style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)'}}>{h}</div>
            ))}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {pagedSales.map((s,i)=>(
              <div key={i} className="gx-sale-row" onClick={()=>onSelectNft&&onSelectNft(s.nft)}>
                <div className="gx-sale-id">#{s.nft.ID}</div>
                <div className="gx-sale-date">{s.date||'—'}</div>
                <div className="gx-sale-price">{s.price.toFixed(4)} Ξ</div>
                <div className="gx-sale-di" style={{color:getRarityTier(s.nft.diScore)?.color||'var(--txt3)'}}>
                  {s.nft.diScore.toFixed(1)}
                </div>
              </div>
            ))}
            {totalPages > 1 && (
              <div style={{display:'flex',justifyContent:'center',gap:8,padding:'12px',borderTop:'1px solid var(--line)'}}>
                <button onClick={()=>setSalesPage(p=>Math.max(0,p-1))} disabled={salesPage===0}
                  style={{padding:'5px 12px',background:'var(--ink3)',border:'1px solid var(--line)',borderRadius:6,color:salesPage===0?'var(--txt3)':'var(--txt)',cursor:salesPage===0?'default':'pointer',fontSize:12}}>
                  ← Prev
                </button>
                <span style={{fontSize:11,color:'var(--txt3)',alignSelf:'center'}}>{salesPage+1} / {totalPages}</span>
                <button onClick={()=>setSalesPage(p=>Math.min(totalPages-1,p+1))} disabled={salesPage===totalPages-1}
                  style={{padding:'5px 12px',background:'var(--ink3)',border:'1px solid var(--line)',borderRadius:6,color:salesPage===totalPages-1?'var(--txt3)':'var(--txt)',cursor:salesPage===totalPages-1?'default':'pointer',fontSize:12}}>
                  Next →
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── TRAITS TABLE ── */}
      {tab==='table'&&(
        <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
          <div className="gx-filters">
            <div className="gx-cat-chips">
              {['All',...CATS].map(c=>(
                <button key={c}
                  className={`gx-cat-chip ${catFilter===c?'on':''}`}
                  style={catFilter===c&&c!=='All'?{borderColor:CAT_COLORS[c],background:`rgba(0,0,0,.15)`,color:CAT_COLORS[c]}:{}}
                  onClick={()=>setCatFilter(c)}>{c}
                </button>
              ))}
            </div>
            <div className="gx-search-wrap">
              <input className="gx-search" placeholder="Search trait name…" value={search}
                onChange={e=>setSearch(e.target.value)}/>
              {search&&<button className="gx-search-clear" onClick={()=>setSearch('')}>{I.x}</button>}
            </div>
          </div>

          <div className="gx-table-head">
            {[['name','Trait'],['score','DI'],['supply','QTY'],['sales','#'],['price','Avg Ξ'],['prem','Prem'],['miss','Miss']].map(([k,l])=>(
              <div key={k} className={`gx-col-${k}`}>
                <button className="gx-sort-btn" onClick={()=>toggleSort(k)}>{l} {SH(k)}</button>
              </div>
            ))}
          </div>
          </div>{/* end gx-sticky */}

          <div className="gx-table-scroll">
            <div className="gx-table-body">
              {filteredRows.length===0
                ? <div style={{padding:'32px 0',textAlign:'center',color:'var(--txt3)'}}>No traits match.</div>
                : filteredRows.map(row=>(
                  <div key={`${row.cat}:${row.name}`} className="gx-row"
                    style={row.saleCount>0?{background:'rgba(0,212,184,.03)'}:{}}
                    onClick={()=>row.exampleNft&&onSelectNft&&onSelectNft(row.exampleNft)}>
                    <div className="gx-col-name">
                      <TraitImg className="gx-thumb" src={row.thumbnailUrl} alt={row.name}/>
                      <div className="gx-name-stack">
                        <span className="gx-trait-name" style={{color:row.rarity?.color||'var(--txt)'}}>{row.name}</span>
                        <span className="gx-cat-badge" style={{color:CAT_COLORS[row.cat]||'var(--txt3)',borderColor:CAT_COLORS[row.cat]||'var(--line)'}}>
                          {row.cat}
                        </span>
                      </div>
                    </div>
                    <div className="gx-col-score" style={{color:row.rarity?.color||'var(--txt2)'}}>
                      {row.score>0?`+${Math.round(row.score)}`:'—'}
                    </div>
                    <div className="gx-col-supply" style={{color:'var(--txt2)'}}>
                      {row.supply||'—'}
                    </div>
                    <div className="gx-col-sales">
                      {row.saleCount>0
                        ?<span style={{background:'rgba(0,212,184,.12)',border:'1px solid var(--teal)',borderRadius:4,padding:'1px 6px',fontSize:10,fontWeight:700,color:'var(--teal)',fontFamily:"Space Mono,monospace"}}>{row.saleCount}</span>
                        :<span style={{color:'var(--txt3)',fontSize:10}}>—</span>}
                    </div>
                    <div className="gx-col-price" style={{fontFamily:'Space Mono,monospace',color:row.avgPrice?'var(--teal)':'var(--txt3)'}}>
                      {row.avgPrice ? row.avgPrice.toFixed(4) : '—'}
                    </div>
                    <div className="gx-col-prem" style={{fontFamily:'Space Mono,monospace',
                      color:row.premium==null?'var(--txt3)':row.premium>0?'var(--green)':row.premium<-0.001?'var(--red)':'var(--txt3)'}}>
                      {row.premium!=null ? fP(row.premium) : '—'}
                    </div>
                    <div className="gx-col-miss" style={{fontFamily:'Space Mono,monospace',fontSize:11,
                      color:row.avgMiss==null?'var(--txt3)':row.avgMiss>0.0005?'var(--green)':row.avgMiss<-0.0005?'var(--red)':'var(--txt3)'}}>
                      {row.avgMiss!=null?fP(row.avgMiss):'—'}
                    </div>
                  </div>
                ))
              }
            </div>
          </div>
        </div>
      )}
    </div>
  );
};


/* ════════════════════════════════════
   APP
════════════════════════════════════ */
const App=()=>{
  // ── Data loading ──
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  useEffect(()=>{
    loadData().then(d=>{setData(d);setLoading(false);}).catch(e=>{setError(e.message);setLoading(false);});
  },[]);

  // ── UI state ──
  const [view,         setView]         = useState('home');
  const [homeQ,        setHomeQ]        = useState('');
  const [selected,     setSelected]     = useState(null);
  const [sidebar,      setSidebar]      = useState(true);
  const [openCat,      setOpenCat]      = useState(null); // auto-expand a category in filter sidebar
  const [sheet,        setSheet]        = useState(false);
  const [toast,        setToast]        = useState({msg:'',show:false});
  const [compareBros,  setCompareBros]  = useState([]);
  const [showCompare,  setShowCompare]  = useState(false);
  const [deepLinkDone, setDeepLinkDone] = useState(false);

  // ── Persisted state ──
  const [recentlyViewed, setRecentlyViewed] = useState(()=>{
    try{const s=localStorage.getItem('hb_recent');return s?JSON.parse(s):[];}catch{return [];}
  });
  const [watchlist, setWatchlist] = useState(()=>{
    try{const s=localStorage.getItem('hb_watch');return s?new Set(JSON.parse(s)):new Set();}catch{return new Set();}
  });

  // ── ETH price ──
  const [ethPrice, setEthPrice] = useState(null);
  useEffect(()=>{
    if(!FEATURES.ethPrice) return;
    fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd')
      .then(r=>r.json()).then(d=>setEthPrice(d?.ethereum?.usd||null)).catch(()=>{});
  },[]);

  const nfts     = data?.nfts||[];
  const traitMap = data?.traitMap||{};
  const salesMap = data?.salesMap||{};

  // ── Gallery state (all filter/sort logic) ──
  const gs = useGalleryState(nfts, traitMap);

  // ── Deep link ──
  useEffect(()=>{
    if(!data||deepLinkDone||!FEATURES.deepLinks) return;
    const id=new URLSearchParams(window.location.search).get('id');
    if(id){ const nft=data.nfts.find(n=>String(n.ID)===id); if(nft){setSelected(nft);setView('gallery');} }
    setDeepLinkDone(true);
  },[data, deepLinkDone]);

  // ── Keyboard navigation ──
  useEffect(()=>{
    const handler=e=>{
      if(e.key==='Escape'){setSelected(null);setShowCompare(false);return;}
      if(!selected||showCompare) return;
      const idx=nfts.findIndex(n=>n.ID===selected.ID);
      if(e.key==='ArrowRight'||e.key==='ArrowDown'){ const next=nfts[idx+1];if(next)setSelected(next); }
      if(e.key==='ArrowLeft'||e.key==='ArrowUp'){ const prev=nfts[idx-1];if(prev)setSelected(prev); }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[selected,nfts,showCompare]);

  // ── Callbacks ──
  const showToast    = useCallback((msg)=>{setToast({msg,show:true});setTimeout(()=>setToast(t=>({...t,show:false})),2200);},[]);
  const addToRecent  = useCallback((nft)=>{
    setRecentlyViewed(prev=>{
      const next=[nft,...prev.filter(n=>n.ID!==nft.ID)].slice(0,8);
      try{localStorage.setItem('hb_recent',JSON.stringify(next));}catch{}
      return next;
    });
  },[]);
  const toggleWatch  = useCallback((id)=>{
    setWatchlist(prev=>{
      const next=new Set(prev); next.has(id)?next.delete(id):next.add(id);
      try{localStorage.setItem('hb_watch',JSON.stringify([...next]));}catch{}
      return next;
    });
  },[]);
  const isWatched    = useCallback((id)=>watchlist.has(id),[watchlist]);
  const handleCardClick = useCallback(nft=>{setSelected(nft);addToRecent(nft);},[addToRecent]);
  const handleAddCompare = useCallback(nft=>{
    setCompareBros(prev=>{
      if(prev.find(n=>n.ID===nft.ID)){showToast('Already in compare');return prev;}
      if(prev.length>=4){showToast('Max 4 Bros to compare');return prev;}
      return [...prev,nft];
    });
    showToast(`#${nft.ID} added to compare`);
  },[showToast]);

  const [encDetail, setEncDetail] = useState(null);
  const onEncPick = useCallback((cat,name)=>{
    const key=tk(cat,name); if(!key) return;
    const detail = traitMap[key]||null;
    const supply = detail?.Supply||'?';
    const bonus  = detail?.adjustedScore||0;
    setEncDetail({name, detail, supply, bonus, label:cat});
  },[traitMap]);

  const commitHome = useCallback(()=>{
    const q=homeQ.trim(); if(!q) return;
    gs.setSearch(q); setView('gallery');
  },[homeQ, gs]);

  const homePreview   = useMemo(()=>{ const q=homeQ.trim();if(!q)return null;return nfts.find(n=>String(n.ID).startsWith(q))||null;},[nfts,homeQ]);
  const homeMatchCount= useMemo(()=>{ const q=homeQ.trim();if(!q)return 0;return nfts.filter(n=>String(n.ID).startsWith(q)).length;},[nfts,homeQ]);

  // ── Build context value ──
  const ctx = useMemo(()=>({
    nfts, traitMap, ethPrice,
    selected, setSelected,
    view, setView,
    watchlist, toggleWatch, isWatched,
    handleCardClick, handleAddCompare,
    addToRecent,
  }),[nfts, traitMap, ethPrice, selected, view, watchlist, toggleWatch, isWatched, handleCardClick, handleAddCompare, addToRecent]);

  /* ── Loading / Error ── */
  if(loading) return <div className="shell"><div className="state-box"><div className="spinner"/><div style={{fontSize:13,color:'var(--txt2)'}}>Loading Hemi Bros…</div></div></div>;
  if(error)   return <div className="shell"><div className="state-box"><div className="big">Error</div><div style={{fontSize:12,color:'var(--txt3)',marginTop:4,maxWidth:320}}>{error}</div></div></div>;

  const isGallery = view==='gallery';
  const showSearch= VIEW_REGISTRY[view]?.showSearch||false;
  const showSort  = isGallery;
  const showFilBar= isGallery && gs.totalActive>0;

  /* ── RENDER ── */
  return(
    <AppCtx.Provider value={ctx}>
    <div className="shell">

      {/* ══ HEADER ══ */}
      <header className="hd">
        <div className="logo" onClick={()=>{setView('home');gs.setSearch('');gs.setFilters({traits:{},families:[]});setHomeQ('');}}>HEMI<em>BROS</em></div>
        {showSearch&&(
          <div className="srch-wrap">
            <span className="srch-ico">{I.search}</span>
            <input className="srch" placeholder="ID or trait name…" value={gs.search} onChange={e=>gs.setSearch(e.target.value)} type="text" inputMode="text" autoComplete="off" autoCapitalize="none"/>
            {gs.search&&<button className="srch-x" onClick={()=>gs.setSearch('')}>{I.x}</button>}
          </div>
        )}
        <div className="hd-right">
          {NAV_VIEWS.map(({k,icon,label})=>(
            <button key={k} className={`tbtn desktop-only ${view===k?'on':''}`} onClick={()=>setView(k)} title={label}>
              {icon}<span style={{fontSize:11}}>{label}</span>
            </button>
          ))}
          {isGallery&&<button className={`ibtn desktop-only ${sidebar?'on':''}`} title="Toggle filters" onClick={()=>setSidebar(p=>!p)}>{I.sidebar}</button>}
        </div>
      </header>

      {/* ── Mobile nav ── */}
      <div className="mobile-only" style={{display:'flex',gap:4,padding:'6px 10px',background:'var(--ink2)',borderBottom:'1px solid var(--line)',overflowX:'auto',flexShrink:0}}>
        {NAV_VIEWS.map(({k,icon,label})=>(
          <button key={k} className={`sort-btn ${view===k?'on':''}`} style={{gap:4}} onClick={()=>setView(k)}>{icon}{label}</button>
        ))}
      </div>

      {/* ── Active filter pills ── */}
      {showFilBar&&(
        <div className="filter-bar">
          {gs.walletFilter&&<div className="fpill" style={{borderColor:'var(--green)',background:'rgba(61,220,151,.12)'}}>👛 My Wallet ({gs.ownedIds.length})<button onClick={()=>gs.setWalletFilter(false)}>{I.x}</button></div>}
          {gs.rarityFilter.map(t=>{ const RARITY_COLORS={Grail:'var(--r-grail)',Legendary:'var(--r-legendary)',Epic:'var(--r-epic)',Rare:'var(--r-rare)',Uncommon:'var(--r-uncommon)',Common:'var(--txt3)'};return(<div key={t} className="fpill" style={{borderColor:RARITY_COLORS[t]||'var(--pop)',background:`${RARITY_COLORS[t]||'var(--pop)'}18`}}>{t}<button onClick={()=>gs.setRarityFilter(r=>r.filter(x=>x!==t))}>{I.x}</button></div>);})}
          {(gs.scoreMin||gs.scoreMax)&&<div className="fpill">Score: {gs.scoreMin||'0'}–{gs.scoreMax||'∞'}<button onClick={()=>{gs.setScoreMin('');gs.setScoreMax('');}}>{I.x}</button></div>}
          {gs.hideIp&&<div className="fpill">{I.warn} No IP Risk<button onClick={()=>gs.setHideIp(false)}>{I.x}</button></div>}
          {gs.search&&<div className="fpill">Search: {gs.search}<button onClick={()=>gs.setSearch('')}>{I.x}</button></div>}
          {gs.filters.families.map(f=>(<div key={f} className="fpill"><span className="fam-dot" style={{background:FAM_COLORS[f],marginRight:3,width:7,height:7,borderRadius:'50%',display:'inline-block',flexShrink:0}}></span>{f}<button onClick={()=>gs.rmFam(f)}>{I.x}</button></div>))}
          {Object.entries(gs.filters.traits).flatMap(([cat,vals])=>{
            if(!Array.isArray(vals)) return [];
            if(vals.length===1) return [<div key={`${cat}-0`} className="fpill">{cat}: {vals[0].split('(')[0].trim()}<button onClick={()=>gs.rmTrait(cat)}>{I.x}</button></div>];
            return [<div key={cat} className="fpill">{cat}: {vals.length} selected<button onClick={()=>gs.rmTrait(cat)}>{I.x}</button></div>];
          })}
          {gs.totalActive>1&&<button className="clear-btn" onClick={gs.clearAll}>Clear all</button>}
          <div className="res-ct"><b>{gs.filtered.length}</b> result{gs.filtered.length!==1?'s':''}</div>
        </div>
      )}

      {/* ── Sort bar ── */}
      {showSort&&(
        <div className="sort-bar">
          <button className={`sort-btn mobile-only ${gs.activeCount>0?'on':''}`} onClick={()=>setSheet(true)} style={{gap:5,flexShrink:0,borderColor:gs.activeCount>0?'var(--pop)':'var(--line)',color:gs.activeCount>0?'var(--pop)':'var(--txt2)',fontWeight:700}}>
            {I.filter} Filters{gs.activeCount>0?` (${gs.activeCount})`:''}</button>
          <span className="sort-lbl desktop-only">{I.sort} Sort</span>
          {[{k:'score_desc',label:'Score ↓'},{k:'score_asc',label:'Score ↑'},{k:'id_asc',label:'ID ↑'},{k:'id_desc',label:'ID ↓'}].map(({k,label})=>(
            <button key={k} className={`sort-btn ${gs.sortKey===k?'on':''}`} onClick={()=>gs.setSortKey(k)}>{label}</button>
          ))}
        </div>
      )}

      {/* ══ BODY ══ */}
      <div className="body">
        {isGallery&&sidebar&&<GallerySidebar gs={gs} traitMap={traitMap} setSheet={setSheet} nfts={nfts} openCat={openCat} setOpenCat={setOpenCat}/>}

        {/* ── Main content area ── */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {view==='home'&&(
            <div className="home">
              <div className="home-hero">
                <div className="home-eyebrow">Rarity Checker</div>
                <h1 className="home-h1">FIND YOUR<br/><span>SCORE</span></h1>
                <p className="home-sub">Type your Hemi Bro ID to instantly check<br/>its rarity score.</p>
                <div className="home-row">
                  <input className="home-inp" placeholder="Bro ID…" value={homeQ} onChange={e=>setHomeQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&commitHome()} type="text" inputMode="numeric" autoFocus/>
                  <button className="home-go" onClick={commitHome}>GO</button>
                </div>
                {homeQ&&homePreview&&(
                  <div className="qres" onClick={()=>{setSelected(homePreview);addToRecent(homePreview);}}>
                    <img className="qres-img" src={homePreview.Image} alt=""/>
                    <div style={{flex:1}}>
                      <div className="qres-lbl">Hemi Bro #{homePreview.ID}</div>
                      <div className="qres-score">{fmtScore(homePreview)}</div>
                      <div className="qres-hint">Rank #{homePreview.rank} · tap to view</div>
                    </div>
                    {homeMatchCount>1&&<button style={{background:'var(--pop-soft)',border:'1px solid var(--pop)',color:'var(--txt)',fontSize:11,fontWeight:700,padding:'4px 9px',borderRadius:7,flexShrink:0,cursor:'pointer'}} onClick={e=>{e.stopPropagation();commitHome();}}>+{homeMatchCount-1} more</button>}
                  </div>
                )}
                {homeQ&&!homePreview&&nfts.length>0&&<p style={{color:'var(--red)',fontSize:13,marginTop:12}}>No Bro found with ID "{homeQ}"</p>}
              </div>
              {recentlyViewed.length>0&&(
                <div className="browse" style={{maxWidth:720}}>
                  <div className="browse-lbl">{I.clock} Recently Viewed</div>
                  <div className="recents-row">{recentlyViewed.map(n=>(<div key={n.ID} className="recent-card" onClick={()=>{setSelected(n);addToRecent(n);}}><img src={n.Image} alt={`#${n.ID}`} loading="lazy"/><div className="recent-id">#{n.ID}</div></div>))}</div>
                </div>
              )}
              <div className="browse" style={{maxWidth:720}}>
                <div className="browse-lbl">Explore</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                  {NAV_VIEWS.map(({k,icon,label})=>(<button key={k} className="fam-bchip" onClick={()=>setView(k)} style={{gap:6}}>{icon}{label}</button>))}
                </div>
              </div>
              <div className="browse"><div className="browse-lbl">Browse by Family</div>
                <div className="fam-browse">
                  {Object.keys(FAM_COLORS).filter(f=>f!=='default').sort().map(fam=>{
                    const cnt=gs.famCounts[fam]||0;if(!cnt)return null;
                    return(<button key={fam} className="fam-bchip" onClick={()=>{gs.setFilters({traits:{},families:[fam]});gs.setSearch('');setView('gallery');}}><span className="fam-dot" style={{background:FAM_COLORS[fam]}}></span>{fam}<span style={{fontSize:10,color:'var(--txt3)'}}>{cnt}</span></button>);
                  })}
                </div>
              </div>
              <div className="browse"><div className="browse-lbl">Browse by Trait</div>
                <div className="cat-browse">
                  {CATS.map(cat=>(<button key={cat} className="cat-bchip" onClick={()=>{setView('gallery');setOpenCat(cat);setSheet(true);}}>{cat}</button>))}
                  <div className="enc-chip" onClick={()=>setView('encyclopedia')}>{I.book} Trait Encyclopedia</div>
                </div>
              </div>
            </div>
          )}

          {view==='gallery'&&<GalleryView gs={gs} nfts={nfts} traitMap={traitMap} onCardClick={handleCardClick} isWatched={isWatched} toggleWatch={toggleWatch} sidebar={sidebar} setSidebar={setSidebar} setSheet={setSheet} openCat={openCat} setOpenCat={setOpenCat}/>}
          {view==='encyclopedia'&&<div className="grid-scroll"><Encyclopedia traitMap={traitMap} onPick={onEncPick}/></div>}
          {encDetail&&<ItemDetailModal item={encDetail} onClose={()=>setEncDetail(null)}/>}
          {view==='leaderboard'&&<div className="grid-scroll"><Leaderboard nfts={nfts} traitMap={traitMap} onSelect={n=>{setSelected(n);addToRecent(n);}}/></div>}
          {view==='stats'&&<div className="grid-scroll"><StatsDashboard nfts={nfts} traitMap={traitMap}/></div>}
          {view==='cooccurrence'&&<div className="grid-scroll"><TraitCooccurrence nfts={nfts} traitMap={traitMap} onFilterTo={(srcCat,srcName,resCat,resName)=>{
  const toFullVal = (cat,name) => { const key=tk(cat,name); return key&&traitMap[key]?`${name} (${traitMap[key].Supply||'?'})`:name; };
  const newTraits = {};
  newTraits[srcCat] = [toFullVal(srcCat,srcName)];
  if(resCat !== srcCat) newTraits[resCat] = [toFullVal(resCat,resName)];
  else newTraits[srcCat] = [...new Set([toFullVal(srcCat,srcName), toFullVal(resCat,resName)])];
  gs.setFilters({traits:newTraits,families:[]});
  gs.setSearch('');
  setView('gallery');
}}/></div>}
          {view==='holders'&&<div className="grid-scroll"><HolderDistribution nfts={nfts}/></div>}
          {view==='exchange'&&<div className="grid-scroll"><GrandExchange nfts={nfts} traitMap={traitMap} onSelectNft={n=>{setSelected(n);addToRecent(n);}}/></div>}
          {view==='builder'&&<div className="grid-scroll"><BroBuilder traitMap={traitMap} nfts={nfts} onSelect={n=>{setSelected(n);addToRecent(n);}}/></div>}
          {view==='feed'&&FEATURES.offerFeed&&<div className="grid-scroll"><OfferFeed nfts={nfts} onSelectNft={n=>{setSelected(n);addToRecent(n);}}/></div>}
          {view==='watchlist'&&FEATURES.watchlist&&<WatchlistView nfts={nfts} watchlist={watchlist} isWatched={isWatched} toggleWatch={toggleWatch} onCardClick={handleCardClick}/>}
        </div>
      </div>

      {/* ── Mobile filter FAB ── */}
      {isGallery&&(
        <button className={`mobile-filter-fab mobile-only ${gs.activeCount>0?'active':''}`} onClick={()=>setSheet(true)}>
          {I.filter} Filters{gs.activeCount>0&&<span className="fab-badge">{gs.activeCount}</span>}
        </button>
      )}

      {/* ── Mobile filter sheet ── */}
      {sheet&&isGallery&&(
        <div className="sheet-bg" onClick={()=>setSheet(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div className="sheet-hd">
              <span className="sheet-title">Filters</span>
              {gs.activeCount>0&&<button className="clear-btn" onClick={()=>{gs.setFilters({traits:{},families:[]});gs.setRarityFilter([]);}}>Clear all</button>}
            </div>
            <div className="sheet-body">
              {FEATURES.walletConnect&&<WalletSection ownedIds={gs.ownedIds} setOwnedIds={gs.setOwnedIds} walletFilter={gs.walletFilter} setWalletFilter={gs.setWalletFilter} nfts={nfts}/>}
              {FEATURES.portfolio&&<PortfolioCalc ownedNfts={gs.ownedNfts}/>}
              <div className="acc-sec">
                <div style={{padding:'10px 14px 4px'}}><span style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)'}}>Quick Filters</span></div>
                <div style={{padding:'0 10px 10px',display:'flex',flexDirection:'column',gap:4}}>
                  {[{label:'🔴 Has Grail Trait',tiers:['Grail']},{label:'🟠 Has Legendary+ Trait',tiers:['Grail','Legendary']},{label:'🟣 Has Epic+ Trait',tiers:['Grail','Legendary','Epic']},{label:'🟢 Has Rare+ Trait',tiers:['Grail','Legendary','Epic','Rare']}].map(({label,tiers})=>{
                    const active=tiers.every(t=>gs.rarityFilter.includes(t))&&gs.rarityFilter.length===tiers.length;
                    return(<button key={label} onClick={()=>gs.setRarityFilter(active?[]:tiers)} style={{textAlign:'left',padding:'5px 9px',borderRadius:7,fontSize:11.5,fontWeight:600,background:active?'var(--pop-soft)':'var(--ink3)',border:`1.5px solid ${active?'var(--pop)':'var(--line)'}`,color:active?'var(--txt)':'var(--txt2)',cursor:'pointer'}}>{label}</button>);
                  })}
                </div>
              </div>
              {FEATURES.ipFilter&&(
                <div className="acc-sec">
                  <div className="ip-toggle-row">
                    <span className="ip-toggle-label"><span className="ip-warn-icon">{I.warn}</span> Hide IP Risk</span>
                    <label className="toggle-switch"><input type="checkbox" checked={gs.hideIp} onChange={e=>gs.setHideIp(e.target.checked)}/><div className="toggle-track"/><div className="toggle-knob"/></label>
                  </div>
                </div>
              )}
              <FilterContent filters={gs.filters} setFilters={gs.setFilters} traitOpts={gs.traitOpts} traitMap={traitMap} facetedCounts={gs.facetedCounts} famCounts={gs.famCounts} openCat={openCat} setOpenCat={setOpenCat}/>
            </div>
            <div className="sheet-ft">
              <button className="sheet-apply" onClick={()=>setSheet(false)}>Show {gs.filtered.length} result{gs.filtered.length!==1?'s':''}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Compare bar ── */}
      {FEATURES.compareMode&&(
        <div className={`compare-bar ${compareBros.length>0?'open':''}`}>
          <div className="compare-count">{I.compare} Compare ({compareBros.length}/4)</div>
          <div className="compare-slots">
            {compareBros.map(n=>(<div key={n.ID} className="compare-slot filled" title={`Bro #${n.ID}`}><img src={n.Image} alt={`#${n.ID}`}/><div className="cs-rm" onClick={e=>{e.stopPropagation();setCompareBros(p=>p.filter(x=>x.ID!==n.ID));}}>×</div></div>))}
            {Array.from({length:4-compareBros.length}).map((_,i)=>(<div key={i} className="compare-slot"/>))}
          </div>
          <button className="compare-open-btn" disabled={compareBros.length<2} onClick={()=>setShowCompare(true)}>Compare</button>
          <button className="compare-clear" onClick={()=>setCompareBros([])}>Clear</button>
        </div>
      )}

      {/* ── Modal ── */}
      {selected&&(
        <Modal nft={selected} traitMap={traitMap} nfts={nfts} ethPriceVal={ethPrice}
          onClose={()=>setSelected(null)} onAddCompare={FEATURES.compareMode?handleAddCompare:null}
          onSelect={n=>{setSelected(n);addToRecent(n);}}
          isWatched={isWatched(selected?.ID)} onToggleWatch={FEATURES.watchlist?toggleWatch:null}/>
      )}

      {/* ── Compare modal ── */}
      {FEATURES.compareMode&&showCompare&&compareBros.length>=2&&(
        <CompareModal nfts={compareBros} traitMap={traitMap} onClose={()=>setShowCompare(false)} onSelect={n=>{setSelected(n);addToRecent(n);}}/>
      )}

      {/* ── Toast ── */}
      <Toast msg={toast.msg} show={toast.show}/>
    </div>
    </AppCtx.Provider>
  );
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);


</script>
</body>
</html>
