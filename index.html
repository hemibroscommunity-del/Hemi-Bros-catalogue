/* ════════════════════════════════════
   PORTFOLIO SUMMARY — Rarity breakdown + comparison
   Shows when wallet is connected and has NFTs.
════════════════════════════════════ */
const PortfolioSummary = ({ownedNfts, allNfts}) => {
  const stats = useMemo(()=>{
    if(!ownedNfts.length) return null;
    const myScores = ownedNfts.map(n=>n.diScore);
    const myAvg = myScores.reduce((a,b)=>a+b,0)/myScores.length;
    const collAvg = allNfts.length ? allNfts.reduce((a,b)=>a+b.diScore,0)/allNfts.length : 0;
    const myBest = Math.max(...myScores);
    const myBestNft = ownedNfts.find(n=>n.diScore===myBest);

    // Rarity tier breakdown of owned NFTs
    const tiers = {Grail:0,Legendary:0,Epic:0,Rare:0,Uncommon:0,Common:0};
    ownedNfts.forEach(n=>{
      CATS.forEach(cat=>{
        const v=n[cat]; if(!v) return;
        const name=String(v).split('(')[0].trim();
        const detail=effectiveTraitMap[tk(cat,name)]; // Note: won't work — needs traitMap passed in
      });
      // Simpler: tier by DI score
      const sc = n.diScore;
      if(sc>=300) tiers.Grail++;
      else if(sc>=148) tiers.Legendary++;
      else if(sc>=65) tiers.Epic++;
      else if(sc>=45) tiers.Rare++;
      else if(sc>=23) tiers.Uncommon++;
      else tiers.Common++;
    });

    // Top 3 traits across holdings
    const traitCounts = {};
    ownedNfts.forEach(n=>{
      CATS.forEach(cat=>{
        const v=n[cat]; if(!v) return;
        const name=String(v).split('(')[0].trim();
        if(name.toLowerCase()==='none') return;
        traitCounts[name]=(traitCounts[name]||0)+1;
      });
    });
    const topTraits = Object.entries(traitCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);

    return {myAvg, collAvg, myBest, myBestNft, tiers, topTraits, count:ownedNfts.length};
  },[ownedNfts, allNfts]);

  if(!stats) return null;
  const {myAvg, collAvg, myBest, myBestNft, tiers, topTraits, count} = stats;
  const aboveAvg = myAvg > collAvg;
  const TIER_COLORS = {Grail:'var(--r-grail)',Legendary:'var(--r-legendary)',Epic:'var(--r-epic)',Rare:'var(--r-rare)',Uncommon:'var(--r-uncommon)',Common:'var(--txt3)'};

  return (
    <div style={{padding:'10px 14px 14px'}}>
      <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:10}}>
        Your Portfolio · {count} Bro{count!==1?'s':''}
      </div>

      {/* Key metrics row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:12}}>
        <div style={{background:'var(--ink3)',borderRadius:8,padding:'8px 6px',textAlign:'center',border:'1px solid var(--line)'}}>
          <div style={{fontFamily:'Space Mono,monospace',fontSize:14,fontWeight:800,color:aboveAvg?'var(--green)':'var(--red)'}}>{myAvg.toFixed(1)}</div>
          <div style={{fontSize:7,color:'var(--txt3)',marginTop:2,textTransform:'uppercase',letterSpacing:'.06em'}}>Avg DI Score</div>
        </div>
        <div style={{background:'var(--ink3)',borderRadius:8,padding:'8px 6px',textAlign:'center',border:'1px solid var(--line)'}}>
          <div style={{fontFamily:'Space Mono,monospace',fontSize:14,fontWeight:800,color:'var(--txt)'}}>{collAvg.toFixed(1)}</div>
          <div style={{fontSize:7,color:'var(--txt3)',marginTop:2,textTransform:'uppercase',letterSpacing:'.06em'}}>Collection Avg</div>
        </div>
        <div style={{background:'var(--ink3)',borderRadius:8,padding:'8px 6px',textAlign:'center',border:'1px solid var(--line)'}}>
          <div style={{fontFamily:'Space Mono,monospace',fontSize:14,fontWeight:800,color:'var(--teal)'}}>#{myBestNft?myBestNft.rank:'—'}</div>
          <div style={{fontSize:7,color:'var(--txt3)',marginTop:2,textTransform:'uppercase',letterSpacing:'.06em'}}>Best Rank</div>
        </div>
      </div>

      {/* Comparison bar */}
      <div style={{background:aboveAvg?'rgba(61,220,151,.08)':'rgba(255,94,108,.08)',
        border:`1px solid ${aboveAvg?'rgba(61,220,151,.25)':'rgba(255,94,108,.25)'}`,
        borderRadius:8,padding:'6px 10px',fontSize:10,color:aboveAvg?'var(--green)':'var(--red)',
        fontWeight:700,textAlign:'center',marginBottom:12}}>
        {aboveAvg?'↑':'↓'} Your portfolio is {Math.abs(((myAvg-collAvg)/collAvg)*100).toFixed(0)}% {aboveAvg?'above':'below'} collection average
      </div>

      {/* Rarity tier breakdown */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Rarity Breakdown</div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {['Grail','Legendary','Epic','Rare','Uncommon','Common'].map(tier=>{
            const c = tiers[tier];
            if(!c) return null;
            return (
              <div key={tier} style={{display:'flex',alignItems:'center',gap:4,
                padding:'3px 8px',borderRadius:6,fontSize:10,fontWeight:700,
                background:TIER_COLORS[tier]+'18',border:`1px solid ${TIER_COLORS[tier]}44`,
                color:TIER_COLORS[tier]}}>
                {tier} <span style={{fontFamily:'Space Mono,monospace'}}>{c}</span>
              </div>

          })}
        </div>
      </div>

      {/* Top shared traits */}
      {topTraits.length>0&&(
        <div>
          <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Most Common Traits</div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {topTraits.map(([name,ct])=>(
              <span key={name} style={{fontSize:10,padding:'3px 8px',borderRadius:6,

                {name} ×{ct}
              </span>
            ))}

        </div>
      )}
    </div>
  );
};

const PortfolioCalc = ({ownedNfts}) => {
  const [open, setOpen]     = useState(false);
  const [floor, setFloor]   = useState('');   // ETH
  const [ethUsd, setEthUsd] = useState('');   // USD per ETH

  const count = ownedNfts.length;
  const floorN = parseFloat(floor);
  const ethN   = parseFloat(ethUsd);
  const hasFloor = !isNaN(floorN) && floorN > 0;
  const hasEth   = !isNaN(ethN)   && ethN   > 0;

  // For each owned NFT, estimate its value range based on displayMultiple / diScore
  // Low  = floor price
  // High = floor × the high end of their display multiple (or diScore-derived multiple)
  // Mid  = average of low + high per NFT, summed
  const stats = useMemo(() => {
    if (!hasFloor || !count) return null;
    let totalLow = 0, totalHigh = 0, totalMid = 0;
    const perBro = ownedNfts.map(nft => {
      const dm = nft.displayMultiple;
      let lowMult = 1, highMult = 1;
      if (dm != null) {
        const s = String(dm).trim();
        // Range like "10x - 30x" or "10x-30x"
        const rangeMatch = s.match(/^([\d.]+)x?\s*[-–]\s*([\d.]+)x?$/i);
        if (rangeMatch) {
          lowMult  = parseFloat(rangeMatch[1]) || 1;
          highMult = parseFloat(rangeMatch[2]) || lowMult;
        } else {
          const n = parseFloat(s.replace(/x/gi,'').replace(/,/g,''));
          if (!isNaN(n) && n > 0) { lowMult = n; highMult = n; }
        }
      }
      // Cap mults reasonably — floor is the absolute minimum
      if (lowMult < 1) lowMult = 1;
      if (highMult < lowMult) highMult = lowMult;
      const low  = floorN * 1;          // floor = lowest estimate for any bro
      const high = floorN * highMult;
      const mid  = floorN * ((lowMult + highMult) / 2);
      totalLow  += low;
      totalHigh += high;
      totalMid  += mid;
      return {nft, low, mid, high, lowMult, highMult};
    });
    return {totalLow, totalMid, totalHigh, perBro};
  }, [ownedNfts, floorN]);

  const fmt  = (eth) => eth >= 0.001 ? `${eth.toFixed(3)} ETH` : `${eth.toFixed(6)} ETH`;
  const fmtU = (eth) => hasEth ? `$${(eth * ethN).toLocaleString('en-US',{maximumFractionDigits:0})}` : null;

  return (
    <div className="calc-sec">
      <button className="acc-hd" onClick={() => setOpen(p=>!p)}>
        {I.calc} Portfolio Value
        {count > 0 && <span className="sel-badge">{count}</span>}
        <span className={`chev ${open?'open':''}`}>{I.chev}</span>
      </button>
      {open && (
        <div className="calc-body">
          {count === 0 ? (
            <div className="calc-no-wallet">Load your wallet first to<br/>calculate portfolio value.</div>
          ) : (
            <>
              <div className="calc-field">
                <div className="calc-label">Floor Price</div>
                <div className="calc-inp-row">
                  <span className="calc-prefix">Ξ</span>
                  <input
                    className="calc-inp"
                    placeholder="e.g. 0.05"
                    value={floor}
                    onChange={e => setFloor(e.target.value)}
                    type="number"
                    min="0"
                    step="0.001"
                  />
                </div>
              </div>

              <div className="calc-field">
                <div className="calc-label">ETH Price (USD)</div>
                <div className="calc-inp-row">
                  <span className="calc-prefix">$</span>
                  <input
                    className="calc-inp"
                    placeholder="e.g. 3200"
                    value={ethUsd}
                    onChange={e => setEthUsd(e.target.value)}
                    type="number"
                    min="0"
                    step="1"
                  />
                </div>
              </div>

              {stats && (
                <div className="calc-results">
                  {/* Range bars */}
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:6}}>
                    Portfolio Range ({count} Bros)
                  </div>
                  <div className="calc-range-row">
                    <div className="calc-range-item calc-range-lo">
                      <div className="rv">{fmt(stats.totalLow)}</div>
                      {hasEth && <div className="rv" style={{fontSize:'.68rem',color:'var(--txt3)'}}>{fmtU(stats.totalLow)}</div>}
                      <div className="rl">Floor</div>
                    </div>
                    <div style={{color:'var(--txt3)',fontSize:11}}>–</div>
                    <div className="calc-range-item calc-range-mid">
                      <div className="rv">{fmt(stats.totalMid)}</div>
                      {hasEth && <div className="rv" style={{fontSize:'.68rem',color:'var(--txt3)'}}>{fmtU(stats.totalMid)}</div>}
                      <div className="rl">Mid</div>
                    </div>
                    <div style={{color:'var(--txt3)',fontSize:11}}>–</div>
                    <div className="calc-range-item calc-range-hi">
                      <div className="rv">{fmt(stats.totalHigh)}</div>
                      {hasEth && <div className="rv" style={{fontSize:'.68rem',color:'var(--txt3)'}}>{fmtU(stats.totalHigh)}</div>}
                      <div className="rl">High</div>
                    </div>
                  </div>

                  {/* Per-bro breakdown — top 5 by high value */}
                  {stats.perBro.filter(b=>b.highMult>1).length > 0 && (
                    <>
                      <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)',marginTop:10,marginBottom:5}}>
                        Notable Holdings
                      </div>
                      {stats.perBro
                        .filter(b => b.highMult > 1)
                        .sort((a,b) => b.highMult - a.highMult)
                        .slice(0, 5)
                        .map(({nft, low, high, highMult}) => (
                          <div className="calc-row" key={nft.ID}>
                            <span className="calc-row-lbl">#{nft.ID}</span>
                            <span className="calc-row-val">
                              {fmt(low)}
                              {highMult > 1 && <span style={{color:'var(--green)'}}> – {fmt(high)}</span>}
                            </span>
                          </div>
                        ))
                      }
                    </>
                  )}
                </div>
              )}

              {!hasFloor && (
                <div className="calc-no-wallet">Enter a floor price to see<br/>your portfolio estimate.</div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   HOLDER DISTRIBUTION
   Shows how a wallet's holdings compare
   to all other holders in the collection.
════════════════════════════════════ */
const HolderDistribution = ({nfts, onViewWallet}) => {
  const [holders,   setHolders]   = useState([]);   // [{address, value}]
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState(null);
  const [nextPage,  setNextPage]  = useState(null);
  const [loadingMore, setLoadingMore] = useState(false);

  // Build address→nfts lookup from our NFT data
  // NFT data doesn't have owner addresses — we rely purely on explorer API
  const EXPLORER_API = 'https://explorer.hemi.xyz/api/v2';

  const fetchHolders = async (pageParams = null, append = false) => {
    if (!append) { setLoading(true); setError(null); setHolders([]); }
    else setLoadingMore(true);
    try {
      let url = `${EXPLORER_API}/tokens/${CONTRACT}/holders?page_size=50`;
      if (pageParams) url += `&${new URLSearchParams(pageParams).toString()}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      const rows = (data.items || []).map((h, i) => ({
        address: h.address?.hash || h.address || '?',
        label:   h.address?.name || null,
        value:   parseInt(h.value || 0, 10),
        idx:     (append ? holders.length : 0) + i,
      }));
      setHolders(prev => append ? [...prev, ...rows] : rows);
      setNextPage(data.next_page_params || null);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setLoadingMore(false);
    }
  };

  useEffect(() => { fetchHolders(); }, []);

  // Score distribution across collection
  // DI score distribution stats — mean, std dev, percentile bands
  const diStats = useMemo(() => {
    if (!nfts.length) return null;
    const scores = nfts.map(n => n.diScore);
    const n = scores.length;
    const mean = scores.reduce((a,b)=>a+b,0)/n;
    const variance = scores.reduce((a,b)=>a+(b-mean)**2,0)/n;
    const sd = Math.sqrt(variance);
    const sorted = [...scores].sort((a,b)=>a-b);
    const pct = p => sorted[Math.floor(p/100*n)];
    // Count in each band
    const inBand = (lo, hi) => scores.filter(s=>s>=lo&&s<=hi).length;
    const band1 = inBand(mean-sd, mean+sd);
    const band2 = inBand(mean-2*sd, mean+2*sd);
    const band3 = inBand(mean-3*sd, mean+3*sd);
    // Histogram for bell curve shape (30 bins)
    const BINS=30;
    const minS=sorted[0], maxS=sorted[n-1], range=maxS-minS||1;
    const bins=Array.from({length:BINS},(_,i)=>{
      const lo=minS+(range/BINS)*i, hi=minS+(range/BINS)*(i+1);
      return{lo,hi,count:0};
    });
    scores.forEach(s=>{bins[Math.min(BINS-1,Math.floor((s-minS)/range*BINS))].count++;});
    const maxC=Math.max(...bins.map(b=>b.count),1);
    const median = pct(50);
    // Clipped bins: show mean-3σ to mean+3σ range (makes distribution visible in center)
    const clipLo = Math.max(minS, mean - 3*sd);
    const clipHi = Math.min(maxS, mean + 3*sd);
    const clipRange = clipHi - clipLo || 1;
    const CBINS = 40;
    const cbins = Array.from({length:CBINS},(_,i)=>{
      const lo=clipLo+(clipRange/CBINS)*i, hi=clipLo+(clipRange/CBINS)*(i+1);
      return{lo,hi,count:0};
    });
    scores.forEach(s=>{
      if(s<clipLo||s>clipHi) return;
      cbins[Math.min(CBINS-1,Math.floor((s-clipLo)/clipRange*CBINS))].count++;
    });
    const cmaxC=Math.max(...cbins.map(b=>b.count),1);
    return {mean, median, sd, n, band1, band2, band3, bins:cbins, minS:clipLo, maxS:clipHi, maxC:cmaxC,
      pct10:pct(10), pct25:pct(25), pct50:pct(50), pct75:pct(75), pct90:pct(90)};
  }, [nfts]);

  // Named positions in the holder leaderboard (by rank index, 0-based)
  const HOLDER_NAMES = [
    {name:'DAO Founder',                badge:'🏛️'},
    {name:'Developer Treasury',          badge:'⚙️'},
    {name:'Developer Upgrade Campaign',  badge:'🎰'},
    {name:'DAO Multi-Sig Treasury',      badge:'🔐'},
  ];
  const shortAddr = a => a && a.length > 12 ? `${a.slice(0,6)}…${a.slice(-4)}` : a;

  return (
    <div className="holder-dist-page">

      {/* ── Holder leaderboard ── */}
      <div className="holder-section">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div className="browse-lbl">Top Holders</div>
          {holders.length>0&&<span style={{fontSize:10,color:'var(--txt3)'}}>{holders.length} loaded</span>}
        </div>

        {loading&&(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'24px 0',color:'var(--txt3)'}}>
            <span className="mini-spin"/>Loading holders…
          </div>
        )}
        {error&&(
          <div style={{background:'var(--ink3)',border:'1px solid var(--red)',borderRadius:8,padding:'10px 14px',fontSize:12,color:'var(--red)',display:'flex',flexDirection:'column',gap:6}}>
            <b>Failed to load holders</b>
            <span style={{color:'var(--txt2)'}}>{error}</span>
            <button onClick={()=>fetchHolders()} style={{alignSelf:'flex-start',fontSize:11,fontWeight:700,color:'var(--pop)',background:'none',border:'1px solid var(--pop)',borderRadius:6,padding:'3px 10px',cursor:'pointer'}}>
              Retry
            </button>
          </div>
        )}

        {!loading&&!error&&holders.length>0&&(
          <>
            <div style={{display:'flex',flexDirection:'column',gap:2}}>
              {holders.map((h, i) => (
                <div key={h.address+i} className="holder-row"
                  style={{cursor:onViewWallet?'pointer':'default'}}
                  onClick={()=>onViewWallet&&onViewWallet(h.address)}>
                  <span className="holder-rank">{i+1}</span>
                  <div className="holder-info">
                    {(()=>{
                      const named = HOLDER_NAMES[i] || null;
                      const lbl = h.label || named?.name || null;
                      return lbl
                        ? <><span className="holder-name">{named?.badge&&<span style={{marginRight:4}}>{named.badge}</span>}{lbl}</span><span className="holder-addr">{shortAddr(h.address)}</span></>
                        : <span className="holder-addr-full">{shortAddr(h.address)}</span>;
                    })()}
                  </div>
                  <div className="holder-count-wrap">
                    <span className="holder-count">{h.value}</span>
                    <div className="holder-count-bar" style={{width:`${h.value/holders[0].value*100}%`}}/>
                  </div>
                  {onViewWallet&&<span style={{fontSize:9,color:'var(--teal)',marginLeft:6,flexShrink:0}} title="View their Bros in Gallery">🖼 View</span>}
                </div>
              ))}
            </div>

            {nextPage&&(
              <button
                className="holder-load-more"
                onClick={()=>fetchHolders(nextPage, true)}
                disabled={loadingMore}
              >
                {loadingMore ? <><span className="mini-spin"/>Loading…</> : 'Load more'}
              </button>
            )}
          </>
        )}
      </div>
    </div>
  );
};

/* ════════════════════════════════════
   TRAIT GALLERY — Visual trait browsing
   Shows traits as image cards, grouped by category.
   Click a trait to see all Bros with it.
════════════════════════════════════ */
const TraitGallery = ({traitMap, nfts, onOpenItemDetail, onFilterTo}) => {
  const [activeCat, setActiveCat] = useState(CATS[0]);
  const [search, setSearch] = useState('');

  const traits = useMemo(()=>{
    const list = [];
    Object.entries(traitMap).forEach(([key, detail])=>{
      if(detail.Category !== activeCat) return;
      const name = detail['Unique Item List'];
      if(!name || name.toLowerCase()==='none') return;
      const supply = parseInt(detail.Supply)||0;
      const score = detail.adjustedScore||0;
      const rarity = getRarityTier(score);
      const thumb = detail.thumbnailUrl||null;
      // Count how many NFTs have this trait
      const nftCount = nfts.filter(n=>{
        const v = n[activeCat]; if(!v) return false;
        return String(v).split('(')[0].trim().toLowerCase() === name.toLowerCase();
      }).length;
      // Get best (highest DI) NFT with this trait for a sample image
      const bestNft = nfts
        .filter(n=>{ const v=n[activeCat]; return v && String(v).split('(')[0].trim().toLowerCase()===name.toLowerCase(); })
        .sort((a,b)=>b.diScore-a.diScore)[0]||null;
      list.push({key, name, supply, score, rarity, thumb, nftCount, bestNft});
    });
    if(search.trim()) {
      const q = search.trim().toLowerCase();
      return list.filter(t=>t.name.toLowerCase().includes(q));
    }
    return list.sort((a,b)=>b.score-a.score);
  },[traitMap, nfts, activeCat, search]);

  return (
    <div style={{padding:'16px 14px'}}>
      <div style={{fontSize:16,fontWeight:900,color:'var(--txt)',marginBottom:4}}>Trait Gallery</div>
      <div style={{fontSize:11,color:'var(--txt3)',marginBottom:14}}>Explore every trait visually. Tap a trait to see all Bros that have it.</div>

      {/* Category tabs */}
      <div style={{display:'flex',gap:4,overflowX:'auto',marginBottom:12,paddingBottom:4}}>
        {CATS.map(cat=>(
          <button key={cat} onClick={()=>{setActiveCat(cat);setSearch('');}}
            style={{padding:'6px 14px',borderRadius:8,fontSize:11,fontWeight:700,
              border:'1.5px solid '+(activeCat===cat?'var(--teal)':'var(--line)'),
              background:activeCat===cat?'rgba(0,212,184,.1)':'var(--ink3)',
              color:activeCat===cat?'var(--teal)':'var(--txt2)',
              cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,transition:'all .12s'}}>
            {cat}
          </button>
        ))}
      </div>

      {/* Search */}
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder={`Search ${activeCat}…`}
        style={{width:'100%',height:34,background:'var(--ink)',border:'1.5px solid var(--line)',
          borderRadius:8,color:'var(--txt)',fontSize:12,padding:'0 12px',outline:'none',
          marginBottom:12}}/>

      {/* Trait grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8}}>
        {traits.map(t=>(
          <div key={t.key} onClick={()=>onFilterTo&&onFilterTo(activeCat, t.name)}
            style={{background:'var(--ink3)',border:'1.5px solid var(--line)',borderRadius:10,
              padding:10,cursor:'pointer',transition:'all .12s',position:'relative',overflow:'hidden'}}>
            {/* Rarity accent bar */}
            <div style={{position:'absolute',top:0,left:0,right:0,height:3,
              background:t.rarity?t.rarity.color:'var(--line)',borderRadius:'10px 10px 0 0'}}/>
            {/* Trait image or NFT sample */}
            <div style={{display:'flex',justifyContent:'center',marginBottom:8,marginTop:4}}>
              {t.thumb ? (
                <img src={t.thumb} alt={t.name} loading="lazy"
                  style={{width:64,height:64,borderRadius:8,objectFit:'contain',background:'var(--ink4)'}}
                  onError={e=>{e.target.style.display='none'}}/>
              ) : t.bestNft ? (
                <img src={wsrvUrl(t.bestNft.Image,80)} alt={t.name} loading="lazy"
                  style={{width:64,height:64,borderRadius:8,objectFit:'cover',background:'var(--ink4)'}}/>
              ) : (
                <div style={{width:64,height:64,borderRadius:8,background:'var(--ink4)',
                  display:'flex',alignItems:'center',justifyContent:'center',color:'var(--txt3)',fontSize:10}}>?</div>
              )}
            </div>
            {/* Name */}
            <div style={{fontSize:11,fontWeight:700,color:'var(--txt)',textAlign:'center',
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
            {/* Stats row */}
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
              <span style={{fontSize:9,color:t.rarity?t.rarity.color:'var(--txt3)',fontWeight:700}}>
                {t.rarity?t.rarity.tier:'Common'}
              </span>
              <span style={{fontSize:9,color:'var(--txt3)',fontFamily:'Space Mono,monospace'}}>
                {t.supply} supply
              </span>
            </div>
          </div>
        ))}
      </div>

  );
};

const TraitCooccurrence = ({nfts, traitMap, onFilterTo, onOpenItemDetail}) => {
  const [selCat,  setSelCat]  = useState('');
  const [selTrait,setSelTrait] = useState('');

  // Build trait options per category
  const traitOpts = useMemo(()=>{
    const o = {};
    CATS.forEach(cat=>{
      const s = new Set();
      nfts.forEach(n=>{ const v=n[cat]; if(v) s.add(String(v).split('(')[0].trim()); });
      o[cat] = [...s].filter(v=>v.toLowerCase()!=='none').sort();
    });
    return o;
  },[nfts]);

  // Compute co-occurrences when a trait is selected
  const results = useMemo(()=>{
    if(!selCat||!selTrait) return [];
    // Find all NFTs that have the selected trait
    const base = nfts.filter(n=>{
      const v = n[selCat]; if(!v) return false;
      return String(v).split('(')[0].trim() === selTrait;
    });
    if(!base.length) return [];

    // Count every other trait across these NFTs
    const counts = {};
    base.forEach(n=>{
      CATS.forEach(cat=>{
        if(cat===selCat) return;
        const v = n[cat]; if(!v) return;
        const name = String(v).split('(')[0].trim();
        if(name.toLowerCase()==='none') return;
        const key = `${cat}|||${name}`;
        counts[key] = (counts[key]||0)+1;
      });
    });

    return Object.entries(counts)
      .map(([key,count])=>{
        const [cat,name] = key.split('|||');
        const tkey = tk(cat,name);
        const detail = tkey ? traitMap[tkey] : null;
        const pct = count/base.length*100;
        return {cat, name, count, pct, detail, baseCount: base.length};
      })
      .sort((a,b)=>b.count-a.count)
      .slice(0,30);
  },[nfts, selCat, selTrait, traitMap]);

  const maxPct = results[0]?.pct || 1;

  return (
    <div className="cooc-wrap">
      <div className="cooc-header">
        <div className="browse-lbl" style={{marginBottom:10}}>Trait Co-occurrence Explorer</div>
        <p style={{fontSize:12,color:'var(--txt2)',marginBottom:12,lineHeight:1.5}}>
          Pick a trait to see which other traits appear most often alongside it.
        </p>
        <div className="cooc-selects">
          <select className="cooc-select" value={selCat} onChange={e=>{setSelCat(e.target.value);setSelTrait('');}}>
            <option value="">Select category…</option>
            {CATS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select className="cooc-select" value={selTrait} onChange={e=>setSelTrait(e.target.value)} disabled={!selCat}>
            <option value="">Select trait…</option>
            {selCat && traitOpts[selCat]?.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        {selTrait&&(
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <div className="cooc-selected-chip">{selCat}: {selTrait}</div>
            <span style={{fontSize:11,color:'var(--txt3)'}}>
              {results[0]?.baseCount||0} Bros have this trait
            </span>
          </div>
        )}
      </div>

      {selTrait&&results.length>0&&(
        <div className="cooc-results">
          <div style={{display:'flex',gap:8,padding:'0 10px 6px',fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)'}}>
            <span style={{flex:1}}>Trait</span>
            <span style={{width:80}}>Co-occur %</span>
            <span style={{width:36,textAlign:'right'}}>%</span>
            <span style={{width:32,textAlign:'right'}}>n</span>
          </div>
          {results.map((r,i)=>(
            <div key={`${r.cat}-${r.name}`} className="cooc-row"
              title={`Filter gallery to ${selCat}: ${selTrait} + ${r.cat}: ${r.name}`}
              onClick={()=>onFilterTo&&onFilterTo(selCat, selTrait, r.cat, r.name)}
            >
              <span className="cooc-rank">{i+1}</span>
              {/* Thumbnail */}
              <div style={{width:28,height:28,borderRadius:5,overflow:'hidden',flexShrink:0,
                border:'1px solid var(--line)',background:'var(--ink3)',marginRight:4,cursor:onOpenItemDetail?'pointer':'default'}}
                onClick={e=>{if(onOpenItemDetail&&r.detail){e.stopPropagation();onOpenItemDetail(r.cat,r.name);}}}>
                {r.detail?.thumbnailUrl
                  ? <img src={r.detail.thumbnailUrl} alt={r.name}
                      style={{width:'100%',height:'100%',objectFit:'cover'}}
                      onError={e=>e.target.style.display='none'}/>
                  : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',
                      justifyContent:'center',fontSize:9,color:'var(--txt3)'}}>{r.name[0]}</div>
                }
              </div>
              <span className="cooc-name">{r.name}</span>
              <span className="cooc-cat">{r.cat}</span>
              <div className="cooc-bar-wrap">
                <div className="cooc-bar-fill" style={{width:`${r.pct/maxPct*100}%`}}/>
              </div>

      )}
      {selTrait&&results.length===0&&(
        <div style={{color:'var(--txt3)',fontSize:13,padding:'20px 0',textAlign:'center'}}>No co-occurrence data found.</div>

      {!selTrait&&(
        <div style={{color:'var(--txt3)',fontSize:13,padding:'20px 0',textAlign:'center'}}>Select a category and trait above to begin.</div>
      )}

  );
};

const Leaderboard = ({nfts, traitMap, onSelect}) => {
  const [lbTab, setLbTab] = useState('overall');
  const TABS = [
    {k:'overall', label:'Top Bros'},
    ...CATS.map(c=>({k:c, label:c})),
  ];

  const rows = useMemo(()=>{
    if(lbTab==='overall') return [...nfts].sort((a,b)=>b.diScore-a.diScore).slice(0,25);
    // Category tabs: one row per UNIQUE TRAIT, ranked by adjustedScore desc — no repetition
    const catTraits = Object.values(traitMap)
      .filter(d => d.Category === lbTab && (parseInt(d.Supply)||0) > 0)
      .sort((a,b) => (b.adjustedScore||0) - (a.adjustedScore||0))
      .slice(0, 25);
    return catTraits.map(detail => {
      const name = detail['Unique Item List'];
      const exampleNft = nfts.find(n => {
        const v = n[lbTab]; if(!v) return false;
        return String(v).split('(')[0].trim().toLowerCase() === name.toLowerCase();
      });
      return { name, detail, exampleNft, score: detail.adjustedScore||0, isTraitRow: true };
    });
  },[nfts, lbTab, traitMap]);

  // Pre-compute display ranks with proper tie handling
  const rankLabels = useMemo(() => {
    const getScore = r => r.isTraitRow ? r.score : r.diScore;
    const labels = [];
    let displayPos = 1;
    for(let i=0; i<rows.length; i++){
      if(i>0 && Math.abs(getScore(rows[i])-getScore(rows[i-1]))<0.001){
        // Tied — same display position as previous
        labels.push(labels[i-1]);
      } else {
        displayPos = i+1;
        labels.push(displayPos===1 ? '👑' : displayPos);
      }
    }
    return labels;
  },[rows]);

  const rankCls = i => rankLabels&&rankLabels[i]==='👑'?'gold':rankLabels&&rankLabels[i]===2?'silver':rankLabels&&rankLabels[i]===3?'bronze':'';

  return (
    <div className="lb-wrap">
      <div className="lb-tabs">
        {TABS.map(t=>(
          <button key={t.k} className={`lb-tab ${lbTab===t.k?'on':''}`} onClick={()=>setLbTab(t.k)}>{t.label}</button>
        ))}
      </div>
      {rows.map((row,i)=>{
        if(row.isTraitRow){
          const {name, detail, exampleNft, score} = row;
          const rarity = getRarityTier(score);
          return(
            <div key={name} className="lb-row"
              onClick={()=>exampleNft&&onSelect(exampleNft)}
              style={{cursor:exampleNft?'pointer':'default'}}
            >
              <div className={`lb-rank ${rankCls(i)}`}>{rankLabels[i]}</div>
              <TraitImg className="lb-img" src={detail.thumbnailUrl} alt={name}/>
              <div className="lb-info">
                <div className="lb-id" style={{fontSize:13,color:'var(--txt)'}}>{name}</div>
                <div className="lb-score" style={{fontSize:'1rem'}}>{score.toFixed(1)}</div>
                <div className="lb-meta">×{detail.Supply||'?'} supply{exampleNft?` · e.g. #${exampleNft.ID}`:''}</div>
              </div>
              {rarity&&<div className="lb-badge" style={{color:rarity.color,borderColor:rarity.color}}>{rarity.tier}</div>}
            </div>
          );
        }
        // Overall tab — NFT rows
        const nft = row;
        let badgeRarity = null, topScore = 0;
        CATS.forEach(cat=>{
          const val = nft[cat]; if(!val) return;
          const name = String(val).split('(')[0].trim();
          const sc = traitMap[tk(cat,name)]?.adjustedScore||0;
          if(sc > topScore){ topScore = sc; badgeRarity = getRarityTier(sc); }
        });
        return(
          <div key={nft.ID} className="lb-row" onClick={()=>onSelect(nft)}>
            <div className={`lb-rank ${rankCls(i)}`}>{rankLabels[i]}</div>
            <LbImg src={nft.Image} id={nft.ID}/>
            <div className="lb-info">
              <div className="lb-id">#{nft.ID}</div>
              <div className="lb-score">{fmtScore(nft)}</div>
              <div className="lb-meta">Rank #{nft.rank} · {nft.dominantFamilies[0]||'—'}</div>
            </div>
            {badgeRarity&&<div className="lb-badge" style={{color:badgeRarity.color,borderColor:badgeRarity.color}}>{badgeRarity.tier}</div>}
          </div>
        );
      })}
    </div>
  );
};

const StatsDashboard = ({nfts, traitMap, floorHistory=[]}) => {
  const stats = useMemo(()=>{
    if(!nfts.length) return null;
    const scores = nfts.map(n=>n.diScore);
    const total = nfts.length;
    const avg = scores.reduce((a,b)=>a+b,0)/total;
    // Rarity distribution is TRAIT-LEVEL not NFT-level.
    // Bucket each unique trait by its adjusted score (< 10 = Common, per scoring system).
    // None traits (adjustedScore ~0.03–1.05) correctly land in Common.
    const tiers = {Grail:0,Legendary:0,Epic:0,Rare:0,Uncommon:0,Common:0};
    let traitTotalCount = 0;
    Object.values(traitMap).forEach(detail=>{
      const sup = parseInt(detail.Supply)||0;
      if(!sup) return; // skip traits with no supply data
      const score = detail.adjustedScore||0;
      const r = getRarityTier(score);
      tiers[r ? r.tier : 'Common'] += sup;  // sum quantities, not unique trait count
      traitTotalCount += sup;
    });
    // Rarest trait per category — use Supply from traitMap (not raw count)
    // This handles ties: collect ALL traits tied at min supply
    const traitFreq = {};
    CATS.forEach(cat=>{
      const entries = Object.values(traitMap)
        .filter(t => t.Category===cat && t['Unique Item List']?.toLowerCase()!=='none')
        .map(t => ({name: t['Unique Item List'], supply: parseInt(t.Supply)||0}))
        .filter(t => t.supply > 0);
      if(!entries.length){ traitFreq[cat]={least:null,leastTied:[]}; return; }
      const sorted = [...entries].sort((a,b)=>a.supply-b.supply);
      const minSupply = sorted[0].supply;
      const tied = sorted.filter(t=>t.supply===minSupply);
      const mostSorted = [...entries].sort((a,b)=>b.supply-a.supply);
      traitFreq[cat] = {
        least: [sorted[0].name, sorted[0].supply],
        leastTied: tied, // all traits tied at rarest
        most: [mostSorted[0].name, mostSorted[0].supply],
      };
    });
    const top = [...nfts].sort((a,b)=>b.diScore-a.diScore)[0];
    const bottom = [...nfts].sort((a,b)=>a.diScore-b.diScore)[0];

    // Floor multiple cohorts — group NFTs by their displayMultiple label.
    // NFTs with a range label (e.g. "10x - 30x") get grouped as-is.
    // NFTs with a numeric multiple get grouped by their value.
    // NFTs with neither get a fallback label from their DI score.
    const multiples = {};
    nfts.forEach(n=>{
      let label;
      const dm = n.displayMultiple;
      if(dm != null && String(dm).trim() && String(dm).trim() !== 'null'){
        const s = String(dm).trim();
        // Range string like "10x - 30x" or numeric
        label = isNaN(Number(s.replace(/,/g,''))) ? s : `${parseFloat(s.replace(/,/g,''))}x`;
      } else {
        // Fallback: derive approximate multiple from DI score
        const sc = n.diScore;
        if(sc>=300) label='30x – 50x';
        else if(sc>=150) label='10x – 30x';
        else if(sc>=45)  label='5x – 10x';
        else if(sc>=25)  label='3x – 5x';
        else if(sc>=10)  label='2x – 3x';
        else             label='1x – 2x';
      }
      multiples[label] = (multiples[label]||0) + 1;
    });
    // Sort cohorts: try to sort by the lower bound number descending
    const parseMultLow = lbl => {
      const m = String(lbl).match(/^(\d+\.?\d*)/);
      return m ? parseFloat(m[1]) : 0;
    };
    const multipleCohorts = Object.entries(multiples)
      .sort((a,b) => parseMultLow(b[0]) - parseMultLow(a[0]));

    const sortedScores = [...scores].sort((a,b)=>a-b);
    const median = sortedScores[Math.floor(sortedScores.length/2)];
    return {total,avg,median,tiers,traitFreq,top,bottom,traitTotalCount,multipleCohorts};
  },[nfts]);

  // DI Score distribution stats (same logic as HolderDistribution)
  const diStats = useMemo(()=>{
    if(!nfts.length) return null;
    const scores = nfts.map(n=>n.diScore);
    const n = scores.length;
    const mean = scores.reduce((a,b)=>a+b,0)/n;
    const variance = scores.reduce((a,b)=>a+(b-mean)**2,0)/n;
    const sd = Math.sqrt(variance);
    const sorted = [...scores].sort((a,b)=>a-b);
    const pct = p => sorted[Math.floor(p/100*n)];
    const inBand = (lo,hi) => scores.filter(s=>s>=lo&&s<=hi).length;
    const band1 = inBand(mean-sd, mean+sd);
    const band2 = inBand(mean-2*sd, mean+2*sd);
    const band3 = inBand(mean-3*sd, mean+3*sd);
    const clipLo = Math.max(sorted[0], mean-3*sd);
    const clipHi = Math.min(sorted[n-1], mean+3*sd);
    const clipRange = clipHi-clipLo||1;
    const CBINS=40;
    const cbins=Array.from({length:CBINS},(_,i)=>{
      const lo=clipLo+(clipRange/CBINS)*i, hi=clipLo+(clipRange/CBINS)*(i+1);
      return{lo,hi,count:0};
    });
    scores.forEach(s=>{
      if(s<clipLo||s>clipHi) return;
      cbins[Math.min(CBINS-1,Math.floor((s-clipLo)/clipRange*CBINS))].count++;
    });
    const cmaxC=Math.max(...cbins.map(b=>b.count),1);
    return {mean,median:pct(50),sd,n,band1,band2,band3,bins:cbins,minS:clipLo,maxS:clipHi,maxC:cmaxC,
      pct10:pct(10),pct25:pct(25),pct50:pct(50),pct75:pct(75),pct90:pct(90)};
  },[nfts]);

  if(!stats) return <div style={{padding:20,color:'var(--txt3)',fontSize:13}}>Loading…</div>;
  const RARITY_ORDER = ['Grail','Legendary','Epic','Rare','Uncommon','Common'];
  const RARITY_COLORS = {Grail:'var(--r-grail)',Legendary:'var(--r-legendary)',Epic:'var(--r-epic)',Rare:'var(--r-rare)',Uncommon:'var(--r-uncommon)',Common:'var(--txt3)'};

  return (
    <div className="stats-wrap">
      {/* ── Collection Floor Chart ── */}
      {floorHistory.length > 0 && (
        <div>
          <div className="stats-section-title">Collection Sales &amp; Floor History<InfoTip text="Each dot is a sale. The purple band shows the trailing 60-day floor range (p10–p90). The dashed line is the floor price (p10). The floor was thin — sweeps from 0.004 to 0.015 ETH were common."/>
            <span style={{fontWeight:400,fontSize:9,textTransform:'none',letterSpacing:0,color:'var(--txt3)',marginLeft:4}}>
              {floorHistory.length} sales · purple band = trailing 60-day p10–p90 floor · dashed line = floor (p10)
            </span>
          </div>
          <div style={{background:'var(--ink3)',borderRadius:10,padding:'10px 6px 4px',border:'1px solid var(--line)'}}>
            <SalesPriceChart sales={floorHistory} width={640} height={240}/>
          </div>
        </div>
      )}

      {/* ── Bro of the Day ── */}
      {nfts.length>0&&(()=>{
        const dayIdx = Math.floor(nfts.length * ((new Date().getDate()+new Date().getMonth()*31) % nfts.length) / nfts.length);
        const botd = nfts[dayIdx]||nfts[0];
        const r = getRarityTier(botd.diScore);
        return (
          <div style={{display:'flex',alignItems:'center',gap:14,
            background:'var(--ink3)',borderRadius:12,border:'1px solid var(--line)',
            padding:'12px 14px',marginBottom:16}}>
            <img src={wsrvUrl(botd.Image,80)} alt={'#'+botd.ID}
              style={{width:56,height:56,borderRadius:10,objectFit:'cover',
                border:'2px solid '+(r?r.color:'var(--line)'),background:'var(--ink4)',flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)'}}>Bro of the Day</div>
              <div style={{fontFamily:'VT323,monospace',fontSize:'1.4rem',color:'var(--txt)'}}>#{botd.ID}</div>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:12,color:r?r.color:'var(--teal)',fontWeight:700}}>{fmtScore(botd)} · Rank #{botd.rank}</div>
            </div>
          </div>
        );
      })()}

      {/* Key numbers */}
      <div>
        <div className="stats-section-title">Collection Overview</div>
        <div className="stats-grid">
          <div className="stat-card"><div className="stat-val">{stats.total.toLocaleString()}</div><div className="stat-lbl">Total Bros</div></div>
          <div className="stat-card accent-teal"><div className="stat-val">{stats.median.toFixed(1)}</div><div className="stat-lbl">Median DI Score</div></div>
          <div className="stat-card accent-gold"><div className="stat-val">{fmtScore(stats.top)}</div><div className="stat-lbl">Highest Floor Multiple</div></div>
          <div className="stat-card accent-pop"><div className="stat-val">{stats.tiers.Grail}</div><div className="stat-lbl">Grails 🔴</div></div>
        </div>
      </div>

      {/* Floor multiple cohorts — vertical bar chart, ascending */}
      <div>
        <div className="stats-section-title">Floor Multiple Cohorts
          <span style={{fontWeight:400,fontSize:9,textTransform:'none',letterSpacing:0,color:'var(--txt3)',marginLeft:4}}>% of collection per price tier</span>
        </div>
        {(()=>{
          // Sort ascending: by lower bound first, then by hi bound (so 1x-1x < 1x-1.5x)
          const sorted = [...stats.multipleCohorts].sort((a,b)=>{
            const parse = lbl => {
              const m = String(lbl).match(/^([\d.]+)x?\s*[-–]\s*([\d.]+)x?/i);
              if(m) return {lo:parseFloat(m[1]), hi:parseFloat(m[2])};
              const n = parseFloat(String(lbl).match(/^([\d.]+)/)?.[1]||0);
              return {lo:n, hi:n};
            };
            const ra=parse(a[0]), rb=parse(b[0]);
            return ra.lo!==rb.lo ? ra.lo-rb.lo : ra.hi-rb.hi;
          });
          const maxPct = Math.max(...sorted.map(([,c])=>stats.total>0?c/stats.total*100:0), 1);
          let cumulative = 0;
          const CHART_H = 160; // px height of bar area
          return (
            <div style={{overflowX:'auto'}}>
            <div style={{display:'flex',alignItems:'flex-end',gap:6,height:CHART_H+60,padding:'0 4px',minWidth:280}}>
              {sorted.map(([label,count],idx)=>{
                const pct = stats.total > 0 ? count/stats.total*100 : 0;
                cumulative += pct;
                const barH = Math.max(pct/maxPct*CHART_H, count>0?4:0);
                const lo = parseFloat(String(label).match(/^(\d+\.?\d*)/)?.[1]||0);
                const color = lo>=30?'var(--r-grail)':lo>=10?'var(--r-legendary)':lo>=5?'var(--r-epic)':lo>=3?'var(--r-rare)':lo>=2?'var(--r-uncommon)':'var(--txt3)';
                return (
                  <div key={label} style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1,minWidth:32}}>
                    {/* % label above bar */}
                    <div style={{fontSize:9,fontWeight:700,color,marginBottom:3,whiteSpace:'nowrap'}}>
                      {pct.toFixed(1)}%
                    </div>
                    {/* Bar */}
                    <div style={{width:'100%',height:barH,background:color,borderRadius:'3px 3px 0 0',opacity:.9,transition:'height .4s ease'}}/>
                    {/* Baseline */}
                    <div style={{width:'100%',height:2,background:'var(--line)',marginBottom:4}}/>
                    {/* Label */}
                    <div style={{fontSize:8,fontWeight:700,color,textAlign:'center',lineHeight:1.3,marginBottom:2,whiteSpace:'nowrap'}}>
                      {label}
                    </div>
                    {/* Cumulative % */}
                    <div style={{fontSize:8,color:'var(--txt3)',textAlign:'center',whiteSpace:'nowrap'}}>
                      {cumulative.toFixed(0)}%
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:9,color:'var(--txt3)',padding:'4px 4px 0',display:'flex',alignItems:'center',gap:4}}>
              <span style={{opacity:.6}}>↑ bar = % of collection · bottom = cumulative %</span>
            </div>
            </div>
          );
        })()}
      </div>

      {/* Rarity distribution — trait level */}
      <div>
        <div className="stats-section-title">Trait Rarity Distribution <span style={{fontWeight:400,fontSize:9,textTransform:'none',letterSpacing:0,color:'var(--txt3)',marginLeft:4}}>({stats.traitTotalCount.toLocaleString()} total trait instances)</span></div>
        <div className="dist-row">
          {RARITY_ORDER.map(tier=>{
            const count = stats.tiers[tier]||0;
            const maxCount = Math.max(...RARITY_ORDER.map(t=>stats.tiers[t]||0));
            const pct = maxCount > 0 ? (count/maxCount*100) : 0;
            return(
              <div key={tier} className="dist-item">
                <div className="dist-label" style={{color:RARITY_COLORS[tier],fontWeight:700}}>{tier}</div>
                <div className="dist-bar-wrap">
                  <div className="dist-bar-fill" style={{width:`${Math.max(pct,count>0?2:0)}%`,background:RARITY_COLORS[tier]}}/>
                </div>
                <div className="dist-count">{count}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Rarest traits */}
      <div>
        <div className="stats-section-title">Rarest Traits</div>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {CATS.map(cat=>{
            const {least, leastTied} = stats.traitFreq[cat]||{};
            if(!least) return null;
            const tied = leastTied||[];
            return(
              <div key={cat} style={{background:'var(--ink3)',borderRadius:8,padding:'8px 10px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)'}}>{cat}</div>
                  <div style={{fontFamily:'Space Mono,monospace',fontSize:'.8rem',color:'var(--r-grail)'}}>{least[1]} <span style={{fontSize:10,color:'var(--txt3)'}}>minted</span></div>
                </div>
                {tied.length<=1
                  ? <div style={{fontSize:12,fontWeight:700,color:'var(--txt)',marginTop:2}}>{least[0]}</div>
                  : <div style={{fontSize:11,color:'var(--txt)',lineHeight:1.5,marginTop:2}}>{tied.map(t=>t.name).join(' · ')}<span style={{fontSize:9,color:'var(--txt3)',marginLeft:4,fontWeight:700}}>({tied.length}-WAY TIE)</span></div>
                }
              </div>
            );
          })}
        </div>
      </div>

      {/* DI Score Distribution */}
      {diStats&&(
      <div>
        <div className="stats-section-title">DI Score Distribution</div>
        <div style={{fontSize:10,color:'var(--txt3)',marginBottom:10}}>
          Median: <b style={{color:'var(--gold,#fbbf24)'}}>{diStats.pct50.toFixed(1)}</b> &nbsp;·&nbsp; Mean: <b style={{color:'var(--teal)'}}>{diStats.mean.toFixed(1)}</b> &nbsp;·&nbsp; σ: <b style={{color:'var(--teal)'}}>{diStats.sd.toFixed(1)}</b>
        </div>
        <div style={{position:'relative',height:90,marginBottom:8}}>
          <div style={{display:'flex',alignItems:'flex-end',gap:1,height:'100%'}}>
            {diStats.bins.map((b,i)=>{
              const z=(b.lo+b.hi)/2-diStats.mean;
              const sigma=Math.abs(z)/diStats.sd;
              const col=sigma<=1?'var(--teal)':sigma<=2?'var(--pop)':'var(--r-grail)';
              return(
                <div key={i} title={`${b.lo.toFixed(1)}–${b.hi.toFixed(1)}: ${b.count} Bros`}
                  style={{flex:1,height:`${Math.max(2,b.count/diStats.maxC*100)}%`,
                  background:col,borderRadius:'2px 2px 0 0',opacity:.85}}/>
              );
            })}
          </div>
          {(()=>{
            const pctPos=(diStats.pct50-diStats.minS)/(diStats.maxS-diStats.minS)*100;
            if(pctPos<0||pctPos>100) return null;
            return(<div style={{position:'absolute',bottom:0,left:`${pctPos}%`,width:2,height:'100%',background:'var(--gold,#fbbf24)',opacity:.8,borderRadius:2}} title={`Median: ${diStats.pct50.toFixed(1)}`}/>);
          })()}
          {(()=>{
            const pctPos=(diStats.mean-diStats.minS)/(diStats.maxS-diStats.minS)*100;
            if(pctPos<0||pctPos>100) return null;
            return(<div style={{position:'absolute',bottom:0,left:`${pctPos}%`,width:2,height:'100%',background:'var(--teal)',opacity:.6,borderRadius:2}} title={`Mean: ${diStats.mean.toFixed(1)}`}/>);
          })()}
        </div>
        <div style={{display:'flex',gap:10,fontSize:9,color:'var(--txt3)',marginBottom:10}}>
          <span style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:8,height:8,borderRadius:2,background:'var(--gold,#fbbf24)',display:'inline-block'}}/>Median {diStats.pct50.toFixed(1)}
          </span>
          <span style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:8,height:8,borderRadius:2,background:'var(--teal)',display:'inline-block'}}/>Mean {diStats.mean.toFixed(1)}
          </span>
          <span style={{color:'var(--txt3)'}}>Showing mean ±3σ ({diStats.minS.toFixed(0)}–{diStats.maxS.toFixed(0)})</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {[
            {label:'Within 1σ',actual:`${((diStats.band1/diStats.n)*100).toFixed(1)}%`,count:diStats.band1,range:`${(diStats.mean-diStats.sd).toFixed(1)} – ${(diStats.mean+diStats.sd).toFixed(1)}`,color:'var(--teal)',expected:'~68% normal'},
            {label:'Within 2σ',actual:`${((diStats.band2/diStats.n)*100).toFixed(1)}%`,count:diStats.band2,range:`${(diStats.mean-2*diStats.sd).toFixed(1)} – ${(diStats.mean+2*diStats.sd).toFixed(1)}`,color:'var(--pop)',expected:'~95% normal'},
            {label:'Within 3σ',actual:`${((diStats.band3/diStats.n)*100).toFixed(1)}%`,count:diStats.band3,range:`${(diStats.mean-3*diStats.sd).toFixed(1)} – ${(diStats.mean+3*diStats.sd).toFixed(1)}`,color:'var(--r-grail)',expected:'~99.7% normal'},
          ].map(b=>(
            <div key={b.label} style={{display:'flex',flexDirection:'column',gap:3}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                <span style={{fontSize:10,fontWeight:700,color:b.color}}>{b.label}: {b.actual}</span>
                <span style={{fontSize:10,fontFamily:'Space Mono,monospace',color:'var(--txt3)'}}>{b.count} Bros · expected {b.expected}</span>
              </div>
              <div style={{fontSize:9,color:'var(--txt3)',fontFamily:'Space Mono,monospace'}}>{b.range}</div>
              <div style={{height:4,background:'var(--ink4)',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:b.actual,background:b.color,borderRadius:99,transition:'width .5s'}}/>
              </div>
            </div>
          ))}
        </div>
        <div style={{fontSize:9,color:'var(--txt3)',marginTop:8,lineHeight:1.5}}>
          ⓘ DI scores are right-skewed (most Bros cluster near the floor, a few outliers score very high). High % within 1σ is expected for this distribution shape — it doesn't indicate an error.
        </div>
      </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   PRICE CHECK — "What would I pay?"
   Interactive pricing tool for any NFT.
════════════════════════════════════ */
const PriceCheck = ({nfts, traitMap, onSelect, globalLatestFloor}) => {
  const [query, setQuery] = useState('');
  const [floorInput, setFloorInput] = useState('0.005');
  const debouncedQ = useDebounce(query, 120);

  const match = useMemo(()=>{
    const q = debouncedQ.trim();
    if(!q) return null;
    return nfts.find(n=>String(n.ID)===q)||null;
  },[nfts, debouncedQ]);

  const floor = parseFloat(floorInput)||0.005;

  const analysis = useMemo(()=>{
    if(!match) return null;
    const nftRange = getMultipleRange(match) || diScoreToRange(match.diScore);
    const estLo = floor * nftRange.lo;
    const estHi = floor * nftRange.hi;
    const estMid = (estLo + estHi) / 2;
    const implied = floor * getImpliedMultiple(match.diScore);

    // Recent sales of similar-scored NFTs (within ±10 DI)
    const similarSales = [];
    nfts.forEach(n=>{
      if(Math.abs(n.diScore - match.diScore) > 10) return;
      (n.sales||[]).forEach(s=>{
        const p = parseFloat(s.price)||0;
        if(p>0) similarSales.push({nft:n, price:p, date:s.date});
      });
    });
    similarSales.sort((a,b)=>new Date(b.date)-new Date(a.date));

    // This NFT's own sales
    const ownSales = (match.sales||[]).filter(s=>parseFloat(s.price)>0).map(s=>({...s,price:parseFloat(s.price)}));
    ownSales.sort((a,b)=>new Date(b.date)-new Date(a.date));

    return {nftRange, estLo, estHi, estMid, implied, similarSales:similarSales.slice(0,6), ownSales};
  },[match, floor, nfts]);

  const rarity = match ? getRarityTier(match.diScore) : null;

  return (
    <div style={{padding:'16px 14px',maxWidth:520}}>
      <div style={{fontSize:16,fontWeight:900,color:'var(--txt)',marginBottom:4}}>Price Check</div>
      <div style={{fontSize:11,color:'var(--txt3)',marginBottom:16}}>Enter a Bro ID and floor price to see what it might be worth.</div>

      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <div style={{flex:1}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:4}}>Bro ID</div>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="#"
            type="text" inputMode="numeric"
            style={{width:'100%',height:40,background:'var(--ink)',border:'1.5px solid var(--line)',
              borderRadius:8,color:'var(--txt)',fontFamily:'Space Mono,monospace',fontSize:16,
              padding:'0 12px',outline:'none',textAlign:'center'}}/>
        </div>
        <div style={{width:130}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:4}}>Floor (ETH)</div>
          <input value={floorInput} onChange={e=>setFloorInput(e.target.value)}
            type="number" step="0.001" min="0"
            style={{width:'100%',height:40,background:'var(--ink)',border:'1.5px solid var(--line)',
              borderRadius:8,color:'var(--teal)',fontFamily:'Space Mono,monospace',fontSize:14,
              padding:'0 12px',outline:'none',textAlign:'center'}}/>
        </div>
      </div>

      {match && analysis && (
        <div>
          {/* NFT header */}
          <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16,
            background:'var(--ink3)',borderRadius:12,padding:12,border:'1px solid var(--line)'}}>
            <img src={wsrvUrl(match.Image,120)} alt={'#'+match.ID}
              style={{width:72,height:72,borderRadius:10,objectFit:'cover',background:'var(--ink4)',
                border:`2px solid ${rarity?rarity.color:'var(--line)'}`,cursor:'pointer'}}
              onClick={()=>onSelect&&onSelect(match)}/>
            <div style={{flex:1}}>
              <div style={{fontFamily:'VT323,monospace',fontSize:'1.6rem',color:'var(--txt)'}}>#{match.ID}</div>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:14,fontWeight:700,color:'var(--teal)'}}>
                {analysis.nftRange.lo===analysis.nftRange.hi?analysis.nftRange.lo+'x':analysis.nftRange.lo+'x – '+analysis.nftRange.hi+'x'} floor
              </div>
              <div style={{fontSize:10,color:'var(--txt3)'}}>Rank #{match.rank} · DI {match.diScore.toFixed(1)}{rarity?' · '+rarity.tier:''}</div>
            </div>
          </div>

          {/* Price estimate */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:16}}>
            {[
              {label:'Low Estimate',val:analysis.estLo,col:'var(--txt3)'},
              {label:'Mid Estimate',val:analysis.estMid,col:'var(--teal)'},
              {label:'High Estimate',val:analysis.estHi,col:'var(--green)'},
            ].map(({label,val,col})=>(
              <div key={label} style={{background:'var(--ink3)',borderRadius:8,padding:'10px 6px',
                textAlign:'center',border:'1px solid var(--line)'}}>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:14,fontWeight:800,color:col}}>
                  {val<0.01?val.toFixed(4):val.toFixed(3)}
                </div>
                <div style={{fontSize:10,color:'var(--txt3)',marginTop:1}}>ETH</div>
                <div style={{fontSize:7,color:'var(--txt3)',marginTop:3,textTransform:'uppercase',letterSpacing:'.06em'}}>{label}</div>
              </div>
            ))}
          </div>

          {/* Formula explanation */}
          <div style={{fontSize:10,color:'var(--txt3)',marginBottom:16,padding:'8px 10px',
            background:'var(--ink3)',borderRadius:8,border:'1px solid var(--line)',lineHeight:1.5}}>
            <span style={{fontWeight:700,color:'var(--txt2)'}}>How this works:</span> Floor price ({floor.toFixed(3)} ETH) × floor multiple ({analysis.nftRange.lo}x–{analysis.nftRange.hi}x) = estimated value range.
            The multiple is based on this Bro's DI rarity score relative to the collection.
          </div>

          {/* Own sales history */}
          {analysis.ownSales.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>This Bro's Sales</div>
              {analysis.ownSales.slice(0,4).map((s,i)=>{
                const fm = priceToFloorMultiple(s.price, s.histFloorLo||FLOOR_LO, s.histFloorHi||FLOOR_HI);
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    padding:'6px 8px',borderBottom:'1px solid var(--ink4)',fontSize:11}}>
                    <span style={{color:'var(--txt3)'}}>{s.date||'—'}</span>
                    <span style={{fontFamily:'Space Mono,monospace',fontWeight:700,color:'var(--txt)'}}>{s.price.toFixed(4)} ETH</span>
                    <span style={{fontFamily:'Space Mono,monospace',fontWeight:800,color:fm.color}}>{fm.label}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Similar sales */}
          {analysis.similarSales.length>0&&(
            <div>
              <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Recent Sales of Similar Bros (±10 DI)</div>
              {analysis.similarSales.map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,
                  padding:'5px 8px',borderBottom:'1px solid var(--ink4)',fontSize:10,cursor:'pointer'}}
                  onClick={()=>onSelect&&onSelect(s.nft)}>
                  <span style={{color:'var(--teal)',fontFamily:'Space Mono,monospace',fontWeight:700,width:44}}>#{s.nft.ID}</span>
                  <span style={{color:'var(--txt3)',flex:1}}>{s.date||'—'}</span>
                  <span style={{fontFamily:'Space Mono,monospace',fontWeight:700,color:'var(--txt)'}}>{s.price.toFixed(4)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {query && !match && <div style={{textAlign:'center',padding:20,color:'var(--txt3)',fontSize:12}}>No Bro found with ID "{query}"</div>}
    </div>
  );
};

const BroBuilder = ({traitMap, nfts, onSelect}) => {
  const [selections, setSelections] = useState({});
  const [pickerCat,  setPickerCat]  = useState(null);
  const [pickerRef,  setPickerRef]  = useState(null);
  const pickerContainerRef = useRef(null);

  useEffect(()=>{
    const handler = e => {
      if(pickerContainerRef.current && !pickerContainerRef.current.contains(e.target)) setPickerCat(null);
    };
    document.addEventListener('mousedown', handler);
    return ()=>document.removeEventListener('mousedown', handler);
  },[]);

  // Build options per category from traitMap
  const opts = useMemo(()=>{
    const o = {};
    CATS.forEach(cat=>{
      const items = [];
      Object.entries(traitMap).forEach(([key, detail])=>{
        if(!key.startsWith(cat.trim().toLowerCase()+':')) return;
        const name = key.split(':').slice(1).join(':');
        items.push({name: name.charAt(0).toUpperCase()+name.slice(1), detail, score: detail.adjustedScore||0});
      });
      o[cat] = items.sort((a,b)=>b.score-a.score);
    });
    return o;
  },[traitMap]);

  // Calculate builder score
  const result = useMemo(()=>{
    let total = 0;
    const famTot = {};
    CATS.forEach(cat=>{
      const sel = selections[cat];
      if(!sel) return;
      total += sel.score;
      if(sel.detail?.tags) Object.entries(sel.detail.tags).forEach(([t,s])=>{
        famTot[t]=(famTot[t]||0)+(typeof s==='number'?s:parseFloat(s)||0);
      });
    });
    const fams = Object.entries(famTot).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const rarity = getRarityTier(total);
    return {total, fams, rarity};
  },[selections]);

  // Find the closest real Bro to this build
  const closestBro = useMemo(()=>{
    if(Object.keys(selections).length < 2) return null;
    const selCats = Object.keys(selections);
    let best = null, bestScore = -1;
    nfts.forEach(n=>{
      let matches = 0;
      selCats.forEach(cat=>{
        const val = n[cat];
        if(!val) return;
        const name = String(val).split('(')[0].trim().toLowerCase();
        if(name === selections[cat].name.toLowerCase()) matches++;
      });
      if(matches > bestScore){bestScore=matches;best=n;}
    });
    return bestScore > 0 ? {nft:best,matches:bestScore} : null;
  },[selections, nfts]);

  const clear = () => setSelections({});

  return (
    <div className="builder-wrap" ref={pickerContainerRef}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:11,color:'var(--txt3)'}}>Pick traits to build your dream Bro</div>
        {Object.keys(selections).length>0&&<button onClick={clear} style={{fontSize:11,color:'var(--red)',background:'none',border:'none',cursor:'pointer',fontWeight:700}}>Reset</button>}
      </div>

      <div className="builder-slots">
        {CATS.map(cat=>{
          const sel = selections[cat];
          const rarity = sel ? getRarityTier(sel.score) : null;
          return(
            <div key={cat} style={{position:'relative'}}>
              <div className="builder-slot" onClick={()=>setPickerCat(pickerCat===cat?null:cat)}>
                <TraitImg className="builder-slot-img" src={sel?.detail?.thumbnailUrl} alt={sel?.name}/>
                <div style={{flex:1,minWidth:0}}>
                  <div className="builder-slot-cat">{cat}</div>
                  <div className="builder-slot-val" style={{color:rarity?rarity.color:'var(--txt2)'}}>{sel?sel.name:'— Any —'}</div>
                </div>
                {sel&&sel.score>0&&<div className="builder-slot-pts" style={{color:rarity?rarity.color:'var(--teal)'}}>+{sel.score.toFixed(1)}</div>}
                <span style={{color:'var(--txt3)',fontSize:10,marginLeft:4}}>{pickerCat===cat?'▲':'▼'}</span>
              </div>
              {pickerCat===cat&&(
                <div className="builder-picker" style={{top:'100%',left:0,right:0,marginTop:4}}>
                  <div
                    className="builder-picker-item"
                    onClick={()=>{ setSelections(s=>{ const ns={...s}; delete ns[cat]; return ns;}); setPickerCat(null); }}
                  >
                    <div className="builder-picker-img" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--txt3)'}}>{I.none}</div>
                    <div className="builder-picker-name" style={{color:'var(--txt3)'}}>— None —</div>
                  </div>
                  {opts[cat]?.map(item=>(
                    <div key={item.name} className="builder-picker-item" onClick={()=>{setSelections(s=>({...s,[cat]:item}));setPickerCat(null);}}>
                      <TraitImg className="builder-picker-img" src={item.detail?.thumbnailUrl} alt={item.name}/>
                      <div className="builder-picker-name">{item.name}</div>
                      {item.score>0&&<div className="builder-picker-pts">+{item.score.toFixed(1)}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {Object.keys(selections).length>0&&(
        <div className="builder-result">
          <div className="builder-score-big">{result.total.toFixed(1)}</div>
          <div className="builder-score-sub" style={{color:result.rarity?result.rarity.color:'var(--txt3)'}}>
            {result.rarity?result.rarity.tier+' Tier':'No rarity tier'}
          </div>
          {result.fams.length>0&&(
            <div className="builder-fam-row">
              {result.fams.map(([name,score])=>(
                <div key={name} className="builder-fam-pill" style={{color:FAM_COLORS[name]||FAM_COLORS.default,background:`${FAM_COLORS[name]||FAM_COLORS.default}18`}}>
                  {name} {score.toFixed(0)}pts
                </div>
              ))}
            </div>
          )}
          {closestBro&&(
            <div style={{marginTop:6,textAlign:'center'}}>
              <div style={{fontSize:10,color:'var(--txt3)',marginBottom:5}}>Closest real match ({closestBro.matches} traits)</div>
              <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center',cursor:'pointer',background:'var(--ink3)',borderRadius:8,padding:'6px 10px',border:'1px solid var(--line)'}} onClick={()=>onSelect(closestBro.nft)}>
                <img src={closestBro.nft.Image} alt="" style={{width:32,height:32,borderRadius:6,objectFit:'cover'}}/>
                <div style={{fontSize:12}}>
                  <div style={{fontWeight:700,color:'var(--txt)'}}>#{closestBro.nft.ID}</div>
                  <div style={{fontFamily:'Space Mono,monospace',fontSize:'.78rem',color:'var(--teal)'}}>{fmtScore(closestBro.nft)}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const ShareCard = ({nft, onClose}) => {
  const canvasRef = useRef(null);
  const [copied, setCopied] = useState(false);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas||!nft) return;
    const ctx = canvas.getContext('2d');
    // Discord/Twitter optimized: 1200x630 (OG image ratio)
    const W=600, H=600;
    canvas.width=W; canvas.height=H;

    const rarity = getRarityTier(nft.diScore);
    const accentColor = rarity ? rarity.color : '#00d4b8';
    const famColor = FAM_COLORS[nft.dominantFamilies[0]]||FAM_COLORS.default;
    const nftRange = getMultipleRange(nft) || diScoreToRange(nft.diScore);
    const scoreLbl = nftRange.lo===nftRange.hi ? nftRange.lo+'x' : nftRange.lo+'x – '+nftRange.hi+'x';

    // Background
    const bg = ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#0b0c14');
    bg.addColorStop(0.5,'#12141f');
    bg.addColorStop(1,'#0b0c14');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Subtle accent glow
    const glow = ctx.createRadialGradient(W/2,200,50,W/2,200,300);
    glow.addColorStop(0, accentColor+'18');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0,0,W,H);

    // Bottom brand bar
    ctx.fillStyle = '#0a0b12';
    ctx.fillRect(0,H-48,W,48);
    ctx.fillStyle = accentColor;
    ctx.fillRect(0,H-48,W,2);

    // Brand text
    ctx.fillStyle = '#4d5580';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('HEMI BROS', 20, H-20);
    ctx.fillStyle = '#3d4470';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('The Flagship NFT Collection on Hemi', W-20, H-20);

    // Load NFT image
    const img = new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      // Large NFT image
      const iSize=280;
      const ix=(W-iSize)/2, iy=30;
      ctx.save();
      ctx.beginPath();ctx.roundRect(ix,iy,iSize,iSize,16);ctx.clip();
      ctx.drawImage(img,ix,iy,iSize,iSize);
      ctx.restore();

      // Accent border on image
      ctx.strokeStyle = accentColor+'88';
      ctx.lineWidth = 2;
      ctx.beginPath();ctx.roundRect(ix,iy,iSize,iSize,16);ctx.stroke();

      // ID
      ctx.fillStyle='#e8eaf8';
      ctx.font='bold 36px "Space Mono", monospace';
      ctx.textAlign='center';
      ctx.fillText('Hemi Bro #'+nft.ID, W/2, iy+iSize+44);

      // Floor multiple (big, accent colored)
      ctx.fillStyle=accentColor;
      ctx.font='bold 52px "Space Mono", monospace';
      ctx.fillText(scoreLbl, W/2, iy+iSize+100);

      // "Floor Multiple" label
      ctx.fillStyle='#8890b8';
      ctx.font='bold 12px sans-serif';
      ctx.fillText('FLOOR MULTIPLE', W/2, iy+iSize+120);

      // Rank + Rarity badges
      const badgeY = iy+iSize+148;
      // Rank badge
      ctx.fillStyle='#1a1d2e';
      ctx.beginPath();ctx.roundRect(W/2-110,badgeY,100,28,8);ctx.fill();
      ctx.strokeStyle='#2d3251';ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(W/2-110,badgeY,100,28,8);ctx.stroke();
      ctx.fillStyle='#e8eaf8';ctx.font='bold 13px "Space Mono", monospace';
      ctx.fillText('Rank #'+nft.rank, W/2-60, badgeY+18);

      // Rarity badge
      if(rarity){
        ctx.fillStyle=accentColor+'22';
        ctx.beginPath();ctx.roundRect(W/2+10,badgeY,100,28,8);ctx.fill();
        ctx.strokeStyle=accentColor+'66';ctx.lineWidth=1;
        ctx.beginPath();ctx.roundRect(W/2+10,badgeY,100,28,8);ctx.stroke();
        ctx.fillStyle=accentColor;ctx.font='bold 12px sans-serif';
        ctx.fillText(rarity.tier.toUpperCase(), W/2+60, badgeY+18);
      }

      // DI Score small
      ctx.fillStyle='#4d5580';ctx.font='11px "Space Mono", monospace';
      ctx.fillText('DI Score: '+nft.diScore.toFixed(1), W/2, badgeY+52);
    };
    img.onerror=()=>{
      ctx.fillStyle='#e8eaf8';ctx.font='bold 72px "VT323"';ctx.textAlign='center';
      ctx.fillText('#'+nft.ID,W/2,200);
      ctx.fillStyle=accentColor;ctx.font='bold 52px monospace';
      ctx.fillText(scoreLbl,W/2,280);
    };
    img.src=wsrvUrl(nft.Image, 300);
  },[nft]);

  const download = () => {
    const canvas = canvasRef.current;
    if(!canvas) return;
    try {
      const a = document.createElement('a');
      a.download=`hemi-bro-${nft.ID}.png`;
      a.href=canvas.toDataURL('image/png');
      a.click();
    } catch(e) {
      /* Canvas tainted by cross-origin image — offer link copy instead */
      const url = `${window.location.href.split('?')[0]}?id=${nft.ID}`;
      navigator.clipboard?.writeText(url);
      alert('Image download blocked by browser security. Link copied instead!');
    }
  };

  const copyLink = () => {
    const url = `${window.location.href.split('?')[0]}?id=${nft.ID}`;
    const onSuccess = () => { setCopied(true); setTimeout(()=>setCopied(false),2000); };
    if(navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(onSuccess).catch(()=>{
        /* Fallback */
        const ta=document.createElement('textarea');ta.value=url;
        ta.style.cssText='position:fixed;left:-9999px';
        document.body.appendChild(ta);ta.select();
        try{document.execCommand('copy');onSuccess();}catch{}
        document.body.removeChild(ta);
      });
    } else {
      const ta=document.createElement('textarea');ta.value=url;
      ta.style.cssText='position:fixed;left:-9999px';
      document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');onSuccess();}catch{}
      document.body.removeChild(ta);
    }
  };

  return(
    <div className="share-mbd" onClick={onClose}>
      <div className="share-mbox" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px 0'}}>
          <span style={{fontSize:13,fontWeight:700,color:'var(--txt)'}}>Share Bro #{nft.ID}</span>
          <button className="mclose" style={{position:'static'}} onClick={onClose}>{I.x}</button>
        </div>
        <div className="share-canvas-wrap">
          <canvas ref={canvasRef} style={{maxWidth:'100%',borderRadius:8}}/>
        </div>
        <div className="share-actions">
          <button className="share-dl-btn" onClick={download}>{I.dl} Download PNG</button>
          <button className="share-copy-btn" onClick={copyLink} style={{color:copied?'var(--green)':'var(--txt2)'}}>
            {copied?<>{I.check} Copied!</>:<>{I.link} Copy Link</>}
          </button>
          {navigator.share&&(
            <button onClick={()=>{
              const url=window.location.href.split('?')[0]+'?id='+nft.ID;
              navigator.share({title:'Hemi Bro #'+nft.ID,text:fmtScore(nft)+' floor multiple · Rank #'+nft.rank,url}).catch(()=>{});
            }} style={{display:'flex',alignItems:'center',gap:5,padding:'0 14px',height:36,
              background:'var(--ink4)',border:'1.5px solid var(--line)',borderRadius:8,
              color:'var(--txt2)',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}>
              📤 Share
            </button>
          )}
          <button onClick={()=>{
            const url=window.location.href.split('?')[0]+'?id='+nft.ID;
            const r=getRarityTier(nft.diScore);
            const tierLbl=r?' '+r.tier:'';
            const txt='My Hemi Bro #'+nft.ID+' is ranked #'+nft.rank+tierLbl+' — '+fmtScore(nft)+' floor multiple\n\nCheck yours → '+url;
            window.open('https://x.com/intent/tweet?text='+encodeURIComponent(txt),'_blank');
          }} style={{display:'flex',alignItems:'center',gap:5,padding:'0 14px',height:36,
            background:'#1a1a2e',border:'1.5px solid #1d9bf0',borderRadius:8,
            color:'#1d9bf0',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}>
            𝕏 Post
          </button>
        </div>
      </div>
    </div>
  );
};

const OfferFeed = ({nfts, onSelectNft}) => {

    setLoading(true);

      .catch(()=>{ setOffers([]); setLoading(false); });
  },[]);

    const m={};
