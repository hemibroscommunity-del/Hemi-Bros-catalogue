const MyOffersView = ({nfts, onSelectNft}) => {
  const {useState, useEffect, useCallback, useMemo} = React;
  const {wallet, status, setStatus, connectWallet, disconnectWallet} = useWallet();
  const [manualWallet, setManualWallet] = useState('');
  const [offers,  setOffers]  = useState([]);
  const [loading, setLoading] = useState(false);
  const [queried, setQueried] = useState(false);

  const activeWallet = wallet || (manualWallet.match(/^0x[0-9a-fA-F]{40}$/) ? manualWallet.toLowerCase() : null);

  const nftById = useMemo(()=>{
    const m={};
    nfts.forEach(n=>m[String(n.ID)]=n);
    return m;
  },[nfts]);

  const loadOffers = useCallback(async()=>{
    if(!activeWallet) return;
    setLoading(true); setQueried(false);
    try {
      const data = await supa.select('offers','withdrawn=is.false&limit=500');
      setOffers(data||[]);
    } catch(e){ setOffers([]); }
    setLoading(false); setQueried(true);
  },[activeWallet]);

  useEffect(()=>{ if(activeWallet) loadOffers(); },[loadOffers]);

  const myOutgoing = useMemo(()=>
    offers.filter(o=>isOfferActive(o) && o.wallet_address?.toLowerCase()===activeWallet)
          .sort((a,b)=>parseFloat(b.offer_amount)-parseFloat(a.offer_amount))
  ,[offers, activeWallet]);

  const offersByNft = useMemo(()=>{
    const m={};
    offers.filter(isOfferActive).forEach(o=>{
      if(!m[o.nft_id]) m[o.nft_id]=[];
      m[o.nft_id].push(o);
    });
    Object.values(m).forEach(arr=>arr.sort((a,b)=>parseFloat(b.offer_amount)-parseFloat(a.offer_amount)));
    return m;
  },[offers]);

  const nftsWithOffers = useMemo(()=>
    Object.entries(offersByNft)
      .sort(([,a],[,b])=>parseFloat(b[0].offer_amount)-parseFloat(a[0].offer_amount))
      .map(([id,arr])=>({nft:nftById[id], id, arr}))
      .filter(x=>x.nft)
  ,[offersByNft, nftById]);

  const totalOutgoingEth = myOutgoing.reduce((s,o)=>s+parseFloat(o.offer_amount),0);

  const withdrawOffer = async (offerId) => {
    try {
      await supa.patch('offers',`id=eq.${offerId}&wallet_address=eq.${activeWallet}`,{withdrawn:true});
      loadOffers();
    } catch(e){ setStatus({type:'err',msg:'Could not withdraw.'}); }
  };

  return(
    <div className="myoffers-wrap" style={{paddingTop:4}}>
      {/* Wallet connect / paste */}
      <div style={{background:'var(--ink3)',border:'1px solid var(--line)',borderRadius:12,padding:14,display:'flex',flexDirection:'column',gap:10}}>
        <div style={{fontSize:11,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--txt3)'}}>Wallet</div>
        {wallet
          ? <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
              <span style={{fontFamily:'Space Mono,monospace',fontSize:11,color:'var(--teal)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{wallet}</span>
              <button className="offer-connect-btn" style={{background:'none',border:'1px solid var(--line)',color:'var(--txt2)',fontSize:11,flexShrink:0}} onClick={disconnectWallet}>Disconnect</button>
            </div>
          : <>
              <button className="myoffers-wallet-btn" onClick={connectWallet}>Connect Wallet</button>
              <div style={{fontSize:11,color:'var(--txt3)',textAlign:'center'}}>— or paste address —</div>
              <div className="myoffers-wallet-row">
                <input className="myoffers-wallet-inp" placeholder="0x…" value={manualWallet}
                  onChange={e=>setManualWallet(e.target.value)}/>
                <button className="myoffers-wallet-btn" onClick={loadOffers}
                  disabled={!manualWallet.match(/^0x[0-9a-fA-F]{40}$/)}>Look Up</button>
              </div>
            </>
        }
        {status && <div className={`offer-status ${status.type}`}>{status.msg}</div>}
      </div>

      {queried && (
        <div className="myoffers-stats">
          <div className="myoffers-stat">
            <div className="myoffers-stat-val">{myOutgoing.length}</div>
            <div className="myoffers-stat-lbl">Active Offers Made</div>
          </div>
          <div className="myoffers-stat">
            <div className="myoffers-stat-val">Ξ {totalOutgoingEth.toFixed(3)}</div>
            <div className="myoffers-stat-lbl">Total ETH Offered</div>
          </div>
          <div className="myoffers-stat">
            <div className="myoffers-stat-val">{nftsWithOffers.length}</div>
            <div className="myoffers-stat-lbl">Bros With Offers</div>
          </div>
        </div>
      )}

      {loading && <div className="myoffers-empty">Loading offers…</div>}

      {queried && myOutgoing.length > 0 && (
        <div>
          <div className="myoffers-section-title">Offers You've Made ({myOutgoing.length})</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {myOutgoing.map(o=>{
              const nft = nftById[String(o.nft_id)];
              const expInfo = fmtExpiry(o.expires_at);
              return(
                <div key={o.id} className="myoffers-bro-card">
                  {nft?.Image && <img className="myoffers-bro-img" src={nft.Image} alt={`#${o.nft_id}`} onClick={()=>nft&&onSelectNft(nft)}/>}
                  <div className="myoffers-bro-info">
                    <div className="myoffers-bro-id" onClick={()=>nft&&onSelectNft(nft)}>
                      Bro #{o.nft_id}
                      {nft && <span style={{fontWeight:400,color:'var(--txt3)',fontSize:11,marginLeft:6}}>{nft.dominantFamilies?.[0]||''}</span>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4,flexWrap:'wrap'}}>
                      <span style={{fontFamily:'Space Mono,monospace',fontWeight:700,color:'var(--teal)',fontSize:14}}>Ξ {parseFloat(o.offer_amount).toFixed(3)}</span>
                      <span style={{fontSize:10,color:'var(--txt3)'}}>Made {fmtRelTime(o.created_at)}</span>
                      {expInfo && <span className={`offer-expiry ${expInfo.cls}`}>{expInfo.label}</span>}
                    </div>
                    {o.message && <div style={{fontSize:11,color:'var(--txt2)',fontStyle:'italic',marginTop:4}}>"{o.message}"</div>}
                    <button className="offer-withdraw-btn" style={{marginTop:6}} onClick={()=>withdrawOffer(o.id)}>Withdraw Offer</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {queried && nftsWithOffers.length > 0 && (
        <div>
          <div className="myoffers-section-title">All Bros With Active Offers ({nftsWithOffers.length})</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {nftsWithOffers.map(({nft,id,arr})=>(
              <div key={id} className="myoffers-bro-card">
                {nft?.Image && <img className="myoffers-bro-img" src={nft.Image} alt={`#${id}`} onClick={()=>onSelectNft(nft)}/>}
                <div className="myoffers-bro-info">
                  <div className="myoffers-bro-id" onClick={()=>onSelectNft(nft)}>
                    Bro #{id}
                    {nft && <span style={{fontWeight:400,color:'var(--txt3)',fontSize:11,marginLeft:6}}>{nft.dominantFamilies?.[0]||''}</span>}
                  </div>
                  <div className="myoffers-bro-meta">Rank #{nft?.rank} · {nft?.diScore?.toFixed(1)} DI</div>
                  <div className="myoffers-incoming">
                    {arr.map((o,i)=>(
                      <div key={o.id} className="myoffers-offer-row">
                        <span className="myoffers-offer-amt">Ξ {parseFloat(o.offer_amount).toFixed(3)}</span>
                        {i===0 && <span style={{fontSize:9,fontWeight:800,color:'var(--green)',background:'rgba(61,220,151,.12)',padding:'1px 6px',borderRadius:4}}>BEST</span>}
                        <span className="myoffers-offer-wallet">{shortAddr(o.wallet_address)}</span>
                        <span className="myoffers-offer-time">{fmtRelTime(o.created_at)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {queried && !loading && myOutgoing.length===0 && nftsWithOffers.length===0 && (
        <div className="myoffers-empty">No active offers found for this wallet.</div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   BATTLE MODE — "Which Bro is rarer?"
   Two random Bros, guess the rarer one.
════════════════════════════════════ */
const BattleMode = ({nfts, onSelect}) => {
  const [pair, setPair] = useState(null);
  const [picked, setPicked] = useState(null);
  const [streak, setStreak] = useState(0);
  const [best, setBest] = useState(0);
  const [total, setTotal] = useState(0);
  const [correct, setCorrect] = useState(0);

  const newPair = useCallback(()=>{
    if(nfts.length<2) return;
    const a = nfts[Math.floor(Math.random()*nfts.length)];
    let b = a;
    let tries=0;
    while(b.ID===a.ID && tries<50){ b=nfts[Math.floor(Math.random()*nfts.length)]; tries++; }
    setPair([a,b]);
    setPicked(null);
  },[nfts]);

  useEffect(()=>{ newPair(); },[newPair]);

  const handlePick = (idx) => {
    if(picked!==null||!pair) return;
    setPicked(idx);
    setTotal(t=>t+1);
    const other = idx===0?1:0;
    const isCorrect = pair[idx].diScore >= pair[other].diScore;
    if(isCorrect) {
      setStreak(s=>{ const n=s+1; setBest(b=>Math.max(b,n)); return n; });
      setCorrect(c=>c+1);
    } else {
      setStreak(0);
    }
  };

  if(!pair) return null;
  const winner = pair[0].diScore >= pair[1].diScore ? 0 : 1;

  return (
    <div style={{padding:'16px 14px',maxWidth:520,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div>
          <div style={{fontSize:16,fontWeight:900,color:'var(--txt)'}}>Rarity Battle</div>
          <div style={{fontSize:10,color:'var(--txt3)'}}>Which Bro is rarer? Tap to guess!</div>
        </div>
        <div style={{textAlign:'right'}}>

/* ════════════════════════════════════
   SIMILAR BROS (used inside Modal)
════════════════════════════════════ */
const SimilarBros = ({nft, nfts, traitMap, onSelect}) => {
  const {similar, rareCombo} = useMemo(()=>{
    if(!nft||!nfts.length) return {similar:[],rareCombo:[]};

    const similar = nfts
      .filter(n=>n.ID!==nft.ID)
      .map(n=>{
        let score=0; const sharedCats=[];
        CATS.forEach(cat=>{ if(n[cat]&&n[cat]===nft[cat]){score++;sharedCats.push(cat);} });
        return {nft:n,score,sharedCats};
      })
      .filter(x=>x.score>0)
      .sort((a,b)=>b.score-a.score||b.nft.diScore-a.nft.diScore)
      .slice(0,8);

    // Rare trait co-occurrence: which pairs on this Bro are hardest to find together
    const thisCats = CATS.filter(cat=>{
      const v=nft[cat]; if(!v) return false;
      return String(v).split('(')[0].trim().toLowerCase()!=='none';
    });
    const combos = [];
    for(let i=0;i<thisCats.length;i++){
      for(let j=i+1;j<thisCats.length;j++){
        const catA=thisCats[i], catB=thisCats[j];
        const valA=nft[catA], valB=nft[catB]; if(!valA||!valB) continue;
        const nameA=String(valA).split('(')[0].trim();
        const nameB=String(valB).split('(')[0].trim();
        const scoreA=traitMap[tk(catA,nameA)]?.adjustedScore||0;
        const scoreB=traitMap[tk(catB,nameB)]?.adjustedScore||0;
        if(scoreA<10&&scoreB<10) continue; // skip all-common combos
        const count = nfts.filter(n=>n[catA]===valA&&n[catB]===valB).length;
        combos.push({catA,catB,nameA,nameB,count,scoreA,scoreB});
      }
    }
    combos.sort((a,b)=>a.count-b.count||(b.scoreA+b.scoreB)-(a.scoreA+a.scoreB));
    return {similar, rareCombo:combos.slice(0,3)};
  },[nft,nfts,traitMap]);

  return(
    <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:16}}>
      {rareCombo.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:6}}>Rare Trait Combos</div>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {rareCombo.map(({nameA,nameB,count,catA,catB,scoreA,scoreB})=>{
              const rA=getRarityTier(scoreA), rB=getRarityTier(scoreB);
              return(
                <div key={`${nameA}-${nameB}`} style={{
                  display:'flex',alignItems:'center',justifyContent:'space-between',
                  padding:'6px 10px',background:'var(--ink3)',borderRadius:8,border:'1px solid var(--line)'
                }}>
                  <div style={{fontSize:12,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginRight:8}}>
                    <span style={{color:rA?rA.color:'var(--txt)',fontWeight:700}}>{nameA}</span>
                    <span style={{color:'var(--txt3)',margin:'0 4px'}}>+</span>
                    <span style={{color:rB?rB.color:'var(--txt)',fontWeight:700}}>{nameB}</span>
                  </div>
                  <div style={{fontFamily:'Space Mono,monospace',fontSize:'.75rem',color:count<=3?'var(--r-grail)':count<=10?'var(--r-legendary)':'var(--txt3)',flexShrink:0}}>
                    ×{count}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {similar.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--txt3)',marginBottom:6}}>Similar Bros</div>
          <div className="similar-row">
            {similar.map(({nft:s,score,sharedCats})=>(
              <div key={s.ID} className="similar-card" onClick={()=>onSelect(s)}
                title={`${score} shared: ${sharedCats.join(', ')}`}>
                <img src={wsrvUrl(s.Image,120)} alt={`#${s.ID}`} loading="lazy" decoding="async"/>
                <div className="similar-card-score">{fmtScore(s)}</div>
                <div style={{fontSize:9,color:'var(--txt3)',textAlign:'center',marginTop:1}}>{score} shared</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {!similar.length&&!rareCombo.length&&(
        <p style={{color:'var(--txt2)',fontSize:13,padding:'18px 0'}}>No similar Bros found.</p>
      )}
    </div>
  );
};

/* All gallery filter/sort state in one place.
   Import via useApp() ctx or pass down once. */
const useGalleryState = (nfts, traitMap) => {
  const [search,        setSearch]        = useState('');
  const [filters,       setFilters]       = useState({traits:{},families:[]});
  const [sortKey,       setSortKey]       = useState('score_desc');
  const [scoreMin,      setScoreMin]      = useState('');
  const [scoreMax,      setScoreMax]      = useState('');
  const [rarityFilter,  setRarityFilter]  = useState([]);
  const [hideIp,        setHideIp]        = useState(false);
  const [walletFilter,  setWalletFilter]  = useState(false);
  const [ownedIds,      setOwnedIds]      = useState([]);
  const debouncedSearch = useDebounce(search, 80);

  const filtered = useMemo(()=>{
    if(!nfts.length) return [];
    const q = debouncedSearch.trim();
    const ownedSet = walletFilter && ownedIds.length > 0 ? new Set(ownedIds) : null;
    const famLen   = filters.families.length;
    const traitEntries = Object.entries(filters.traits);
    const traitLen = traitEntries.length;
    const sMin = scoreMin!==''?parseFloat(scoreMin):null;
    const sMax = scoreMax!==''?parseFloat(scoreMax):null;
    const rarSet = rarityFilter.length>0 ? new Set(rarityFilter) : null;

    let result = nfts.filter(nft=>{
      if(ownedSet && !ownedSet.has(nft.idStr)) return false;
      if(q){
        const ql = q.toLowerCase();
        const idMatch = nft.idStr.startsWith(q);
        const traitMatch = !idMatch && CATS.some(cat=>{
          const v = nft[cat]; if(!v) return false;
          return String(v).split('(')[0].trim().toLowerCase().includes(ql);
        });
        if(!idMatch && !traitMatch) return false;
      }
      if(hideIp && nft.hasIpRisk) return false;
      if(famLen > 0) {
        let ok = false;
        for(let i=0;i<famLen;i++) if(nft.famSet.has(filters.families[i])){ ok=true; break; }
        if(!ok) return false;
      }
      for(let i=0;i<traitLen;i++){
        const [cat,vals]=traitEntries[i];
        if(!Array.isArray(vals)||vals.length===0) continue;
        if(!vals.includes(nft[cat])) return false;
      }
      if(sMin!==null && nft.diScore<sMin) return false;
      if(sMax!==null && nft.diScore>sMax) return false;
      if(rarSet){
        let traitMatch = false;
        for(const cat of CATS){
          const val = nft[cat]; if(!val) continue;
          const name = String(val).split('(')[0].trim();
          const detail = traitMap[tk(cat,name)];
          const r = detail ? getRarityTier(detail.adjustedScore||0) : null;
          const tierName = r ? r.tier : 'Common';
          if(rarSet.has(tierName)){ traitMatch=true; break; }
        }
        if(!traitMatch) return false;
      }
      return true;
    });

    switch(sortKey){
      case 'score_desc': result.sort((a,b)=>b.diScore-a.diScore); break;
      case 'score_asc':  result.sort((a,b)=>a.diScore-b.diScore); break;
      case 'id_asc':     result.sort((a,b)=>Number(a.ID)-Number(b.ID)); break;
      case 'id_desc':    result.sort((a,b)=>Number(b.ID)-Number(a.ID)); break;
      case 'rarest':{
        const topTrait = n => Math.max(0,...CATS.map(cat=>{
          const v=n[cat]; if(!v) return 0;
          return traitMap[tk(cat,String(v).split('(')[0].trim())]?.adjustedScore||0;
        }));
        result.sort((a,b)=>topTrait(b)-topTrait(a)); break;
      }
      case 'common':{
        const topTraitC = n => Math.max(0,...CATS.map(cat=>{
          const v=n[cat]; if(!v) return 0;
          return traitMap[tk(cat,String(v).split('(')[0].trim())]?.adjustedScore||0;
        }));
        result.sort((a,b)=>topTraitC(a)-topTraitC(b)); break;
      }
      default: break;
    }
    return result;
  },[nfts, debouncedSearch, filters, walletFilter, ownedIds, sortKey, scoreMin, scoreMax, rarityFilter, hideIp, traitMap]);

  const traitOpts = useMemo(()=>{
    const o={};
    CATS.forEach(cat=>{
      const s=new Set();
      nfts.forEach(n=>{const v=n[cat];if(v) s.add(v);});
      o[cat]=[...s].sort((a,b)=>{
        const aNone=a.split('(')[0].trim().toLowerCase()==='none';
        const bNone=b.split('(')[0].trim().toLowerCase()==='none';
        if(aNone&&!bNone) return 1; if(!aNone&&bNone) return -1;
        return a.localeCompare(b);
      });
    });
    return o;
  },[nfts]);

  const facetedCounts = useMemo(()=>{
    const fc={}; CATS.forEach(cat=>fc[cat]={});
    const q = debouncedSearch.trim();
    const famLen = filters.families.length;
    const traitEntries = Object.entries(filters.traits);
    const ownedSet = walletFilter && ownedIds.length > 0 ? new Set(ownedIds) : null;
    const sMin = scoreMin!==''?parseFloat(scoreMin):null;
    const sMax = scoreMax!==''?parseFloat(scoreMax):null;
    const rarSet = rarityFilter.length>0 ? new Set(rarityFilter) : null;
    nfts.forEach(nft=>{
      if(ownedSet && !ownedSet.has(nft.idStr)) return;
      if(q){
        const ql=q.toLowerCase();
        const idMatch=nft.idStr.startsWith(q);
        const traitMatch=!idMatch&&CATS.some(cat=>{const v=nft[cat];if(!v)return false;return String(v).split('(')[0].trim().toLowerCase().includes(ql);});
        if(!idMatch&&!traitMatch) return;
      }
      if(hideIp&&nft.hasIpRisk) return;
      if(famLen>0){let ok=false;for(let i=0;i<famLen;i++)if(nft.famSet.has(filters.families[i])){ok=true;break;}if(!ok)return;}
      if(sMin!==null&&nft.diScore<sMin) return;
      if(sMax!==null&&nft.diScore>sMax) return;
      if(rarSet){
        let tm=false;
        for(const cat of CATS){const val=nft[cat];if(!val)continue;const name=String(val).split('(')[0].trim();const detail=traitMap[tk(cat,name)];const r=detail?getRarityTier(detail.adjustedScore||0):null;if(rarSet.has(r?r.tier:'Common')){tm=true;break;}}
        if(!tm) return;
      }
      CATS.forEach(cat=>{
        const v=nft[cat]; if(!v) return;
        for(let i=0;i<traitEntries.length;i++){
          const [c,vals]=traitEntries[i];
          if(c===cat) continue;
          if(!Array.isArray(vals)||vals.length===0) continue;
          if(!vals.includes(nft[c])) return;
        }
        fc[cat][v]=(fc[cat][v]||0)+1;
      });
    });
    return fc;
  },[nfts, filters, debouncedSearch, walletFilter, ownedIds, hideIp, scoreMin, scoreMax, rarityFilter, traitMap]);

  const famCounts = useMemo(()=>{
    const fc={};
    nfts.forEach(n=>n.famSet.forEach(f=>{fc[f]=(fc[f]||0)+1;}));
    return fc;
  },[nfts]);

  const activeCount = Object.values(filters.traits).reduce((s,v)=>s+(Array.isArray(v)?v.length:1),0)
    +filters.families.length+(walletFilter?1:0)+(rarityFilter.length>0?1:0)+(hideIp?1:0)+((scoreMin||scoreMax)?1:0);
  const totalActive = activeCount+(search?1:0);

  const ownedNfts = useMemo(()=>{
    if(!ownedIds.length) return [];
    const s=new Set(ownedIds);
    return nfts.filter(n=>s.has(n.idStr));
  },[nfts, ownedIds]);

  const clearAll = useCallback(()=>{
    setFilters({traits:{},families:[]});setSearch('');setWalletFilter(false);
    setRarityFilter([]);setScoreMin('');setScoreMax('');setHideIp(false);
  },[]);
  const rmTrait = useCallback(cat=>setFilters(f=>{const t={...f.traits};delete t[cat];return {...f,traits:t};}),[]);
  const rmFam   = useCallback(fam=>setFilters(f=>({...f,families:f.families.filter(x=>x!==fam)})),[]);

  return {
    search, setSearch, filters, setFilters, sortKey, setSortKey,
    scoreMin, setScoreMin, scoreMax, setScoreMax,
    rarityFilter, setRarityFilter, hideIp, setHideIp,
    walletFilter, setWalletFilter, ownedIds, setOwnedIds,
    filtered, traitOpts, facetedCounts, famCounts,
    activeCount, totalActive, ownedNfts, clearAll, rmTrait, rmFam,
  };
};

const DiModelRow = ({trait, overrideVal, setScoreOverride, onOpenItemDetail}) => {
  const key = tk(trait.Category, trait['Unique Item List']);
  const baseScore = trait.adjustedScore || 0;
  const effectiveScore = overrideVal ?? baseScore;
  const isModified = overrideVal !== undefined && overrideVal !== baseScore;

  // Local editable state — strings so user can type freely
  const [scoreStr, setScoreStr] = React.useState('');
  const [pctStr,   setPctStr]   = React.useState('');
  const [focused,  setFocused]  = React.useState(null); // 'score' | 'pct' | null
  // Track whether pctStr was set by the user (via +/- or typing) vs auto-synced
  const [pctUserSet, setPctUserSet] = React.useState(false);

  // Keep display values in sync when not focused
  // pctStr: only auto-sync if user hasn't manually set it via +/- buttons
  React.useEffect(() => {
    if(focused !== 'score') setScoreStr(effectiveScore.toFixed(1));
    if(focused !== 'pct' && !pctUserSet) {
      setPctStr(baseScore > 0 ? (((effectiveScore - baseScore) / baseScore) * 100).toFixed(1) : '0.0');
    }
  }, [effectiveScore, baseScore, focused, pctUserSet]);

  // When override is reset (overrideVal undefined), clear pctUserSet too
  React.useEffect(() => {
    if(overrideVal === undefined) { setPctUserSet(false); }
  }, [overrideVal]);

  const applyScore = val => {
    const n = parseFloat(val);
    if(!isNaN(n) && n >= 0) setScoreOverride(key, parseFloat(n.toFixed(2)));
  };
  const applyPct = val => {
    const p = parseFloat(val);
    if(!isNaN(p) && baseScore > 0) {
      const newScore = baseScore * (1 + p / 100);
      setScoreOverride(key, parseFloat(Math.max(0, newScore).toFixed(2)));
    }
  };

  const rarity = getRarityTier(effectiveScore);
  const rarityColor = rarity ? rarity.color : 'var(--txt3)';
  const pctVal = baseScore > 0 ? ((effectiveScore - baseScore) / baseScore) * 100 : 0;
  const pctColor = pctVal > 0 ? 'var(--green)' : pctVal < 0 ? 'var(--red)' : 'var(--txt3)';

  return (
    <div style={{
      display:'grid',gridTemplateColumns:'40px 1fr 90px 110px 36px',gap:8,
      padding:'6px 16px',alignItems:'center',
      borderBottom:'1px solid rgba(255,255,255,.03)',
      background: isModified ? 'rgba(45,212,191,.04)' : 'transparent',
      transition:'background .15s'}}>

      {/* Thumbnail — click to open item detail */}
      <div style={{width:36,height:36,borderRadius:6,overflow:'hidden',flexShrink:0,
        border:`1.5px solid ${isModified ? 'rgba(45,212,191,.4)' : 'var(--line)'}`,
        background:'var(--ink3)',cursor:onOpenItemDetail?'pointer':'default'}}
        title={onOpenItemDetail?`View ${trait['Unique Item List']} details`:''}
        onClick={e=>{if(onOpenItemDetail){e.stopPropagation();onOpenItemDetail(trait.Category,trait['Unique Item List']);}}}>
        {trait.thumbnailUrl
          ? <img src={trait.thumbnailUrl} alt={trait['Unique Item List']}
              style={{width:'100%',height:'100%',objectFit:'cover'}}
              onError={e=>e.target.style.display='none'}/>
          : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:14,color:'var(--txt3)'}}>{trait['Unique Item List']?.[0]||'?'}</div>
        }
      </div>

      {/* Name + category + supply */}
      <div style={{minWidth:0}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--txt)',overflow:'hidden',
          textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{trait['Unique Item List']}</div>
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
          {rarity && (
            <span style={{fontSize:9,fontWeight:800,color:rarityColor,letterSpacing:'.05em',
              textTransform:'uppercase'}}>{rarity.tier}</span>
          )}
          {trait.Supply && (
            <span style={{fontSize:9,color:'var(--txt3)'}}>×{trait.Supply}</span>
          )}
          {isModified && (
            <span style={{fontSize:9,color:'var(--teal)',fontWeight:700}}>● edited</span>
          )}
        </div>
      </div>

      {/* Score input */}
      <div style={{position:'relative'}}>
        <input
          type="number" min="0" step="0.1"
          value={scoreStr}
          onFocus={()=>{ setFocused('score'); setScoreStr(effectiveScore.toFixed(1)); }}
          onChange={e => {
            setScoreStr(e.target.value);
            const n = parseFloat(e.target.value);
            if(!isNaN(n) && n >= 0 && baseScore > 0)
              setPctStr((((n - baseScore) / baseScore) * 100).toFixed(1));
          }}
          onBlur={e => { setFocused(null); applyScore(e.target.value); }}
          onKeyDown={e => e.key==='Enter' && e.target.blur()}
          style={{
            width:'100%',boxSizing:'border-box',
            background: isModified ? 'rgba(45,212,191,.08)' : 'var(--ink3)',
            border: `1px solid ${isModified ? 'rgba(45,212,191,.4)' : 'var(--line)'}`,
            borderRadius:6,padding:'5px 6px',
            color: rarityColor,fontSize:12,fontWeight:700,
            fontFamily:'Space Mono,monospace',textAlign:'right',outline:'none',
          }}
        />
        {baseScore > 0 && effectiveScore !== baseScore && (
          <div style={{position:'absolute',top:-8,right:2,fontSize:8,color:'var(--txt3)'}}>
            was {baseScore.toFixed(1)}
          </div>
        )}
      </div>

      {/* Pct change input */}
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <div style={{display:'flex',border:'1px solid var(--line)',borderRadius:6,overflow:'hidden',
          background:'var(--ink3)',flex:1,alignItems:'center'}}>
          <button
            onClick={() => {
              const n = parseFloat(pctStr)||0;
              const newP = n - 10;
              setPctStr(newP.toFixed(1));
              setPctUserSet(true);
              applyPct(newP);
            }}
            style={{background:'none',border:'none',borderRight:'1px solid var(--line)',
              color:'var(--txt3)',cursor:'pointer',padding:'4px 7px',fontSize:13,lineHeight:1,flexShrink:0}}>−</button>
          <input
            type="number" step="1"
            value={pctStr}
            onFocus={()=>{ setFocused('pct'); setPctUserSet(false); setPctStr((((effectiveScore - baseScore) / baseScore) * 100).toFixed(1)); }}
            onChange={e => {
              setPctStr(e.target.value);
              const p = parseFloat(e.target.value);
              if(!isNaN(p) && baseScore > 0)
                setScoreStr((baseScore * (1 + p / 100)).toFixed(1));
            }}
            onBlur={e => { setFocused(null); applyPct(e.target.value); }}
            onKeyDown={e => e.key==='Enter' && e.target.blur()}
            style={{
              flex:1,background:'transparent',border:'none',
              color: pctColor, fontSize:11,fontWeight:700,
              fontFamily:'Space Mono,monospace',textAlign:'center',outline:'none',
              minWidth:0,padding:'5px 2px'
            }}
          />
          <span style={{fontSize:10,color:'var(--txt3)',paddingRight:5,flexShrink:0}}>%</span>
          <button
            onClick={() => {
              const n = parseFloat(pctStr)||0;
              const newP = n + 10;
              setPctStr(newP.toFixed(1));
              setPctUserSet(true);
              applyPct(newP);
            }}
            style={{background:'none',border:'none',borderLeft:'1px solid var(--line)',
              color:'var(--txt3)',cursor:'pointer',padding:'4px 7px',fontSize:13,lineHeight:1,flexShrink:0}}>+</button>
        </div>
      </div>

      {/* Reset button */}
      <div style={{display:'flex',justifyContent:'center'}}>
        {isModified ? (
          <button onClick={() => setScoreOverride(key, null)} style={{
            background:'none',border:'none',color:'var(--txt3)',cursor:'pointer',
            fontSize:14,padding:2,lineHeight:1,borderRadius:4,
            transition:'color .15s'}}
            title="Reset to original">↺</button>
        ) : (
          <div style={{width:20}}/>
        )}
      </div>
    </div>
  );
};

/* ════════════════════════════════════

const NAV_DRAWER_PINS_KEY = 'hb_nav_pins';

const NavDrawer = ({view, setView, onClose}) => {
  const {useState, useEffect, useCallback, useRef} = React;
  const [pins, setPins] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem(NAV_DRAWER_PINS_KEY)||'[]'); }
    catch{ return []; }
  });
  const drawerRef = useRef(null);
  const startXRef = useRef(null);

  const savePins = useCallback(next => {
    setPins(next);
    try{ localStorage.setItem(NAV_DRAWER_PINS_KEY, JSON.stringify(next)); }catch{}
  },[]);

  const togglePin = useCallback((e, k) => {
    e.stopPropagation();
    savePins(pins.includes(k) ? pins.filter(p=>p!==k) : [...pins, k]);
  },[pins, savePins]);

  const navigate = useCallback(k => {
    setView(k);
    onClose();
  },[setView, onClose]);

  // Swipe-left-to-close
  useEffect(()=>{
    const el = drawerRef.current; if(!el) return;
    const onStart = e => { startXRef.current = e.touches?.[0]?.clientX ?? null; };
    const onEnd   = e => {
      if(startXRef.current === null) return;
      const dx = (e.changedTouches?.[0]?.clientX ?? 0) - startXRef.current;
      if(dx > 48) onClose();
      startXRef.current = null;
    };
    el.addEventListener('touchstart', onStart, {passive:true});
    el.addEventListener('touchend',   onEnd,   {passive:true});
    return ()=>{ el.removeEventListener('touchstart',onStart); el.removeEventListener('touchend',onEnd); };
  },[onClose]);

  const pinnedViews  = NAV_VIEWS.filter(v => pins.includes(v.k));
  const allViews     = NAV_VIEWS;

  const renderItem = (v) => (
    <button
      key={v.k}
      className={`nav-item${view===v.k?' active':''}`}
      onClick={()=>navigate(v.k)}
    >
      <span className="nav-item-icon">{v.icon}</span>
      <span className="nav-item-label">{v.label}</span>
      <button
        className={`nav-item-pin${pins.includes(v.k)?' pinned':''}`}
        onClick={e=>togglePin(e, v.k)}
        title={pins.includes(v.k)?'Unpin from Quick Access':'Pin to Quick Access'}
      >
        {pins.includes(v.k) ? '★' : '☆'}
      </button>
    </button>
  );

  return (
    <>
      {/* Backdrop */}
      <div className="nav-drawer-backdrop open" onClick={onClose}/>
      {/* Drawer panel */}
      <div className="nav-drawer open" ref={drawerRef}>
        <div className="nav-drawer-head">
          <button className="nav-drawer-close" onClick={onClose}>✕</button>
          <div className="nav-drawer-logo">HEMI<em>BROS</em></div>
        </div>
        <div className="nav-drawer-scroll">
          {/* Pinned favourites */}
          {pinnedViews.length > 0 && (
            <>
              <div className="nav-drawer-section-label">⚡ Quick Access</div>
              {pinnedViews.map(v=>renderItem(v))}
              <div style={{height:1,background:'var(--line)',margin:'8px 6px'}}/>
            </>
          )}
          {/* All sections */}
          <div className="nav-drawer-section-label">All Sections</div>
          {allViews.map(v=>renderItem(v))}
        </div>
      </div>
    </>
  );
};

        <FilterContent filters={filters} setFilters={setFilters} traitOpts={traitOpts} traitMap={traitMap} facetedCounts={facetedCounts} famCounts={famCounts} openCat={openCat} setOpenCat={setOpenCat}/>

      </div>
      <div style={{padding:'10px 14px',borderTop:'1px solid var(--line)',flexShrink:0,textAlign:'center'}}>
        <span style={{fontFamily:'Space Mono,monospace',fontSize:'1rem',color:'var(--teal)'}}>{filtered.length}</span>
        <span style={{fontSize:11,color:'var(--txt3)',marginLeft:5}}>result{filtered.length!==1?'s':''}</span>
      </div>
    </aside>
  );
};

// ── Sale Verdict Helper ─────────────────────────────────────────────
// price vs expected band. nftRangeLo = NFT's rarity multiple low end.
// ✓  teal   — within band
// ↑  green  — above band
// ~  slate  — at floor: below bandLo but within 15% (near floor, not a miss)
// 🏷️ amber  — floor setter: well below bandLo AND floor-tier NFT (rangeLo ≤ 1.1)
// ↓  red    — below model: well below bandLo AND premium NFT (rangeLo > 1.1)
const getSaleVerdict = (price, bandLo, bandHi, nftRangeLo=1) => {
  if(price >= bandLo && price <= bandHi)
    return {icon:'✓',  col:'var(--teal)',  colHex:'#2dd4bf', label:'Within band',  isFloorSetter:false, isAtFloor:false, isBelowModel:false};
  if(price > bandHi)
    return {icon:'↑',  col:'var(--green)', colHex:'#4ade80', label:'Above band',   isFloorSetter:false, isAtFloor:false, isBelowModel:false};
  if(price >= bandLo * 0.85)
    return {icon:'~',  col:'#94a3b8',      colHex:'#94a3b8', label:'At floor',     isFloorSetter:false, isAtFloor:true,  isBelowModel:false};
  if(nftRangeLo <= 1.1)
    return {icon:'🏷️', col:'#f59e0b',      colHex:'#f59e0b', label:'Floor setter', isFloorSetter:true,  isAtFloor:false, isBelowModel:false};
  return   {icon:'↓',  col:'var(--red)',   colHex:'#f87171', label:'Below model',  isFloorSetter:false, isAtFloor:false, isBelowModel:true};
};

// Compute the floor multiple a sale traded at, rounded to nearest 0.5x.
// The floor is the p10 (floorLo) — the actual price floor-tier NFTs sold at.
// A common NFT selling at floorLo = 1x. Selling at 2×floorLo = 2x.
// Returns {multiple: number (0.5, 1, 1.5, 2, ...), label: '1x', '1.5x', etc.}
const priceToFloorMultiple = (price, floorLo, floorHi) => {
  const floor = floorLo > 0 ? floorLo : (floorHi > 0 ? floorHi : 0);
  if(!floor || floor <= 0 || !price || price <= 0)
    return {multiple:0, label:'—', color:'#555'};
  const raw = price / floor;
  const rounded = Math.round(raw * 2) / 2; // round to nearest 0.5
  const clamped = Math.max(0.5, rounded);
  const label = Number.isInteger(clamped) ? clamped+'x' : clamped.toFixed(1)+'x';
  // Color coding: 1x = neutral, >1x = progressively green/teal, <1x = dimmed
  const color = clamped >= 10 ? '#f87171'   // red — grail tier
    : clamped >= 5  ? '#c084fc'   // purple — legendary
    : clamped >= 3  ? '#fb923c'   // orange — epic
    : clamped >= 2  ? '#34d399'   // green — premium
    : clamped >= 1.5? '#60a5fa'   // blue — above floor
    : clamped >= 1  ? '#9ca3af'   // gray — at floor
    : '#f87171';                  // red — below floor
  return {multiple:clamped, label, color};
};

// ── Sale Price Band Modal ──────────────────────────────────────────
const SaleBandModal = ({sale, onClose}) => {

         synthetic=false, floorLo: sFL=FLOOR_LO, floorHi: sFH=FLOOR_HI,
         nftRange: passedRange=null, hasModelOverride=false,
         histFloorLo=null, histFloorHi=null,
         globalLatestFloor: glf=null} = sale;
  // Use override-aware range passed from Modal; fall back to computing from live diScore
  const nftR = passedRange || (
    (nft.originalDiScore && Math.abs(nft.diScore-(nft.originalDiScore||nft.diScore))>0.05)
      ? diScoreToRange(nft.diScore)

  // Pane stats

  const pct  = (!synthetic && expectedMid>0)    ? (price - expectedMid)/expectedMid*100 : null;
  const hMiss = (hfMid!=null && !synthetic) ? price - hfMid : null;
  const hPct  = (hfMid!=null && hfMid>0 && !synthetic) ? (price - hfMid)/hfMid*100 : null;
  const cMiss = (cfMid!=null && !synthetic) ? price - cfMid : null;
  const cPct  = (cfMid!=null && cfMid>0 && !synthetic) ? (price - cfMid)/cfMid*100 : null;

    ? expectedHi * 1.5

  const trackW  = W - PAD * 2;
  const toX     = v => PAD + (v / ceiling) * trackW;

  const loX  = toX(expectedLo);
  const hiX  = toX(expectedHi);
  const midX = toX(expectedMid);
  const prX  = toX(price);
  const bandW = hiX - loX;

  const brkY   = BRK_ZONE - 30;
  const tickH  = 10;
  const lblY   = brkY - 6;
  const tooClose = Math.abs(prX - midX) < 50;

  // Historical pane SVG layout (this sale's trailing p10–p90 floor × nftRange)
  const hCeiling = (hfHi != null && !synthetic)
    ? Math.max(hfHi * 1.3, price * 1.25, hfHi + 0.005)
    : ceiling;
  const toHX    = v => PAD + (v / hCeiling) * trackW;
  const hLoX    = hfLo != null ? toHX(hfLo)  : loX;
  const hHiX    = hfHi != null ? toHX(hfHi)  : hiX;
  const hMidX   = hfMid!= null ? toHX(hfMid) : midX;

  const cHiX    = cfHi != null ? toCX(cfHi)  : hiX;
  const cMidX   = cfMid!= null ? toCX(cfMid) : midX;

            {hasModelOverride&&(

              <div style={{background:'#0f1120',borderRadius:10,overflow:'hidden',border:'1px solid #1e2038'}}>

                    const isCur = Math.abs(s.p - price) < 0.000001 && s.date === date;
                    const sHFLo = s.histFloorLo != null ? s.histFloorLo : FLOOR_LO;
                    const sHFHi = s.histFloorHi != null ? s.histFloorHi : FLOOR_HI;
                    const fm = priceToFloorMultiple(s.p, sHFLo, sHFHi);
                    return (
                      <div key={i} style={{

                        background:isCur?'rgba(45,212,191,.07)':'transparent',

                            color:'var(--teal)',letterSpacing:'.06em'}}>← THIS</span>}

                          color:isCur?'var(--teal)':'var(--txt)',textAlign:'right'}}>

                            color:fm.color,lineHeight:1.2}}>{fm.label}</div>
                          <div style={{fontSize:7,fontFamily:'Space Mono,monospace',
                            color:'#4d5580',lineHeight:1.3,whiteSpace:'nowrap'}}>
                            flr {sHFLo.toFixed(3)}–{sHFHi.toFixed(3)}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div style={{fontSize:9,color:'#3a3f60',marginTop:6,textAlign:'right'}}>
                Floor × = sale price ÷ floor (p10) at time of sale · floor was thin with wide sweeps
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
};

const InstallBanner = () => {
  const [show, setShow] = React.useState(false);
  const [installed, setInstalled] = React.useState(false);
  const promptRef = React.useRef(null);

  React.useEffect(() => {
    // Already standalone (installed)?
    if (window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true) {
      setInstalled(true);
      return;
    }
    const onReady = () => {
      promptRef.current = window._pwaInstallPrompt;
      setShow(true);
    };
    const onInstalled = () => { setShow(false); setInstalled(true); };
    window.addEventListener('pwaInstallReady', onReady);
    window.addEventListener('pwaInstalled', onInstalled);
    // In case event already fired before component mounted
    if (window._pwaInstallPrompt) onReady();
    return () => {
      window.removeEventListener('pwaInstallReady', onReady);
      window.removeEventListener('pwaInstalled', onInstalled);
    };
  }, []);

  if (!show || installed) return null;

  const handleInstall = () => {
    if (!promptRef.current) return;
    promptRef.current.prompt();
    promptRef.current.userChoice.then(choice => {
      if (choice.outcome === 'accepted') setShow(false);
      promptRef.current = null;
      window._pwaInstallPrompt = null;
    });
  };

  return (
    <div style={{
      position:'fixed', bottom:72, left:'50%', transform:'translateX(-50%)',
      zIndex:9999, background:'#1a1d2e', border:'1.5px solid #00d4b8',
      borderRadius:14, padding:'10px 14px', display:'flex', alignItems:'center',
      gap:10, boxShadow:'0 8px 32px rgba(0,0,0,.6)', maxWidth:320, width:'calc(100% - 32px)'}}>
      <span style={{fontSize:26, flexShrink:0}}>📲</span>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:12, fontWeight:800, color:'#e8eaf8'}}>Install Hemi Bros</div>
        <div style={{fontSize:10, color:'#8890b8', marginTop:1}}>Add to your home screen for quick access</div>
      </div>
      <button onClick={handleInstall} style={{
        background:'#00d4b8', border:'none', borderRadius:8, padding:'6px 12px',
        fontSize:11, fontWeight:800, color:'#0b0c14', cursor:'pointer', flexShrink:0}}>
        Install
      </button>
      <button onClick={() => setShow(false)} style={{
        background:'none', border:'none', color:'#4d5580', fontSize:16,
        cursor:'pointer', padding:0, flexShrink:0, lineHeight:1}}>✕</button>
    </div>
  );
};
