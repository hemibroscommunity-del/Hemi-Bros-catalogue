const COPTER_TABLE = 'copter_scores';

// ── Anti-cheat: game session integrity ──────────────────────────────
const _AC_SALT = 'h3m1br0s_c0pt3r_2025_xK9';
const _acSessionId = () => {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => b.toString(16).padStart(2,'0')).join('');
};
const _acSign = async (payload, sessionKey) => {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', enc.encode(sessionKey), {name:'HMAC', hash:'SHA-256'}, false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(payload));
  return Array.from(new Uint8Array(sig), b => b.toString(16).padStart(2,'0')).join('');
};
const _acBuildPayload = (sessionId, score, meta) => {
  return [sessionId, score.toFixed(3), meta.frames, meta.pipesSpawned,
    meta.bricksHit, meta.stonesDestroyed, meta.wallsShattered,
    meta.livesLost, meta.missilesFired].join('|');
};
const _acPlausible = (score, meta) => {
  const ef = score * 60;
  if(meta.frames < ef * 0.8 || meta.frames > ef * 1.3) return false;
  const minPipes = Math.floor(score * 60 / 90 * 0.4);
  if(meta.pipesSpawned < minPipes && score > 3) return false;
  if(score < 0 || score > 600) return false;
  return true;
};

// ── Sound effect URLs (jsDelivr CDN from GitHub) ──────────────────────────
const SFX_SHOOT   = 'https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main/237443__noisecollector__bulletimpact_wmrind.wav';
const SFX_BRICK   = 'https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main/655621__hankof__brick-falling-on-floor.wav';
const SFX_DESTROY = 'https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main/446119__justinvoke__crack-2.wav';
const SFX_GLASS   = 'https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main/204140__craxic__glass06.flac';
const SFX_HELI    = 'https://cdn.jsdelivr.net/gh/hemibroscommunity-del/Hemi-Bros-catalogue@main/609460__unikumpu__helicopter-loop.wav';

const CopterGame = ({nfts}) => {
  const {useState,useEffect,useRef,useCallback,useMemo} = React;

  // ── State ──────────────────────────────────────────────────────────────
  const [broId,      setBroId]      = useState('');
  const [gameState,  setGameState]  = useState('setup');
  const [score,      setScore]      = useState(0);
  const [lives,      setLives]      = useState(3);
  const [missileReady, setMissileReady] = useState(true);
  const [missileCooldown, setMissileCooldown] = useState(0); // 0-5s
  const [gunUpgraded,   setGunUpgraded]    = useState(false);
  const [bestLocal,  setBestLocal]  = useState(()=>{ try{return parseFloat(localStorage.getItem('hb_copter_best')||'0');}catch{return 0;}});
  const [scores,     setScores]     = useState([]);
  const [loadingLb,  setLoadingLb]  = useState(false);
  const [submitName, setSubmitName] = useState('');
  const [submitWallet, setSubmitWallet] = useState('');
  const [submitted,  setSubmitted]  = useState(false);
  const [submitErr,  setSubmitErr]  = useState('');
  const acPayloadRef = useRef(null);
  const [exploding,  setExploding]  = useState(false);

  const canvasRef   = useRef(null);
  const stateRef    = useRef(null);
  const rafRef      = useRef(null);
  const deadRef     = useRef(false);
  // Joystick: -1.0 (full up = fly down) to +1.0 (full down = fly up)
  // Direct finger tracking: target Y the copter moves toward
  const fingerYRef      = useRef(null); // null = no finger down
  const missileReadyRef = useRef(true);
  const gunUpgradedRef  = useRef(false); // true after gun pickup
  const livesRef        = useRef(3);
  // Invincibility frames after a hit
  const invincRef       = useRef(0);
  const sfxCtxRef       = useRef(null);  // shared AudioContext for SFX
  const sfxRef          = useRef({});    // {shoot, brick, destroy, glass, heli} AudioBuffers
  const heliLoopRef     = useRef(null);  // currently playing heli loop {src, gain}

  // ── Audio helpers ─────────────────────────────────────────────────────
  const getSfxCtx = useCallback(()=>{
    if(!sfxCtxRef.current){
      try{ sfxCtxRef.current = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
    }
    return sfxCtxRef.current;
  },[]);

  const playSfx = useCallback((key, volume=1)=>{
    const ctx = getSfxCtx(); if(!ctx) return;
    const buf = sfxRef.current[key]; if(!buf) return;
    try{
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      gain.gain.value = volume;
      src.buffer = buf;
      src.connect(gain); gain.connect(ctx.destination);
      src.start(0);
    } catch(e){}
  },[getSfxCtx]);

  const startHeliLoop = useCallback(()=>{
    const ctx = getSfxCtx(); if(!ctx) return;
    const buf = sfxRef.current['heli']; if(!buf) return;
    if(heliLoopRef.current) return; // already running
    try{
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      gain.gain.value = 0.45;
      src.buffer = buf;
      src.loop = true;
      src.connect(gain); gain.connect(ctx.destination);
      src.start(0);
      heliLoopRef.current = {src, gain};
    } catch(e){}
  },[getSfxCtx]);

  const stopHeliLoop = useCallback(()=>{
    if(!heliLoopRef.current) return;
    try{
      const ctx = sfxCtxRef.current;
      if(ctx) heliLoopRef.current.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.15);
      const src = heliLoopRef.current.src;
      setTimeout(()=>{ try{ src.stop(); }catch(e){} }, 300);
    } catch(e){}
    heliLoopRef.current = null;
  },[]);

  // Preload SFX once AudioContext is available (on first user gesture)
  const preloadSfx = useCallback(async()=>{
    const ctx = getSfxCtx(); if(!ctx) return;
    const load = async (key, url) => {
      if(sfxRef.current[key]) return; // already loaded
      try{
        const res = await fetch(url);
        const arr = await res.arrayBuffer();
        sfxRef.current[key] = await ctx.decodeAudioData(arr);
      } catch(e){ console.warn('SFX load failed:', key, e); }
    };
    await Promise.all([
      load('shoot',   SFX_SHOOT),
      load('brick',   SFX_BRICK),
      load('destroy', SFX_DESTROY),
      load('glass',   SFX_GLASS),
      load('heli',    SFX_HELI),
    ]);
    startHeliLoop(); // start loop once heli buffer is ready
  },[getSfxCtx, startHeliLoop]);

  const broNft = useMemo(()=> nfts.find(n=>String(n.ID)===String(broId)), [broId,nfts]);
  const {url:broUrl} = useImgSrc(broNft?.Image||'', 120);

  // ── Leaderboard ───────────────────────────────────────────────────────
  const loadLb = useCallback(async()=>{
    setLoadingLb(true);
    try { const rows = await supa.select(COPTER_TABLE,'select=name,score,bro_id,wallet&limit=20&order=score.desc'); setScores(rows||[]); }
    catch{ setScores([]); }
    setLoadingLb(false);
  },[]);
  useEffect(()=>{ loadLb(); },[loadLb]);

  const submitScore = useCallback(async()=>{
    if(!submitName.trim()) return;
    const wallet = submitWallet.trim();
    const isValidWallet = /^0x[0-9a-fA-F]{40}$/.test(wallet);
    // ── Anti-cheat validation ──
    const ac = acPayloadRef.current;
    if(!ac || Math.abs(ac.score - score) > 0.01) {
      setSubmitErr('Score integrity check failed. Play again.'); return;
    }
    if(!_acPlausible(ac.score, ac.meta)) {
      setSubmitErr('Score failed plausibility check. Play again.'); return;
    }
    try {
      await supa.insert(COPTER_TABLE,{
        name:submitName.trim(),
        score:parseFloat(score.toFixed(3)),
        bro_id:broId||null,
        wallet: isValidWallet ? wallet.toLowerCase() : null,
        ac_session: ac.sessionId,
        ac_signature: ac.signature,
        ac_frames: ac.meta.frames,
        ac_pipes: ac.meta.pipesSpawned,
        ac_missiles: ac.meta.missilesFired,
        ac_lives_lost: ac.meta.livesLost,
      });
      acPayloadRef.current = null; // prevent replay
      setSubmitted(true); loadLb();
    } catch{ setSubmitErr('Could not save. Try again.'); }
  },[submitName,submitWallet,score,broId,loadLb]);

  // ── Constants ─────────────────────────────────────────────────────────
  const W=480, H=320;
  const PIPE_W=38;
  const SPEED_BASE=3.8, SPEED_MAX=11.0;
  const GAP_START=160, GAP_MIN=68;
  const PIPE_INT=90;
  const MISSILE_SPEED=14;
  const MISSILE_RELOAD=5000;

  // ── Start ─────────────────────────────────────────────────────────────
  const startGame = useCallback(()=>{
    preloadSfx(); // kick off audio preload on first user gesture — also starts heli loop
    stopHeliLoop(); // stop any stale loop before restarting
    deadRef.current=false;
    fingerYRef.current=null;
    missileReadyRef.current=true;
    gunUpgradedRef.current=false;
    livesRef.current=3;
    invincRef.current=0;
    setLives(3);
    setMissileReady(true);
    setMissileCooldown(0);
    setGunUpgraded(false);
    setExploding(false);
    setGameState('playing');
    setScore(0);
    setSubmitted(false); setSubmitErr(''); setSubmitName('');
    stateRef.current = {
      y:H/2, vy:0,
      pipes:[], missiles:[],
      pipeCount:0,
      brickCount:0,
      gunPickup:null,
      walls:[],
      wallSpawned:false,
      stones:[],        // {x, y, hp:1, hitTimer:0} — 1-shot boulders
      stoneSpawned:0,   // tracks last spawnTick to avoid double-spawn
      stoneParticles:[], // crumble chunks [{x,y,vx,vy,r,angle,spin,life,maxLife,col}]
      frame:0,
      startTime:performance.now(),
      elapsed:0,
      // ── Anti-cheat telemetry ──
      _acSessionId: _acSessionId(),
      _acPipesSpawned: 0,
      _acBricksHit: 0,
      _acStonesDestroyed: 0,
      _acWallsShattered: 0,
      _acLivesLost: 0,
      _acMissilesFired: 0,
    };
    Object.defineProperty(stateRef.current, '_acSessionId', {writable:false, configurable:false});
  },[preloadSfx, stopHeliLoop]);

  // ── Canvas pointer handlers — finger directly sets target Y ──────────
  const onCanvasDown = useCallback((e)=>{
    e.preventDefault();
    if(e.pointerId !== undefined) {
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch(_){}
    }
    const rect = e.currentTarget.getBoundingClientRect();
    fingerYRef.current = (e.clientY - rect.top) * (H / rect.height);
  },[]);

  const onCanvasMove = useCallback((e)=>{
    if(fingerYRef.current === null) return;
    e.preventDefault();
    const rect = e.currentTarget.getBoundingClientRect();
    fingerYRef.current = (e.clientY - rect.top) * (H / rect.height);
  },[]);

  const onCanvasUp = useCallback((e)=>{
    e.preventDefault();
    fingerYRef.current = null;
  },[]);

  // ── Missile fire ──────────────────────────────────────────────────────
  const fireMissile = useCallback(()=>{
    if(!missileReadyRef.current) return;
    if(gameState!=='playing') return;
    const gs = stateRef.current;
    if(!gs) return;
    gs.missiles.push({ x: W-80-30, y: gs.y, vx: -MISSILE_SPEED });
    gs._acMissilesFired=(gs._acMissilesFired||0)+1;
    playSfx('shoot', 0.7);
    if(gunUpgradedRef.current) return; // unlimited — no cooldown
    missileReadyRef.current=false;
    setMissileReady(false);
    setMissileCooldown(MISSILE_RELOAD/1000);
    let remaining=MISSILE_RELOAD/1000;
    const interval=setInterval(()=>{
      remaining=parseFloat((remaining-0.1).toFixed(1));
      setMissileCooldown(Math.max(0,remaining));
      if(remaining<=0){ clearInterval(interval); missileReadyRef.current=true; setMissileReady(true); }
    },100);
  },[gameState, playSfx]);

  // ── Keyboard support ──────────────────────────────────────────────────
  // X / Z = fire missile, Arrow keys or W/S = fly, Space = fire missile
  const keysRef = useRef({up:false, down:false});
  useEffect(()=>{
    const down=e=>{
      if(e.code==='KeyX'||e.code==='KeyZ'||e.code==='Space') { e.preventDefault(); fireMissile(); }
      if(e.code==='ArrowUp'  ||e.code==='KeyW') { e.preventDefault(); keysRef.current.up=true; }
      if(e.code==='ArrowDown'||e.code==='KeyS') { e.preventDefault(); keysRef.current.down=true; }
    };
    const up=e=>{
      if(e.code==='ArrowUp'  ||e.code==='KeyW') keysRef.current.up=false;
      if(e.code==='ArrowDown'||e.code==='KeyS') keysRef.current.down=false;
    };
    window.addEventListener('keydown',down);
    window.addEventListener('keyup',up);
    return ()=>{ window.removeEventListener('keydown',down); window.removeEventListener('keyup',up); };
  },[fireMissile]);

  // ── Game loop ─────────────────────────────────────────────────────────
  useEffect(()=>{
    if(gameState!=='playing') return;
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    let img=null;
    if(broUrl){ img=new Image(); img.crossOrigin='anonymous'; img.src=broUrl; }

    const tick=()=>{
      if(deadRef.current) return;
      const gs=stateRef.current;
      gs.frame++;
      gs.elapsed=(performance.now()-gs.startTime)/1000;

      // ── Physics — copter tracks finger Y directly ─────────────────
      // Keyboard flight: arrow keys / W/S drive a virtual target Y
      const keys = keysRef.current;
      if(keys.up || keys.down) {
        const KEYBOARD_SPEED = 8;
        if(keys.up)   fingerYRef.current = Math.max(0, (fingerYRef.current ?? gs.y) - KEYBOARD_SPEED);
        if(keys.down)  fingerYRef.current = Math.min(H, (fingerYRef.current ?? gs.y) + KEYBOARD_SPEED);
      } else if(fingerYRef.current !== null && !keys.up && !keys.down) {
        // If keys were the only input and are now released, clear target so copter holds
        // Only clear if no mouse/touch is active (fingerY was set by keys)
      }
      const targetY = fingerYRef.current;
      if(targetY !== null) {
        const dy = targetY - gs.y;
        const dist = Math.abs(dy);
        // Speed scales with distance: far away = fast, close = gentle
        const lerpFactor = Math.min(dist / 20, 1) * 0.45;
        gs.vy = dy * lerpFactor;
        gs.vy = Math.max(-13, Math.min(13, gs.vy));
      } else {
        // No finger — hold position, decel quickly
        gs.vy *= 0.55;
        if(Math.abs(gs.vy) < 0.1) gs.vy = 0;
      }
      gs.y += gs.vy;

      // ── Difficulty ────────────────────────────────────────────────
      const prog=Math.min(gs.elapsed/15,1);
      const speed=SPEED_BASE+(SPEED_MAX-SPEED_BASE)*(prog*prog);
      const gapP=Math.min(gs.elapsed/8,1);
      const gap=Math.round(GAP_START-(GAP_START-GAP_MIN)*(gapP*gapP));

      // ── Spawn pipes ───────────────────────────────────────────────
      const STONE_R=32; // collision radius — defined here so pipe spawn can use it
      const WALL_W=28;  // also needed here for wall-proximity check
      const pipeInterval=Math.max(42,PIPE_INT-Math.floor(gs.elapsed*3.5));
      if(gs.frame%pipeInterval===0){
        const margin=50;
        const topH=margin+Math.floor(Math.random()*(H-gap-margin*2));
        gs.pipeCount++;
        gs._acPipesSpawned=(gs._acPipesSpawned||0)+1;
        const isBrick=(gs.pipeCount%5===0);
        if(isBrick){ gs.brickCount++; gs._acBricksHit=(gs._acBricksHit||0)+1; }
        gs.pipes.push({x:-PIPE_W, topH, gap, speed, brick:isBrick, hit:false, hitTimer:0});
        // ── Stone: spawn centered in this pipe's gap every 3rd pipe after 60s ──
        if(gs.elapsed>=60 && gs.pipeCount%3===0){
          // Block if any wall is active anywhere
          const anyWall = gs.walls.some(w => !w.shattering);
          // ALSO block if a wall is about to spawn THIS same tick (wall spawn runs after this block)
          // Mirror the wall spawn condition exactly: elapsed>=40, brickCount>=2, even, not yet spawned
          const wallAboutToSpawn = gs.elapsed>=40
            && gs.brickCount>=2
            && gs.brickCount%2===0
            && gs.wallSpawned!==gs.brickCount;
          if(!anyWall && !wallAboutToSpawn){
            const gapCenterY = topH + gap/2;
            gs.stones.push({x:-PIPE_W-STONE_R, y:gapCenterY, hp:1, hitTimer:0});
          }
        }
      }

      // ── Gun pickup: spawns once at 30s ───────────────────────────
      if(gs.elapsed>=30 && !gs.gunPickup && !gunUpgradedRef.current){
        const gy0=60+Math.random()*(H-120);
        gs.gunPickup={x:-40, baseY:gy0, y:gy0, collected:false};
      }
      if(gs.gunPickup && !gs.gunPickup.collected){
        gs.gunPickup={...gs.gunPickup,
          x: gs.gunPickup.x + speed*0.65,
          y: gs.gunPickup.baseY + Math.sin(gs.frame*0.08)*20
        };
        const dx2=Math.abs((W-80)-gs.gunPickup.x);
        const dy2=Math.abs(gs.y-gs.gunPickup.y);
        if(dx2<24 && dy2<24){
          gs.gunPickup={...gs.gunPickup,collected:true};
          gunUpgradedRef.current=true;
          missileReadyRef.current=true;
          setGunUpgraded(true); setMissileReady(true); setMissileCooldown(0);
        }
        if(gs.gunPickup.x>W+50) gs.gunPickup={...gs.gunPickup,collected:true};
      }

      // ── Black wall: unlocks at 40s, then spawns after every other brick pipe ──
      // wallSpawned tracks the last brickCount we spawned a wall at
      if(gs.elapsed >= 40) {
        // Every even brickCount (2, 4, 6…) triggers a wall, but only once per brick
        const wallDue = gs.brickCount >= 2 && gs.brickCount % 2 === 0;
        const alreadySpawnedForThis = gs.wallSpawned === gs.brickCount;
        const stoneActive = gs.stones.length > 0; // never overlap wall with boulder
        if(wallDue && !alreadySpawnedForThis && !stoneActive) {
          gs.wallSpawned = gs.brickCount;
          gs.walls.push({x:-WALL_W, hitTimer:0, shatterTimer:0, shattering:false});
        }
      }
      gs.walls=gs.walls
        .map(w=>({...w,
          x: w.shattering ? w.x : w.x+speed,
          hitTimer:Math.max(0,w.hitTimer-1),
          shatterTimer:Math.max(0,w.shatterTimer-1)
        }))
        .filter(w=>!w.shattering || w.shatterTimer>0)
        .filter(w=>w.x<W+WALL_W+10);

      // ── Stones: move and cull ─────────────────────────────────────
      gs.stones=gs.stones
        .map(s=>({...s, x:s.x+speed, hitTimer:Math.max(0,s.hitTimer-1)}))
        .filter(s=>s.x<W+STONE_R*2+10);

      // ── Move missiles ─────────────────────────────────────────────
      gs.missiles=gs.missiles.map(m=>({...m, x:m.x+m.vx}))
                              .filter(m=>m.x>-20);

      // ── Missile-pipe collisions ────────────────────────────────────
      gs.missiles=gs.missiles.filter(missile=>{
        let hit=false;
        gs.pipes=gs.pipes.map(p=>{
          if(hit) return p;
          const inX=missile.x>p.x && missile.x<p.x+PIPE_W;
          const inTop=missile.y<p.topH;
          const inBot=missile.y>p.topH+p.gap;
          if(inX&&(inTop||inBot)){
            hit=true;
            if(p.brick){ playSfx('brick',0.8); return {...p, hit:true, hitTimer:8}; } // brick: flash but survive
            playSfx('destroy',0.9);
            return null; // silver pipe destroyed
          }
          return p;
        }).filter(Boolean);
        return !hit;
      });

      // ── Missile-wall collisions — missiles bounce back ────────────
      gs.missiles=gs.missiles.map(missile=>{
        for(let i=0;i<gs.walls.length;i++){
          const w=gs.walls[i];
          if(w.shattering) continue;
          if(missile.x+4>w.x && missile.x-4<w.x+WALL_W){
            gs.walls[i]={...w, hitTimer:10};
            return {...missile, vx:-missile.vx, x:missile.vx<0?w.x+WALL_W+5:w.x-5};
          }
        }
        return missile;
      }).filter(m=>m.x>-20 && m.x<W+20);

      // ── Missile-stone collisions — 1 hit to destroy ──────────────
      gs.missiles=gs.missiles.filter(missile=>{
        for(let i=0;i<gs.stones.length;i++){
          const s=gs.stones[i];
          const dx=missile.x-s.x; const dy=missile.y-s.y;
          if(Math.sqrt(dx*dx+dy*dy)<STONE_R+8){
            gs.stones.splice(i,1);
            gs._acStonesDestroyed=(gs._acStonesDestroyed||0)+1;
            playSfx('destroy',1.0);
            // Spawn crumble particles
            const cols=['#9c8c6a','#7a6e52','#b0a07a','#5c5040','#cbbf90','#4a4030'];
            for(let p=0;p<18;p++){
              const angle=Math.random()*Math.PI*2;
              const spd=2+Math.random()*5;
              gs.stoneParticles.push({
                x:s.x+Math.random()*16-8, y:s.y+Math.random()*16-8,
                vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd-1.5,
                r:4+Math.random()*9,
                angle:Math.random()*Math.PI*2,
                spin:(Math.random()-0.5)*0.25,
                life:28+Math.floor(Math.random()*18),
                maxLife:28+18,
                col:cols[Math.floor(Math.random()*cols.length)]
              });
            }
            return false; // consume missile
          }
        }
        return true;
      });

      // ── Tick & cull stone particles ───────────────────────────────
      gs.stoneParticles=gs.stoneParticles
        .map(p=>({...p,
          x:p.x+p.vx, y:p.y+p.vy,
          vy:p.vy+0.28,        // gravity
          vx:p.vx*0.96,        // drag
          angle:p.angle+p.spin,
          life:p.life-1
        }))
        .filter(p=>p.life>0);

      // ── Tick hit timers ───────────────────────────────────────────
      gs.pipes=gs.pipes.map(p=>p.hitTimer>0?{...p,hitTimer:p.hitTimer-1}:p);

      // ── Move & cull pipes ─────────────────────────────────────────
      gs.pipes=gs.pipes.map(p=>({...p,x:p.x+speed})).filter(p=>p.x<W+PIPE_W+10);

      // ── Invincibility countdown ───────────────────────────────────
      if(invincRef.current>0) invincRef.current--;

      // ── Collision detection ───────────────────────────────────────
      // Helicopter visual is roughly 50px wide, 22px tall centred at BRO_X, gs.y
      // Use a tight elliptical hitbox — much more forgiving than the old circle
      const BRO_X=W-80;
      const HIT_W=18; // half-width of hitbox (body only, not rotors)
      const HIT_H=9;  // half-height of hitbox
      const fellOff=gs.y-HIT_H>H;  // fully below screen = instant death
      const hitTop=gs.y-HIT_H<0;

      // Pipe collision: use actual pipe visual bounds.
      // The cap is 4px wider each side, but we'll use the shaft only (p.x to p.x+PIPE_W)
      // so small nudges along the edge don't get falsely flagged.
      let hitPipe=null, hitWall=null;
      if(invincRef.current===0){
        for(const p of gs.pipes){
          const pLeft  = p.x + 2;
          const pRight = p.x + PIPE_W - 2;
          const inX = BRO_X + HIT_W > pLeft && BRO_X - HIT_W < pRight;
          if(!inX) continue;
          const inGap = gs.y - HIT_H > p.topH && gs.y + HIT_H < p.topH + p.gap;
          if(!inGap){ hitPipe=p; break; }
        }
        for(const w of gs.walls){
          if(w.shattering) continue;
          if(BRO_X+HIT_W > w.x && BRO_X-HIT_W < w.x+WALL_W){ hitWall=w; break; }
        }
        // Bounced missile hits copter
        for(let mi=0;mi<gs.missiles.length;mi++){
          const m=gs.missiles[mi];
          if(m.vx<=0) continue; // only bounced (rightward) missiles are dangerous
          const mdx=Math.abs(m.x-BRO_X); const mdy=Math.abs(m.y-gs.y);
          if(mdx<20 && mdy<10){
            gs.missiles.splice(mi,1); mi--;
            const newLives=livesRef.current-1; gs._acLivesLost=(gs._acLivesLost||0)+1;
            livesRef.current=newLives; setLives(newLives);
            if(newLives<=0){ triggerDeath(gs,ctx,img,gap,speed); return; }
            invincRef.current=90;
          }
        }
        // Stone hits copter — costs a life
        for(const s of gs.stones){
          const sdx=Math.abs(BRO_X-s.x); const sdy=Math.abs(gs.y-s.y);
          if(Math.sqrt(sdx*sdx+sdy*sdy)<STONE_R+HIT_W*0.6){
            const newLives=livesRef.current-1; gs._acLivesLost=(gs._acLivesLost||0)+1;
            livesRef.current=newLives; setLives(newLives);
            if(newLives<=0){ triggerDeath(gs,ctx,img,gap,speed); return; }
            gs.vy = gs.y < s.y ? -4 : 4;
            invincRef.current=90;
            break;
          }
        }
      }

      if(fellOff){
        // Instant death — lose all lives
        livesRef.current=0;
        setLives(0);
        triggerDeath(gs, ctx, img, gap, speed);
        return;
      }

      if(hitTop||hitPipe||hitWall){
        if(hitWall){
          // Flying through the frosted wall shatters it — no life lost
          playSfx('glass', 0.85); gs._acWallsShattered=(gs._acWallsShattered||0)+1;
          gs.walls=gs.walls.map(w=>
            (w===hitWall) ? {...w, shattering:true, shatterTimer:18} : w
          );
        } else {
          const newLives=livesRef.current-1; gs._acLivesLost=(gs._acLivesLost||0)+1;
          livesRef.current=newLives;
          setLives(newLives);
          if(newLives<=0){
            triggerDeath(gs, ctx, img, gap, speed);
            return;
          }
          // Lost a life — bounce back, invincibility
          gs.vy = gs.y < H/2 ? 3 : -3;
          if(hitPipe) gs.y = hitPipe.topH > gs.y ? hitPipe.topH - HIT_H - 2 : hitPipe.topH + hitPipe.gap + HIT_H + 2;
          else gs.y = HIT_H + 2;
          invincRef.current=90;
        }
      }

      setScore(parseFloat(gs.elapsed.toFixed(3)));
      drawFrame(ctx,gs,img,gap,speed,false);
      rafRef.current=requestAnimationFrame(tick);
    };

    const triggerDeath=(gs,ctx,img,gap,speed)=>{
      deadRef.current=true;
      const finalScore=parseFloat(gs.elapsed.toFixed(3));
      setScore(finalScore);
      setBestLocal(prev=>{
        const next=Math.max(prev,finalScore);
        try{localStorage.setItem('hb_copter_best',String(next));}catch{}
        return next;
      });
      // ── Anti-cheat: sign the score ──
      const acMeta = {
        frames: gs.frame, pipesSpawned: gs._acPipesSpawned||0,
        bricksHit: gs._acBricksHit||0, stonesDestroyed: gs._acStonesDestroyed||0,
        wallsShattered: gs._acWallsShattered||0, livesLost: gs._acLivesLost||0,
        missilesFired: gs._acMissilesFired||0,
      };
      const acSid = gs._acSessionId||'';
      _acSign(_acBuildPayload(acSid, finalScore, acMeta), _AC_SALT+':'+acSid)
        .then(sig=>{ acPayloadRef.current={signature:sig,meta:acMeta,sessionId:acSid,score:finalScore}; })
        .catch(()=>{ acPayloadRef.current=null; });
      setExploding(true);
      drawFrame(ctx,gs,img,gap,speed,true);
      stopHeliLoop();
      setTimeout(()=>{ setExploding(false); setGameState('dead'); },900);
    };

    rafRef.current=requestAnimationFrame(tick);

    // ── Pause clock when tab/app goes hidden, resume on return ──────────
    const onVisChange = () => {
      const gs = stateRef.current;
      if(!gs) return;
      if(document.hidden){
        // Record when we paused
        gs._pausedAt = performance.now();
        if(rafRef.current){ cancelAnimationFrame(rafRef.current); rafRef.current=null; }
        stopHeliLoop();
      } else {
        // Shift startTime forward by the time we were hidden so elapsed is unchanged
        if(gs._pausedAt != null){
          gs.startTime += performance.now() - gs._pausedAt;
          gs._pausedAt = null;
        }
        if(!rafRef.current && !deadRef.current){
          rafRef.current = requestAnimationFrame(tick);
        }
        if(!deadRef.current) startHeliLoop();
      }
    };
    document.addEventListener('visibilitychange', onVisChange);

    return ()=>{
      if(rafRef.current) cancelAnimationFrame(rafRef.current);
      document.removeEventListener('visibilitychange', onVisChange);
      stopHeliLoop();
    };
  },[gameState,broUrl,playSfx,startHeliLoop,stopHeliLoop]);

  // ── Draw ──────────────────────────────────────────────────────────────
  const drawFrame=(ctx,gs,img,gap,speed,isDead)=>{
    const elapsed=gs.elapsed;
    const skyDark=Math.min(elapsed/20,0.7);
    // Night transition: starts at 80s, fully night by 95s
    const nightFrac=Math.max(0,Math.min(1,(elapsed-80)/15));

    // Day/dusk sky colours blended toward deep night
    const dayTop  =[Math.round(15+30*(1-skyDark)), Math.round(23+50*(1-skyDark)), Math.round(42+80*(1-skyDark))];
    const dayBot  =[Math.round(10+20*(1-skyDark)), Math.round(15+30*(1-skyDark)), Math.round(30+50*(1-skyDark))];
    const nightTop=[4, 6, 20];
    const nightBot=[8, 5, 18];
    const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
    const skyTop=[lerp(dayTop[0],nightTop[0],nightFrac), lerp(dayTop[1],nightTop[1],nightFrac), lerp(dayTop[2],nightTop[2],nightFrac)];
    const skyBot=[lerp(dayBot[0],nightBot[0],nightFrac), lerp(dayBot[1],nightBot[1],nightFrac), lerp(dayBot[2],nightBot[2],nightFrac)];

    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,`rgb(${skyTop[0]},${skyTop[1]},${skyTop[2]})`);
    sky.addColorStop(1,`rgb(${skyBot[0]},${skyBot[1]},${skyBot[2]})`);
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Stars — fade in as night arrives
    if(nightFrac>0){
      // Deterministic star field using seeded positions
      const starAlpha=nightFrac*0.85;
      const stars=[[34,18],[89,42],[145,11],[210,55],[280,22],[340,38],[410,14],[55,65],[120,30],[175,48],[235,8],[295,35],[368,52],[440,20],[22,50],[160,62],[320,8],[400,44],[72,25]];
      stars.forEach(([sx,sy])=>{
        const twinkle=0.6+0.4*Math.sin(elapsed*3.1+sx*0.7+sy*0.5);
        ctx.fillStyle=`rgba(255,255,240,${starAlpha*twinkle})`;
        const sr=sx%3===0?1.5:1;
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
      });
      // Moon — slides in from right edge after 85s
      const moonFrac=Math.max(0,Math.min(1,(elapsed-85)/10));
      if(moonFrac>0){
        const mx=W-45; const my=28;
        ctx.save();
        ctx.globalAlpha=moonFrac*0.92;
        // Moon glow
        const mg=ctx.createRadialGradient(mx,my,4,mx,my,22);
        mg.addColorStop(0,'rgba(255,252,200,0.35)');
        mg.addColorStop(1,'rgba(255,252,200,0)');
        ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2); ctx.fill();
        // Moon disc
        ctx.fillStyle='#fffae0';
        ctx.beginPath(); ctx.arc(mx,my,10,0,Math.PI*2); ctx.fill();
        // Crescent shadow
        ctx.fillStyle=`rgb(${skyTop[0]},${skyTop[1]},${skyTop[2]})`;
        ctx.beginPath(); ctx.arc(mx+4,my-2,9,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // Parallax buildings — city lights appear at night
    const buildingCol = nightFrac > 0
      ? `rgba(${lerp(20,8,nightFrac)},${lerp(30,10,nightFrac)},${lerp(60,25,nightFrac)},0.9)`
      : 'rgba(20,30,60,0.8)';
    ctx.fillStyle=buildingCol;
    const bOff=(gs.frame*speed*0.18)%W;
    const bHeights=[60,90,50,110,70,45,95,65];
    [0,W].forEach(ox=>{
      [0,60,120,180,240,300,360,420].forEach((bx,i)=>{
        const bh=bHeights[i];
        const rx=bx-bOff+ox;
        ctx.fillRect(rx,H-bh,38,bh);
        // Window lights — appear as night arrives
        if(nightFrac>0.1){
          const winAlpha=Math.min(1,(nightFrac-0.1)/0.4);
          for(let wy=H-bh+6;wy<H-8;wy+=12){
            for(let wx=rx+4;wx<rx+32;wx+=10){
              // Each window has a fixed on/off pattern based on position
              const on=(Math.sin(wx*0.7+wy*1.3+i*2.1)>0.1);
              if(on){
                const flicker=0.7+0.3*Math.sin(elapsed*5.5+wx*0.9+wy*0.6);
                ctx.fillStyle=`rgba(255,240,160,${winAlpha*flicker*0.75})`;
                ctx.fillRect(wx,wy,6,7);
              }
            }
          }
        }
      });
    });

    // ── Draw pipes ────────────────────────────────────────────────────
    gs.pipes.forEach(p=>{
      const flashing=p.hitTimer>0 && p.hitTimer%2===0;
      if(p.brick){
        // Brick pipe — brown/orange Mario style
        const drawBrick=(x,y,w,h,isTop)=>{
          if(h<=0) return;
          // Base
          const bg=ctx.createLinearGradient(x,y,x+w,y);
          bg.addColorStop(0,flashing?'#fbbf24':'#92400e');
          bg.addColorStop(0.4,flashing?'#fef08a':'#b45309');
          bg.addColorStop(1,flashing?'#f59e0b':'#78350f');
          ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(x,y,w,h,isTop?[6,6,0,0]:[0,0,6,6]); ctx.fill();
          // Brick pattern
          if(!flashing){
            ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.5;
            const brickH=12, brickW=16;
            for(let by=y+2;by<y+h-2;by+=brickH){
              const rowOff=((Math.floor((by-y)/brickH)%2)*brickW/2);
              ctx.beginPath(); ctx.moveTo(x,by); ctx.lineTo(x+w,by); ctx.stroke();
              for(let bx2=x+rowOff;bx2<x+w;bx2+=brickW){
                ctx.beginPath(); ctx.moveTo(bx2,by); ctx.lineTo(bx2,by+brickH); ctx.stroke();
              }
            }
          }
          // Cap
          ctx.fillStyle=flashing?'#fef9c3':'#d97706';
          if(isTop) { ctx.beginPath(); ctx.roundRect(x-4,y+h-14,w+8,14,[4,4,0,0]); ctx.fill(); }
          else       { ctx.beginPath(); ctx.roundRect(x-4,y,w+8,14,[0,0,4,4]); ctx.fill(); }
        };
        drawBrick(p.x, 0, PIPE_W, p.topH, true);
        drawBrick(p.x, p.topH+p.gap, PIPE_W, H-(p.topH+p.gap), false);
      } else {
        // Silver pipe — Mario NES style
        const drawSilver=(x,y,w,h,isTop)=>{
          if(h<=0) return;
          const sg=ctx.createLinearGradient(x,y,x+w,y);
          sg.addColorStop(0,'#64748b');
          sg.addColorStop(0.25,'#cbd5e1');
          sg.addColorStop(0.5,'#f1f5f9');
          sg.addColorStop(0.75,'#94a3b8');
          sg.addColorStop(1,'#475569');
          ctx.fillStyle=sg; ctx.beginPath(); ctx.roundRect(x,y,w,h,isTop?[0,0,6,6]:[6,6,0,0]); ctx.fill();
          // Highlight stripe
          ctx.fillStyle='rgba(255,255,255,0.18)';
          ctx.beginPath(); ctx.roundRect(x+4,y,5,h,[2]); ctx.fill();
          // Cap
          const cg=ctx.createLinearGradient(x-4,y,x+w+4,y);
          cg.addColorStop(0,'#475569'); cg.addColorStop(0.5,'#e2e8f0'); cg.addColorStop(1,'#475569');
          ctx.fillStyle=cg;
          if(isTop) { ctx.beginPath(); ctx.roundRect(x-4,y+h-14,w+8,14,[4,4,0,0]); ctx.fill(); }
          else       { ctx.beginPath(); ctx.roundRect(x-4,y,w+8,14,[0,0,4,4]); ctx.fill(); }
        };
        drawSilver(p.x, 0, PIPE_W, p.topH, true);
        drawSilver(p.x, p.topH+p.gap, PIPE_W, H-(p.topH+p.gap), false);
      }
    });

    // ── Draw missiles ─────────────────────────────────────────────────
    gs.missiles.forEach(m=>{
      ctx.save();
      ctx.translate(m.x, m.y);
      const bounced = m.vx > 0; // travelling right = bounced back from wall
      if(bounced) ctx.scale(-1,1); // flip so nose faces direction of travel
      // Body
      const mg=ctx.createLinearGradient(-18,0,6,0);
      mg.addColorStop(0,'#dc2626'); mg.addColorStop(0.5,'#f87171'); mg.addColorStop(1,'#7f1d1d');
      ctx.fillStyle=mg;
      ctx.beginPath(); ctx.ellipse(0,0,12,4,0,0,Math.PI*2); ctx.fill();
      // Nose — blue tint on bounced so player can tell it's coming back
      ctx.fillStyle= bounced ? '#93c5fd' : '#fbbf24';
      ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-18,-3); ctx.lineTo(-18,3); ctx.closePath(); ctx.fill();
      // Exhaust
      ctx.fillStyle= bounced ? 'rgba(147,197,253,0.5)' : 'rgba(251,191,36,0.6)';
      ctx.beginPath(); ctx.ellipse(10,0,6,3,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // ── Draw gun pickup ──────────────────────────────────────────────
    if(gs.gunPickup && !gs.gunPickup.collected){
      const gx=gs.gunPickup.x, gy=gs.gunPickup.y;
      // Glow
      const glow=ctx.createRadialGradient(gx,gy,0,gx,gy,28);
      glow.addColorStop(0,'rgba(251,191,36,0.45)');
      glow.addColorStop(1,'rgba(251,191,36,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(gx,gy,28,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.translate(gx,gy);
      // Gun body
      ctx.fillStyle='#fbbf24';
      ctx.beginPath(); ctx.roundRect(-13,-5,20,10,[3]); ctx.fill();
      // Barrel
      ctx.fillStyle='#92400e';
      ctx.beginPath(); ctx.roundRect(-17,-3,7,6,[2]); ctx.fill();
      // Handle
      ctx.fillStyle='#78350f';
      ctx.beginPath(); ctx.roundRect(-1,5,7,8,[2]); ctx.fill();
      // Shine
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.roundRect(-11,-3,9,3,[1]); ctx.fill();
      ctx.restore();
      // Label
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.beginPath(); ctx.roundRect(gx-20,gy-30,40,13,[4]); ctx.fill();
      ctx.fillStyle='#fde68a'; ctx.font='bold 8px "Space Mono",monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('UPGRADE',gx,gy-24); ctx.textAlign='left';
    }

    // ── Draw frosted glass walls ──────────────────────────────────────
    const WALL_W_DRAW=28;
    gs.walls.forEach(w=>{
      const fl=w.hitTimer>0;
      const shatFrac=w.shattering ? 1-(w.shatterTimer/18) : 0; // 0=solid, 1=gone
      const alpha=w.shattering ? Math.max(0,1-shatFrac*1.4) : 1;
      ctx.save();
      ctx.globalAlpha=alpha;
      // Frosted base — layered semi-transparent fills
      ctx.fillStyle=fl?'rgba(200,230,255,0.55)':'rgba(180,220,255,0.28)';
      ctx.fillRect(w.x,0,WALL_W_DRAW,H);
      // Inner frost shimmer
      const fg=ctx.createLinearGradient(w.x,0,w.x+WALL_W_DRAW,0);
      fg.addColorStop(0,'rgba(255,255,255,0.0)');
      fg.addColorStop(0.35,'rgba(255,255,255,0.22)');
      fg.addColorStop(0.6,'rgba(200,240,255,0.18)');
      fg.addColorStop(1,'rgba(255,255,255,0.04)');
      ctx.fillStyle=fg; ctx.fillRect(w.x,0,WALL_W_DRAW,H);
      // Frost texture — vertical streaks
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
      for(let lx=w.x+4;lx<w.x+WALL_W_DRAW-2;lx+=5){
        ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx+2,H); ctx.stroke();
      }
      // Horizontal frost lines
      ctx.strokeStyle='rgba(200,235,255,0.08)'; ctx.lineWidth=1;
      for(let ly=0;ly<H;ly+=20){
        ctx.beginPath(); ctx.moveTo(w.x,ly); ctx.lineTo(w.x+WALL_W_DRAW,ly); ctx.stroke();
      }
      // Shatter cracks spreading as shatFrac increases
      if(w.shattering){
        ctx.strokeStyle=`rgba(255,255,255,${0.7*(1-shatFrac)})`;
        ctx.lineWidth=1.5;
        const cx=w.x+WALL_W_DRAW/2;
        // Radiate crack lines from centre
        const crackLines=[[cx,H/2,cx-10,H*0.15],[cx,H/2,cx+8,H*0.08],[cx,H/2,cx-8,H*0.85],[cx,H/2,cx+10,H*0.9],[cx,H/2,w.x,H*0.4],[cx,H/2,w.x+WALL_W_DRAW,H*0.6]];
        crackLines.forEach(([x1,y1,x2,y2])=>{
          const t=Math.min(1,shatFrac*2);
          ctx.beginPath(); ctx.moveTo(x1,y1);
          ctx.lineTo(x1+(x2-x1)*t, y1+(y2-y1)*t); ctx.stroke();
        });
      }
      // Border glow
      ctx.strokeStyle=fl?'rgba(150,220,255,0.9)':'rgba(180,225,255,0.45)';
      ctx.lineWidth=fl?2.5:1.5; ctx.strokeRect(w.x,0,WALL_W_DRAW,H);
      // Hint label
      if(!w.shattering){
        ctx.fillStyle='rgba(200,240,255,0.55)'; ctx.font='bold 8px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('FLY', w.x+WALL_W_DRAW/2, H/2-8);
        ctx.fillText('THRU', w.x+WALL_W_DRAW/2, H/2+4);
        ctx.textAlign='left';
      }
      ctx.restore();
    });

    // ── Draw stones ────────────────────────────────────────────────
    const STONE_R_DRAW=32;
    gs.stones.forEach(s=>{
      ctx.save();
      ctx.translate(s.x, s.y);
      const fl = s.hitTimer > 0;
      const R = STONE_R_DRAW;

      // Irregular rock silhouette — fixed offsets give a chunky boulder shape
      const pts=[
        [0,-R*1.05],[R*0.55,-R*0.85],[R*0.95,-R*0.35],[R*1.0,R*0.2],
        [R*0.7,R*0.82],[R*0.1,R*1.0],[-R*0.5,R*0.9],[-R*0.95,R*0.45],
        [-R*1.0,-R*0.2],[-R*0.7,-R*0.75],[-R*0.25,-R*1.0]
      ];
      const rockPath=()=>{
        ctx.beginPath();
        ctx.moveTo(pts[0][0],pts[0][1]);
        for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
        ctx.closePath();
      };

      // Hit glow
      if(fl){
        ctx.shadowColor='rgba(255,200,60,0.9)'; ctx.shadowBlur=22;
        rockPath(); ctx.fillStyle='rgba(255,200,60,0.18)'; ctx.fill();
        ctx.shadowBlur=0; ctx.shadowColor='transparent';
      }

      // Drop shadow
      ctx.save(); ctx.translate(4,5);
      rockPath(); ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();
      ctx.restore();

      // Base stone fill — warm granite colours
      const bg=ctx.createRadialGradient(-R*0.3,-R*0.35,R*0.05, 0,0,R*1.1);
      bg.addColorStop(0,'#b0aa96');
      bg.addColorStop(0.35,'#888070');
      bg.addColorStop(0.65,'#666058');
      bg.addColorStop(1,'#3d3a34');
      rockPath(); ctx.fillStyle=bg; ctx.fill();

      // Colour variation patches — gives granite/sandstone feel
      ctx.save(); rockPath(); ctx.clip();
      const patches=[
        {x:-R*0.4,y:-R*0.2,rx:R*0.45,ry:R*0.3,a:-0.4,c:'rgba(160,148,112,0.28)'},
        {x:R*0.3,y:R*0.25,rx:R*0.38,ry:R*0.28,a:0.6,c:'rgba(100,90,70,0.22)'},
        {x:-R*0.1,y:R*0.4,rx:R*0.5,ry:R*0.22,a:-0.2,c:'rgba(180,168,130,0.18)'},
        {x:R*0.15,y:-R*0.45,rx:R*0.3,ry:R*0.18,a:0.3,c:'rgba(80,72,58,0.25)'},
      ];
      patches.forEach(({x,y,rx,ry,a,c})=>{
        ctx.fillStyle=c;
        ctx.beginPath(); ctx.ellipse(x,y,rx,ry,a,0,Math.PI*2); ctx.fill();
      });
      ctx.restore();

      // Surface pitting — small dark dots for rock texture
      ctx.save(); rockPath(); ctx.clip();
      const pits=[[-R*0.55,R*0.1],[R*0.4,-R*0.5],[R*0.6,R*0.35],[-R*0.2,R*0.55],[R*0.1,-R*0.2],[-R*0.65,-R*0.3],[R*0.25,R*0.6]];
      pits.forEach(([px,py])=>{
        ctx.fillStyle='rgba(0,0,0,0.2)';
        ctx.beginPath(); ctx.arc(px,py,2.5,0,Math.PI*2); ctx.fill();
      });
      ctx.restore();

      // Primary highlight — upper-left catching imaginary light
      ctx.save(); rockPath(); ctx.clip();
      const hl=ctx.createRadialGradient(-R*0.38,-R*0.42,0,-R*0.2,-R*0.28,R*0.62);
      hl.addColorStop(0,'rgba(255,252,220,0.38)');
      hl.addColorStop(0.5,'rgba(255,252,220,0.12)');
      hl.addColorStop(1,'rgba(255,252,220,0)');
      ctx.fillStyle=hl; ctx.fillRect(-R*1.2,-R*1.2,R*2.4,R*2.4);
      ctx.restore();

      rockPath();
      ctx.strokeStyle='rgba(50,46,38,0.75)';
      ctx.lineWidth=2;
      ctx.stroke();

      ctx.restore();
    });

    // ── Draw stone crumble particles ──────────────────────────────
    gs.stoneParticles.forEach(p=>{
      const alpha = Math.min(1, p.life / (p.maxLife * 0.5)); // fade out in second half
      ctx.save();
      ctx.globalAlpha = alpha * 0.92;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      // Irregular chunk shape
      ctx.beginPath();
      ctx.moveTo(-p.r*0.6, -p.r*0.5);
      ctx.lineTo( p.r*0.5, -p.r*0.7);
      ctx.lineTo( p.r*0.8,  p.r*0.2);
      ctx.lineTo( p.r*0.3,  p.r*0.7);
      ctx.lineTo(-p.r*0.5,  p.r*0.5);
      ctx.lineTo(-p.r*0.8, -p.r*0.1);
      ctx.closePath();
      ctx.fillStyle = p.col;
      ctx.fill();
      // Highlight edge
      ctx.strokeStyle = 'rgba(255,245,210,0.3)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.restore();
    });

    // ── HUD ───────────────────────────────────────────────────────────
    // Timer (top right)
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(W-142,8,134,28,6); ctx.fill();
    ctx.fillStyle='#2dd4bf'; ctx.font='bold 15px "Space Mono",monospace';
    ctx.textBaseline='middle'; ctx.textAlign='right';
    ctx.fillText(`⏱ ${elapsed.toFixed(3)}s`,W-12,22); ctx.textAlign='left';

    // Lives (top left) — draw profile pic icons
    const livesNow=livesRef.current;
    const lifeIconSize=22; const lifeGap=3; const lifePad=6;
    const livesBarW=livesNow>0 ? livesNow*(lifeIconSize+lifeGap)-lifeGap+lifePad*2 : 36;
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(8,8,Math.max(36,livesBarW),28,6); ctx.fill();
    if(livesNow<=0){
      ctx.font='16px sans-serif'; ctx.textBaseline='middle';
      ctx.fillText('💀', 14, 22);
    } else {
      for(let li=0;li<livesNow;li++){
        const lx=8+lifePad+li*(lifeIconSize+lifeGap);
        const ly=9;
        ctx.save();
        ctx.beginPath(); ctx.roundRect(lx,ly,lifeIconSize,lifeIconSize,4); ctx.clip();
        if(img && img.complete && img.naturalWidth>0){
          ctx.drawImage(img,lx,ly,lifeIconSize,lifeIconSize);
        } else {
          ctx.fillStyle='rgba(45,212,191,0.6)'; ctx.fillRect(lx,ly,lifeIconSize,lifeIconSize);
          ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('B',lx+lifeIconSize/2,ly+lifeIconSize/2);
          ctx.textAlign='left';
        }
        // thin teal border per icon
        ctx.strokeStyle='rgba(45,212,191,0.7)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.roundRect(lx,ly,lifeIconSize,lifeIconSize,4); ctx.stroke();
        ctx.restore();
      }
    }
    // Gun upgrade indicator
    if(gunUpgradedRef.current){
      ctx.fillStyle='rgba(0,0,0,0.55)';
      ctx.beginPath(); ctx.roundRect(8,42,76,20,5); ctx.fill();
      ctx.fillStyle='#fbbf24'; ctx.font='bold 9px "Space Mono",monospace';
      ctx.textBaseline='middle'; ctx.fillText('⚡ RAPID FIRE', 13, 52);
    }

    // Copter (blinks when invincible)
    const showCopter = invincRef.current===0 || Math.floor(invincRef.current/6)%2===0;
    if(showCopter) {
      drawHeli(ctx,img,W-80,gs.y,gs.vy,isDead);
      // Faint hitbox outline so player can see exact collision area
      if(!isDead){
        ctx.strokeStyle='rgba(45,212,191,0.25)';
        ctx.lineWidth=1;
        ctx.strokeRect(W-80-18, gs.y-9, 36, 18);
      }
    }
    if(isDead) drawExplosion(ctx,W-80,gs.y);
  };

  const drawHeli=(ctx,img,x,y,vy,isDead)=>{
    if(isDead) return;
    ctx.save(); ctx.translate(x,y);
    const tilt=Math.max(-0.35,Math.min(0.25,vy*0.04));
    ctx.rotate(tilt);
    const bodyGrad=ctx.createLinearGradient(-28,-12,28,12);
    bodyGrad.addColorStop(0,'#334155'); bodyGrad.addColorStop(0.5,'#475569'); bodyGrad.addColorStop(1,'#1e293b');
    ctx.fillStyle=bodyGrad;
    ctx.beginPath();
    ctx.moveTo(18,-10); ctx.lineTo(-22,-10); ctx.lineTo(-32,0); ctx.lineTo(-22,12); ctx.lineTo(18,12); ctx.lineTo(26,1); ctx.closePath();
    ctx.fill(); ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(45,212,191,0.22)'; ctx.strokeStyle='#2dd4bf'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(-16,0,14,10,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    if(img&&img.complete&&img.naturalWidth>0){
      ctx.save(); ctx.beginPath(); ctx.ellipse(-16,0,12,8.5,0,0,Math.PI*2); ctx.clip();
      ctx.drawImage(img,-28,-8.5,24,17); ctx.restore();
    } else {
      ctx.fillStyle='#0f766e'; ctx.font='bold 9px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('BRO',-16,0);
    }
    ctx.fillStyle='#334155';
    ctx.beginPath(); ctx.moveTo(18,-4); ctx.lineTo(38,-2); ctx.lineTo(38,6); ctx.lineTo(18,8); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#94a3b8'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(38,-8); ctx.lineTo(38,14); ctx.stroke();
    const rotorT=(Date.now()/80)%(Math.PI*2);
    ctx.strokeStyle='rgba(203,213,225,0.9)'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-4+Math.cos(rotorT)*32,-14+Math.sin(rotorT)*4);
    ctx.lineTo(-4-Math.cos(rotorT)*32,-14-Math.sin(rotorT)*4); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.beginPath(); ctx.arc(-4,-14,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#64748b'; ctx.lineWidth=2; ctx.lineCap='square';
    ctx.beginPath(); ctx.moveTo(-18,12); ctx.lineTo(-18,18); ctx.lineTo(10,18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8,12); ctx.lineTo(8,18); ctx.moveTo(-5,12); ctx.lineTo(-5,18); ctx.stroke();
    ctx.restore();
  };

  const drawExplosion=(ctx,x,y)=>{
    const t=Date.now();
    for(let i=0;i<6;i++){
      const phase=((t/50)+i*20)%360;
      const r=20+i*12+Math.sin(phase/57)*8;
      const alpha=Math.max(0,0.9-i*0.15);
      ctx.strokeStyle=`rgba(255,${Math.round(100+i*25)},0,${alpha})`;
      ctx.lineWidth=3-i*0.3; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
    }
    const flash=ctx.createRadialGradient(x,y,0,x,y,35);
    flash.addColorStop(0,'rgba(255,255,200,0.9)'); flash.addColorStop(0.4,'rgba(255,140,0,0.7)'); flash.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=flash; ctx.beginPath(); ctx.arc(x,y,35,0,Math.PI*2); ctx.fill();
    for(let i=0;i<12;i++){
      const ang=(i/12)*Math.PI*2+t/200; const dr=25+i*3;
      ctx.fillStyle=`rgba(255,${100+i*10},0,0.8)`;
      ctx.beginPath(); ctx.arc(x+Math.cos(ang)*dr,y+Math.sin(ang)*dr,3,0,Math.PI*2); ctx.fill();
    }
  };

  // ── Render ────────────────────────────────────────────────────────────
  const fmt=s=>`${s.toFixed(3)}s`;
  const isPlaying=gameState==='playing'||exploding;

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 12px',gap:10,minHeight:'70vh'}}>

      {/* Title */}
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--txt)',letterSpacing:'.04em'}}>🚁 <span style={{color:'var(--teal)'}}>HELI</span>BROS</div>
        <div style={{fontSize:11,color:'var(--txt3)',marginTop:2}}>Joystick ↓ to rise • ↑ to fall • X/Z fires missile</div>
      </div>

      {/* Setup */}
      {gameState==='setup' && (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,width:'100%',maxWidth:420}}>
          <div style={{display:'flex',gap:8,alignItems:'center',width:'100%',maxWidth:280}}>
            <input type="number" min="1" max="5000" placeholder="Bro ID (e.g. 420)"
              value={broId} onChange={e=>setBroId(e.target.value)}
              style={{flex:1,padding:'9px 12px',borderRadius:10,background:'var(--ink3)',
                border:'1.5px solid var(--line)',color:'var(--txt)',fontSize:14,outline:'none'}}/>
            {broNft&&broUrl&&(
              <div style={{width:40,height:40,borderRadius:10,overflow:'hidden',border:'2px solid var(--teal)',flexShrink:0}}>
                <img src={broUrl} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              </div>
            )}
          </div>
          {broId&&!broNft&&<div style={{fontSize:11,color:'#f87171'}}>Bro #{broId} not found</div>}
          <button onClick={startGame}
            style={{padding:'12px 48px',borderRadius:14,fontSize:17,fontWeight:900,
              background:'var(--teal)',color:'#000',border:'none',cursor:'pointer',
              boxShadow:'0 0 20px rgba(45,212,191,0.3)',letterSpacing:'.03em'}}>
            🚁 FLY
          </button>
          <div style={{fontSize:11,color:'var(--txt3)'}}>Joystick below screen or keyboard arrows</div>
        </div>
      )}

      {/* Canvas — touch/drag controls copter altitude directly */}
      {isPlaying && (
        <div style={{position:'relative',touchAction:'none',userSelect:'none',
          WebkitUserSelect:'none',WebkitTouchCallout:'none'}}
          onContextMenu={e=>e.preventDefault()}>
          <canvas ref={canvasRef} width={W} height={H}
            onPointerDown={onCanvasDown}
            onPointerMove={onCanvasMove}
            onPointerUp={onCanvasUp}
            onPointerLeave={onCanvasUp}
            onContextMenu={e=>e.preventDefault()}
            style={{display:'block',maxWidth:'100%',borderRadius:14,cursor:'crosshair',
              WebkitUserSelect:'none',userSelect:'none',

          {/* Missile button overlaid bottom-left */}

          {!submitted?(

              <div style={{display:'flex',gap:8,alignItems:'center'}}>

                <button onClick={submitScore}

              <div style={{fontSize:10,color:'var(--txt3)',textAlign:'center'}}>Wallet is optional — paste yours to flex your Hemi Bro identity 🤙</div>

          <div style={{display:'flex',gap:10}}>
            <button onClick={startGame}
              style={{padding:'11px 32px',borderRadius:12,fontSize:15,fontWeight:900,
                background:'var(--teal)',color:'#000',border:'none',cursor:'pointer'}}>🚁 Try Again</button>
            <button onClick={()=>{ stopHeliLoop(); setGameState('setup'); }}
              style={{padding:'11px 20px',borderRadius:12,fontSize:13,fontWeight:700,
                background:'var(--ink3)',color:'var(--txt)',border:'1.5px solid var(--line)',cursor:'pointer'}}>Change Bro</button>
          </div>
        </div>
      )}

      {/* Leaderboard */}
      <div style={{width:'100%',maxWidth:420,marginTop:8}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:800,color:'var(--txt)',letterSpacing:'.05em'}}>🏆 TOP 20 LEADERBOARD</div>
          <button onClick={loadLb} style={{fontSize:11,color:'var(--teal)',background:'none',border:'none',cursor:'pointer',fontWeight:700}}>
            {loadingLb?'…':'↻ Refresh'}</button>
        </div>
        {scores.length===0&&!loadingLb&&(
          <div style={{fontSize:12,color:'var(--txt3)',textAlign:'center',padding:'12px 0'}}>No scores yet — be the first!</div>
        )}
        {scores.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',
            background:i%2===0?'var(--ink3)':'transparent',borderRadius:8,marginBottom:2}}>
            <div style={{width:22,fontSize:13,fontWeight:900,
              color:i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#b45309':'var(--txt3)',textAlign:'center'}}>
              {i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                {s.bro_id&&(<div style={{fontSize:11,color:'var(--teal)',fontFamily:"'Space Mono',monospace",flexShrink:0}}>#{s.bro_id}</div>)}
                <div style={{fontSize:13,fontWeight:700,color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</div>

          </div>
        ))}
      </div>
    </div>
  );
};

const MYSTERY_LB_TABLE = 'mystery_jackpot_scores';
